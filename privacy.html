<style>
/* PRIVACY — Solana */
:root{--amber:#FFB527;--sol:#F2A93B;--terra:#E8431F;--terra2:#C2380F;--ink:#23190D;--mut:#7A6A52;
 --paper:#FFFAF1;--cream:#FFF3DF;--sand:#FBEED7;--line:#F0E2C8;--sky:#CDE8F2;
 --sh:0 26px 60px -34px rgba(120,70,20,.28);--sh2:0 14px 34px -22px rgba(120,70,20,.22)}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:"Hanken Grotesk",system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.7;font-size:17.5px;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:"Big Shoulders Display",system-ui,sans-serif;font-weight:700;letter-spacing:.005em;text-transform:uppercase;line-height:.95}
em{font-family:"Fraunces",Georgia,serif;font-style:italic;font-weight:450;text-transform:none}
h1 em,h2 em,h3 em{color:var(--terra)}
::selection{background:var(--ink);color:var(--amber)}
a{color:var(--terra)}
/* nav unificata */
nav{position:sticky;top:0;z-index:100;background:rgba(255,250,241,.85);backdrop-filter:blur(14px);border-bottom:1.5px solid var(--line)}
.nav-in{display:flex;align-items:center;justify-content:space-between;height:70px;gap:14px;max-width:1180px;margin:0 auto;padding:0 26px}
.brand{display:flex;align-items:center;gap:10px;font-family:"Big Shoulders Display",sans-serif;font-weight:700;font-size:1.2rem;text-transform:uppercase;letter-spacing:.03em;color:var(--ink);text-decoration:none;white-space:nowrap}
.logo{width:26px;height:26px;color:var(--terra);flex:none}
.nav-right{display:flex;align-items:center;gap:14px}
.nav-links{display:flex;gap:22px}
.nav-links a{color:var(--ink);text-decoration:none;font-weight:600;font-size:.93rem;opacity:.85}
.nav-links a:hover{opacity:1;color:var(--terra)}
@media(max-width:880px){.nav-links{display:none}}
.lang{display:flex;border:1.5px solid var(--line);border-radius:99px;overflow:hidden;background:#fff}
.lang button{border:none;background:transparent;font-family:inherit;font-size:.7rem;font-weight:800;padding:7px 10px;cursor:pointer;color:var(--mut)}
.lang button.on{background:var(--ink);color:var(--amber)}
.nav-cta{background:var(--terra);color:#fff;text-decoration:none;font-weight:700;font-size:.9rem;padding:10px 18px;border-radius:99px;white-space:nowrap;transition:background .2s,transform .2s}
.nav-cta:hover{background:#ff5a2a;transform:translateY(-2px)}
@media(max-width:560px){.nav-cta{display:none}.nav-in{padding:0 16px}.brand{font-size:.95rem}.lang button{padding:6px 7px;font-size:.6rem}}
/* pagina */
.page{max-width:860px;margin:0 auto;padding:64px 26px 96px}
.page-head{margin-bottom:30px}
.kicker{display:flex;align-items:center;gap:12px;font-size:.74rem;font-weight:800;letter-spacing:.24em;text-transform:uppercase;color:var(--terra2);margin-bottom:16px}
.kicker::before{content:"";width:30px;height:2.5px;background:var(--amber);border-radius:3px}
h1{font-size:clamp(2.4rem,6vw,3.8rem);color:var(--ink)}
.upd{color:var(--mut);font-size:.9rem;font-style:italic;margin-top:12px;max-width:640px}
.legal-card{background:#fff;border:1.5px solid var(--line);border-radius:20px;box-shadow:var(--sh2);padding:clamp(26px,5vw,48px)}
.box{background:var(--sand);border:1.5px solid var(--line);border-radius:14px;padding:20px 24px;margin-bottom:10px;font-family:"Fraunces",Georgia,serif;font-style:italic;font-weight:450;font-size:1.06rem;color:#54452F;line-height:1.6}
h2{display:flex;align-items:center;gap:12px;font-size:1.35rem;color:var(--ink);margin:36px 0 10px}
h2::before{content:"";width:22px;height:3px;background:var(--amber);border-radius:3px;flex:none}
p,li{color:#4E4130;font-size:.99rem}
p+p{margin-top:10px}
ul{margin:8px 0 8px 24px}
li{margin-bottom:8px}
li::marker{color:var(--sol)}
.legal-card a{font-weight:600;text-decoration-color:rgba(232,67,31,.4)}
.legal-card a:hover{color:var(--terra2)}
/* footer */
footer{background:var(--cream);color:var(--mut);border-top:1.5px solid var(--line);padding:36px 0 56px;font-size:.9rem}
.foot-in{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;max-width:1180px;margin:0 auto;padding:0 26px}
footer .brand{font-size:1.05rem}
.foot-links a{color:var(--terra);text-decoration:none;margin-left:18px;font-weight:600}
.foot-links a:hover{color:var(--terra2)}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms !important;transition-duration:.01ms !important}}

var I={"en": {"credit_by": "A project by","nav.how": "How it works", "nav.vil": "The villages", "nav.com": "Communities", "nav.join": "Join", "title": "Privacy Policy", "updated": "Draft · to be reviewed by a lawyer before final publication and before any real data collection.", "short": "In short: we only collect the data you voluntarily provide so that we can get back to you about the Tu Andalucía project. We do not sell it or share it with third parties. You can request its modification or deletion at any time.", "h1": "1. Who is the data controller", "p1": "The data controller is the promoter of the Tu Andalucía project. For any request regarding your data, you can write to webmaster.puntorosso@gmail.com.", "h2": "2. What data we collect", "p2a": "Data you enter in the contact form: name, phone, email, community of interest, village, preferred language.", "p2b": "Any additional information you share with us voluntarily (e.g. by email).", "p2c": "At this stage we do not collect sensitive data (health, income, opinions). These will only be requested later, with specific and separate consent.", "h3": "3. Why we process them", "p3a": "To get back to you and keep you informed about the project and the initiatives of your community — legal basis: your consent.", "p3b": "To organize meetings, exploratory trips and activities — legal basis: your consent and/or pre-contractual measures requested by you.", "h4": "4. How long we keep them", "p4": "We keep your data for as long as necessary to manage your participation and the contacts related to the project, and in any case until you request its deletion.", "h5": "5. Who they may be shared with", "p5a": "The data is accessible only to the people who manage the project. It is not shared with third parties for commercial purposes. It may be shared with any partners (e.g. local authorities, real estate agencies) only with your consent.", "p5b": "The registration form is handled through the technical service FormSubmit, which forwards the data to our email inbox as a technical provider; the data may pass through servers outside the EU.", "h6": "6. Your rights (GDPR)", "p6": "You have the right to access your data, correct it, delete it, restrict its processing, object to it and request its portability. To exercise these rights, write to webmaster.puntorosso@gmail.com. You also have the right to lodge a complaint with the competent supervisory authority.", "h7": "7. Cookies", "p7": "This site does not use profiling cookies. To remember the language you have chosen, we use only your browser's local storage (localStorage).", "back": "← Back to the site", "backtop": "Back to the site"}, "it": {"credit_by": "Un progetto di","nav.how": "Come funziona", "nav.vil": "I paesi", "nav.com": "Le comunità", "nav.join": "Unisciti", "title": "Informativa sulla privacy", "updated": "Bozza · da validare con un legale prima della pubblicazione definitiva e della raccolta dati reale.", "short": "In breve: raccogliamo solo i dati che ci lasci volontariamente per essere ricontattato sul progetto Tu Andalucía. Non li vendiamo né li cediamo a terzi. Puoi chiederne in ogni momento la modifica o la cancellazione.", "h1": "1. Chi è il titolare", "p1": "Il titolare del trattamento è il promotore del progetto Tu Andalucía. Per qualsiasi richiesta relativa ai tuoi dati puoi scrivere a webmaster.puntorosso@gmail.com.", "h2": "2. Quali dati raccogliamo", "p2a": "Dati che inserisci nel modulo di contatto: nome, telefono, email, comunità di interesse, borgo, lingua preferita.", "p2b": "Eventuali informazioni aggiuntive che ci comunichi spontaneamente (es. via email).", "p2c": "In questa fase non raccogliamo dati sensibili (salute, reddito, opinioni). Verranno richiesti solo più avanti, con un consenso specifico e separato.", "h3": "3. Perché li trattiamo", "p3a": "Per ricontattarti e informarti sul progetto e sulle iniziative della tua comunità — base giuridica: il tuo consenso.", "p3b": "Per organizzare incontri, viaggi esplorativi e attività — base giuridica: il tuo consenso e/o misure precontrattuali da te richieste.", "h4": "4. Per quanto tempo li conserviamo", "p4": "Conserviamo i tuoi dati per il tempo necessario a gestire la tua adesione e i contatti relativi al progetto, e comunque finché non ne richiedi la cancellazione.", "h5": "5. A chi possono essere comunicati", "p5a": "I dati sono accessibili solo alle persone che gestiscono il progetto. Non vengono ceduti a terzi per finalità commerciali. Potranno essere condivisi con eventuali partner (es. amministrazioni locali, agenzie immobiliari) solo con il tuo consenso.", "p5b": "Il modulo di iscrizione è gestito tramite il servizio tecnico FormSubmit, che inoltra i dati alla nostra casella email come fornitore tecnico; i dati potrebbero transitare su server extra-UE.", "h6": "6. I tuoi diritti (GDPR)", "p6": "Hai diritto di accedere ai tuoi dati, correggerli, cancellarli, limitarne il trattamento, opporti e richiederne la portabilità. Per esercitare questi diritti scrivi a webmaster.puntorosso@gmail.com. Hai inoltre il diritto di presentare reclamo all’autorità di controllo competente.", "h7": "7. Cookie", "p7": "Questo sito non utilizza cookie di profilazione. Per ricordare la lingua scelta usiamo esclusivamente la memoria locale del tuo browser (localStorage).", "back": "← Torna al sito", "backtop": "Torna al sito"}, "es": {"credit_by": "Un proyecto de","nav.how": "Cómo funciona", "nav.vil": "Los pueblos", "nav.com": "Comunidades", "nav.join": "Únete", "title": "Política de privacidad", "updated": "Borrador · pendiente de validación por un abogado antes de la publicación definitiva y de la recogida real de datos.", "short": "En resumen: solo recogemos los datos que nos facilitas voluntariamente para poder contactarte sobre el proyecto Tu Andalucía. No los vendemos ni los cedemos a terceros. Puedes solicitar su modificación o eliminación en cualquier momento.", "h1": "1. Quién es el responsable", "p1": "El responsable del tratamiento es el promotor del proyecto Tu Andalucía. Para cualquier solicitud relativa a tus datos puedes escribir a webmaster.puntorosso@gmail.com.", "h2": "2. Qué datos recogemos", "p2a": "Datos que introduces en el formulario de contacto: nombre, teléfono, correo electrónico, comunidad de interés, pueblo, idioma preferido.", "p2b": "Cualquier información adicional que nos comuniques espontáneamente (p. ej. por correo electrónico).", "p2c": "En esta fase no recogemos datos sensibles (salud, ingresos, opiniones). Solo se solicitarán más adelante, con un consentimiento específico y separado.", "h3": "3. Por qué los tratamos", "p3a": "Para contactarte e informarte sobre el proyecto y las iniciativas de tu comunidad — base jurídica: tu consentimiento.", "p3b": "Para organizar encuentros, viajes exploratorios y actividades — base jurídica: tu consentimiento y/o medidas precontractuales solicitadas por ti.", "h4": "4. Cuánto tiempo los conservamos", "p4": "Conservamos tus datos durante el tiempo necesario para gestionar tu adhesión y los contactos relacionados con el proyecto y, en todo caso, hasta que solicites su eliminación.", "h5": "5. A quién pueden comunicarse", "p5a": "Los datos solo son accesibles para las personas que gestionan el proyecto. No se ceden a terceros con fines comerciales. Podrán compartirse con posibles socios (p. ej. administraciones locales, agencias inmobiliarias) únicamente con tu consentimiento.", "p5b": "El formulario de inscripción se gestiona a través del servicio técnico FormSubmit, que reenvía los datos a nuestra bandeja de correo como proveedor técnico; los datos podrían transitar por servidores fuera de la UE.", "h6": "6. Tus derechos (RGPD)", "p6": "Tienes derecho a acceder a tus datos, rectificarlos, suprimirlos, limitar su tratamiento, oponerte y solicitar su portabilidad. Para ejercer estos derechos escribe a webmaster.puntorosso@gmail.com. Además, tienes derecho a presentar una reclamación ante la autoridad de control competente.", "h7": "7. Cookies", "p7": "Este sitio no utiliza cookies de perfilado. Para recordar el idioma elegido usamos exclusivamente el almacenamiento local de tu navegador (localStorage).", "back": "← Volver al sitio", "backtop": "Volver al sitio"}, "de": {"credit_by": "Ein Projekt von","nav.how": "So geht’s", "nav.vil": "Die Dörfer", "nav.com": "Gemeinschaften", "nav.join": "Mach mit", "title": "Datenschutzerklärung", "updated": "Entwurf · vor der endgültigen Veröffentlichung und der tatsächlichen Datenerhebung von einem Anwalt zu prüfen.", "short": "Kurz gesagt: Wir erheben nur die Daten, die du uns freiwillig überlässt, damit wir dich zum Tu Andalucía-Projekt kontaktieren können. Wir verkaufen sie nicht und geben sie nicht an Dritte weiter. Du kannst jederzeit ihre Änderung oder Löschung verlangen.", "h1": "1. Wer ist der Verantwortliche", "p1": "Verantwortlicher für die Verarbeitung ist der Initiator des Tu Andalucía-Projekts. Für jede Anfrage zu deinen Daten kannst du an webmaster.puntorosso@gmail.com schreiben.", "h2": "2. Welche Daten wir erheben", "p2a": "Daten, die du im Kontaktformular eingibst: Name, Telefon, E-Mail, gewünschte Gemeinschaft, Dorf, bevorzugte Sprache.", "p2b": "Zusätzliche Informationen, die du uns freiwillig mitteilst (z. B. per E-Mail).", "p2c": "In dieser Phase erheben wir keine sensiblen Daten (Gesundheit, Einkommen, Meinungen). Diese werden erst später und mit einer gesonderten, ausdrücklichen Einwilligung erfragt.", "h3": "3. Warum wir sie verarbeiten", "p3a": "Um dich zu kontaktieren und über das Projekt sowie die Initiativen deiner Gemeinschaft zu informieren — Rechtsgrundlage: deine Einwilligung.", "p3b": "Um Treffen, Erkundungsreisen und Aktivitäten zu organisieren — Rechtsgrundlage: deine Einwilligung und/oder von dir angeforderte vorvertragliche Maßnahmen.", "h4": "4. Wie lange wir sie aufbewahren", "p4": "Wir bewahren deine Daten so lange auf, wie es zur Verwaltung deiner Teilnahme und der projektbezogenen Kontakte erforderlich ist, in jedem Fall jedoch, bis du ihre Löschung verlangst.", "h5": "5. An wen sie weitergegeben werden können", "p5a": "Die Daten sind nur den Personen zugänglich, die das Projekt verwalten. Sie werden nicht zu kommerziellen Zwecken an Dritte weitergegeben. Eine Weitergabe an mögliche Partner (z. B. lokale Verwaltungen, Immobilienagenturen) erfolgt nur mit deiner Einwilligung.", "p5b": "Das Anmeldeformular wird über den technischen Dienst FormSubmit abgewickelt, der die Daten als technischer Anbieter an unser E-Mail-Postfach weiterleitet; die Daten können dabei über Server außerhalb der EU laufen.", "h6": "6. Deine Rechte (DSGVO)", "p6": "Du hast das Recht, auf deine Daten zuzugreifen, sie zu berichtigen, zu löschen, ihre Verarbeitung einzuschränken, ihr zu widersprechen und ihre Übertragbarkeit zu verlangen. Um diese Rechte auszuüben, schreibe an webmaster.puntorosso@gmail.com. Außerdem hast du das Recht, bei der zuständigen Aufsichtsbehörde Beschwerde einzulegen.", "h7": "7. Cookies", "p7": "Diese Website verwendet keine Profiling-Cookies. Um die von dir gewählte Sprache zu speichern, nutzen wir ausschließlich den lokalen Speicher deines Browsers (localStorage).", "back": "← Zurück zur Website", "backtop": "Zurück zur Website"}};
function setLang(l){if(!I[l])l='en';document.documentElement.lang=l;try{localStorage.setItem('mp_lang',l)}catch(e){}
 document.querySelectorAll('#lang button').forEach(function(b){b.classList.toggle('on',b.dataset.lang===l)});
 document.querySelectorAll('[data-i18n]').forEach(function(el){var k=el.getAttribute('data-i18n');if(I[l][k]!=null)el.textContent=I[l][k]})}
document.querySelectorAll('#lang button').forEach(function(b){b.addEventListener('click',function(){setLang(b.dataset.lang)})});
(function(){var s='en';try{s=localStorage.getItem('mp_lang')||'en'}catch(e){};setLang(s)})();
</script>
