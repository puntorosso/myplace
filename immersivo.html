<style>
:root{--sol:#F2A93B;--amber:#FFB527;--terra:#E8431F;--ink:#0E0D0C;--ink2:#15120F;--cream:#FCF7EE;--mut:#B9AE9C;--line:rgba(255,255,255,.14)}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;overflow-x:clip;background:var(--ink)}
body{font-family:"Hanken Grotesk",system-ui,sans-serif;background:var(--ink);color:var(--cream);line-height:1.6;font-size:18px;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:var(--sol);color:var(--ink)}
:focus-visible{outline:3px solid var(--sol);outline-offset:3px}
.disp{font-family:"Big Shoulders Display",system-ui,sans-serif;font-weight:700;line-height:.92;letter-spacing:.005em;text-transform:uppercase}
em{font-family:"Fraunces",Georgia,serif;font-style:italic;font-weight:450;text-transform:none;letter-spacing:-.01em}
.wrap{max-width:1280px;margin:0 auto;padding:0 30px}
a{color:var(--sol)}
.progress{position:fixed;top:0;left:0;height:3px;width:100%;z-index:200;transform-origin:0 50%;transform:scaleX(0);background:linear-gradient(90deg,var(--amber),var(--terra))}
@supports (animation-timeline:scroll()){.progress{animation:gw linear both;animation-timeline:scroll(root)}@keyframes gw{to{transform:scaleX(1)}}}
/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;transition:background .3s,backdrop-filter .3s,border-color .3s;border-bottom:1px solid transparent}
nav.solid{background:rgba(14,13,12,.72);backdrop-filter:blur(14px) saturate(1.3);border-bottom-color:var(--line)}
.nav-in{display:flex;align-items:center;justify-content:space-between;height:78px;gap:16px}
.brand{display:flex;align-items:center;gap:11px;font-family:"Big Shoulders Display",sans-serif;font-weight:700;font-size:1.5rem;letter-spacing:.02em;color:#fff;text-decoration:none;text-transform:uppercase}
.brand .dot{width:16px;height:16px;border-radius:50%;background:radial-gradient(circle at 38% 34%,#FFE9A8,var(--amber) 45%,var(--terra));box-shadow:0 0 22px 3px rgba(255,181,39,.55)}
.nav-right{display:flex;align-items:center;gap:16px}
.nav-links{display:flex;gap:26px}
.nav-links a{color:#EFE7D7;text-decoration:none;font-weight:600;font-size:.95rem;opacity:.85;transition:.2s}
.nav-links a:hover{opacity:1;color:var(--sol)}
@media(max-width:900px){.nav-links{display:none}}
.lang{display:flex;border:1px solid var(--line);border-radius:99px;overflow:hidden}
.lang button{border:none;background:transparent;color:var(--mut);font-family:inherit;font-weight:800;font-size:.72rem;padding:8px 10px;cursor:pointer}
.lang button.on{background:var(--cream);color:var(--ink)}
.njoin{background:var(--terra);color:#fff;text-decoration:none;font-weight:700;font-size:.92rem;padding:11px 20px;border-radius:99px;transition:.2s;white-space:nowrap}
.njoin:hover{background:#ff5a2a;transform:translateY(-1px)}
/* HERO full-bleed */
.hero{position:relative;min-height:100svh;display:flex;align-items:flex-end;overflow:hidden}
.hero .bg{position:absolute;inset:0;background-size:cover;background-position:center;transform:scale(1.04);animation:kb 18s ease-out forwards}
@keyframes kb{to{transform:scale(1.12)}}
.hero .veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(14,13,12,.62) 0%,rgba(14,13,12,.28) 26%,rgba(14,13,12,.5) 56%,rgba(14,13,12,.97) 100%)}
.hero .wrap{position:relative;z-index:2;padding-bottom:8vh;padding-top:120px}
.eye{display:inline-flex;align-items:center;gap:10px;font-size:.74rem;font-weight:800;letter-spacing:.24em;text-transform:uppercase;color:var(--amber);margin-bottom:24px}
.eye::before{content:"";width:30px;height:2px;background:var(--amber)}
.hero h1{font-size:clamp(3.2rem,8.6vw,7.6rem);color:#fff;text-shadow:0 4px 40px rgba(0,0,0,.4)}
.hero h1 .l2{display:block;color:var(--amber)}
.hero .lede{max-width:640px;margin:28px 0 0;font-size:clamp(1.1rem,1.8vw,1.4rem);color:#EFE7D7}
.hero-actions{display:flex;flex-wrap:wrap;gap:16px;margin-top:38px}
.btn{display:inline-flex;align-items:center;gap:10px;font-weight:700;font-size:1.04rem;padding:17px 32px;border-radius:99px;text-decoration:none;cursor:pointer;border:none;font-family:inherit;transition:.22s}
.btn-p{background:var(--terra);color:#fff;box-shadow:0 18px 40px -14px rgba(232,67,31,.6)}
.btn-p:hover{transform:translateY(-3px);background:#ff5a2a}
.btn-g{background:rgba(255,255,255,.08);color:#fff;border:1.5px solid rgba(255,255,255,.4);backdrop-filter:blur(6px)}
.btn-g:hover{background:rgba(255,255,255,.18)}
.scrolld{position:absolute;left:50%;bottom:26px;transform:translateX(-50%);z-index:2;color:#EFE7D7;font-size:.7rem;letter-spacing:.28em;text-transform:uppercase;opacity:.8;display:flex;flex-direction:column;align-items:center;gap:8px}
.scrolld span{width:1px;height:34px;background:linear-gradient(var(--amber),transparent);animation:sd 1.8s ease-in-out infinite}
@keyframes sd{0%,100%{opacity:.3;transform:scaleY(.7)}50%{opacity:1;transform:scaleY(1)}}
/* CHAPTER full-bleed */
.chapter{position:relative;min-height:92vh;display:flex;align-items:center;overflow:hidden}
.chapter .bg{position:absolute;inset:0;background-size:cover;background-position:center}
.chapter .veil{position:absolute;inset:0}
.ch1 .veil{background:linear-gradient(90deg,rgba(14,13,12,.94) 0%,rgba(14,13,12,.7) 45%,rgba(14,13,12,.25) 100%)}
.ch2 .veil{background:linear-gradient(270deg,rgba(14,13,12,.94) 0%,rgba(14,13,12,.6) 50%,rgba(14,13,12,.2) 100%)}
.chapter .wrap{position:relative;z-index:2}
.kick{font-size:.76rem;font-weight:800;letter-spacing:.26em;text-transform:uppercase;color:var(--amber);margin-bottom:22px;display:flex;align-items:center;gap:12px}
.kick::before{content:"";width:30px;height:2px;background:var(--amber)}
.ch-t{font-size:clamp(2.2rem,5.2vw,4.6rem);max-width:780px;color:#fff}
.ch-p{max-width:560px;margin-top:24px;font-size:1.2rem;color:#E7DDCB}
.ch2 .wrap{display:flex;justify-content:flex-end}
.ch2 .inner{max-width:620px;text-align:right}
.ch2 .ch-t,.ch2 .ch-p{margin-left:auto}
.steps{display:flex;flex-direction:column;gap:18px;margin-top:34px;max-width:560px;margin-left:auto}
.stp{display:flex;gap:18px;align-items:flex-start;background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:16px;padding:18px 22px;backdrop-filter:blur(6px)}
.stp .nn{font-family:"Big Shoulders Display",sans-serif;font-size:2rem;font-weight:700;color:var(--amber);line-height:1;flex:none}
.stp h3{font-size:1.18rem;color:#fff;margin-bottom:3px}.stp p{font-size:.96rem;color:#C8BCA8}
.ch2 .stp{text-align:left}
/* VILLAGES */
.vsec{background:var(--ink);padding:110px 0 90px}
.vhead{max-width:760px;margin-bottom:14px}
.vhead .v-t{font-size:clamp(2.4rem,6vw,5rem);color:#fff}
.vhead .v-p{font-size:1.18rem;color:var(--mut);margin-top:18px;max-width:620px}
/* LARVA feature */
.larva{position:relative;margin:46px 0 18px;border-radius:26px;overflow:hidden;min-height:60vh;display:flex;align-items:flex-end;text-decoration:none;color:#fff;box-shadow:0 40px 90px -40px #000}
.larva .bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .9s cubic-bezier(.3,1,.4,1)}
.larva:hover .bg{transform:scale(1.05)}
.larva .veil{position:absolute;inset:0;background:linear-gradient(200deg,rgba(14,13,12,.05) 30%,rgba(14,13,12,.92) 100%)}
.larva .in{position:relative;z-index:2;padding:42px}
.larva .pilot{display:inline-block;background:var(--amber);color:var(--ink);font-size:.7rem;font-weight:800;letter-spacing:.16em;text-transform:uppercase;padding:8px 14px;border-radius:99px;margin-bottom:14px}
.larva h3{font-family:"Big Shoulders Display",sans-serif;font-size:clamp(3rem,7vw,6rem);text-transform:uppercase;line-height:.9;color:#fff}
.larva .reg{color:var(--amber);font-weight:700;letter-spacing:.04em;margin-top:6px}
.larva p{max-width:600px;color:#E7DDCB;margin-top:14px;font-size:1.02rem}
.larva .go{display:inline-flex;align-items:center;gap:8px;margin-top:20px;color:#fff;background:var(--terra);padding:13px 24px;border-radius:99px;font-weight:700}
/* GRID of big village folders */
.cluster{font-size:.8rem;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:var(--amber);margin:54px 0 22px;display:flex;align-items:center;gap:14px}
.cluster::after{content:"";flex:1;height:1px;background:var(--line)}
.vgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:26px}
@media(max-width:780px){.vgrid{grid-template-columns:1fr}}
.vcard{position:relative;min-height:440px;border-radius:22px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;text-decoration:none;color:#fff;cursor:pointer;border:1px solid var(--line);box-shadow:0 30px 70px -44px #000;transition:transform .4s cubic-bezier(.3,1,.4,1),box-shadow .4s}
.vcard:hover{transform:translateY(-8px);box-shadow:0 50px 100px -40px #000}
.vcard .bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform 1s cubic-bezier(.3,1,.4,1);filter:saturate(1.05)}
.vcard:hover .bg{transform:scale(1.08)}
.vcard .veil{position:absolute;inset:0;background:linear-gradient(195deg,rgba(14,13,12,.04) 30%,rgba(14,13,12,.55) 64%,rgba(14,13,12,.95) 100%)}
.vcard .in{position:relative;z-index:2;padding:28px}
.vcard .reg{font-size:.74rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin-bottom:8px}
.vcard h3{font-family:"Big Shoulders Display",sans-serif;font-size:clamp(2.2rem,4vw,3.2rem);text-transform:uppercase;line-height:.9;color:#fff}
.vcard .vt{margin-top:12px;color:#E2D8C6;font-size:.96rem;max-width:90%}
.vcard .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.vcard .chips span{font-size:.74rem;font-weight:700;background:rgba(255,255,255,.12);border:1px solid var(--line);border-radius:99px;padding:6px 11px;backdrop-filter:blur(4px)}
.vcard .soon{position:absolute;top:18px;right:18px;z-index:3;font-size:.62rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:rgba(14,13,12,.6);border:1px solid var(--line);color:#EFE7D7;padding:6px 11px;border-radius:99px;backdrop-filter:blur(6px)}
.vcard .open{position:relative;z-index:2;display:inline-flex;align-items:center;gap:8px;margin-top:18px;font-weight:700;color:var(--amber);font-size:.92rem}
.vcard .arrow{transition:transform .3s}.vcard:hover .arrow{transform:translateX(6px)}
/* COMMUNITIES strip */
.com{background:var(--ink2);padding:96px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.com .v-t{font-size:clamp(2.2rem,5vw,4rem);color:#fff}
.com .v-p{color:var(--mut);margin-top:14px;font-size:1.15rem}
.compills{display:flex;flex-wrap:wrap;gap:14px;margin-top:38px}
.compill{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:99px;padding:13px 22px;font-weight:600;font-size:1.05rem;transition:.2s}
.compill:hover{background:rgba(255,255,255,.12);transform:translateY(-3px)}
.compill .e{font-size:1.4rem}
/* CTA full-bleed */
.cta{position:relative;min-height:80vh;display:flex;align-items:center;overflow:hidden}
.cta .bg{position:absolute;inset:0;background-size:cover;background-position:center}
.cta .veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(14,13,12,.86),rgba(14,13,12,.7))}
.cta .wrap{position:relative;z-index:2;text-align:center;max-width:820px}
.cta .v-t{font-size:clamp(2.4rem,6vw,5rem);color:#fff;margin:0 auto}
.cta .v-p{color:#E7DDCB;margin:22px auto 0;font-size:1.2rem;max-width:620px}
.cta .btn-p{margin-top:36px;font-size:1.15rem;padding:20px 42px}
.cta .note{margin-top:18px;color:var(--mut);font-size:.92rem;letter-spacing:.04em}
/* FOOTER */
footer{background:#000;color:var(--mut);padding:54px 0 60px;text-align:center}
footer .brand{justify-content:center;margin-bottom:18px}
.flinks{display:flex;gap:24px;justify-content:center;flex-wrap:wrap;margin-bottom:18px}
.flinks a{color:#CFC4B2;text-decoration:none;font-weight:600}.flinks a:hover{color:var(--sol)}
.ftag{font-size:.86rem;max-width:560px;margin:0 auto;opacity:.8}
/* reveal */
.rv{opacity:0;transform:translateY(34px)}
.rv.in{opacity:1;transform:none;transition:opacity 1s cubic-bezier(.2,.9,.3,1),transform 1s cubic-bezier(.2,.9,.3,1)}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.rv{opacity:1;transform:none}.hero .bg{animation:none}}
@media(max-width:620px){.njoin{display:none}}
@media(max-width:560px){.wrap{padding:0 18px}.nav-in{height:64px}.brand{font-size:1.15rem}.lang button{padding:7px 8px;font-size:.64rem}.ch2 .inner,.ch2 .steps{text-align:left;margin-left:0}.ch2 .wrap{justify-content:flex-start}.larva .in,.vcard .in{padding:24px}}
</style>
</head>

<script>
var D={"en": {"nav_how": "How it works", "nav_vil": "The villages", "nav_com": "Communities", "join": "Join the project", "h_eye": "Affordable Andalusian villages · communities by affinity", "h_t1": "Find your place.", "h_t2": "With your people.", "h_p": "Retire well, even on a small pension, in a sunlit village where life costs little — surrounded by people who share your passions.", "h_cta1": "Join the project", "h_cta2": "See the villages", "scroll": "Scroll", "c1_k": "Our generation's dilemma", "c1_t": "Many of us will reach retirement unable to stay where we live today.", "c1_p": "Cities priced us out. Pensions are small. And the deepest fear isn't money — it's growing old alone. We answer all three at once.", "c2_k": "How it works", "c2_t": "You don't move to a village. You found one — together.", "s1t": "Find your people", "s1p": "Join, or start, a community of kindred spirits — by passion, trade or values.", "s2t": "We match the village", "s2p": "Together we choose the right village and budget, with the town hall on board.", "s3t": "We handle the rest", "s3p": "Home, paperwork, the move, and a social life built around your group.", "v_k": "The villages", "v_t": "Eighteen villages. One could be yours.", "v_p": "Hand-picked across Andalusia — real services, affordable homes, town halls that want new life. Open a folder.", "pilot": "Pilot village", "larva_p": "~435 people, a clinic open 7/7 with an ambulance, a €2 taxi to the hospital, fibre, pharmacy, school. The first home of the project — an artists' village in the making.", "scopri": "Open the village", "soon": "Soon", "ch_pop": "people", "ch_house": "homes from", "ch_beach": "beach", "ch_net": "internet", "com_k": "The communities", "com_t": "Bring your tribe.", "com_p": "Eight worlds — and room to invent your own.", "cta_k": "Take the first step", "cta_t": "Your new life starts with one message.", "cta_p": "Tell us which community feels like yours — or start one. No commitment, just a conversation.", "cta_b": "Join the project →", "cta_n": "Free · by invitation · pilot phase", "foot": "Affordable villages · International communities by affinity · Andalusia, Spain"}, "it": {"nav_how": "Come funziona", "nav_vil": "I paesi", "nav_com": "Le comunità", "join": "Unisciti al progetto", "h_eye": "Borghi andalusi accessibili · comunità per affinità", "h_t1": "Trova il tuo posto.", "h_t2": "Con la tua gente.", "h_p": "Vivi bene la pensione, anche con un assegno piccolo, in un borgo pieno di sole dove la vita costa poco — tra persone che condividono le tue passioni.", "h_cta1": "Unisciti al progetto", "h_cta2": "Vedi i paesi", "scroll": "Scorri", "c1_k": "Il nodo della nostra generazione", "c1_t": "Molti di noi arriveranno alla pensione senza poter restare dove vivono oggi.", "c1_p": "Le città sono diventate care. Le pensioni piccole. E la paura più profonda non è il denaro: è invecchiare soli. Rispondiamo a tutte e tre insieme.", "c2_k": "Come funziona", "c2_t": "Non ti trasferisci in un borgo. Lo fondi — insieme.", "s1t": "Trova la tua gente", "s1p": "Entra, o avvia, una comunità di persone affini — per passione, mestiere o valori.", "s2t": "Abbiniamo il borgo", "s2p": "Scegliamo insieme il paese e il budget giusti, con il Comune al nostro fianco.", "s3t": "Al resto pensiamo noi", "s3p": "Casa, pratiche, trasloco e una vita sociale costruita attorno al tuo gruppo.", "v_k": "I paesi", "v_t": "Diciotto borghi. Uno può essere il tuo.", "v_p": "Scelti a mano in tutta l'Andalusia — servizi veri, case accessibili, Comuni che cercano nuova vita. Apri una cartella.", "pilot": "Borgo pilota", "larva_p": "~435 abitanti, ambulatorio aperto 7/7 con ambulanza, taxi a 2€ per l'ospedale, fibra, farmacia, scuola. La prima casa del progetto — un paese di artisti che sta nascendo.", "scopri": "Apri il borgo", "soon": "Presto", "ch_pop": "abitanti", "ch_house": "case da", "ch_beach": "mare", "ch_net": "internet", "com_k": "Le comunità", "com_t": "Porta la tua tribù.", "com_p": "Otto mondi — e spazio per inventare il tuo.", "cta_k": "Fai il primo passo", "cta_t": "La tua nuova vita inizia con un messaggio.", "cta_p": "Dicci a quale comunità senti di appartenere — o avviane una. Nessun impegno, solo una conversazione.", "cta_b": "Unisciti al progetto →", "cta_n": "Gratis · su invito · fase pilota", "foot": "Borghi accessibili · Comunità internazionali per affinità · Andalusia, Spagna"}, "es": {"nav_how": "Cómo funciona", "nav_vil": "Los pueblos", "nav_com": "Las comunidades", "join": "Únete al proyecto", "h_eye": "Pueblos andaluces asequibles · comunidades por afinidad", "h_t1": "Encuentra tu lugar.", "h_t2": "Con tu gente.", "h_p": "Vive bien la jubilación, aun con una pensión pequeña, en un pueblo lleno de sol donde la vida cuesta poco — entre personas que comparten tus pasiones.", "h_cta1": "Únete al proyecto", "h_cta2": "Ver los pueblos", "scroll": "Desliza", "c1_k": "El dilema de nuestra generación", "c1_t": "Muchos llegaremos a la jubilación sin poder quedarnos donde vivimos hoy.", "c1_p": "Las ciudades se encarecieron. Las pensiones son pequeñas. Y el miedo más hondo no es el dinero: es envejecer solos. Respondemos a los tres a la vez.", "c2_k": "Cómo funciona", "c2_t": "No te mudas a un pueblo. Lo fundas — juntos.", "s1t": "Encuentra a tu gente", "s1p": "Únete, o crea, una comunidad de personas afines — por pasión, oficio o valores.", "s2t": "Buscamos el pueblo", "s2p": "Elegimos juntos el pueblo y el presupuesto, con el Ayuntamiento a favor.", "s3t": "Del resto nos ocupamos", "s3p": "Casa, trámites, mudanza y una vida social en torno a tu grupo.", "v_k": "Los pueblos", "v_t": "Dieciocho pueblos. Uno puede ser el tuyo.", "v_p": "Elegidos a mano por toda Andalucía — servicios reales, casas asequibles, ayuntamientos que quieren nueva vida. Abre una carpeta.", "pilot": "Pueblo piloto", "larva_p": "~435 habitantes, consultorio abierto 7/7 con ambulancia, taxi de 2€ al hospital, fibra, farmacia, escuela. La primera casa del proyecto — un pueblo de artistas en formación.", "scopri": "Abrir el pueblo", "soon": "Pronto", "ch_pop": "habitantes", "ch_house": "casas desde", "ch_beach": "playa", "ch_net": "internet", "com_k": "Las comunidades", "com_t": "Trae a tu tribu.", "com_p": "Ocho mundos — y sitio para inventar el tuyo.", "cta_k": "Da el primer paso", "cta_t": "Tu nueva vida empieza con un mensaje.", "cta_p": "Dinos a qué comunidad sientes que perteneces — o crea una. Sin compromiso, solo una conversación.", "cta_b": "Únete al proyecto →", "cta_n": "Gratis · por invitación · fase piloto", "foot": "Pueblos asequibles · Comunidades internacionales por afinidad · Andalucía, España"}, "de": {"nav_how": "So geht's", "nav_vil": "Die Dörfer", "nav_com": "Gemeinschaften", "join": "Mach mit", "h_eye": "Bezahlbare andalusische Dörfer · Gemeinschaften nach Wahlverwandtschaft", "h_t1": "Finde deinen Ort.", "h_t2": "Mit deinen Leuten.", "h_p": "Lebe den Ruhestand gut, auch mit kleiner Rente, in einem sonnigen Dorf, wo das Leben wenig kostet — unter Menschen, die deine Leidenschaften teilen.", "h_cta1": "Mach mit", "h_cta2": "Dörfer ansehen", "scroll": "Scrollen", "c1_k": "Das Dilemma unserer Generation", "c1_t": "Viele von uns gehen in Rente und können nicht bleiben, wo sie heute leben.", "c1_p": "Die Städte sind zu teuer. Die Renten klein. Und die tiefste Angst ist nicht das Geld — es ist, allein alt zu werden. Wir beantworten alle drei zugleich.", "c2_k": "So funktioniert's", "c2_t": "Du ziehst nicht in ein Dorf. Du gründest eins — gemeinsam.", "s1t": "Finde deine Leute", "s1p": "Tritt einer Gemeinschaft Gleichgesinnter bei oder gründe eine — nach Leidenschaft, Beruf oder Werten.", "s2t": "Wir finden das Dorf", "s2p": "Gemeinsam wählen wir Dorf und Budget — mit dem Rathaus an Bord.", "s3t": "Den Rest machen wir", "s3p": "Zuhause, Formalitäten, Umzug und ein soziales Leben rund um deine Gruppe.", "v_k": "Die Dörfer", "v_t": "Achtzehn Dörfer. Eines könnte deins sein.", "v_p": "Handverlesen in ganz Andalusien — echte Versorgung, bezahlbare Häuser, Rathäuser, die neues Leben wollen. Öffne eine Mappe.", "pilot": "Pilotdorf", "larva_p": "~435 Einwohner, Arztpraxis 7/7 mit Krankenwagen, 2-€-Taxi zum Krankenhaus, Glasfaser, Apotheke, Schule. Das erste Zuhause des Projekts — ein Künstlerdorf im Entstehen.", "scopri": "Dorf öffnen", "soon": "Bald", "ch_pop": "Einwohner", "ch_house": "Häuser ab", "ch_beach": "Strand", "ch_net": "Internet", "com_k": "Die Gemeinschaften", "com_t": "Bring deinen Stamm mit.", "com_p": "Acht Welten — und Platz, deine eigene zu erfinden.", "cta_k": "Mach den ersten Schritt", "cta_t": "Dein neues Leben beginnt mit einer Nachricht.", "cta_p": "Sag uns, welche Gemeinschaft sich nach dir anfühlt — oder gründe eine. Unverbindlich, nur ein Gespräch.", "cta_b": "Mach mit →", "cta_n": "Kostenlos · auf Einladung · Pilotphase", "foot": "Bezahlbare Dörfer · Internationale Gemeinschaften nach Wahlverwandtschaft · Andalusien, Spanien"}}, VILL=[{"slug": "bedmar", "name": "Bedmar y Garcíez", "region": "Sierra Mágina · Jaén", "cluster": "Sierra Mágina", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/Bedmar%2001.jpg?width=1400", "pop": "~355 (Garcíez) · 2.571 (mun.)", "house": "€10.300+", "beach": "", "net": "UNICO / 4G", "tags": ["🌿", "🔧"], "hi": {"en": "Tucked inside the Sierra Mágina Natural Park in Jaén, Bedmar y Garcíez pairs a living municipality of 2,571 with the…", "it": "Incastonato nel Parco Naturale Sierra Mágina (Jaén), Bedmar y Garcíez unisce un municipio vivo di 2.571 abitanti al m…", "es": "Enclavado en el Parque Natural Sierra Mágina (Jaén), Bedmar y Garcíez une un municipio vivo de 2.571 habitantes con e…", "de": "Im Naturpark Sierra Mágina hat der winzige Weiler Garcíez (rund 355 Einwohner) den minimalen, vertrauten Maßstab von…"}}, {"slug": "belmez", "name": "Bélmez de la Moraleda", "region": "Sierra Mágina · Jaén", "cluster": "Sierra Mágina", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/B%C3%A9lmez%20de%20la%20Moraleda%2024J%2001.jpg? var lang='en';
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}
function chip(label,val){return val? '<span>'+label+' '+esc(val)+'</span>':''}
function renderVill(){
  var box=document.getElementById('villBox'); box.innerHTML='';
  var clusters=[]; VILL.forEach(function(v){if(clusters.indexOf(v.cluster)<0)clusters.push(v.cluster)});
  clusters.forEach(function(cl){
    var items=VILL.filter(function(v){return v.cluster===cl});
    var reg=items[0].region;
    var h='<div class="cluster rv">'+esc(reg)+'</div><div class="vgrid">';
    items.forEach(function(v){
      var chips='<div class="chips">'+chip('👥',v.pop)+chip('🏠',v.house)+(v.beach?chip('🏖️',v.beach):chip('📶',v.net))+'</div>';
      h+='<a class="vcard rv" href="borgo.html?id='+v.slug+'">'+
        '<div class="bg" style="background-image:url(\''+v.photo+'\')"></div><div class="veil"></div>'+
        '<span class="soon">'+D[lang].soon+'</span>'+
        '<div class="in"><div class="reg">'+esc(v.region)+'</div><h3>'+esc(v.name)+'</h3>'+
        '<div class="vt">'+esc(v.hi[lang])+'</div>'+chips+
        '<span class="open"><span>'+D[lang].scopri+'</span><span class="arrow">→</span></span></div></a>';
    });
    h+='</div>';
    box.insertAdjacentHTML('beforeend',h);
  });
  observe();
}
function renderComs(){
  var c=document.getElementById('compills'); c.innerHTML='';
  COMS.forEach(function(x){c.insertAdjacentHTML('beforeend','<a class="compill" href="registrati.html"><span class="e">'+x[0]+'</span>'+x[1]+'</a>')});
}
function applyLang(l){
  if(!D[l])l='en'; lang=l; document.documentElement.lang=l;
  try{localStorage.setItem('mp_lang',l)}catch(e){}
  document.querySelectorAll('#lang button').forEach(function(b){b.classList.toggle('on',b.dataset.l===l)});
  document.querySelectorAll('[data-k]').forEach(function(el){var k=el.getAttribute('data-k');if(D[l][k]!=null)el.textContent=D[l][k]});
  renderVill();
}
function observe(){
  if(!window.IntersectionObserver){document.querySelectorAll('.rv').forEach(function(e){e.classList.add('in')});return;}
  var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}})},{threshold:.12});
  document.querySelectorAll('.rv:not(.in)').forEach(function(e){io.observe(e)});
}
renderComs();
document.querySelectorAll('#lang button').forEach(function(b){b.addEventListener('click',function(){applyLang(b.dataset.l)})});
(function(){var s='';try{s=localStorage.getItem('mp_lang')||''}catch(e){};if(!s){var nl=(navigator.language||'en').slice(0,2).toLowerCase();s={it:'it',es:'es',de:'de'}[nl]||'en';}applyLang(s);})();
var nav=document.getElementById('nav');
function onscroll(){nav.classList.toggle('solid',window.scrollY>60)}
window.addEventListener('scroll',onscroll,{passive:true});onscroll();
</script>
