<style>
/* COMUNITÀ — Solana */
:root{--amber:#FFB527;--sol:#F2A93B;--terra:#E8431F;--terra2:#C2380F;--ink:#23190D;--mut:#7A6A52;
 --paper:#FFFAF1;--cream:#FFF3DF;--sand:#FBEED7;--line:#F0E2C8;--olive:#5F7A33;
 --sh:0 26px 60px -34px rgba(120,70,20,.28);--sh2:0 14px 34px -22px rgba(120,70,20,.22)}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:"Hanken Grotesk",system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.62;font-size:18px;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:"Big Shoulders Display",system-ui,sans-serif;font-weight:700;text-transform:uppercase;line-height:.95}
em{font-family:"Fraunces",Georgia,serif;font-style:italic;font-weight:450;text-transform:none}
::selection{background:var(--ink);color:var(--amber)}
.wrap{max-width:1020px;margin:0 auto;padding:0 24px}
nav{background:rgba(255,250,241,.85);border-bottom:1.5px solid var(--line);position:sticky;top:0;z-index:10;backdrop-filter:blur(14px)}
.nav-in{display:flex;align-items:center;justify-content:space-between;height:70px;gap:14px;max-width:1180px;margin:0 auto;padding:0 26px}
.brand{display:flex;align-items:center;gap:10px;font-family:"Big Shoulders Display",sans-serif;font-weight:700;font-size:1.2rem;text-transform:uppercase;letter-spacing:.03em;color:var(--ink);text-decoration:none;white-space:nowrap}
.logo{width:26px;height:26px;color:var(--terra);flex:none}
.nav-right{display:flex;align-items:center;gap:14px}
.nav-links{display:flex;gap:22px}
.nav-links a{color:var(--ink);text-decoration:none;font-weight:600;font-size:.93rem;opacity:.85}
.nav-links a:hover{opacity:1;color:var(--terra)}
@media(max-width:880px){.nav-links{display:none}}
.lang{display:flex;border:1.5px solid var(--line);border-radius:99px;overflow:hidden;background:#fff}
.lang button{border:none;background:transparent;font-family:inherit;font-size:.7rem;font-weight:800;padding:7px 10px;cursor:pointer;color:var(--mut)}
.lang button.on{background:var(--ink);color:var(--amber)}
.nav-cta{background:var(--terra);color:#fff;text-decoration:none;font-weight:700;font-size:.9rem;padding:10px 18px;border-radius:99px;white-space:nowrap}
.nav-cta:hover{background:#ff5a2a}
@media(max-width:560px){.nav-cta{display:none}}
/* hero */
.chero{position:relative;min-height:54svh;display:flex;align-items:flex-end;overflow:hidden}
.chero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.chero .shade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(35,25,13,.18),rgba(35,25,13,0) 40%,rgba(255,250,241,.06) 70%,rgba(255,250,241,.65) 100%)}
.glasshd{position:relative;z-index:2;margin:0 auto;width:100%;max-width:1020px;padding:0 24px 40px}
.glasshd .in{display:inline-block;background:rgba(255,250,241,.86);backdrop-filter:blur(16px) saturate(1.3);-webkit-backdrop-filter:blur(16px) saturate(1.3);border:1px solid rgba(255,255,255,.7);border-radius:22px;padding:24px 28px;box-shadow:var(--sh);max-width:640px}
.glasshd .emoji{font-size:2rem;display:block;margin-bottom:6px}
.glasshd h1{font-size:clamp(2.4rem,6vw,4.2rem);color:var(--ink)}
.glasshd .tagline{font-family:"Fraunces",Georgia,serif;font-style:italic;font-weight:450;font-size:1.18rem;color:var(--terra2);margin-top:8px;text-transform:none}
.badge{display:inline-block;font-size:.68rem;font-weight:800;letter-spacing:.16em;text-transform:uppercase;padding:7px 14px;border-radius:99px;margin-bottom:12px}
.badge.active{background:var(--terra);color:#fff}
.badge.forming{background:#fff;color:var(--olive);border:1.5px solid var(--olive)}
/* corpo */
main.wrap{padding-top:92px}
.kicker{display:flex;align-items:center;gap:12px;font-size:.74rem;font-weight:800;letter-spacing:.24em;text-transform:uppercase;color:var(--terra2);margin-bottom:16px}
.kicker::before{content:"";width:30px;height:2.5px;background:var(--amber);border-radius:3px}
.lede{font-size:clamp(1.1rem,1.9vw,1.35rem);max-width:760px;color:#54452F}
.sect{margin-top:70px}
.acts{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:30px}
@media(max-width:760px){.acts{grid-template-columns:1fr}}
.act{background:#fff;border:1.5px solid var(--line);border-radius:20px;padding:26px;box-shadow:var(--sh2);transition:transform .3s,box-shadow .3s}
.act:hover{transform:translateY(-4px);box-shadow:var(--sh)}
.act .ic{font-size:1.7rem;margin-bottom:10px;display:block}
.act h3{font-size:1.22rem;margin-bottom:8px}
.act p{color:var(--mut);font-size:.96rem}
.wherebox{background:var(--sand);border:1.5px solid var(--line);border-radius:22px;padding:30px;margin-top:30px;box-shadow:var(--sh2)}
.wherebox p{max-width:720px;color:#54452F}
.wbtns{display:flex;flex-wrap:wrap;gap:12px;margin-top:20px}
.btn{display:inline-flex;align-items:center;gap:9px;font-weight:700;font-size:.98rem;padding:13px 24px;border-radius:99px;text-decoration:none;transition:.2s;border:none;cursor:pointer;font-family:inherit}
.btn-primary{background:var(--terra);color:#fff;box-shadow:0 14px 36px -12px rgba(232,67,31,.5)}
.btn-primary:hover{background:#ff5a2a;transform:translateY(-2px)}
.btn-ghost{background:#fff;color:var(--ink);border:1.5px solid var(--ink)}
.btn-ghost:hover{background:var(--ink);color:var(--amber)}
.others{display:flex;flex-wrap:wrap;gap:10px;margin-top:26px}
.oc{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--line);border-radius:99px;padding:10px 18px;text-decoration:none;color:var(--ink);font-weight:600;font-size:.92rem;transition:.18s;box-shadow:var(--sh2)}
.oc:hover{border-color:var(--terra);transform:translateY(-2px);color:var(--terra)}
/* CTA */
.cta{margin-top:80px;background:radial-gradient(80% 90% at 80% -10%,rgba(255,181,39,.5) 0%,rgba(255,181,39,0) 60%),linear-gradient(180deg,var(--sand),var(--cream));border-top:1.5px solid var(--line);padding:70px 0 80px;text-align:center}
.cta h2{font-size:clamp(2rem,5vw,3.2rem)}
.cta .note{font-size:.92rem;color:var(--mut);margin-top:16px;max-width:520px;margin-left:auto;margin-right:auto}
.cta .btn{margin-top:24px;font-size:1.08rem;padding:17px 34px}
footer{background:var(--cream);border-top:1.5px solid var(--line);padding:28px 0;color:var(--mut);font-size:.88rem}
.foot-in{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;max-width:1180px;margin:0 auto;padding:0 26px}
footer .brand{font-size:1rem}
footer a{color:var(--terra);text-decoration:none;font-weight:600}
.nf{padding:90px 0;text-align:center;color:var(--mut)}
@media(max-width:760px){main.wrap{padding-top:60px}.sect{margin-top:54px}}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms !important;transition-duration:.01ms !important}}
</style>

<script>
var C={"arte": {"name": {"en": "Arts & stage", "it": "Arte & spettacolo", "es": "Arte y escena", "de": "Kunst & Bühne"}, "emoji": "🎭", "img": "https://images.pexels.com/photos/10240139/pexels-photo-10240139.jpeg?auto=compress&cs=tinysrgb&w=1600", "status": "active", "tagline": {"en": "Music, paint and words in a village coming back to life", "it": "Musica, colori e parole in un borgo che rinasce", "es": "Música, color y palabras en un pueblo que renace", "de": "Musik, Farben und Worte in einem Dorf, das wieder auflebt"}, "intro": {"en": "You play, paint, write or act — maybe all your life, maybe since you finally found the time. This community brings together people like you who want to take their art to an Andalusian village: a shared rehearsal room, open workshops, evenings in the square. Not starting over — just carrying on creating, together, in a place that needs you.", "it": "Suoni, dipingi, scrivi, reciti — da una vita o da quando finalmente hai tempo. Questa comunità riunisce persone come te che vogliono portare la propria arte in un borgo andaluso: una sala prove condivisa, laboratori aperti, serate in piazza. Non per ricominciare da zero, ma per continuare a creare, insieme, in un posto che ha bisogno di voi.", "es": "Tocas, pintas, escribes o haces teatro — de toda la vida o desde que por fin tienes tiempo. Esta comunidad reúne a personas como tú que quieren llevar su arte a un pueblo andaluz: una sala de ensayo compartida, talleres abiertos, tardes en la plaza. No se trata de empezar de cero, sino de seguir creando, juntos, en un lugar que os necesita.", "de": "Du machst Musik, malst, schreibst oder spielst Theater — seit Jahrzehnten oder seit du endlich Zeit hast. Diese Gemeinschaft bringt Menschen wie dich zusammen, die ihre Kunst in ein andalusisches Dorf tragen wollen: ein gemeinsamer Proberaum, offene Werkstätten, Abende auf dem Dorfplatz. Nicht neu anfangen, sondern weitermachen — gemeinsam, an einem Ort, der euch braucht."}, "activities": [{"emoji": "🎵", "title": {"en": "A shared rehearsal room", "it": "Sala prove condivisa", "es": "Sala de ensayo compartida", "de": "Gemeinsamer Proberaum"}, "text": {"en": "A room with good acoustics where you can practise together, from a duo to the village choir. Play whenever you like — no neighbours banging on the wall.", "it": "Una stanza con buona acustica dove provare insieme, dal duo al coro del paese. Si suona quando si vuole, senza vicini che bussano al muro.", "es": "Una sala con buena acústica para ensayar juntos, del dúo al coro del pueblo. Se toca cuando se quiere, sin vecinos que golpeen la pared.", "de": "Ein Raum mit guter Akustik zum gemeinsamen Proben — vom Duo bis zum Dorfchor. Gespielt wird, wann ihr wollt, ohne dass jemand an die Wand klopft."}}, {"emoji": "🎨", "title": {"en": "A studio with southern light", "it": "Atelier con la luce del sud", "es": "Un taller con la luz del sur", "de": "Ein Atelier im Licht des Südens"}, "text": {"en": "A shared space with easels and worktables for painting, drawing and printmaking — with open workshops for villagers who would like to try.", "it": "Uno spazio comune con cavalletti e tavoli da lavoro per dipingere, disegnare e incidere — con laboratori aperti a chi del paese vuole provare.", "es": "Un espacio común con caballetes y mesas de trabajo para pintar, dibujar y grabar — con talleres abiertos a los vecinos que quieran probar.", "de": "Ein gemeinsamer Raum mit Staffeleien und Werktischen zum Malen, Zeichnen und Drucken — mit offenen Kursen für alle im Dorf, die es ausprobieren möchten."}}, {"emoji": "📖", "title": {"en": "A literary café", "it": "Caffè letterario", "es": "Un café literario", "de": "Ein Literaturcafé"}, "text": {"en": "A corner with full bookshelves, readings aloud and launches of books written right here. Or simply a place to sit for a while, with a coffee.", "it": "Un angolo con scaffali pieni, letture ad alta voce e presentazioni dei libri scritti in paese. O semplicemente un posto dove stare, con un caffè.", "es": "Un rincón con estanterías llenas, lecturas en voz alta y presentaciones de los libros escritos en el pueblo. O simplemente un sitio donde estar, con un café.", "de": "Eine Ecke mit vollen Bücherregalen, Lesungen und kleinen Buchpremieren aus dem Dorf. Oder einfach ein Ort zum Sitzen, mit einem Kaffee."}}, {"emoji": "🎭", "title": {"en": "The village festival", "it": "Il festival del paese", "es": "El festival del pueblo", "de": "Das Dorffest der Künste"}, "text": {"en": "Once a year, music, theatre and exhibitions in the streets — organised with the locals, to bring people and life back to the village.", "it": "Una volta all'anno, musica, teatro e mostre per le strade: organizzato con gli abitanti, per riportare gente e vita nel borgo.", "es": "Una vez al año, música, teatro y exposiciones por las calles, organizado con los vecinos, para devolver gente y vida al pueblo.", "de": "Einmal im Jahr Musik, Theater und Ausstellungen in den Gassen — gemeinsam mit den Einwohnern organisiert, damit wieder Leben ins Dorf kommt."}}], "where": {"en": "This community already has its village: Larva, in the province of Jaén at the foot of the Sierra Mágina — around 435 inhabitants, a medical clinic open seven days a week, and a mayor who backs the project. Before anyone decides anything, you visit it together on an exploratory trip.", "it": "Questa comunità ha già il suo borgo: Larva, in provincia di Jaén, ai piedi della Sierra Mágina — circa 435 abitanti, un ambulatorio aperto 7 giorni su 7 e una sindaca che sostiene il progetto. Prima di decidere qualsiasi cosa, lo si visita insieme con un viaggio esplorativo.", "es": "Esta comunidad ya tiene su pueblo: Larva, en la provincia de Jaén, a los pies de Sierra Mágina — unos 435 habitantes, un consultorio médico abierto los 7 días de la semana y una alcaldesa que apoya el proyecto. Antes de decidir nada, se visita juntos en un viaje exploratorio.", "de": "Diese Gemeinschaft hat ihr Dorf schon gefunden: Larva in der Provinz Jaén, am Fuß der Sierra Mágina — rund 435 Einwohner, eine Arztpraxis, die an sieben Tagen die Woche geöffnet ist, und eine Bürgermeisterin, die das Projekt unterstützt. Bevor jemand etwas entscheidet, besucht ihr es gemeinsam auf einer Erkundungsreise."}}, "natura": {"name": {"en": "Nature & animals", "it": "Natura & animali", "es": "Naturaleza y animales", "de": "Natur & Tiere"}, "emoji": "🌿", "img": "https://images.pexels.com/photos/9909229/pexels-photo-9909229.jpeg?auto=compress&cs=tinysrgb&w=1600", "status": "forming", "tagline": {"en": "Trails, wings and wet noses, every day", "it": "Sentieri, ali e musi bagnati, ogni giorno", "es": "Senderos, alas y hocicos húmedos, cada día", "de": "Pfade, Flügel und feuchte Schnauzen, jeden Tag"}, "intro": {"en": "You're happiest outdoors: boots on a trail, binoculars around your neck, a dog at your side or a horse to look after. This community dreams of a village where nature isn't a weekend trip but the front door — shared walks, animals cared for together, and neighbours who understand why you stop to watch a vulture circle.", "it": "Stai bene all'aria aperta: scarponi sul sentiero, binocolo al collo, un cane accanto o un cavallo di cui prenderti cura. Questa comunità sogna un borgo dove la natura non è la gita del weekend ma l'uscio di casa: camminate condivise, animali accuditi insieme e vicini che capiscono perché ti fermi a guardare un grifone che volteggia.", "es": "Estás a gusto al aire libre: botas en el sendero, prismáticos al cuello, un perro al lado o un caballo que cuidar. Esta comunidad sueña con un pueblo donde la naturaleza no sea la excursión del fin de semana sino la puerta de casa: caminatas compartidas, animales cuidados entre todos y vecinos que entienden por qué te paras a mirar un buitre planear.", "de": "Du bist am liebsten draußen: Stiefel auf dem Pfad, Fernglas um den Hals, ein Hund an deiner Seite oder ein Pferd, das dich braucht. Diese Gemeinschaft träumt von einem Dorf, in dem Natur kein Wochenendausflug ist, sondern direkt vor der Haustür beginnt — mit gemeinsamen Wanderungen, geteilter Tierpflege und Nachbarn, die verstehen, warum du stehen bleibst, wenn ein Geier kreist."}, "activities": [{"emoji": "🥾", "title": {"en": "Walking group on real trails", "it": "Gruppo di cammino sui sentieri", "es": "Grupo de senderismo en rutas reales", "de": "Wandergruppe auf echten Pfaden"}, "text": {"en": "Weekly walks at your own pace, from gentle olive-grove paths to longer routes in Sierra Mágina and Cazorla. Someone always knows the way back.", "it": "Camminate settimanali al ritmo di ognuno, dai sentieri dolci tra gli ulivi ai percorsi più lunghi in Sierra Mágina e Cazorla. C'è sempre chi conosce la via del ritorno.", "es": "Caminatas semanales al ritmo de cada uno, desde senderos suaves entre olivos hasta rutas más largas por Sierra Mágina y Cazorla. Siempre hay quien conoce el camino de vuelta.", "de": "Wöchentliche Wanderungen im eigenen Tempo, von sanften Wegen durch Olivenhaine bis zu längeren Touren in Sierra Mágina und Cazorla. Einer kennt immer den Rückweg."}}, {"emoji": "🐕", "title": {"en": "A small animal refuge, run together", "it": "Un piccolo rifugio gestito insieme", "es": "Un pequeño refugio gestionado juntos", "de": "Ein kleines Tierheim, gemeinsam geführt"}, "text": {"en": "A modest shelter for abandoned dogs and cats, with shared shifts for feeding, walks and vet visits. Useful work that gives every day a shape.", "it": "Un rifugio modesto per cani e gatti abbandonati, con turni condivisi per pasti, passeggiate e visite dal veterinario. Un impegno utile che dà forma alle giornate.", "es": "Un refugio modesto para perros y gatos abandonados, con turnos compartidos para comidas, paseos y visitas al veterinario. Una labor útil que da forma a los días.", "de": "Ein bescheidenes Tierheim für ausgesetzte Hunde und Katzen, mit gemeinsamen Diensten für Füttern, Gassigehen und Tierarztbesuche. Sinnvolle Arbeit, die dem Tag Struktur gibt."}}, {"emoji": "🔭", "title": {"en": "Birdwatching mornings and a logbook", "it": "Mattine di birdwatching e un registro", "es": "Mañanas de pajareo y un cuaderno de campo", "de": "Vogelbeobachtung am Morgen, mit Logbuch"}, "text": {"en": "Early outings with binoculars and a thermos, then notes over coffee: griffon vultures, bee-eaters, golden eagles. A shared record of what the valley shows you.", "it": "Uscite all'alba con binocolo e termos, poi appunti davanti a un caffè: grifoni, gruccioni, aquile reali. Un registro comune di ciò che la valle vi mostra.", "es": "Salidas al amanecer con prismáticos y termo, y luego apuntes con un café: buitres leonados, abejarucos, águilas reales. Un registro común de lo que os enseña el valle.", "de": "Frühe Touren mit Fernglas und Thermoskanne, danach Notizen beim Kaffee: Gänsegeier, Bienenfresser, Steinadler. Ein gemeinsames Logbuch dessen, was euch das Tal zeigt."}}, {"emoji": "🐴", "title": {"en": "Stables and paddocks for the horses", "it": "Stalle e paddock per i cavalli", "es": "Cuadras y prados para los caballos", "de": "Stall und Koppel für die Pferde"}, "text": {"en": "Shared stabling at village prices, with grazing land nearby and quiet bridle paths from the door. Care shared among people who know horses.", "it": "Una scuderia condivisa a prezzi di paese, con pascoli vicini e tranquille vie a cavallo che partono da casa. La cura si divide tra chi i cavalli li conosce davvero.", "es": "Cuadras compartidas a precios de pueblo, con pastos cerca y caminos tranquilos para montar desde la puerta. El cuidado se reparte entre gente que entiende de caballos.", "de": "Gemeinsame Stallplätze zu Dorfpreisen, mit Weiden in der Nähe und ruhigen Reitwegen direkt vor der Tür. Die Pflege teilt ihr euch unter Leuten, die Pferde wirklich kennen."}}], "where": {"en": "The founding group chooses the village together, from 18 hand-picked ones — some near the sea and the airport — based on what the community needs: trails, grazing land, space for animals. Every step is reversible: first an exploratory trip, then renting.", "it": "Il borgo lo sceglie il gruppo fondatore, insieme, tra i 18 borghi selezionati — alcuni vicini al mare e all'aeroporto — in base ai bisogni della comunità: sentieri, pascoli, spazio per gli animali. Ogni passo è reversibile: prima un viaggio esplorativo, poi l'affitto.", "es": "El pueblo lo elige el grupo fundador, juntos, entre los 18 pueblos seleccionados — algunos cerca del mar y del aeropuerto — según lo que necesite la comunidad: senderos, pastos, espacio para los animales. Cada paso es reversible: primero un viaje exploratorio, después el alquiler.", "de": "Das Dorf wählt die Gründungsgruppe gemeinsam aus — aus 18 ausgesuchten Dörfern, einige nah am Meer und am Flughafen — je nachdem, was die Gemeinschaft braucht: Wanderwege, Weideland, Platz für Tiere. Jeder Schritt ist umkehrbar: erst eine Erkundungsreise, dann zur Miete."}}, "cucina": {"name": {"en": "Kitchen & garden", "it": "Cucina & orto", "es": "Cocina y huerto", "de": "Küche & Garten"}, "emoji": "🥘", "img": "https://images.pexels.com/photos/7705363/pexels-photo-7705363.jpeg?auto=compress&cs=tinysrgb&w=1600", "status": "forming", "tagline": {"en": "Long tables, local olive oil, a garden you tend together", "it": "Tavolate lunghe, olio del posto, un orto da curare insieme", "es": "Mesas largas, aceite de aquí y un huerto que cuidar juntos", "de": "Lange Tafeln, Öl aus der Region, ein gemeinsamer Garten"}, "intro": {"en": "You're the kind of person whose day revolves around the table: you cook, you grow things, you make preserves — and you'd rather not do it alone. This community dreams of an Andalusian village with a shared vegetable garden, olive oil bought from the people who press it, and long lunches that need no occasion. It's just forming, and every step along the way is reversible.", "it": "Sei una di quelle persone per cui la giornata gira intorno alla tavola: cucini, coltivi, fai conserve, e ti piace farlo in compagnia. Questa comunità sogna un borgo andaluso con un orto condiviso, l'olio comprato da chi lo produce e tavolate che non hanno bisogno di un'occasione. È in formazione: si comincia con calma, e ogni passo è reversibile.", "es": "Eres de esas personas para las que el día gira en torno a la mesa: cocinas, cultivas, haces conservas, y te gusta hacerlo en compañía. Esta comunidad sueña con un pueblo andaluz con huerto compartido, aceite comprado a quien lo produce y mesas largas que no necesitan excusa. Está en formación: se empieza con calma, y cada paso es reversible.", "de": "Du gehörst zu den Menschen, bei denen sich der Tag um den Tisch dreht: Du kochst, ziehst Gemüse, kochst ein — und am liebsten nicht allein. Diese Gemeinschaft träumt von einem andalusischen Dorf mit gemeinsamem Garten, Olivenöl direkt vom Erzeuger und langen Tafeln ohne besonderen Anlass. Sie ist gerade im Entstehen — und jeder Schritt bleibt umkehrbar."}, "activities": [{"emoji": "🌱", "title": {"en": "The shared garden", "it": "L'orto condiviso", "es": "El huerto compartido", "de": "Der gemeinsame Garten"}, "text": {"en": "A plot divided into beds, worked together in the cool hours of the day. Some know how to prune, some how to graft — here, experience counts for more than a strong back.", "it": "Un terreno diviso in parcelle, lavorato insieme nelle ore fresche. C'è chi sa potare e chi sa innestare: qui l'esperienza vale più della schiena.", "es": "Una parcela dividida en bancales, trabajada juntos en las horas frescas. Unos saben podar, otros injertar: aquí la experiencia vale más que la espalda.", "de": "Ein Stück Land mit Beeten, bestellt in den kühlen Stunden des Tages. Wer schneiden oder veredeln kann, gibt es weiter: Erfahrung zählt hier mehr als Kraft."}}, {"emoji": "🍽️", "title": {"en": "The Sunday long table", "it": "La tavolata della domenica", "es": "La mesa larga del domingo", "de": "Die lange Sonntagstafel"}, "text": {"en": "One long table in the square or a courtyard, everyone brings a dish. Your recipes from home meet the neighbours' salmorejo.", "it": "Una tavola lunga in piazza o in cortile, ognuno porta un piatto. Le ricette di casa tua incontrano il salmorejo dei vicini.", "es": "Una mesa larga en la plaza o en un patio, cada uno trae un plato. Tus recetas de casa se encuentran con el salmorejo de los vecinos.", "de": "Eine lange Tafel auf dem Platz oder im Hof, jeder bringt etwas mit. Deine Rezepte von zu Hause treffen auf das Salmorejo der Nachbarn."}}, {"emoji": "🫙", "title": {"en": "The preserving kitchen", "it": "Il laboratorio delle conserve", "es": "El obrador de conservas", "de": "Die Einmachküche"}, "text": {"en": "A well-equipped kitchen for jams, tomato sauce and pickles when the harvest comes in. You work in good company and share everything out.", "it": "Una cucina attrezzata per passate, marmellate e sottoli quando arriva il raccolto. Si lavora in compagnia e si divide tutto.", "es": "Una cocina equipada para mermeladas, tomate en bote y encurtidos cuando llega la cosecha. Se trabaja en compañía y se reparte todo.", "de": "Eine gut ausgestattete Küche für Marmelade, Tomatensoße und Eingelegtes, wenn die Ernte kommt. Gearbeitet wird gemeinsam, geteilt wird alles."}}, {"emoji": "🫒", "title": {"en": "Market day and the village mill", "it": "Il mercato e l'olio del frantoio", "es": "El mercado y el aceite de almazara", "de": "Markttag und Öl aus der Mühle"}, "text": {"en": "Weekly shopping at the market, and new oil straight from the local mill. In November, those who fancy it lend a hand with the olive harvest.", "it": "La spesa settimanale al mercato e l'olio nuovo preso direttamente al frantoio. A novembre, chi vuole dà una mano alla raccolta delle olive.", "es": "La compra semanal en el mercado y el aceite nuevo directo de la almazara. En noviembre, quien quiera echa una mano en la recogida de la aceituna.", "de": "Der Wocheneinkauf auf dem Markt, das frische Öl direkt aus der Mühle. Im November hilft mit, wer Lust hat — bei der Olivenernte."}}], "where": {"en": "The founding group chooses the village together, from 18 selected Andalusian villages — some close to the sea and an airport. For this community, good soil, water and a weekly market will matter most, and you'll see the places in person before anything is decided.", "it": "Il borgo lo sceglie il gruppo fondatore, insieme, tra i 18 borghi andalusi selezionati — alcuni vicini al mare e all'aeroporto. Per questa comunità peseranno terra, acqua e mercato: si decide vedendo i posti di persona, durante il viaggio esplorativo.", "es": "El pueblo lo elige el grupo fundador, juntos, entre los 18 pueblos andaluces seleccionados — algunos cerca del mar y del aeropuerto. Para esta comunidad pesarán la tierra, el agua y el mercado: se decide viendo los pueblos en persona, en el viaje exploratorio.", "de": "Das Dorf wählt die Gründungsgruppe gemeinsam aus — unter 18 ausgewählten andalusischen Dörfern, manche nah am Meer und am Flughafen. Für diese Gemeinschaft zählen Boden, Wasser und Markt: Entschieden wird erst, wenn ihr die Orte auf der Erkundungsreise selbst gesehen habt."}}, "sport": {"name": {"en": "Sport & active life", "it": "Sport & vita attiva", "es": "Deporte y vida activa", "de": "Sport & Aktivsein"}, "emoji": "🚴", "img": "https://images.pexels.com/photos/21405596/pexels-photo-21405596.jpeg?auto=compress&cs=tinysrgb&w=1600", "status": "forming", "tagline": {"en": "Move every day, in good company", "it": "Muoversi ogni giorno, in buona compagnia", "es": "Moverse cada día, en buena compañía", "de": "Jeden Tag in Bewegung, in guter Gesellschaft"}, "intro": {"en": "You like days that start with movement: a walk before breakfast, a bike ride on an empty road, a few lengths in the pool, a quiet yoga session. This community brings together people aged 55 to 75 who want to stay active side by side — not chasing performance, but sharing the habit. Together you'd build a village life where moving every day is simply normal.", "it": "Ti piacciono le giornate che iniziano in movimento: una camminata prima di colazione, un giro in bici su una strada vuota, qualche vasca, una sessione di yoga in silenzio. Questa comunità riunisce persone tra i 55 e i 75 anni che vogliono restare attive fianco a fianco: non per la prestazione, ma per l'abitudine condivisa. Insieme costruireste una vita di paese dove muoversi ogni giorno è semplicemente normale.", "es": "Te gustan los días que empiezan en movimiento: un paseo antes del desayuno, una vuelta en bici por una carretera vacía, unos largos en la piscina, una sesión de yoga tranquila. Esta comunidad reúne a personas de entre 55 y 75 años que quieren mantenerse activas codo con codo: no por el rendimiento, sino por la costumbre compartida. Juntos construiríais una vida de pueblo donde moverse cada día sea, sencillamente, lo normal.", "de": "Du magst Tage, die mit Bewegung beginnen: ein Spaziergang vor dem Frühstück, eine Radtour auf leerer Straße, ein paar Bahnen im Wasser, eine ruhige Yogastunde. Diese Gemeinschaft bringt Menschen zwischen 55 und 75 zusammen, die Seite an Seite aktiv bleiben wollen — nicht für die Leistung, sondern für die gemeinsame Gewohnheit. Zusammen baut ihr ein Dorfleben auf, in dem tägliche Bewegung einfach dazugehört."}, "activities": [{"emoji": "🥾", "title": {"en": "A walking group with its own trails", "it": "Un gruppo di cammino con i suoi sentieri", "es": "Un grupo de senderismo con rutas propias", "de": "Eine Wandergruppe mit eigenen Wegen"}, "text": {"en": "Map the paths around the village together, mark them, and meet for morning walks — short loops for easy days, longer routes when you feel like it.", "it": "Mappare insieme i sentieri intorno al borgo, segnarli e ritrovarsi per le camminate del mattino: anelli brevi per i giorni tranquilli, percorsi più lunghi quando ne avete voglia.", "es": "Trazar juntos los senderos alrededor del pueblo, señalizarlos y quedar para caminar por la mañana: rutas cortas para los días tranquilos y más largas cuando apetezca.", "de": "Gemeinsam die Wege rund ums Dorf erkunden, markieren und sich zum Morgenspaziergang treffen — kurze Runden für ruhige Tage, längere, wenn dir danach ist."}}, {"emoji": "🚲", "title": {"en": "A shared bike workshop", "it": "Una ciclofficina condivisa", "es": "Un taller de bicis compartido", "de": "Eine gemeinsame Fahrradwerkstatt"}, "text": {"en": "A small workshop with tools, stands and spare parts, where bikes get fixed together and quiet-road rides start from the front door.", "it": "Una piccola officina con attrezzi, cavalletti e ricambi, dove si riparano le bici insieme e le uscite su strade tranquille partono da sotto casa.", "es": "Un pequeño taller con herramientas, soportes y repuestos, donde arreglar las bicis juntos y salir a pedalear por carreteras tranquilas desde la puerta de casa.", "de": "Eine kleine Werkstatt mit Werkzeug, Montageständern und Ersatzteilen — Räder werden gemeinsam repariert, und ruhige Landstraßen beginnen direkt vor der Tür."}}, {"emoji": "🧘", "title": {"en": "Yoga and gentle movement room", "it": "Sala yoga e movimento dolce", "es": "Sala de yoga y movimiento suave", "de": "Raum für Yoga und sanfte Bewegung"}, "text": {"en": "A bright room with mats and chairs for yoga, stretching and balance practice — led by whoever in the group has taught before, at a pace that suits everyone.", "it": "Una sala luminosa con tappetini e sedie per yoga, stretching ed esercizi di equilibrio, guidata da chi nel gruppo ha già insegnato, a un ritmo adatto a tutti.", "es": "Una sala luminosa con esterillas y sillas para yoga, estiramientos y equilibrio, guiada por quien del grupo ya haya enseñado, a un ritmo que vaya bien a todos.", "de": "Ein heller Raum mit Matten und Stühlen für Yoga, Dehnung und Gleichgewichtsübungen — angeleitet von denen in der Gruppe, die schon unterrichtet haben, in einem Tempo, das allen guttut."}}, {"emoji": "🏊", "title": {"en": "Swimming days, organised together", "it": "Giornate di nuoto, organizzate insieme", "es": "Días de natación, organizados juntos", "de": "Schwimmtage, gemeinsam organisiert"}, "text": {"en": "Regular shared trips to the nearest pool or, in summer, to lakes and the coast — with car-sharing, fixed days and a coffee together afterwards.", "it": "Uscite regolari verso la piscina più vicina o, d'estate, verso laghi e costa: auto condivise, giorni fissi e un caffè tutti insieme al ritorno.", "es": "Salidas regulares a la piscina más cercana o, en verano, a pantanos y a la costa: coche compartido, días fijos y un café juntos a la vuelta.", "de": "Regelmäßige gemeinsame Fahrten zum nächsten Schwimmbad oder im Sommer an Seen und ans Meer — mit Fahrgemeinschaften, festen Tagen und einem Kaffee danach."}}], "where": {"en": "The founding group chooses the village together, from 18 selected Andalusian villages — some near the sea and an airport — based on what the community needs: trails, quiet roads, access to a pool. Mild weather all year, and every step is reversible: you visit first, then rent before deciding anything.", "it": "Il borgo lo sceglie il gruppo fondatore, insieme, tra i 18 borghi andalusi selezionati — alcuni vicini al mare e all'aeroporto — in base ai bisogni della comunità: sentieri, strade tranquille, accesso a una piscina. Clima mite tutto l'anno, e ogni passo è reversibile: prima si visita, poi si affitta, prima di decidere qualsiasi cosa.", "es": "El pueblo lo elige el grupo fundador, juntos, entre los 18 pueblos andaluces seleccionados — algunos cerca del mar y del aeropuerto — según lo que necesite la comunidad: senderos, carreteras tranquilas, acceso a una piscina. Clima suave todo el año, y cada paso es reversible: primero se visita, luego se alquila, antes de decidir nada.", "de": "Das Dorf wählt die Gründungsgruppe gemeinsam aus — aus 18 ausgewählten andalusischen Dörfern, einige nah am Meer und am Flughafen — je nachdem, was die Gemeinschaft braucht: Wanderwege, ruhige Straßen, ein Schwimmbad in der Nähe. Mildes Klima das ganze Jahr, und jeder Schritt ist umkehrbar: Erst besuchst du das Dorf, dann mietest du, bevor du irgendetwas entscheidest."}}, "motori": {"name": {"en": "Motors & classics", "it": "Motori & d'epoca", "es": "Motores y clásicos", "de": "Motoren & Oldtimer"}, "emoji": "🏍️", "img": "https://images.pexels.com/photos/4166677/pexels-photo-4166677.jpeg?auto=compress&cs=tinysrgb&w=1600", "status": "forming", "tagline": {"en": "Two wheels, four wheels, open roads", "it": "Due ruote, quattro ruote, strade aperte", "es": "Dos ruedas, cuatro ruedas, carretera abierta", "de": "Zwei Räder, vier Räder, freie Straßen"}, "intro": {"en": "You've spent a lifetime with grease under your fingernails, or simply with a soft spot for engines that have a soul. Here you'd find a shared garage, hands that know what a torque wrench is, and Andalusian roads made for slow Sunday drives. A village where your passion isn't a hobby squeezed into weekends — it's daily life.", "it": "Hai passato una vita con le mani nel motore, o semplicemente con un debole per i mezzi che hanno un'anima. Qui troveresti un garage condiviso, mani che sanno cos'è una chiave dinamometrica e strade andaluse fatte per i giri lenti della domenica. Un borgo dove la tua passione non è un hobby da ritagliare nel weekend: è la vita di tutti i giorni.", "es": "Has pasado la vida con las manos en el motor, o simplemente con debilidad por las máquinas que tienen alma. Aquí encontrarías un garaje compartido, manos que saben lo que es una llave dinamométrica y carreteras andaluzas hechas para rutas tranquilas. Un pueblo donde tu pasión no es un hobby de fin de semana: es el día a día.", "de": "Du hast ein Leben lang geschraubt — oder einfach ein Faible für Maschinen mit Seele. Hier fändest du eine gemeinsame Werkstatt, Hände, die wissen, was ein Drehmomentschlüssel ist, und andalusische Straßen wie gemacht für gemütliche Ausfahrten. Ein Dorf, in dem deine Leidenschaft kein Wochenendhobby ist, sondern Alltag."}, "activities": [{"emoji": "🔧", "title": {"en": "A shared garage", "it": "Un'officina condivisa", "es": "Un garaje compartido", "de": "Eine gemeinsame Werkstatt"}, "text": {"en": "A real workshop with lifts, tools and good light — where restorations move forward and someone always lends a hand or an opinion.", "it": "Una vera officina con ponte, attrezzi e buona luce — dove i restauri vanno avanti e c'è sempre chi dà una mano o un parere.", "es": "Un taller de verdad con elevador, herramientas y buena luz, donde las restauraciones avanzan y siempre hay alguien que echa una mano.", "de": "Eine richtige Werkstatt mit Hebebühne, Werkzeug und gutem Licht — wo Restaurierungen vorankommen und immer jemand mit anpackt oder mitdenkt."}}, {"emoji": "🗺️", "title": {"en": "Sunday road runs", "it": "Le uscite della domenica", "es": "Rutas de domingo", "de": "Sonntagsausfahrten"}, "text": {"en": "Slow drives on quiet mountain roads, planned together over coffee: olive groves, mountain passes, lunch in the next village.", "it": "Giri lenti su strade di montagna tranquille, pianificati insieme davanti a un caffè: uliveti, passi, pranzo nel paese accanto.", "es": "Rutas tranquilas por carreteras de montaña, planeadas juntos con un café: olivares, puertos y comida en el pueblo de al lado.", "de": "Gemütliche Touren über ruhige Bergstraßen, gemeinsam beim Kaffee geplant: Olivenhaine, Pässe, Mittagessen im Nachbardorf."}}, {"emoji": "📚", "title": {"en": "Knowledge passed on", "it": "Il sapere che si tramanda", "es": "Saber que se transmite", "de": "Wissen, das weitergeht"}, "text": {"en": "Evenings on carburettors, bodywork and old manuals — each of you teaches what a lifetime of tinkering has taught you.", "it": "Serate su carburatori, carrozzeria e vecchi manuali: ognuno insegna quello che una vita passata in garage gli ha insegnato.", "es": "Tardes de carburadores, chapa y manuales antiguos: cada uno enseña lo que le ha enseñado una vida entre motores.", "de": "Abende über Vergaser, Karosserie und alte Handbücher — jeder gibt weiter, was ihn ein Leben am Schrauberhobby gelehrt hat."}}, {"emoji": "🏘️", "title": {"en": "A village rally day", "it": "Il raduno del borgo", "es": "La concentración del pueblo", "de": "Ein Oldtimertreffen im Dorf"}, "text": {"en": "Once a year, classics in the village square: an open day with the neighbours, polished chrome, and clubs invited from nearby towns.", "it": "Una volta l'anno, le auto d'epoca in piazza: porte aperte ai vicini, cromature lucidate e club invitati dai paesi intorno.", "es": "Una vez al año, los clásicos en la plaza: jornada abierta con los vecinos, cromados relucientes y clubes invitados de la comarca.", "de": "Einmal im Jahr stehen die Klassiker auf dem Dorfplatz: offener Tag mit den Nachbarn, poliertes Chrom, befreundete Clubs aus der Gegend."}}], "where": {"en": "The village isn't decided yet: the founding group chooses it together, from 18 selected villages — some near the sea and an airport — based on what the community needs, garages and good roads included. Every step is reversible: first an exploratory trip, then renting.", "it": "Il borgo non è ancora deciso: lo sceglie insieme il gruppo fondatore, tra i 18 borghi selezionati — alcuni vicini al mare e all'aeroporto — in base ai bisogni della comunità, garage e belle strade compresi. Ogni passo è reversibile: prima il viaggio esplorativo, poi l'affitto.", "es": "El pueblo aún no está decidido: lo elige el grupo fundador, entre los 18 pueblos seleccionados —algunos cerca del mar y del aeropuerto— según lo que necesite la comunidad, garajes y buenas carreteras incluidos. Cada paso es reversible: primero el viaje exploratorio, luego el alquiler.", "de": "Welches Dorf es wird, steht noch nicht fest: Die Gründungsgruppe wählt es gemeinsam aus 18 ausgesuchten Dörfern — einige nah am Meer und am Flughafen — je nachdem, was die Gemeinschaft braucht, Garagen und schöne Straßen inklusive. Jeder Schritt ist umkehrbar: erst die Erkundungsreise, dann die Miete."}}, "makers": {"name": {"en": "Makers & hands", "it": "Makers & mani", "es": "Makers y manos", "de": "Makers & Hände"}, "emoji": "🔧", "img": "https://images.pexels.com/photos/6790066/pexels-photo-6790066.jpeg?auto=compress&cs=tinysrgb&w=1600", "status": "forming", "tagline": {"en": "Hands that fix, build and teach — together.", "it": "Mani che aggiustano, costruiscono, insegnano.", "es": "Manos que arreglan, construyen y enseñan.", "de": "Hände, die reparieren, bauen und weitergeben."}, "intro": {"en": "You've spent a lifetime fixing, building, restoring — or you've always wanted to learn. This community brings together craftspeople, repairers and DIY enthusiasts who dream of a village where tools are shared, the workshop is a short walk from home, and there's always someone to swap a trick of the trade with.", "it": "Hai passato la vita ad aggiustare, costruire, restaurare — o hai sempre voluto imparare. Questa comunità riunisce artigiani, riparatori e appassionati di fai-da-te che sognano un borgo dove gli attrezzi si condividono, il laboratorio è a due passi da casa e c'è sempre qualcuno con cui scambiarsi un trucco del mestiere.", "es": "Has pasado la vida arreglando, construyendo, restaurando — o siempre quisiste aprender. Esta comunidad reúne a artesanos, reparadores y aficionados al bricolaje que sueñan con un pueblo donde las herramientas se comparten, el taller está a dos pasos de casa y siempre hay alguien con quien intercambiar un truco del oficio.", "de": "Du hast dein Leben lang repariert, gebaut, restauriert — oder wolltest es immer schon lernen. Diese Gemeinschaft bringt Handwerker, Tüftler und Selbermacher zusammen, die von einem Dorf träumen, in dem Werkzeug geteilt wird, die Werkstatt gleich um die Ecke liegt und immer jemand da ist, der einen Kniff weitergibt."}, "activities": [{"emoji": "🛠️", "title": {"en": "Shared workshop", "it": "Laboratorio condiviso", "es": "Taller compartido", "de": "Gemeinsame Werkstatt"}, "text": {"en": "A common space with workbenches, wood and metal tools, and room for everyone's projects. You keep it in order together and learn by watching each other's hands.", "it": "Uno spazio comune con banchi da lavoro, attrezzi per legno e metallo e posto per i progetti di ognuno. Si tiene in ordine insieme e si impara guardandosi le mani.", "es": "Un espacio común con bancos de trabajo, herramientas de madera y metal y sitio para los proyectos de cada uno. Se cuida entre todos y se aprende mirando las manos de los demás.", "de": "Ein gemeinsamer Raum mit Werkbänken, Holz- und Metallwerkzeug und Platz für eigene Projekte. Ihr haltet ihn zusammen in Schuss und schaut euch gegenseitig über die Schulter."}}, {"emoji": "🔧", "title": {"en": "Village repair café", "it": "Repair café del borgo", "es": "Repair café del pueblo", "de": "Repair-Café im Dorf"}, "text": {"en": "One fixed afternoon a week to mend whatever breaks — a lamp, a chair, an old radio. For the community and for the neighbours in the village.", "it": "Un pomeriggio fisso a settimana per riparare ciò che si rompe: una lampada, una sedia, una vecchia radio. Per la comunità e per i vicini del paese.", "es": "Una tarde fija a la semana para reparar lo que se rompe: una lámpara, una silla, una radio antigua. Para la comunidad y para los vecinos del pueblo.", "de": "Ein fester Nachmittag pro Woche, um zu reparieren, was kaputtgeht: eine Lampe, einen Stuhl, ein altes Radio. Für die Gemeinschaft und für die Nachbarn im Dorf."}}, {"emoji": "🖨️", "title": {"en": "3D printing corner", "it": "Angolo stampa 3D", "es": "Rincón de impresión 3D", "de": "3D-Druck-Ecke"}, "text": {"en": "3D printers for the spare parts you can't buy anymore: the broken knob, the discontinued hinge. Those who know teach, those who don't learn at their own pace.", "it": "Stampanti 3D per ricreare i ricambi introvabili: la manopola rotta, la cerniera fuori produzione. Chi sa insegna, chi non sa impara con calma.", "es": "Impresoras 3D para recrear las piezas que ya no se encuentran: el pomo roto, la bisagra descatalogada. Quien sabe enseña y quien no, aprende con calma.", "de": "3D-Drucker für Ersatzteile, die es nicht mehr zu kaufen gibt: der gebrochene Drehknopf, das Scharnier von früher. Wer sich auskennt, zeigt es den anderen — in Ruhe."}}, {"emoji": "🪑", "title": {"en": "Restoration workshop", "it": "Bottega del restauro", "es": "Taller de restauración", "de": "Restaurierungswerkstatt"}, "text": {"en": "Furniture, shutters, old everyday objects: villages are full of things waiting to be brought back to life. Patient work, best done in good company.", "it": "Mobili, infissi, oggetti d'epoca: nei borghi non manca materiale da riportare in vita. Un lavoro paziente, perfetto da fare in compagnia.", "es": "Muebles, ventanas, objetos de otra época: en los pueblos no falta material que devolver a la vida. Un trabajo paciente, perfecto para hacer en compañía.", "de": "Möbel, Fensterläden, alte Alltagsgegenstände: In den Dörfern gibt es vieles, das wieder zum Leben erweckt werden will. Geduldige Arbeit, am schönsten in Gesellschaft."}}], "where": {"en": "The founding group chooses the village together: among the 18 villages we've selected — some close to the sea and an airport — you'll weigh up which one best fits the community's needs, starting with space for the workshops.", "it": "Il borgo lo sceglie il gruppo fondatore, insieme: tra i 18 borghi che abbiamo selezionato — alcuni vicini al mare e all'aeroporto — si valuta quello che risponde meglio ai bisogni della comunità, a partire dagli spazi per i laboratori.", "es": "El pueblo lo elige el grupo fundador, juntos: entre los 18 pueblos que hemos seleccionado — algunos cerca del mar y del aeropuerto — se valora cuál responde mejor a las necesidades de la comunidad, empezando por los espacios para los talleres.", "de": "Das Dorf wählt die Gründungsgruppe gemeinsam aus: Unter den 18 Dörfern, die wir ausgesucht haben — einige nah am Meer und am Flughafen — entscheidet ihr, welches am besten zu den Bedürfnissen der Gemeinschaft passt, angefangen bei Räumen für die Werkstätten."}}, "geek": {"name": {"en": "Geek & tech", "it": "Geek & tech", "es": "Geek y tech", "de": "Geek & Tech"}, "emoji": "💻", "img": "https://images.pexels.com/photos/19673910/pexels-photo-19673910.jpeg?auto=compress&cs=tinysrgb&w=1600", "status": "forming", "tagline": {"en": "People who speak your language. Fiber included.", "it": "Gente che parla la tua lingua. Fibra compresa.", "es": "Gente que habla tu idioma. Fibra incluida.", "de": "Menschen, die deine Sprache sprechen. Mit Glasfaser."}, "intro": {"en": "You've spent a lifetime around computers, soldering irons and lines of code — and you have no intention of stopping now. This community brings together programmers, retrogamers and radio amateurs who dream of a village with real fibre and neighbours who get the joke when you mention BASIC. Built together, one reversible step at a time.", "it": "Hai passato la vita tra computer, saldatori e righe di codice — e non hai nessuna intenzione di smettere. Questa comunità riunisce informatici, retrogamer, programmatori e radioamatori che sognano un borgo dove la fibra arriva davvero e il vicino capisce di cosa parli quando dici BASIC. Insieme, con calma, un passo reversibile alla volta.", "es": "Has pasado la vida entre ordenadores, soldadores y líneas de código, y no piensas parar ahora. Esta comunidad reúne a informáticos, retrojugadores, programadores y radioaficionados que sueñan con un pueblo con fibra de verdad y vecinos que entienden de qué hablas cuando dices BASIC. Juntos, con calma, y cada paso es reversible.", "de": "Du hast dein Leben zwischen Computern, Lötkolben und Codezeilen verbracht — und denkst gar nicht daran aufzuhören. Diese Gemeinschaft bringt Informatiker, Retro-Gamer, Programmierer und Funkamateure zusammen, die von einem Dorf mit echter Glasfaser träumen, wo der Nachbar versteht, was du mit BASIC meinst. Gemeinsam, Schritt für Schritt — und jeder Schritt ist umkehrbar."}, "activities": [{"emoji": "🕹️", "title": {"en": "Retro-gaming room", "it": "Sala retrogaming", "es": "Sala de retrogaming", "de": "Retro-Gaming-Raum"}, "text": {"en": "Consoles and home computers brought back to life together, from the Commodore 64 to the first PlayStation. Open evenings for the village kids too.", "it": "Console e home computer rimessi in vita insieme, dal Commodore 64 alla prima PlayStation. Serate aperte anche ai ragazzi del borgo.", "es": "Consolas y ordenadores antiguos devueltos a la vida entre todos, del Commodore 64 a la primera PlayStation. Tardes abiertas también a los chavales del pueblo.", "de": "Konsolen und Heimcomputer, gemeinsam wieder zum Laufen gebracht — vom C64 bis zur ersten PlayStation. Offene Abende, auch für die Kinder aus dem Dorf."}}, {"emoji": "📡", "title": {"en": "Club radio station", "it": "Stazione radio di club", "es": "Estación de radioaficionados", "de": "Klubstation für Funkamateure"}, "text": {"en": "An antenna on the highest spot in the village and a shared ham station: contacts worldwide, and help preparing your licence if you don't have one yet.", "it": "Un'antenna sul punto più alto del paese e una stazione condivisa: contatti in tutto il mondo, e chi non ha la licenza può prepararla insieme agli altri.", "es": "Una antena en lo alto del pueblo y una estación compartida: contactos con todo el mundo, y quien no tenga licencia puede prepararla con los demás.", "de": "Eine Antenne am höchsten Punkt des Dorfes, eine gemeinsame Station: Verbindungen in die ganze Welt. Wer keine Lizenz hat, bereitet sie mit den anderen vor."}}, {"emoji": "🔧", "title": {"en": "Electronics repair café", "it": "Repair café dell'elettronica", "es": "Café de reparación electrónica", "de": "Reparatur-Café für Elektronik"}, "text": {"en": "A bench with soldering irons and an oscilloscope to fix PCs, radios and small appliances — yours and your neighbours'.", "it": "Un banco con saldatori e oscilloscopio dove riparare PC, radio e piccoli elettrodomestici — i tuoi e quelli dei vicini.", "es": "Un banco con soldadores y osciloscopio para arreglar ordenadores, radios y pequeños aparatos: los tuyos y los de tus vecinos.", "de": "Eine Werkbank mit Lötkolben und Oszilloskop, um Rechner, Radios und kleine Geräte zu reparieren — deine und die der Nachbarn."}}, {"emoji": "💻", "title": {"en": "Village digital help desk", "it": "Sportello digitale del borgo", "es": "Punto digital del pueblo", "de": "Digital-Sprechstunde im Dorf"}, "text": {"en": "One afternoon a week helping neighbours with smartphones, online paperwork and e-government. A concrete way to be useful and get known in the village.", "it": "Un pomeriggio a settimana per aiutare i vicini con smartphone, SPID e pratiche online. Un modo concreto per rendersi utili e farsi conoscere nel borgo.", "es": "Una tarde a la semana ayudando a los vecinos con el móvil, los trámites online y el certificado digital. Una forma concreta de ser útil y darse a conocer.", "de": "Ein Nachmittag pro Woche, an dem du Nachbarn mit Smartphone, Online-Anträgen und Behördenkram hilfst. So wirst du im Dorf schnell ein bekanntes Gesicht."}}], "where": {"en": "The founding group chooses the village together, from the 18 selected villages — with fibre, some close to the sea and an airport — based on what the community needs.", "it": "Il borgo lo sceglie il gruppo fondatore, insieme: tra i 18 borghi selezionati — con la fibra, alcuni vicini al mare e all'aeroporto — in base ai bisogni della comunità.", "es": "El pueblo lo elige el grupo fundador, juntos: entre los 18 pueblos seleccionados — con fibra, algunos cerca del mar y del aeropuerto — según las necesidades de la comunidad.", "de": "Welches Dorf es wird, entscheidet die Gründungsgruppe gemeinsam: 18 ausgewählte Dörfer stehen zur Wahl — mit Glasfaser, einige nah am Meer und am Flughafen — je nachdem, was die Gemeinschaft braucht."}}, "moda": {"name": {"en": "Fashion & design", "it": "Moda & design", "es": "Moda y diseño", "de": "Mode & Design"}, "emoji": "👗", "img": "https://images.pexels.com/photos/3984871/pexels-photo-3984871.jpeg?auto=compress&cs=tinysrgb&w=1600", "status": "forming", "tagline": {"en": "Threads, fabric and a new life to stitch together", "it": "Fili, stoffe e una nuova vita da cucire insieme", "es": "Hilos, telas y una nueva vida que coser juntos", "de": "Stoff für ein neues Leben – gemeinsam genäht"}, "intro": {"en": "You've spent your life with fabric, scissors and sewing machines — or fashion has always been your passion. This community brings together tailors, designers and textile makers who dream of a shared workshop in an Andalusian village: cutting tables, craft markets, old shops coming back to life. The founding group is forming now — it starts with getting to know each other, no rush.", "it": "Hai passato la vita tra stoffe, forbici e macchine da cucire — o la moda è sempre stata la tua passione. Questa comunità riunisce sarti, designer e artigiani del tessile che sognano un laboratorio condiviso in un borgo andaluso: tavoli da taglio, mercatini, botteghe che riaprono. Il gruppo fondatore è in formazione: si parte conoscendosi, senza fretta.", "es": "Has pasado la vida entre telas, tijeras y máquinas de coser — o la moda siempre ha sido tu pasión. Esta comunidad reúne a sastres, modistas, diseñadores y artesanos textiles que sueñan con un taller compartido en un pueblo andaluz: mesas de corte, mercadillos, talleres que vuelven a abrir. El grupo fundador se está formando: se empieza por conocerse, sin prisa.", "de": "Du hast dein Leben zwischen Stoffen, Scheren und Nähmaschinen verbracht – oder Mode war schon immer deine Leidenschaft. Diese Gemeinschaft verbindet Schneider, Designer und Textilhandwerker, die von einer gemeinsamen Werkstatt in einem andalusischen Dorf träumen: Zuschneidetische, Märkte, Läden, die wieder öffnen. Die Gründungsgruppe entsteht gerade – ohne Eile, Schritt für Schritt."}, "activities": [{"emoji": "🧵", "title": {"en": "Shared textile workshop", "it": "Laboratorio tessile condiviso", "es": "Taller textil compartido", "de": "Gemeinsame Textilwerkstatt"}, "text": {"en": "Sewing machines, cutting tables, maybe a loom. A common space to work in every day, each at your own pace, on your own projects.", "it": "Macchine da cucire, tavoli da taglio, magari un telaio. Uno spazio comune dove lavorare ogni giorno, ognuno ai propri ritmi e ai propri progetti.", "es": "Máquinas de coser, mesas de corte, quizá un telar. Un espacio común donde trabajar cada día, cada uno a su ritmo y con sus proyectos.", "de": "Nähmaschinen, Zuschneidetische, vielleicht ein Webstuhl. Ein gemeinsamer Raum zum täglichen Arbeiten – jeder in seinem Tempo, an eigenen Projekten."}}, {"emoji": "🧺", "title": {"en": "Craft market in the square", "it": "Mercatino dell'artigianato", "es": "Mercadillo de artesanía", "de": "Handwerksmarkt auf dem Platz"}, "text": {"en": "A regular market in the square with your one-of-a-kind pieces, alongside local produce. A way to meet neighbours and visitors — and earn a little too.", "it": "Bancarelle periodiche in piazza con i vostri pezzi unici, accanto ai prodotti del borgo. Un'occasione per incontrare vicini e visitatori — e guadagnare qualcosa.", "es": "Un mercadillo periódico en la plaza con vuestras piezas únicas, junto a los productos del pueblo. Una ocasión para encontrarse con vecinos y visitantes, y ganar algo además.", "de": "Ein regelmäßiger Markt auf dem Dorfplatz mit euren Unikaten, neben den Erzeugnissen des Ortes. Eine Gelegenheit, Nachbarn und Besucher zu treffen – und etwas dazuzuverdienen."}}, {"emoji": "🪡", "title": {"en": "Classes and repairs for the village", "it": "Corsi e riparazioni per il borgo", "es": "Clases y arreglos para el pueblo", "de": "Kurse und Reparaturen fürs Dorf"}, "text": {"en": "Teaching people to sew, mend and alter: small classes open to locals, plus a repair corner. Skills get passed on, and friendships often start there.", "it": "Insegnare a cucire, rammendare, aggiustare: piccoli corsi aperti agli abitanti e un angolo riparazioni. Il mestiere si tramanda, e spesso crea legami.", "es": "Enseñar a coser, remendar, arreglar: pequeñas clases abiertas a los vecinos y un rincón de arreglos. El oficio se transmite, y a menudo crea lazos.", "de": "Nähen, Flicken, Ändern: kleine Kurse für die Nachbarschaft und eine Reparatur-Ecke. So wird das Handwerk weitergegeben – und oft entstehen Freundschaften."}}, {"emoji": "🌿", "title": {"en": "Natural dye garden", "it": "Orto delle tinture naturali", "es": "Huerto de plantas tintóreas", "de": "Garten für Naturfarben"}, "text": {"en": "A small garden of dye plants for experimenting with natural colours on wool and linen. Slow techniques, best learned together.", "it": "Un piccolo orto di piante tintorie per sperimentare colori naturali su lana e lino. Tecniche lente, che si imparano meglio insieme.", "es": "Un pequeño huerto de plantas tintóreas para experimentar con colores naturales sobre lana y lino. Técnicas lentas, que se aprenden mejor juntos.", "de": "Ein kleiner Garten mit Färberpflanzen, um natürliche Farben auf Wolle und Leinen auszuprobieren. Langsame Techniken, die man am besten gemeinsam lernt."}}], "where": {"en": "The village is chosen by the founding group, together: among the 18 villages we have selected — some close to the sea and an airport — you'll look for the one that best fits this community's needs.", "it": "Il borgo lo sceglie il gruppo fondatore, insieme: tra i 18 borghi che abbiamo selezionato — alcuni vicini al mare e all'aeroporto — si cerca quello che risponde meglio ai bisogni di questa comunità.", "es": "El pueblo lo elige el grupo fundador, juntos: entre los 18 pueblos que hemos seleccionado — algunos cerca del mar y del aeropuerto — se busca el que mejor responda a las necesidades de esta comunidad.", "de": "Das Dorf wählt die Gründungsgruppe gemeinsam aus: Unter den 18 Dörfern, die wir ausgewählt haben – einige nah am Meer und am Flughafen – sucht ihr das, das am besten zu den Bedürfnissen dieser Gemeinschaft passt."}}};

var ORDER=['arte','natura','cucina','sport','motori','makers','geek','moda'];
var lang='en';
var id=(new URLSearchParams(location.search).get('id')||'arte').toLowerCase();
function esc(x){return String(x==null?'':x).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
function tr(o){return (o&&(o[lang]||o.en))||''}
function render(){
  var t=L[lang]||L.en; var c=C[id];
  document.documentElement.lang=lang;
  document.querySelectorAll('#lang button').forEach(function(b){b.classList.toggle('on',b.dataset.lang===lang)});
  ['n-how','n-vil','n-com','n-join'].forEach(function(i){var el=document.getElementById(i);el.textContent=t[{'n-how':'nHow','n-vil':'nVil','n-com':'nCom','n-join':'nJoin'}[i]]});
  document.getElementById('f-vil').textContent=t.nVil;
  document.getElementById('f-join').textContent=t.nJoin;
  var _by=document.getElementById('f-by'); if(_by)_by.textContent=t.credit_by;
  if(!c){
    document.getElementById('chero').style.display='none';
    document.getElementById('main').style.display='none';
    document.querySelector('.cta').style.display='none';
    var nf=document.getElementById('nf'); nf.style.display='block'; nf.textContent=L[lang].nf;
    return;
  }
  document.title='Tu Andalucía — '+tr(c.name);
  document.getElementById('heroimg').src=c.img;
  document.getElementById('heroimg').alt=tr(c.name);
  var bd=document.getElementById('badge');
  bd.textContent=(c.status==='active'?t.badgeActive:t.badgeForming);
  bd.className='badge '+(c.status==='active'?'active':'forming');
  document.getElementById('emoji').textContent=c.emoji;
  document.getElementById('cname').textContent=tr(c.name);
  document.getElementById('tagline').textContent=tr(c.tagline);
  document.getElementById('intro').textContent=tr(c.intro);
  document.getElementById('kLife').textContent=t.kLife;
  document.getElementById('kWhere').textContent=t.kWhere;
  document.getElementById('kOthers').textContent=t.kOthers;
  var ac=document.getElementById('acts'); ac.innerHTML='';
  (c.activities||[]).forEach(function(a){
    ac.insertAdjacentHTML('beforeend','<div class="act"><span class="ic">'+esc(a.emoji)+'</span><h3>'+esc(tr(a.title))+'</h3><p>'+esc(tr(a.text))+'</p></div>');
  });
  document.getElementById('where').textContent=tr(c.where);
  var wb=document.getElementById('wbtns'); wb.innerHTML='';
  if(id==='arte'){wb.insertAdjacentHTML('beforeend','<a class="btn btn-primary" href="larva.html">'+esc(t.larvaBtn)+'</a>');}
  wb.insertAdjacentHTML('beforeend','<a class="btn btn-ghost" href="index.html#villages">'+esc(t.vilBtn)+'</a>');
  var ot=document.getElementById('others'); ot.innerHTML='';
  ORDER.forEach(function(k){
    if(k===id||!C[k])return;
    ot.insertAdjacentHTML('beforeend','<a class="oc" href="comunita.html?id='+k+'">'+esc(C[k].emoji)+' '+esc(tr(C[k].name))+'</a>');
  });
  ot.insertAdjacentHTML('beforeend','<a class="oc" href="registrati.html">✨ '+esc(t.yourOwn)+'</a>');
  document.getElementById('ctaT').textContent=t.ctaT;
  var cb=document.getElementById('ctaBtn');
  cb.textContent=t.ctaBtn; cb.href='registrati.html?com='+id;
  document.getElementById('ctaNote').textContent=t.ctaNote;
}
document.getElementById('lang').addEventListener('click',function(e){
  var b=e.target.closest('button'); if(!b)return;
  lang=b.dataset.lang; try{localStorage.setItem('mp_lang',lang)}catch(x){}
  render();
});
(function(){
  var saved=null; try{saved=localStorage.getItem('mp_lang')}catch(x){}
  if(saved&&L[saved]){lang=saved;}
  else{var nl=(navigator.language||'en').slice(0,2).toLowerCase();lang={it:'it',es:'es',de:'de'}[nl]||'en';}
  if(!L[lang])lang='en';
  render();
})();
</script>
