pagna in auto**, oppure il taxi per il paese vicino a ~2 €.\n- Sei ricoverato? La comunità organizza i **turni**: qualcuno viene a trovarti, ti porta il pigiama pulito, parla con i medici se il tuo spagnolo non basta.\n- La regola dell'Edizione 1 è semplice: **nessuno resta solo in ospedale**.\n\n## Il modulo S1 in 4 passi (per chi ha la pensione italiana)\n\n- **Passo 1.** Prima di partire, chiedi alla tua **ASL** il modulo S1: è il documento che dà diritto alla sanità pubblica spagnola, a carico dell'Italia. Costo: zero.\n- **Passo 2.** A Larva fai l'**empadronamiento** in municipio: è la residenza anagrafica spagnola.\n- **Passo 3.** Registri l'S1 alla **Dirección Provincial dell'INSS** a Jaén (la \"sede provinciale dell'INPS spagnolo\").\n- **Passo 4.** Con la registrazione chiedi la **tarjeta sanitaria**: ti assegnano il medico di famiglia all'ambulatorio di Larva.\n\nRicorda anche l'**iscrizione all'AIRE** tramite il consolato (è un obbligo per chi risiede all'estero) e, per pensione INPS e tasse, fatti seguire da un **patronato e da un commercialista**: lì serve un professionista, non una guida.\n\n## Per chi questo percorso non basta\n\nUn'ultima cosa, la più importante. Se oggi hai bisogno di **assistenza continua** — cure quotidiane, una persona accanto giorno e notte — Larva oggi non è il posto giusto, e non te lo nascondiamo. Ne parliamo apertamente nella guida \"Per chi non è questo progetto\".\n\n> Tempi di attesa, distanze e costi indicati con ~ sono medie o stime da confermare: cambiano nel tempo. Per S1, pensione e fisco fatti seguire da ASL, patronato e un professionista di fiducia.", "en": "Moving to a village of ~435 people at 60 or 70 raises one question before all others: \"What if I get sick?\" It's the right question. It deserves a concrete answer, not vague reassurance. Here is the real path, scenario by scenario.\n\n## 1. An emergency at 3 a.m.\n\nYou wake up with severe chest pain. What actually happens?\n\n- You call **061**, Andalucía's medical emergency number, or **112**, the Europe-wide emergency number. Trained staff assess your symptoms and decide what to send.\n- Larva has a **medical clinic with an ambulance**, right in the village. In serious cases, you're on the road immediately.\n- The referral hospital is **San Juan de la Cruz in Úbeda**, ~40 km away: about 50 minutes by road.\n- For the most critical cases, Andalucía runs a **061 air ambulance service** through EPES, the public emergency agency. Medical helicopters are based across the region, including one in Baza (Granada), not far from the Sierra Mágina. The 061 control centre decides when to dispatch one, based on severity and location. Exact flight times to Larva: to be confirmed.\n\nLet's be honest: 50 minutes is not the 15 you might get in a big city. In some emergencies, minutes matter. This is the real trade-off of village life, and you should know it before deciding, not after.\n\n## 2. The everyday doctor\n\nLarva's clinic is open **7 days a week**. For blood pressure, the flu, a check-up, you don't have to travel anywhere: the doctor is in the village. Once you're registered in the Andalusian health system (see the S1 steps below), your family doctor is assigned right there.\n\n## 3. Chronic conditions and medicines\n\nIf you take medication every day, this is the part that matters most to you.\n\n- Andalucía uses an **electronic prescription system** (called Receta XXI): in a single visit, your doctor can prescribe up to 12 months of treatment. No queuing just to renew prescriptions.\n- You collect your medicines at the **pharmacy in Larva**, in the village, with your health card. The system works all over Spain.\n- Arriving with ongoing treatment? Bring your records: discharge letters, a list of your medicines with their **active ingredients**, recent test results. Ideally translated into Spanish. The Larva doctor reviews them with you and enters your treatment into the system. Active ingredients are the same across the EU; sometimes only the brand name changes.\n\n## 4. Specialists and appointments: the honest numbers\n\nThe cardiologist, the eye doctor, the orthopaedist are in Úbeda or Jaén. And here honesty is required: **waiting lists exist**. Data from the Andalusian Health Service (SAS, June 2025) show an average wait of ~127 days for a first specialist appointment in Andalucía; in Jaén province it's higher, ~183 days, falling but still long (to be confirmed: figures change with every update). For non-urgent surgery, the Andalusian average is ~160 days.\n\nTwo things need saying together:\n\n- **Real urgencies don't wait**: serious and cancer cases have fast-track pathways and legal response-time guarantees.\n- Many residents occasionally pay for a **private appointment** in Úbeda or Jaén when they don't want to wait. Prices: to be confirmed case by case.\n\n## 5. What the community does\n\nThe health system treats you. The community does the rest — which often weighs more:\n\n- Need to get to Úbeda for an appointment? Someone **drives you there**, or the taxi to the next village costs ~€2.\n- In hospital? The community organises **shifts**: someone visits, brings clean pyjamas, talks to the doctors if your Spanish isn't enough.\n- The rule of Edition 1 is simple: **nobody is left alone in hospital**.\n\n## The S1 form in 4 steps\n\n- **Step 1.** Before you move, ask the institution that covers your healthcare at home (your national health service or health insurer — they will tell you which office) to issue **form S1**. It entitles you to Spanish public healthcare, paid for by your home country. Cost: zero. UK state pensioners: the S1 still exists post-Brexit, via NHS Overseas Healthcare Services — check the current rules.\n- **Step 2.** In Larva, complete the **empadronamiento** at the town hall: it's the Spanish residence registration.\n- **Step 3.** Register your S1 at the **Provincial Office of the INSS** in Jaén (Spain's social security institute).\n- **Step 4.** Once registered, apply for the **tarjeta sanitaria** (health card): you'll be assigned a family doctor at the Larva clinic.\n\nFor pensions and taxes, talk to a **professional adviser** — that part needs an expert, not a guide.\n\n## When this path is not enough\n\nOne last thing — the most important. If you need **continuous care today** — daily nursing, someone at your side day and night — Larva is not the right place right now, and we won't pretend otherwise. We discuss this openly in the guide \"Who this project is not for\".\n\n> Waiting times, distances and costs marked with ~ are averages or estimates to be confirmed: they change over time. For the S1, your pension and taxes, get help from your health institution and a trusted professional.", "es": "Mudarse a los 60 o 70 años a un pueblo de ~435 habitantes despierta una pregunta antes que todas las demás: «¿Y si me pongo enfermo?». Es la pregunta correcta. No merece frases tranquilizadoras, sino un camino concreto. Aquí lo tienes, escenario por escenario.\n\n## 1. Una urgencia a las 3 de la madrugada\n\nTe despiertas con un dolor fuerte en el pecho. ¿Qué pasa de verdad?\n\n- Llamas al **061**, el teléfono de emergencias sanitarias de Andalucía, o al **112**, el número único europeo. Te atiende personal que valora los síntomas y decide qué enviar.\n- En Larva hay un **consultorio médico con ambulancia**, en el propio pueblo. En los casos graves se sale de inmediato hacia el hospital.\n- El hospital de referencia es el **San Juan de la Cruz de Úbeda**, a ~40 km: unos 50 minutos por carretera.\n- Para los casos más críticos, Andalucía cuenta con los **helicópteros sanitarios del 061**, gestionados por EPES, la empresa pública de emergencias. Los aparatos están repartidos por la región, con una base en Baza (Granada), no lejos de Sierra Mágina. El centro coordinador del 061 decide cuándo activarlos, según la gravedad y el lugar. Tiempos exactos de vuelo hasta Larva: por confirmar.\n\nSeamos claros: 50 minutos no son los 15 de una gran ciudad. En algunas emergencias los minutos cuentan. Es el compromiso real de vivir en un pueblo, y conviene saberlo antes de decidir, no después.\n\n## 2. El médico de cada día\n\nEl consultorio de Larva abre **los 7 días de la semana**. Para la tensión, una gripe, una revisión, no tienes que desplazarte: el médico está en el pueblo. En cuanto estés dado de alta en el sistema sanitario andaluz (mira los 4 pasos del S1 más abajo), te asignan allí mismo tu médico de cabecera.\n\n## 3. Enfermedades crónicas y medicamentos\n\nSi tomas medicación a diario, esta es la parte que más te importa.\n\n- Andalucía usa la **receta electrónica** (se llama Receta XXI): en una sola consulta, el médico puede dejarte prescrito el tratamiento hasta 12 meses. Se acabó ir al médico solo \"a por recetas\".\n- Recoges los medicamentos en la **farmacia de Larva**, en el pueblo, con tu tarjeta sanitaria. El sistema funciona en toda España.\n- ¿Llegas con tratamientos en curso? Trae tu documentación: informes de alta, lista de medicamentos con sus **principios activos**, últimas pruebas. Mejor traducida al español. El médico de Larva la revisa contigo y carga tu tratamiento en el sistema. Los principios activos son los mismos en toda la UE; a veces solo cambia la marca.\n\n## 4. Especialistas y consultas: los plazos de verdad\n\nEl cardiólogo, el oftalmólogo, el traumatólogo están en Úbeda o en Jaén. Y aquí toca ser honestos: **las listas de espera existen**. Según los datos del Servicio Andaluz de Salud (SAS, junio de 2025), la espera media para una primera consulta de especialista en Andalucía es de ~127 días; en la provincia de Jaén es mayor, ~183 días, bajando pero todavía alta (por confirmar: las cifras cambian en cada corte). Para cirugía no urgente, la media andaluza es de ~160 días.\n\nDos cosas hay que decirlas juntas:\n\n- **Las urgencias de verdad no esperan**: los casos graves y oncológicos tienen circuitos rápidos y plazos de respuesta garantizados por ley.\n- Muchos vecinos recurren de vez en cuando a una **consulta privada** en Úbeda o Jaén cuando no quieren esperar. Precios: por confirmar en cada caso.\n\n## 5. Lo que hace la comunidad\n\nEl sistema sanitario cura. La comunidad hace el resto, que muchas veces pesa más:\n\n- ¿Tienes consulta en Úbeda? Alguien te **lleva en coche**, o el taxi al pueblo de al lado por ~2 €.\n- ¿Estás ingresado? La comunidad organiza **turnos**: alguien te visita, te trae el pijama limpio, habla con los médicos si tu español aún no llega.\n- La regla de la Edición 1 es sencilla: **nadie se queda solo en el hospital**.\n\n## El formulario S1 en 4 pasos (pensionistas de otro país de la UE)\n\n- **Paso 1.** Antes de mudarte, pide el **formulario S1** a la institución que cubre tu sanidad en tu país (te dirán qué oficina lo emite). Te da derecho a la sanidad pública española, pagada por tu país de origen. Coste: cero.\n- **Paso 2.** En Larva, haz el **empadronamiento** en el ayuntamiento.\n- **Paso 3.** Registra el S1 en la **Dirección Provincial del INSS** en Jaén.\n- **Paso 4.** Con el registro, solicita la **tarjeta sanitaria**: te asignan médico de cabecera en el consultorio de Larva.\n\n¿Eres pensionista español? Entonces no necesitas el S1: con el empadronamiento y el traslado de tu historia al centro de salud es suficiente. Para pensión e impuestos, consulta a un **gestor o asesor**: ahí hace falta un profesional.\n\n## Para quien este camino no basta\n\nUna última cosa, la más importante. Si hoy necesitas **asistencia continua** — cuidados diarios, alguien a tu lado día y noche — Larva no es ahora el lugar adecuado, y no te lo vamos a ocultar. Lo contamos abiertamente en la guía \"Para quién no es este proyecto\".\n\n> Los plazos, distancias y costes marcados con ~ son medias o estimaciones por confirmar: cambian con el tiempo. Para el S1, la pensión y los impuestos, apóyate en tu institución sanitaria y en un profesional de confianza.", "de": "Mit 60 oder 70 in ein Dorf mit ~435 Einwohnern ziehen — da kommt eine Frage vor allen anderen: „Und wenn ich krank werde?“ Die Frage ist berechtigt. Sie verdient keine Beschwichtigung, sondern einen konkreten Weg. Hier ist er, Szenario für Szenario.\n\n## 1. Ein Notfall um 3 Uhr nachts\n\nDu wachst mit starken Brustschmerzen auf. Was passiert wirklich?\n\n- Du rufst die **061** an, die Nummer für medizinische Notfälle in Andalusien, oder die **112**, die europaweite Notrufnummer. Geschultes Personal bewertet die Symptome und entscheidet, was losgeschickt wird.\n- In Larva gibt es eine **Arztpraxis mit Rettungswagen**, direkt im Dorf. In ernsten Fällen geht es sofort Richtung Krankenhaus.\n- Das zuständige Krankenhaus ist das **San Juan de la Cruz in Úbeda**, ~40 km entfernt: etwa 50 Minuten Fahrt.\n- Für die kritischsten Fälle hat Andalusien **Rettungshubschrauber der 061**, betrieben von EPES, der öffentlichen Notfallagentur. Die Hubschrauber sind über die Region verteilt; eine Basis liegt in Baza (Granada), nicht weit von der Sierra Mágina. Die Leitstelle der 061 entscheidet je nach Schwere und Ort, wann ein Hubschrauber startet. Genaue Flugzeiten nach Larva: noch zu bestätigen.\n\nSagen wir es offen: 50 Minuten sind nicht die 15 Minuten einer Großstadt. Bei manchen Notfällen zählen Minuten. Das ist der ehrliche Kompromiss des Dorflebens — und du solltest ihn vorher kennen, nicht hinterher.\n\n## 2. Der Arzt für jeden Tag\n\nDie Praxis in Larva ist **7 Tage die Woche** geöffnet. Für den Blutdruck, eine Grippe, eine Kontrolle musst du nirgendwohin fahren: Der Arzt ist im Dorf. Sobald du im andalusischen Gesundheitssystem angemeldet bist (siehe die 4 S1-Schritte unten), bekommst du genau dort deinen Hausarzt zugeteilt.\n\n## 3. Chronische Krankheiten und Medikamente\n\nWenn du täglich Medikamente nimmst, ist das hier der wichtigste Teil für dich.\n\n- Andalusien nutzt das **elektronische Rezept** (es heißt Receta XXI): Der Arzt kann dir in einem einzigen Termin die Therapie für bis zu 12 Monate verordnen. Kein Anstehen mehr nur für Folgerezepte.\n- Deine Medikamente holst du in der **Apotheke von Larva** ab, im Dorf, mit deiner Gesundheitskarte. Das System gilt in ganz Spanien.\n- Du kommst mit laufenden Therapien an? Bring deine Unterlagen mit: Entlassungsbriefe, eine Medikamentenliste mit den **Wirkstoffen**, aktuelle Befunde. Am besten auf Spanisch übersetzt. Der Arzt in Larva geht sie mit dir durch und trägt deine Therapie ins System ein. Die Wirkstoffe sind in der ganzen EU dieselben; manchmal ändert sich nur der Handelsname.\n\n## 4. Fachärzte und Termine: die ehrlichen Zahlen\n\nKardiologe, Augenarzt, Orthopäde sitzen in Úbeda oder Jaén. Und hier braucht es Ehrlichkeit: **es gibt Wartelisten**. Die Daten des andalusischen Gesundheitsdienstes (SAS, Juni 2025) nennen ~127 Tage durchschnittliche Wartezeit auf einen ersten Facharzttermin in Andalusien; in der Provinz Jaén mehr, ~183 Tage, sinkend, aber noch hoch (zu bestätigen: die Zahlen ändern sich mit jeder Erhebung). Bei nicht dringenden Operationen liegt der andalusische Schnitt bei ~160 Tagen.\n\nZwei Dinge gehören zusammen:\n\n- **Echte Notfälle warten nicht**: Schwere Fälle und Krebserkrankungen haben schnelle Versorgungswege und gesetzlich garantierte Antwortfristen.\n- Viele Einwohner gehen gelegentlich **privat zum Facharzt** in Úbeda oder Jaén, wenn sie nicht warten wollen. Preise: im Einzelfall zu klären.\n\n## 5. Was die Gemeinschaft tut\n\nDas Gesundheitssystem behandelt. Die Gemeinschaft macht den Rest — und der wiegt oft schwerer:\n\n- Du musst zu einem Termin nach Úbeda? Jemand **fährt dich**, oder du nimmst das Taxi ins Nachbardorf für ~2 €.\n- Du liegst im Krankenhaus? Die Gemeinschaft organisiert **Schichten**: Jemand besucht dich, bringt frische Wäsche, spricht mit den Ärzten, wenn dein Spanisch nicht reicht.\n- Die Regel der Edition 1 ist einfach: **Niemand bleibt allein im Krankenhaus**.\n\n## Das Formular S1 in 4 Schritten (für deutsche Rentner)\n\n- **Schritt 1.** Vor dem Umzug beantragst du das **Formular S1** bei deiner gesetzlichen Krankenkasse. Es gibt dir Anspruch auf die spanische öffentliche Gesundheitsversorgung — bezahlt von Deutschland. Kosten: null. Privat versichert? Dann gibt es kein S1 — kläre den Auslandsschutz direkt mit deiner Versicherung.\n- **Schritt 2.** In Larva machst du das **Empadronamiento** im Rathaus: die spanische Wohnsitzanmeldung.\n- **Schritt 3.** Du registrierst das S1 bei der **Dirección Provincial des INSS** in Jaén (das spanische Pendant zur Rentenversicherung).\n- **Schritt 4.** Mit der Registrierung beantragst du die **Tarjeta sanitaria**: Du bekommst deinen Hausarzt in der Praxis von Larva zugeteilt.\n\nDeine Rente zahlt die **Deutsche Rentenversicherung** auch nach Spanien — melde ihr und deiner Krankenkasse den Umzug. Für Steuern (Stichwort Doppelbesteuerungsabkommen) brauchst du einen **Steuerberater**: Da hilft ein Profi, kein Ratgeber.\n\n## Für wen dieser Weg nicht reicht\n\nEin letzter Punkt — der wichtigste. Wenn du **heute schon dauerhafte Pflege** brauchst — tägliche Versorgung, jemanden an deiner Seite, Tag und Nacht — dann ist Larva im Moment nicht der richtige Ort. Das verschweigen wir nicht. Wir sprechen offen darüber im Ratgeber „Für wen dieses Projekt nichts ist“.\n\n> Wartezeiten, Entfernungen und Kosten mit ~ sind Durchschnittswerte oder Schätzungen und noch zu bestätigen: Sie ändern sich. Für S1, Rente und Steuern wende dich an deine Krankenkasse, die Deutsche Rentenversicherung und einen Steuerberater deines Vertrauens."}}, "per-chi-no": {"slug": "per-chi-no", "emoji": "🚫", "title": {"en": "Who Tu Andalucía is NOT for: 7 honest profiles", "it": "Per chi NON è Tu Andalucía: i 7 profili a cui diciamo no", "es": "Para quién NO es Tu Andalucía: 7 perfiles sinceros", "de": "Für wen Tu Andalucía NICHT ist: 7 ehrliche Profile"}, "subtitle": {"en": "Seven honest profiles of people we advise not to make this move — and what we suggest instead.", "it": "Sette profili a cui sconsigliamo il trasferimento — e cosa consigliamo al loro posto.", "es": "Siete perfiles a los que desaconsejamos esta mudanza — y qué les recomendamos en su lugar.", "de": "Sieben Profile, denen wir von diesem Schritt ehrlich abraten — und was wir ihnen stattdessen empfehlen."}, "md": {"it": "La maggior parte dei progetti ti dice solo perché dire di sì. Noi preferiamo iniziare dai no.\n\nTu Andalucía funziona solo se è la scelta giusta per te. E per sette tipi di persone, oggi, non lo è. Leggi con calma. Se ti riconosci in uno di questi profili, è meglio saperlo adesso — gratis, da casa tua — che scoprirlo dopo, in Andalusia.\n\n## 1. Cerchi un investimento immobiliare o un affare\n\nÈ vero: nei borghi candidati ci sono case da ~10.000-25.000 €. Ma questo non è un progetto per far soldi, è un progetto per vivere. Nessuno ti garantisce che il valore salirà: in un paese di ~435 abitanti il mercato immobiliare è piccolo e lento. E noi non vendiamo nulla: i pagamenti vanno direttamente ai proprietari, quei soldi non li tocchiamo mai.\n\n**Cosa ti consigliamo invece:** se cerchi un investimento, parla con un consulente finanziario indipendente. Una casa in un borgo rurale spagnolo non è un prodotto finanziario.\n\n## 2. Oggi hai bisogno di assistenza sanitaria continua\n\nA Larva c'è un ambulatorio medico aperto 7 giorni su 7, con ambulanza, e una farmacia in paese. Ma l'ospedale di riferimento è a Úbeda, a ~40 km: circa 50 minuti di strada. Se hai bisogno di cure quotidiane, dialisi, visite frequenti, o se non sei autosufficiente, quei chilometri diventano un peso vero — per te e per chi ti vuole bene.\n\n**Cosa ti consigliamo invece:** resta vicino alla tua rete di cura attuale, e parla di ogni eventuale trasferimento prima di tutto con il tuo medico. Il modulo S1 ti dà accesso alla sanità pubblica spagnola, ma non accorcia la strada.\n\n## 3. Stai scappando DA qualcosa\n\nUn lutto fresco, un divorzio recente, una crisi. Capiamo la voglia di cambiare tutto e subito. Ma un trasloco fatto per fuggire raramente guarisce: il dolore viaggia in valigia con te. Tu Andalucía funziona per chi va VERSO qualcosa, non per chi scappa.\n\n**Cosa ti consigliamo invece:** aspetta un anno. Prenditi cura di te dove sei, con le persone che ti conoscono. I borghi non scappano. E nemmeno noi.\n\n## 4. Non vuoi nessuna vita di comunità — o ti aspetti amici automatici\n\nQui i vicini esistono: ti salutano, ti chiedono come stai, si ricordano di te. Se cerchi l'anonimato totale, un paese piccolo è il posto sbagliato. Ma vale anche il contrario: nessuno può garantirti amicizie istantanee o felicità assicurata. La comunità aiuta, le occasioni ci sono — il lavoro di costruire legami però resta tuo.\n\n**Cosa ti consigliamo invece:** se cerchi solitudine assoluta, valuta una casa isolata in campagna, fuori da progetti come il nostro. Se cerchi felicità garantita, diffida di chiunque te la prometta. Noi non lo facciamo.\n\n## 5. Non rinunci ai servizi della grande città\n\nOspedale sotto casa, teatri, cinema, consegne a domicilio a ogni ora: a Larva non ci sono. Ci sono ambulatorio, farmacia, scuola, internet che funziona e un taxi per il paese vicino a ~2 €. Per un borgo di ~435 abitanti è tanto. Se il tuo metro è Milano o Roma, è poco. E preferiamo dirtelo chiaro.\n\n**Cosa ti consigliamo invece:** guarda una città spagnola di medie dimensioni. Costa di più, offre di più. È un progetto diverso dal nostro, e va benissimo così.\n\n## 6. Non puoi permetterti i mesi di prova senza ansia economica\n\nIl percorso prevede un viaggio esplorativo e poi un affitto di prova: in tutto circa 6-12 mesi prima di qualunque scelta stabile. Partecipare al progetto non costa nulla, ma viaggio e affitto li paghi tu, direttamente. Se queste spese ti metterebbero in ansia, la prova diventa una sofferenza invece che una scoperta.\n\n**Cosa ti consigliamo invece:** prima metti in ordine i conti. Un patronato può aiutarti a verificare con l'INPS quanto incasseresti davvero all'estero e cosa comporta l'iscrizione all'AIRE. Quando i numeri ti faranno dormire tranquillo, torna a trovarci. Noi ci siamo.\n\n## 7. Lo faresti contro la tua famiglia\n\nDi nascosto dai figli, o in guerra aperta con loro. Non funziona. La distanza amplifica i conflitti, e alla prima difficoltà arriva il \"te l'avevo detto\". Questa scelta ha bisogno almeno del rispetto di chi ti vuole bene, anche senza il loro entusiasmo.\n\n**Cosa ti consigliamo invece:** parlane apertamente. Stampa queste pagine e leggetele insieme. Se vogliono, porta i tuoi figli con te al viaggio esplorativo. E se dopo una conversazione onesta è ancora guerra: aspetta.\n\n## Perché ti diciamo tutti questi no\n\nPerché possiamo permettercelo. Partecipare non costa nulla, non tocchiamo mai i soldi delle case, non prendiamo commissioni: non guadagniamo niente dal tuo sì. Per questo non abbiamo bisogno di convincerti.\n\nDire questi no, chiari e per iscritto, è il motivo per cui puoi fidarti dei nostri sì. Se non ti sei riconosciuto in nessun profilo, il resto del sito ti aspetta — con la stessa onestà.\n\n> ⚠️ Le cifre con la tilde (~) sono stime da confermare di persona. Per pensione, fisco e residenza all'estero parla sempre con un patronato o un commercialista; per la salute, con il tuo medico. Questa guida non sostituisce nessuno di loro.", "en": "Most projects only tell you why to say yes. We'd rather start with the reasons to say no.\n\nTu Andalucía only works if it's right for you. And for seven kinds of people, right now, it isn't. Read this calmly. If you see yourself in one of these profiles, it's better to know now — for free, from your own home — than to find out later, in Andalusia.\n\n## 1. You're looking for a property investment or a bargain\n\nIt's true: houses in our candidate villages cost ~€10,000-25,000. But this is not a project for making money. It's a project for living. Nobody can promise you the value will rise: in a village of ~435 people, the property market is small and slow. And we sell nothing — payments go directly to the owners, and we never touch that money.\n\n**What we suggest instead:** if you want an investment, talk to an independent financial adviser. A house in a rural Spanish village is not a financial product.\n\n## 2. You need continuous medical care today\n\nLarva has a medical centre open 7 days a week, with an ambulance, and a pharmacy in the village. But the main hospital is in Úbeda, ~40 km away — about 50 minutes by road. If you need daily treatment, dialysis, frequent appointments, or you are not self-sufficient, those kilometres become a real burden — for you and for the people who love you.\n\n**What we suggest instead:** stay close to your current care network, and discuss any move with your doctor first. The EU's S1 form gives you access to Spanish public healthcare, but it doesn't shorten the road.\n\n## 3. You're running away FROM something\n\nA fresh bereavement, a recent divorce, a crisis. We understand the urge to change everything at once. But a move made in flight rarely heals: the pain travels in your suitcase. Tu Andalucía works for people moving TOWARDS something — not away from it.\n\n**What we suggest instead:** wait a year. Look after yourself where you are, among people who know you. The villages aren't going anywhere. Neither are we.\n\n## 4. You want no community life at all — or you expect instant friends\n\nHere, neighbours exist. They greet you, ask how you are, remember you. If you want total anonymity, a small village is the wrong place. The opposite is also true: nobody can guarantee instant friendship or happiness. The community helps, the occasions are there — but building bonds is work, and that work is yours.\n\n**What we suggest instead:** if you want real solitude, look at an isolated house in the countryside, outside projects like ours. If you want guaranteed happiness, be wary of anyone who promises it. We don't.\n\n## 5. You won't give up big-city services\n\nA hospital around the corner, theatres, cinemas, food delivered at midnight: Larva has none of that. It has the medical centre, the pharmacy, a school, internet that works, and a taxi to the next town for ~€2. For a village of ~435 people, that's a lot. If your benchmark is London or Madrid, it's little. We'd rather say so plainly.\n\n**What we suggest instead:** look at a mid-sized Spanish city. It costs more and offers more. It's a different project from ours — and that's perfectly fine.\n\n## 6. You can't afford the trial months without money worries\n\nThe path includes an exploratory trip and then a trial rental: roughly 6-12 months in all before any permanent decision. Taking part in the project costs nothing, but you pay for the travel and the rent yourself, directly. If those expenses would keep you awake at night, the trial becomes an ordeal instead of a discovery.\n\n**What we suggest instead:** put your finances in order first. Check with your national pension institution exactly what you would receive abroad, and what a move means for your taxes and healthcare. When the numbers let you sleep, come back. We'll be here.\n\n## 7. You'd do it against your family\n\nBehind your children's backs, or at open war with them. It doesn't work. Distance amplifies conflict, and at the first difficulty comes the \"I told you so\". This choice needs at least the respect of the people who love you — even without their enthusiasm.\n\n**What we suggest instead:** talk about it openly. Print these pages and read them together. Bring your family on the exploratory trip if they want to come. And if, after an honest conversation, it's still war: wait.\n\n## Why we say no so plainly\n\nBecause we can afford to. Taking part costs nothing, we never touch the money for the houses, and we take no commission. We earn nothing from your yes — so we don't need to talk you into anything.\n\nSaying no clearly, in writing, is the reason you can trust us when we say yes. If you didn't see yourself in any of these profiles, the rest of this site is waiting for you — with the same honesty.\n\n> ⚠️ Figures marked with ~ are estimates to be confirmed in person. For pensions, tax and residence abroad, always talk to your national pension institution and a qualified tax adviser; for your health, to your doctor. This guide replaces none of them.", "es": "La mayoría de los proyectos solo te cuenta por qué decir que sí. Nosotros preferimos empezar por los noes.\n\nTu Andalucía solo funciona si es lo correcto para ti. Y para siete tipos de personas, hoy, no lo es. Léelo con calma. Si te reconoces en alguno de estos perfiles, mejor saberlo ahora —gratis, desde tu casa— que descubrirlo después, ya en Andalucía.\n\n## 1. Buscas una inversión inmobiliaria o un chollo\n\nEs verdad: en los pueblos candidatos hay casas de ~10.000-25.000 €. Pero esto no es un proyecto para ganar dinero, es un proyecto para vivir. Nadie te garantiza que el valor vaya a subir: en un pueblo de ~435 habitantes el mercado inmobiliario es pequeño y lento. Y nosotros no vendemos nada: los pagos van directamente a los propietarios y nunca tocamos ese dinero.\n\n**Qué te recomendamos en su lugar:** si buscas invertir, habla con un asesor financiero independiente. Una casa en un pueblo rural no es un producto financiero.\n\n## 2. Hoy necesitas asistencia sanitaria continua\n\nEn Larva hay un consultorio médico abierto los 7 días de la semana, con ambulancia, y farmacia en el pueblo. Pero el hospital de referencia está en Úbeda, a ~40 km: unos 50 minutos por carretera. Si necesitas tratamiento diario, diálisis, citas frecuentes, o no eres autosuficiente, esos kilómetros se convierten en una carga real — para ti y para quien te quiere.\n\n**Qué te recomendamos en su lugar:** quédate cerca de tu red de cuidados actual y habla de cualquier mudanza primero con tu médico. Si eres pensionista de otro país de la UE, el formulario S1 te da acceso a la sanidad pública española, pero no acorta la carretera.\n\n## 3. Estás huyendo DE algo\n\nUn duelo reciente, un divorcio, una crisis. Entendemos las ganas de cambiarlo todo de golpe. Pero una mudanza hecha huyendo rara vez cura: el dolor viaja contigo en la maleta. Tu Andalucía funciona para quien va HACIA algo, no para quien escapa.\n\n**Qué te recomendamos en su lugar:** espera un año. Cuídate donde estás, con la gente que te conoce. Los pueblos no se mueven de sitio. Y nosotros tampoco.\n\n## 4. No quieres ninguna vida de comunidad — o esperas amigos automáticos\n\nAquí los vecinos existen: te saludan, te preguntan cómo estás, se acuerdan de ti. Si buscas el anonimato total, un pueblo pequeño es el lugar equivocado. Y también vale lo contrario: nadie puede garantizarte amistades instantáneas ni felicidad asegurada. La comunidad ayuda, las ocasiones están ahí; el trabajo de construir lazos, en cambio, es tuyo.\n\n**Qué te recomendamos en su lugar:** si buscas soledad absoluta, valora una casa aislada en el campo, fuera de proyectos como el nuestro. Si buscas felicidad garantizada, desconfía de quien te la prometa. Nosotros no lo hacemos.\n\n## 5. No renuncias a los servicios de la gran ciudad\n\nHospital al lado de casa, teatros, cines, comida a domicilio a cualquier hora: en Larva no los hay. Hay consultorio, farmacia, escuela, internet que funciona y un taxi al pueblo de al lado por ~2 €. Para un pueblo de ~435 habitantes es mucho. Si tu medida es Madrid o Barcelona, es poco. Y preferimos decírtelo claro.\n\n**Qué te recomendamos en su lugar:** mira una ciudad española de tamaño medio. Cuesta más y ofrece más. Es un proyecto distinto del nuestro, y no pasa nada.\n\n## 6. No puedes permitirte los meses de prueba sin agobio económico\n\nEl camino incluye un viaje exploratorio y después un alquiler de prueba: en total, unos 6-12 meses antes de cualquier decisión estable. Participar en el proyecto no cuesta nada, pero el viaje y el alquiler los pagas tú, directamente. Si esos gastos te quitarían el sueño, la prueba se convierte en un sufrimiento en vez de un descubrimiento.\n\n**Qué te recomendamos en su lugar:** primero pon las cuentas en orden. Confirma con tu organismo de pensiones cuánto cobrarías exactamente y qué implica un cambio de residencia. Cuando los números te dejen dormir tranquilo, vuelve. Aquí estaremos.\n\n## 7. Lo harías contra tu familia\n\nA escondidas de tus hijos, o en guerra abierta con ellos. No funciona. La distancia amplifica los conflictos, y a la primera dificultad llega el «te lo dije». Esta decisión necesita, como mínimo, el respeto de quien te quiere, aunque no su entusiasmo.\n\n**Qué te recomendamos en su lugar:** háblalo abiertamente. Imprime estas páginas y leedlas juntos. Si quieren, llévalos contigo al viaje exploratorio. Y si después de una conversación honesta sigue habiendo guerra: espera.\n\n## Por qué te decimos todos estos noes\n\nPorque podemos permitírnoslo. Participar no cuesta nada, nunca tocamos el dinero de las casas, no cobramos comisiones: no ganamos nada con tu sí. Por eso no necesitamos convencerte de nada.\n\nDecir estos noes, claros y por escrito, es el motivo por el que puedes fiarte de nuestros síes. Si no te has reconocido en ningún perfil, el resto de la web te espera — con la misma honestidad.\n\n> ⚠️ Las cifras con ~ son estimaciones que conviene confirmar en persona. Para pensiones, impuestos y residencia, consulta siempre a tu organismo de pensiones y a un asesor fiscal; para la salud, a tu médico. Esta guía no sustituye a ninguno de ellos.", "de": "Die meisten Projekte erzählen dir nur, warum du Ja sagen sollst. Wir fangen lieber mit dem Nein an.\n\nTu Andalucía funktioniert nur, wenn es wirklich zu dir passt. Und für sieben Arten von Menschen passt es — Stand heute — nicht. Lies in Ruhe. Wenn du dich in einem dieser Profile wiedererkennst, ist es besser, das jetzt zu wissen — kostenlos, von zu Hause aus — als es später in Andalusien zu merken.\n\n## 1. Du suchst eine Immobilie als Geldanlage oder ein Schnäppchen\n\nEs stimmt: In den Dörfern, die wir prüfen, gibt es Häuser für ~10.000-25.000 €. Aber das hier ist kein Projekt, um Geld zu verdienen. Es ist ein Projekt zum Leben. Niemand garantiert dir, dass der Wert steigt: In einem Dorf mit ~435 Einwohnern ist der Immobilienmarkt klein und träge. Und wir verkaufen nichts — die Zahlungen gehen direkt an die Eigentümer, wir fassen dieses Geld nie an.\n\n**Was wir dir stattdessen raten:** Wenn du eine Geldanlage suchst, sprich mit einem unabhängigen Finanzberater. Ein Haus in einem spanischen Dorf ist kein Finanzprodukt.\n\n## 2. Du brauchst heute laufende medizinische Versorgung\n\nLarva hat eine Arztpraxis, die sieben Tage die Woche geöffnet ist, mit Krankenwagen, und eine Apotheke im Ort. Aber das zuständige Krankenhaus liegt in Úbeda, ~40 km entfernt — etwa 50 Minuten Fahrt. Wenn du tägliche Behandlungen brauchst, Dialyse, häufige Termine, oder wenn du nicht mehr allein zurechtkommst, werden diese Kilometer zur echten Last — für dich und für die Menschen, die dich lieben.\n\n**Was wir dir stattdessen raten:** Bleib in der Nähe deiner heutigen Versorgung und besprich jeden Umzugsgedanken zuerst mit deinem Arzt. Das S1-Formular deiner Krankenkasse gibt dir Zugang zur spanischen öffentlichen Gesundheitsversorgung — aber es macht die Straße nicht kürzer.\n\n## 3. Du läufst VOR etwas davon\n\nEin frischer Trauerfall, eine Scheidung, eine Krise. Wir verstehen den Wunsch, alles auf einmal zu ändern. Aber ein Umzug auf der Flucht heilt selten: Der Schmerz reist im Koffer mit. Tu Andalucía funktioniert für Menschen, die AUF etwas zugehen — nicht für Menschen, die weglaufen.\n\n**Was wir dir stattdessen raten:** Warte ein Jahr. Kümmere dich um dich, dort wo du bist, bei Menschen, die dich kennen. Die Dörfer laufen nicht weg. Wir auch nicht.\n\n## 4. Du willst gar kein Gemeinschaftsleben — oder erwartest, dass Freundschaften von selbst entstehen\n\nHier gibt es Nachbarn. Sie grüßen dich, fragen, wie es dir geht, erinnern sich an dich. Wenn du völlige Anonymität willst, ist ein kleines Dorf der falsche Ort. Das Gegenteil gilt genauso: Niemand kann dir sofortige Freundschaften oder garantiertes Glück versprechen. Die Gemeinschaft hilft, die Gelegenheiten sind da — aber Beziehungen aufbauen ist Arbeit, und die bleibt deine.\n\n**Was wir dir stattdessen raten:** Wenn du echte Einsamkeit suchst, schau dir ein abgelegenes Haus auf dem Land an, außerhalb von Projekten wie unserem. Wenn du garantiertes Glück suchst: Misstraue jedem, der es verspricht. Wir tun es nicht.\n\n## 5. Du verzichtest nicht auf die Großstadt\n\nKrankenhaus um die Ecke, Theater, Kino, Lieferdienst um Mitternacht: Das alles gibt es in Larva nicht. Es gibt die Arztpraxis, die Apotheke, eine Schule, funktionierendes Internet und ein Taxi ins Nachbardorf für ~2 €. Für ein Dorf mit ~435 Einwohnern ist das viel. Wenn dein Maßstab Berlin oder München ist, ist es wenig. Wir sagen es lieber deutlich.\n\n**Was wir dir stattdessen raten:** Schau dir eine mittelgroße spanische Stadt an. Sie kostet mehr und bietet mehr. Das ist ein anderes Projekt als unseres — und das ist völlig in Ordnung.\n\n## 6. Du kannst dir die Probemonate nicht ohne Geldsorgen leisten\n\nDer Weg sieht erst eine Erkundungsreise vor, dann ein Probewohnen zur Miete: insgesamt etwa 6-12 Monate, bevor irgendetwas fest wird. Die Teilnahme am Projekt kostet nichts, aber Reise und Miete zahlst du selbst, direkt. Wenn diese Ausgaben dir den Schlaf rauben würden, wird aus der Probezeit eine Qual statt einer Entdeckung.\n\n**Was wir dir stattdessen raten:** Bring zuerst deine Finanzen in Ordnung. Kläre mit der Deutschen Rentenversicherung, wie deine Rente in Spanien ausgezahlt wird, und mit deiner Krankenkasse, wie das S1-Verfahren läuft. Wenn die Zahlen dich ruhig schlafen lassen, komm wieder. Wir sind da.\n\n## 7. Du würdest es gegen deine Familie tun\n\nHeimlich, hinter dem Rücken deiner Kinder, oder im offenen Streit mit ihnen. Das funktioniert nicht. Entfernung verstärkt Konflikte, und bei der ersten Schwierigkeit kommt das „Ich hab's dir doch gesagt“. Diese Entscheidung braucht mindestens den Respekt der Menschen, die dich lieben — auch ohne ihre Begeisterung.\n\n**Was wir dir stattdessen raten:** Sprich offen darüber. Druck diese Seiten aus und lest sie gemeinsam. Nimm deine Familie mit auf die Erkundungsreise, wenn sie mag. Und wenn nach einem ehrlichen Gespräch immer noch Streit herrscht: Warte.\n\n## Warum wir dir all diese Neins sagen\n\nWeil wir es uns leisten können. Die Teilnahme kostet nichts, wir fassen das Geld für die Häuser nie an, wir nehmen keine Provision. Wir verdienen nichts an deinem Ja — also müssen wir dich zu nichts überreden.\n\nDiese Neins klar und schriftlich auszusprechen ist der Grund, warum du unserem Ja vertrauen kannst. Wenn du dich in keinem Profil wiedererkannt hast, wartet der Rest unserer Website auf dich — mit derselben Ehrlichkeit.\n\n> ⚠️ Zahlen mit ~ sind Schätzungen, die du vor Ort bestätigen solltest. Für Rente, Steuern und Wohnsitz im Ausland sprich immer mit der Deutschen Rentenversicherung, deiner Krankenkasse und einem Steuerberater; für die Gesundheit mit deinem Arzt. Diese Seite ersetzt keinen von ihnen."}}, "gruppo": {"slug": "gruppo", "emoji": "🤝", "title": {"en": "What if I don't like the group?", "it": "E se il gruppo non mi piace?", "es": "¿Y si el grupo no me gusta?", "de": "Und wenn mir die Gruppe nicht gefällt?"}, "subtitle": {"en": "Affinity is not friendship. Here is what we do to make the group work — and what happens if it doesn't.", "it": "Affinità non vuol dire amicizia. Ecco cosa facciamo perché il gruppo funzioni, senza promesse vuote.", "es": "Afinidad no es amistad. Esto es lo que hacemos para que el grupo funcione, sin promesas vacías.", "de": "Gemeinsame Interessen sind keine Garantie für Freundschaft. Was wir tun, damit die Gruppe funktioniert – ohne leere Versprechen."}, "md": {"it": "## La paura che nessuno dice ad alta voce\n\nPartiamo da quella vera. Non è la paura di restare soli. È la paura di sentirsi soli dentro un gruppo: cene forzate, conversazioni che non decollano, una persona che parla sempre e tre che non parlano mai. Trasferirsi a duemila chilometri da casa e ritrovarsi, sei mesi dopo, a cambiare strada per non incrociare il vicino.\n\nÈ una paura legittima. Chi ti risponde \"vedrai, andrà tutto bene\" ti sta vendendo qualcosa. Noi preferiamo dirti come stanno le cose.\n\n## Cosa non ti promettiamo\n\n- **L'amicizia automatica.** L'amicizia non si organizza a tavolino: nasce, oppure no.\n- **L'armonia perpetua.** Dieci nuclei che vivono nello stesso paese prima o poi litigheranno. Su questo non c'è dubbio.\n- **Che tutti piaceranno a tutti.** Non succede nemmeno in famiglia.\n\nAffinità non vuol dire amicizia. Vuol dire partire con qualcosa in comune. Il resto si costruisce, giorno per giorno.\n\n## Cosa facciamo, in concreto\n\n### Gruppi piccoli, formati con cura\n\nL'Edizione 1 è fatta di 10 nuclei fondatori, su invito. Per Larva il filo comune è l'arte: musica, pittura, scrittura, palcoscenico. Le passioni comuni sono la materia prima, non la garanzia. Come la farina per il pane: senza non si parte, ma il pane va comunque impastato.\n\n### Vi conoscete prima, non dopo\n\nIl percorso ha 4 tappe, tutte reversibili. La prima è proprio questa: conoscere la comunità online, con calma, per mesi se serve. Poi il viaggio esplorativo, insieme. Poi l'affitto di prova. Solo alla fine la casa stabile. A ogni tappa puoi dire \"non fa per me\" e fermarti. Partecipare non costa nulla e non devi dare spiegazioni a nessuno.\n\n### Un patto scritto, firmato prima di partire\n\nLe regole non scritte sono quelle che feriscono di più, perché ognuno ne porta in testa una versione diversa. Per questo il gruppo scrive e firma un **Patto di Comunità** prima del trasferimento. Questa è la bozza, in 8 punti. La versione definitiva la scriverete voi dieci, insieme.\n\n- **1. Rispetto e porta aperta.** Ci trattiamo con gentilezza anche quando non siamo d'accordo. Chi ha bisogno può bussare, sempre.\n- **2. Partecipare è un diritto, non un obbligo.** Nessuno conta le presenze. Chi viene alla cena è benvenuto; chi non viene non deve giustificarsi.\n- **3. I conflitti si portano al facilitatore, non in piazza.** Se qualcosa si rompe tra due persone, se ne parla con chi può aiutare a ripararlo. Niente fazioni, niente voci di corridoio.\n- **4. Le decisioni comuni si prendono così:** chi propone mette la proposta per iscritto; tutti hanno una settimana per pensarci; poi si decide insieme, una voce per nucleo. Nessuno decide mai sulla casa o sui soldi degli altri.\n- **5. La privacy di ognuno.** La tua casa, le tue giornate, i tuoi affari restano tuoi. Vivere vicini non significa vivere addosso.\n- **6. Il rapporto coi vicini storici.** A Larva vivono ~435 persone, da generazioni. Arriviamo da ospiti e diventiamo vicini: si saluta, si partecipa alle feste del paese, si compra nei negozi di lì.\n- **7. La lingua: impariamo lo spagnolo insieme.** Un po' ogni settimana, aiutandoci tra noi. Parlare col paese non è un optional: è il progetto.\n- **8. Chi se ne va resta un amico.** Andarsene non è un tradimento né un fallimento. Ci si saluta, ci si scrive, la porta resta aperta.\n\n### Un facilitatore terzo per i conflitti\n\nI conflitti veri non si risolvono al bar. Il progetto prevede una figura neutrale, esterna ai 10 nuclei, a cui rivolgersi quando una discussione si incaglia. Chi sarà e con quale frequenza sarà disponibile: da confermare, e lo saprete prima di firmare il patto.\n\n### La libertà di startene per conto tuo\n\nHai la tua casa, le tue chiavi, le tue abitudini. Nessuno bussa per chiederti perché ieri non c'eri. Il punto 2 del patto esiste apposta: anche il silenzio è un modo di stare in comunità.\n\n### Non un'enclave: c'è un paese intero\n\nLarva non è un residence per stranieri. È un paese vivo, con farmacia, scuola e ambulatorio aperto 7 giorni su 7. La tua vita sociale non dipende solo dal gruppo: ci sono i vicini, i negozi, le feste. Se il gruppo ti delude, il paese resta. E viceversa.\n\n## E se davvero non funziona?\n\nTe ne vai, senza vergogna. Il percorso è reversibile per costruzione: prima di qualsiasi acquisto c'è sempre l'affitto di prova. I soldi delle case non passano mai da noi: paghi direttamente il proprietario, quindi nessun legame economico ti tiene legato al gruppo. E la pensione INPS la incassi in Spagna come in Italia: tornare indietro non mette a rischio nulla. Ne parliamo punto per punto nella guida \"Se non funziona\".\n\n> **Nota:** il Patto qui sopra è una bozza di lavoro: la versione vera la scriveranno i 10 nuclei fondatori, insieme. La figura del facilitatore è prevista, ma i dettagli pratici sono da confermare. Per affitti e acquisti fatevi sempre assistere da un professionista (gestoría spagnola o notaio); per pensione e residenza all'estero, INPS e AIRE sono i riferimenti.", "en": "## The fear nobody says out loud\n\nLet's start with the real one. It isn't the fear of being alone. It's the fear of feeling lonely inside a group: dinners that feel like duty, conversations that never take off, one person who always talks and three who never do. Moving a thousand miles from home and finding yourself, six months later, crossing the street to avoid a neighbour.\n\nThat fear is legitimate. Anyone who answers \"don't worry, it'll be fine\" is selling you something. We'd rather tell you how things actually stand.\n\n## What we don't promise\n\n- **Automatic friendship.** Friendship can't be arranged. It grows, or it doesn't.\n- **Permanent harmony.** Ten households living in the same village will fall out sooner or later. Count on it.\n- **That everyone will like everyone.** That doesn't even happen in families.\n\nAffinity is not friendship. It means starting out with something in common. The rest gets built, day by day.\n\n## What we actually do\n\n### Small groups, formed with care\n\nEdition 1 is made up of 10 founding households, by invitation. For Larva, the common thread is art: music, painting, writing, the stage. Shared passions are the raw material, not the guarantee. Like flour for bread: you can't start without it, but the bread still has to be kneaded.\n\n### You meet before you move, not after\n\nThe path has 4 stages, all of them reversible. The first is exactly this: getting to know the community online, slowly, over months if you need them. Then the exploratory trip, together. Then a trial rental. Only at the end, a home of your own. At every stage you can say \"this isn't for me\" and stop. Taking part costs nothing, and you owe nobody an explanation.\n\n### A written pact, signed before anyone moves\n\nUnwritten rules are the ones that hurt most, because everyone carries a different version in their head. So the group writes and signs a **Community Pact** before relocating. Here is the working draft, in 8 points. The final version will be written by the ten of you, together.\n\n- **1. Respect, and an open door.** We treat each other kindly, even when we disagree. Anyone in need can knock, always.\n- **2. Taking part is a right, not a duty.** Nobody takes attendance. Whoever comes to dinner is welcome; whoever stays home needs no excuse.\n- **3. Conflicts go to the facilitator, not to the village square.** If something breaks between two people, you talk to someone who can help mend it. No factions, no whispering.\n- **4. Joint decisions are made like this:** whoever proposes something puts it in writing; everyone gets a week to think; then the group decides together, one voice per household. Nobody ever decides about anyone else's house or money.\n- **5. Everyone's privacy.** Your home, your days, your affairs remain yours. Living close does not mean living on top of each other.\n- **6. Our long-standing neighbours.** Larva has been home to ~435 people for generations. We arrive as guests and become neighbours: we greet, we join the village festivals, we shop locally.\n- **7. The language: we learn Spanish together.** A little every week, helping each other. Talking with the village isn't optional — it is the project.\n- **8. Whoever leaves remains a friend.** Leaving is not a betrayal, and it is not a failure. We say goodbye, we stay in touch, the door stays open.\n\n### A facilitator from outside the group\n\nReal conflicts don't get solved over coffee. The project includes a neutral figure, outside the 10 households, to turn to when a disagreement gets stuck. Who it will be, and how often they'll be available: to be confirmed — you will know before signing the pact.\n\n### The freedom to keep to yourself\n\nYou have your own house, your own keys, your own habits. Nobody knocks to ask why you weren't there yesterday. Point 2 of the pact exists for this: quiet is also a way of belonging.\n\n### Not an enclave — a whole village\n\nLarva is not a gated compound for foreigners. It's a living village, with a pharmacy, a school and a medical centre open 7 days a week. Your social life doesn't depend on the group alone: there are neighbours, the shops, the festivals. If the group lets you down, the village is still there. And the other way round.\n\n## And if it really doesn't work?\n\nYou leave — without shame. The path is reversible by design: before any purchase there is always a trial rental. Housing money never passes through us: you pay the owner directly, so no financial tie binds you to the group. And as an EU pensioner, your pension and your public healthcare rights (the S1 form) travel with you — to Spain and back home again. We go through it step by step in the guide \"If it doesn't work out\".\n\n> **Note:** the Pact above is a working draft: the real one will be written by the 10 founding households, together. The facilitator role is planned, but the practical details are to be confirmed. For rentals and purchases, always get help from a professional (a Spanish gestoría or a notary); for pension and healthcare paperwork, your national pension institution is the place to ask.", "es": "## El miedo que nadie dice en voz alta\n\nEmpecemos por el de verdad. No es el miedo a quedarte solo. Es el miedo a sentirte solo dentro de un grupo: cenas por compromiso, conversaciones que no arrancan, una persona que habla siempre y tres que no hablan nunca. Mudarte lejos de casa y descubrir, seis meses después, que cambias de acera para no cruzarte con el vecino.\n\nEs un miedo legítimo. Quien te responde \"tranquilo, ya verás como todo va bien\" te está vendiendo algo. Nosotros preferimos contarte cómo son las cosas.\n\n## Lo que no te prometemos\n\n- **Amistad automática.** La amistad no se organiza: nace, o no nace.\n- **Armonía perpetua.** Diez núcleos viviendo en el mismo pueblo discutirán tarde o temprano. De eso no hay duda.\n- **Que todos se caigan bien.** Eso no pasa ni en las familias.\n\nAfinidad no es amistad. Es empezar con algo en común. El resto se construye, día a día.\n\n## Lo que sí hacemos\n\n### Grupos pequeños, formados con cuidado\n\nLa Edición 1 son 10 núcleos fundadores, por invitación. En Larva el hilo común es el arte: música, pintura, escritura, escenario. Las pasiones compartidas son la materia prima, no la garantía. Como la harina para el pan: sin ella no se empieza, pero el pan hay que amasarlo igual.\n\n### Os conocéis antes, no después\n\nEl camino tiene 4 etapas, todas reversibles. La primera es justo esta: conocer a la comunidad online, con calma, durante meses si hace falta. Después, el viaje exploratorio, juntos. Después, el alquiler de prueba. Solo al final, la casa estable. En cada etapa puedes decir \"esto no es para mí\" y parar. Participar no cuesta nada y no le debes explicaciones a nadie.\n\n### Un pacto escrito, firmado antes de mudarse\n\nLas reglas no escritas son las que más daño hacen, porque cada uno lleva en la cabeza una versión distinta. Por eso el grupo escribe y firma un **Pacto de Comunidad** antes del traslado. Este es el borrador, en 8 puntos. La versión definitiva la escribiréis vosotros diez, juntos.\n\n- **1. Respeto y puerta abierta.** Nos tratamos con amabilidad incluso cuando no estamos de acuerdo. Quien necesite algo puede llamar a la puerta, siempre.\n- **2. Participar es un derecho, no una obligación.** Nadie pasa lista. Quien viene a la cena es bienvenido; quien no viene no tiene que justificarse.\n- **3. Los conflictos se llevan al facilitador, no a la plaza.** Si algo se rompe entre dos personas, se habla con quien puede ayudar a arreglarlo. Ni bandos, ni rumores.\n- **4. Las decisiones comunes se toman así:** quien propone, lo pone por escrito; todos tienen una semana para pensarlo; después se decide juntos, una voz por núcleo. Nadie decide nunca sobre la casa o el dinero de los demás.\n- **5. La privacidad de cada uno.** Tu casa, tus días y tus asuntos son tuyos. Vivir cerca no es vivir encima.\n- **6. La relación con los vecinos de toda la vida.** En Larva viven ~435 personas desde hace generaciones. Llegamos como invitados y nos hacemos vecinos: se saluda, se participa en las fiestas del pueblo, se compra en las tiendas de aquí.\n- **7. El idioma: aprendemos español juntos.** Un poco cada semana; quien ya lo habla, ayuda a los demás. Hablar con el pueblo no es opcional: es el proyecto.\n- **8. Quien se va, sigue siendo un amigo.** Irse no es una traición ni un fracaso. Nos despedimos, seguimos en contacto, la puerta queda abierta.\n\n### Un facilitador externo\n\nLos conflictos de verdad no se arreglan en la barra del bar. El proyecto prevé una figura neutral, ajena a los 10 núcleos, a la que acudir cuando una discusión se atasca. Quién será y con qué frecuencia estará disponible: por confirmar; lo sabréis antes de firmar el pacto.\n\n### La libertad de estar a tu aire\n\nTienes tu casa, tus llaves, tus costumbres. Nadie llama a tu puerta para preguntarte por qué ayer no estuviste. El punto 2 del pacto existe para eso: el silencio también es una forma de comunidad.\n\n### No es un enclave: hay un pueblo entero\n\nLarva no es una urbanización cerrada para forasteros. Es un pueblo vivo, con farmacia, colegio y consultorio médico abierto los 7 días de la semana. Tu vida social no depende solo del grupo: están los vecinos, las tiendas, las fiestas. Si el grupo te decepciona, el pueblo sigue ahí. Y al revés.\n\n## ¿Y si de verdad no funciona?\n\nTe vas, sin vergüenza. El camino es reversible por diseño: antes de cualquier compra siempre hay un alquiler de prueba. El dinero de las casas nunca pasa por nosotros: pagas directamente al propietario, así que ningún lazo económico te ata al grupo. Y tu pensión te llega igual en Larva que donde vives hoy; si vienes de otro país de la UE, el formulario S1 te da la sanidad pública española a cargo de tu país de origen. Volver no pone nada en riesgo. Lo contamos paso a paso en la guía \"Si no funciona\".\n\n> **Nota:** el Pacto de arriba es un borrador de trabajo: el de verdad lo escribirán los 10 núcleos fundadores, juntos. La figura del facilitador está prevista, pero los detalles prácticos están por confirmar. Para alquileres y compras, hazte acompañar siempre por un profesional (gestoría o notario); para dudas sobre la pensión, tu referencia es la Seguridad Social.", "de": "## Die Angst, die keiner ausspricht\n\nFangen wir mit der echten an. Es ist nicht die Angst, allein zu sein. Es ist die Angst, sich innerhalb einer Gruppe einsam zu fühlen: Abendessen aus Pflichtgefühl, Gespräche, die nicht in Gang kommen, eine Person, die immer redet, und drei, die nie etwas sagen. Zweitausend Kilometer von zu Hause wegziehen – und sechs Monate später die Straßenseite wechseln, um dem Nachbarn nicht zu begegnen.\n\nDiese Angst ist berechtigt. Wer dir „Wird schon gut gehen“ sagt, will dir etwas verkaufen. Wir sagen dir lieber, wie die Dinge stehen.\n\n## Was wir dir nicht versprechen\n\n- **Automatische Freundschaft.** Freundschaft lässt sich nicht planen. Sie entsteht – oder eben nicht.\n- **Ewige Harmonie.** Zehn Haushalte im selben Dorf werden früher oder später streiten. Darauf kannst du dich verlassen.\n- **Dass sich alle mögen.** Das klappt nicht einmal in Familien.\n\nAffinität ist keine Freundschaft. Sie bedeutet: mit etwas Gemeinsamem zu starten. Der Rest entsteht Tag für Tag.\n\n## Was wir konkret tun\n\n### Kleine Gruppen, sorgfältig zusammengestellt\n\nEdition 1 besteht aus 10 Gründungshaushalten, auf Einladung. In Larva ist der rote Faden die Kunst: Musik, Malerei, Schreiben, Bühne. Gemeinsame Leidenschaften sind das Rohmaterial, nicht die Garantie. Wie Mehl fürs Brot: Ohne geht es nicht, aber kneten musst du trotzdem.\n\n### Ihr lernt euch vorher kennen, nicht nachher\n\nDer Weg hat 4 Etappen, alle umkehrbar. Die erste ist genau das: die Gemeinschaft online kennenlernen, in Ruhe, über Monate, wenn nötig. Dann die Erkundungsreise, gemeinsam. Dann das Probewohnen zur Miete. Erst ganz am Ende das eigene Zuhause. Auf jeder Etappe kannst du sagen „Das ist nichts für mich“ – und aufhören. Die Teilnahme kostet nichts, und du schuldest niemandem eine Erklärung.\n\n### Ein schriftlicher Pakt, unterschrieben vor dem Umzug\n\nUngeschriebene Regeln tun am meisten weh, weil jeder eine andere Version davon im Kopf hat. Deshalb schreibt und unterschreibt die Gruppe vor dem Umzug einen **Gemeinschaftspakt**. Hier der Entwurf in 8 Punkten. Die endgültige Fassung schreibt ihr zehn gemeinsam.\n\n- **1. Respekt und offene Tür.** Wir gehen freundlich miteinander um, auch wenn wir uns nicht einig sind. Wer etwas braucht, darf immer klopfen.\n- **2. Mitmachen ist ein Recht, keine Pflicht.** Niemand führt eine Anwesenheitsliste. Wer zum Essen kommt, ist willkommen; wer zu Hause bleibt, muss sich nicht rechtfertigen.\n- **3. Konflikte gehen an den Vermittler, nicht auf den Dorfplatz.** Wenn zwischen zwei Menschen etwas zerbricht, redet man mit jemandem, der beim Kitten helfen kann. Keine Lager, kein Getuschel.\n- **4. Gemeinsame Entscheidungen laufen so:** Wer etwas vorschlägt, schreibt es auf; alle haben eine Woche Bedenkzeit; dann entscheidet die Gruppe zusammen, eine Stimme pro Haushalt. Über Haus oder Geld der anderen entscheidet niemand. Niemals.\n- **5. Die Privatsphäre jedes Einzelnen.** Dein Haus, deine Tage, deine Angelegenheiten bleiben deine. Nah beieinander wohnen heißt nicht, einander auf der Pelle zu sitzen.\n- **6. Das Verhältnis zu den alteingesessenen Nachbarn.** In Larva leben ~435 Menschen, seit Generationen. Wir kommen als Gäste und werden Nachbarn: Man grüßt, feiert die Dorffeste mit, kauft in den Läden vor Ort.\n- **7. Die Sprache: Wir lernen Spanisch zusammen.** Jede Woche ein bisschen, und wir helfen einander. Mit dem Dorf zu reden ist kein Extra – es ist das Projekt.\n- **8. Wer geht, bleibt ein Freund.** Gehen ist kein Verrat und kein Scheitern. Man verabschiedet sich, bleibt in Kontakt, die Tür bleibt offen.\n\n### Ein neutraler Vermittler\n\nEchte Konflikte löst man nicht beim Kaffee. Das Projekt sieht eine neutrale Person außerhalb der 10 Haushalte vor, an die man sich wendet, wenn ein Streit festgefahren ist. Wer das sein wird und wie oft sie erreichbar ist: noch zu bestätigen – ihr erfahrt es, bevor ihr den Pakt unterschreibt.\n\n### Die Freiheit, für dich zu bleiben\n\nDu hast dein Haus, deine Schlüssel, deine Gewohnheiten. Niemand klopft und fragt, warum du gestern nicht da warst. Punkt 2 des Pakts gibt es genau dafür: Auch Stille ist eine Form von Gemeinschaft.\n\n### Keine Enklave – ein ganzes Dorf\n\nLarva ist keine abgeschottete Siedlung für Ausländer. Es ist ein lebendiges Dorf mit Apotheke, Schule und einer Arztpraxis, die an 7 Tagen die Woche geöffnet ist. Dein soziales Leben hängt nicht nur an der Gruppe: Es gibt die Nachbarn, die Läden, die Feste. Wenn die Gruppe dich enttäuscht, bleibt das Dorf. Und umgekehrt.\n\n## Und wenn es wirklich nicht klappt?\n\nDann gehst du – ohne Scham. Der Weg ist von Anfang an umkehrbar: Vor jedem Kauf steht immer das Probewohnen zur Miete. Das Geld für die Häuser läuft nie über uns: Du zahlst direkt an die Eigentümer, also bindet dich finanziell nichts an die Gruppe. Und deine Rente zahlt dir die Deutsche Rentenversicherung nach Spanien genauso wie zurück nach Deutschland – eine Rückkehr setzt nichts aufs Spiel. Schritt für Schritt steht das im Leitfaden „Wenn es nicht klappt“.\n\n> **Hinweis:** Der Pakt oben ist ein Arbeitsentwurf: Die echte Fassung schreiben die 10 Gründungshaushalte selbst. Der Vermittler ist eingeplant, die praktischen Details sind aber noch zu bestätigen. Bei Miete und Kauf lass dich immer von Fachleuten begleiten (spanische Gestoría oder Notar); Fragen zu Rente und Krankenversicherung klärst du mit der Deutschen Rentenversicherung und deiner Krankenkasse."}}, "figli": {"slug": "figli", "emoji": "👨‍👩‍👧", "title": {"en": "The Family Checklist: 10 Checks in 30 Minutes", "it": "La checklist dei figli: 10 verifiche in 30 minuti", "es": "La lista para los hijos: 10 comprobaciones en 30 minutos", "de": "Die Checkliste für die Kinder: 10 Checks in 30 Minuten"}, "subtitle": {"en": "Your mum or dad showed you this project. Good — be skeptical. Here is how to verify everything.", "it": "Tua madre o tuo padre ti ha mostrato questo progetto. Bene: sii scettico. Ecco come verificare tutto.", "es": "Tu madre o tu padre te ha enseñado este proyecto. Bien: sé escéptico. Así puedes verificarlo todo.", "de": "Deine Mutter oder dein Vater hat dir dieses Projekt gezeigt. Gut so: Sei skeptisch. So prüfst du alles."}, "md": {"en": "## You are right to be skeptical\n\nYour mother or father has shown you this project: moving to a small village in Andalusia, together with other people, with a low pension. Your first thought was probably \"this sounds like a scam\".\n\nGood. That is exactly the right reaction.\n\nWe are not asking you to trust us. We are asking you to **check up on us**. Below are 10 verifications you can do yourself, most of them in a few minutes, without speaking to anyone from the project. If we fail even one of them, tell your parent to walk away.\n\n## The 10 checks\n\n### 1. Check that Larva exists (2 min)\n\nSearch for \"Larva Jaén\" on Wikipedia or on the website of the Spanish statistics institute (INE). It is a real village in the Sierra Mágina, province of Jaén, with about 435 inhabitants. If a project names a place you can verify independently, that is a first good sign. If it didn't, it would be a very bad one.\n\n### 2. Call the town hall of Larva (5 min)\n\nThe phone number of the Ayuntamiento de Larva is public. Call and ask whether they know about the project for retirees from other EU countries. The mayor is involved in it. You can speak Spanish, or use a translation app. A scam does not survive a phone call to a real town hall.\n\n### 3. Check that nobody asks for money (3 min)\n\nThis is the most important one. **Participating costs nothing.** There are no membership fees, no deposits, no \"reservation\" payments. Houses are paid **only to the owner, at the notary's office**, exactly like any property purchase in Spain. We never touch that money and we take no commission. If anyone ever asks your parent to transfer money to the project, that is your red line: stop everything.\n\n### 4. Read the privacy policy (3 min)\n\nRead who processes your parent's personal data and how. The policy is on the website. Vague or missing privacy information is a warning sign anywhere — here you can check it directly.\n\n### 5. Verify the S1 form yourself (5 min)\n\nThe project says EU pensioners get Spanish public healthcare through the **S1 form**, paid by their home country. Don't take our word for it: this is EU law, not our invention. Search for \"S1 form\" on the website of the health-insurance authority in your parent's country, or on the European Commission's \"Your Europe\" portal. You will find it described exactly as we describe it.\n\n### 6. Read the guide \"If it doesn't work out\" (3 min)\n\nThe path is reversible by design: first you meet the community online, then an exploratory trip, then a trial rental, only then a permanent home. Withdrawal is foreseen at every stage, in writing. Read that guide. A project that plans for people leaving is more honest than one that only plans for people arriving.\n\n### 7. Ask the founder the uncomfortable questions (time varies)\n\nThere is a weekly phone hour. Use it. Ask whatever feels uncomfortable: who earns what, what happens if the project fails, what happens if your parent gets seriously ill. You are welcome — skeptical relatives are exactly who that hour is for.\n\n### 8. Ask to speak to someone else (time varies)\n\nAsk to be put in touch with another candidate family, or with the mayor of Larva. One voice can be rehearsed. Several independent voices are much harder to fake.\n\n### 9. Come on the exploratory trip (—)\n\nFamily members are welcome on the exploratory trip. See the village, the medical centre (open 7 days a week, with an ambulance), the pharmacy, the houses. Thirty minutes of checks are good; two days on the ground are better.\n\n### 10. Check house prices yourself (5 min)\n\nThe project mentions houses from roughly €10,000–25,000 in the candidate villages. Open **idealista**, the main Spanish property portal, and search the rural province of Jaén. You will see that ~€15,000 for a village house there is real, not bait.\n\n## What do we get out of it?\n\nThe honest answer: **for now, nothing.** This is a pilot phase. Nobody pays to participate, and we earn nothing on the houses — payments go directly from buyer to owner. A future sustainability model will exist, and it will be published transparently before it applies to anyone. What it will never include: hidden commissions on homes.\n\nIf after these 10 checks something still doesn't add up, call us and say so. Hard questions make this project better.\n\n> ⚠️ House prices (~€10,000–25,000) and the taxi fare (~€2) are estimates to be confirmed case by case. Hospital of reference: Úbeda, ~40 km, ~50 min. Emergencies: 112 (Spain), 061 (medical emergencies, Andalusia). For taxes, pensions and property purchases, your parent should consult a qualified professional (tax advisor, notary) — no guide replaces that.", "it": "## Hai ragione a essere scettico\n\nTua madre o tuo padre ti ha mostrato questo progetto: trasferirsi in un piccolo borgo dell'Andalusia, insieme ad altre persone, con una pensione bassa. Il tuo primo pensiero, probabilmente, è stato \"sembra una truffa\".\n\nBene. È esattamente la reazione giusta.\n\nNon ti chiediamo di fidarti. Ti chiediamo di **controllarci**. Qui sotto trovi 10 verifiche che puoi fare da solo, quasi tutte in pochi minuti, senza parlare con nessuno del progetto. Se ne falliamo anche una sola, di' a tua madre o a tuo padre di lasciar perdere.\n\n## Le 10 verifiche\n\n### 1. Controlla che Larva esista (2 min)\n\nCerca \"Larva Jaén\" su Wikipedia o sul sito dell'istituto di statistica spagnolo (INE). È un paese reale della Sierra Mágina, provincia di Jaén, circa 435 abitanti. Un progetto che nomina un luogo verificabile in modo indipendente parte con il piede giusto. Se non lo facesse, sarebbe un pessimo segnale.\n\n### 2. Chiama il Comune di Larva (5 min)\n\nIl numero dell'Ayuntamiento de Larva è pubblico. Chiama e chiedi se conoscono il progetto per pensionati da altri paesi UE. La sindaca è coinvolta. Puoi parlare in spagnolo o usare un traduttore sul telefono. Una truffa non sopravvive a una telefonata a un municipio vero.\n\n### 3. Controlla che nessuno chieda soldi (3 min)\n\nQuesta è la verifica più importante. **Partecipare non costa nulla.** Niente quote di iscrizione, niente caparre, niente \"prenotazioni\" a pagamento. Le case si pagano **solo al proprietario, dal notaio**, come in qualsiasi compravendita in Spagna. Noi quei soldi non li tocchiamo mai e non prendiamo commissioni. Se qualcuno chiedesse mai a tuo padre o a tua madre un bonifico al progetto: quella è la linea rossa, ferma tutto.\n\n### 4. Leggi l'informativa privacy (3 min)\n\nLeggi chi tratta i dati personali di tua madre o tuo padre e come. L'informativa è sul sito. Un'informativa vaga o assente è un campanello d'allarme ovunque — qui puoi controllarla direttamente.\n\n### 5. Verifica tu stesso il modulo S1 (5 min)\n\nIl progetto dice che i pensionati UE hanno la sanità pubblica spagnola tramite il **modulo S1**, a carico del paese d'origine. Non crederci sulla parola: è diritto europeo, non una nostra invenzione. Cerca \"modulo S1\" sul sito della tua ASL o dell'INPS, o sul portale \"La tua Europa\" della Commissione europea. Lo troverai descritto esattamente come lo descriviamo noi. (E ricorda: chi si trasferisce stabilmente all'estero si iscrive all'AIRE — anche questo è verificabile sul sito del Ministero degli Esteri.)\n\n### 6. Leggi la guida \"Se non funziona\" (3 min)\n\nIl percorso è reversibile per costruzione: prima si conosce la comunità online, poi un viaggio esplorativo, poi un affitto di prova, solo alla fine una casa stabile. Il ritiro è previsto in ogni tappa, per iscritto. Leggi quella guida. Un progetto che prevede chi se ne va è più onesto di uno che prevede solo chi arriva.\n\n### 7. Fai le domande scomode al fondatore (tempo variabile)\n\nC'è un orario telefonico settimanale. Usalo. Chiedi tutto quello che ti mette a disagio: chi guadagna cosa, cosa succede se il progetto fallisce, cosa succede se tua madre si ammala seriamente. Sei il benvenuto: quell'orario esiste proprio per i familiari scettici.\n\n### 8. Chiedi di parlare con qualcun altro (tempo variabile)\n\nChiedi di essere messo in contatto con un'altra famiglia candidata, o con la sindaca di Larva. Una voce sola può essere preparata. Più voci indipendenti sono molto più difficili da costruire a tavolino.\n\n### 9. Vieni anche tu al viaggio esplorativo (—)\n\nI familiari sono benvenuti al viaggio esplorativo. Vedi il paese, l'ambulatorio medico (aperto 7 giorni su 7, con ambulanza), la farmacia, le case. Trenta minuti di verifiche vanno bene; due giorni sul posto valgono di più.\n\n### 10. Controlla i prezzi delle case con i tuoi occhi (5 min)\n\nIl progetto parla di case da circa 10.000–25.000 € nei borghi candidati. Apri **idealista**, il principale portale immobiliare spagnolo, e cerca nella provincia di Jaén rurale. Vedrai che ~15.000 € per una casa di paese lì sono una cifra reale, non un'esca.\n\n## E noi cosa ci guadagniamo?\n\nLa risposta onesta: **per ora, niente.** Siamo in fase pilota. Nessuno paga per partecipare e sulle case non guadagniamo nulla: i pagamenti vanno direttamente dal compratore al proprietario. Un modello di sostenibilità futuro ci sarà, e sarà pubblicato in modo trasparente prima di applicarsi a chiunque. Quello che non ci sarà mai: commissioni nascoste sulle case.\n\nSe dopo queste 10 verifiche qualcosa ancora non ti torna, chiamaci e diccelo. Le domande difficili rendono questo progetto migliore.\n\n> ⚠️ I prezzi delle case (~10.000–25.000 €) e il costo del taxi (~2 €) sono stime da confermare caso per caso. Ospedale di riferimento: Úbeda, ~40 km, ~50 min. Emergenze: 112 (Spagna), 061 (emergenze sanitarie, Andalucía). Per fisco, pensione INPS, AIRE e compravendita, tua madre o tuo padre deve consultare un professionista qualificato (commercialista, notaio): nessuna guida lo sostituisce.", "es": "## Haces bien en ser escéptico\n\nTu madre o tu padre te ha enseñado este proyecto: mudarse a un pueblo pequeño de Andalucía, junto a otras personas, con una pensión baja. Tu primer pensamiento, probablemente, fue \"esto huele a estafa\".\n\nBien. Es exactamente la reacción correcta.\n\nNo te pedimos que confíes en nosotros. Te pedimos que **nos pongas a prueba**. Aquí tienes 10 comprobaciones que puedes hacer tú mismo, casi todas en pocos minutos, sin hablar con nadie del proyecto. Si fallamos aunque sea una, dile a tu madre o a tu padre que lo deje.\n\n## Las 10 comprobaciones\n\n### 1. Comprueba que Larva existe (2 min)\n\nBusca \"Larva Jaén\" en Wikipedia o en la web del INE. Es un pueblo real de Sierra Mágina, provincia de Jaén, con unos 435 habitantes. Un proyecto que nombra un lugar verificable de forma independiente empieza bien. Si no lo hiciera, sería muy mala señal.\n\n### 2. Llama al Ayuntamiento de Larva (5 min)\n\nEl teléfono del Ayuntamiento de Larva es público. Llama y pregunta si conocen el proyecto para pensionistas de otros países de la UE. La alcaldesa está implicada. Una estafa no sobrevive a una llamada a un ayuntamiento de verdad.\n\n### 3. Comprueba que nadie pide dinero (3 min)\n\nEsta es la más importante. **Participar no cuesta nada.** Sin cuotas, sin señales, sin \"reservas\" de pago. Las casas se pagan **solo al propietario, ante notario**, como en cualquier compraventa en España. Nosotros nunca tocamos ese dinero y no cobramos comisión. Si alguien pidiera alguna vez una transferencia al proyecto: esa es la línea roja, páralo todo.\n\n### 4. Lee la política de privacidad (3 min)\n\nLee quién trata los datos personales de tu madre o tu padre y cómo. Está en la web. Una información de privacidad vaga o ausente es señal de alarma en cualquier sitio — aquí puedes comprobarla directamente.\n\n### 5. Verifica tú mismo el formulario S1 (5 min)\n\nEl proyecto dice que los pensionistas de la UE acceden a la sanidad pública española con el **formulario S1**, a cargo de su país de origen. No nos creas: es derecho europeo, no un invento nuestro. Busca \"formulario S1\" en la web del organismo sanitario del país de tu madre o tu padre, o en el portal \"Tu Europa\" de la Comisión Europea. Lo encontrarás descrito exactamente como lo describimos.\n\n### 6. Lee la guía \"Si no funciona\" (3 min)\n\nEl camino es reversible por diseño: primero se conoce la comunidad online, después un viaje exploratorio, después un alquiler de prueba, y solo al final una casa estable. La retirada está prevista en cada etapa, por escrito. Lee esa guía. Un proyecto que prevé que alguien se vaya es más honesto que uno que solo prevé que llegue gente.\n\n### 7. Haz las preguntas incómodas al fundador (tiempo variable)\n\nHay un horario telefónico semanal. Úsalo. Pregunta lo que te incomode: quién gana qué, qué pasa si el proyecto fracasa, qué pasa si tu madre enferma gravemente. Eres bienvenido: ese horario existe precisamente para los familiares escépticos.\n\n### 8. Pide hablar con otra persona (tiempo variable)\n\nPide que te pongan en contacto con otra familia candidata o con la alcaldesa de Larva. Una sola voz puede estar ensayada. Varias voces independientes son mucho más difíciles de fabricar.\n\n### 9. Ven también tú al viaje exploratorio (—)\n\nLos familiares son bienvenidos en el viaje exploratorio. Verás el pueblo, el consultorio médico (abierto los 7 días de la semana, con ambulancia), la farmacia, las casas. Treinta minutos de comprobaciones están bien; dos días sobre el terreno valen más.\n\n### 10. Mira los precios de las casas con tus propios ojos (5 min)\n\nEl proyecto habla de casas desde unos 10.000–25.000 € en los pueblos candidatos. Abre **idealista**, el principal portal inmobiliario español, y busca en la provincia de Jaén rural. Verás que ~15.000 € por una casa de pueblo allí es una cifra real, no un cebo.\n\n## ¿Y nosotros qué ganamos?\n\nLa respuesta honesta: **por ahora, nada.** Estamos en fase piloto. Nadie paga por participar y con las casas no ganamos nada: los pagos van directamente del comprador al propietario. Habrá un modelo de sostenibilidad en el futuro, y se publicará con transparencia antes de aplicarse a nadie. Lo que nunca habrá: comisiones ocultas sobre las casas.\n\nSi después de estas 10 comprobaciones algo sigue sin cuadrarte, llámanos y dínoslo. Las preguntas difíciles hacen mejor este proyecto.\n\n> ⚠️ Los precios de las casas (~10.000–25.000 €) y el taxi (~2 €) son estimaciones por confirmar caso a caso. Hospital de referencia: Úbeda, ~40 km, ~50 min. Emergencias: 112 (España) y 061 (sanitarias, Andalucía). Para impuestos, pensión y compraventa, tu madre o tu padre debe consultar a un profesional cualificado (asesor fiscal, notario): ninguna guía lo sustituye.", "de": "## Du hast recht, skeptisch zu sein\n\nDeine Mutter oder dein Vater hat dir dieses Projekt gezeigt: mit einer kleinen Rente in ein andalusisches Dorf ziehen, gemeinsam mit anderen. Dein erster Gedanke war vermutlich: \"Das klingt nach Betrug.\"\n\nGut so. Genau diese Reaktion ist richtig.\n\nWir bitten dich nicht, uns zu vertrauen. Wir bitten dich, **uns zu überprüfen**. Hier sind 10 Checks, die du selbst machen kannst — die meisten in wenigen Minuten, ohne mit jemandem vom Projekt zu sprechen. Fallen wir auch nur bei einem durch, sag deiner Mutter oder deinem Vater: Finger weg.\n\n## Die 10 Checks\n\n### 1. Prüfe, dass Larva existiert (2 Min.)\n\nSuche \"Larva Jaén\" auf Wikipedia oder auf der Website des spanischen Statistikamts (INE). Es ist ein reales Dorf in der Sierra Mágina, Provinz Jaén, mit rund 435 Einwohnern. Ein Projekt, das einen unabhängig überprüfbaren Ort nennt, fängt gut an. Täte es das nicht, wäre das ein sehr schlechtes Zeichen.\n\n### 2. Ruf das Rathaus von Larva an (5 Min.)\n\nDie Nummer des Ayuntamiento de Larva ist öffentlich. Ruf an und frag, ob man das Projekt für Rentner aus anderen EU-Ländern kennt. Die Bürgermeisterin ist eingebunden. Du kannst Spanisch sprechen oder eine Übersetzungs-App nutzen. Ein Betrug übersteht keinen Anruf bei einem echten Rathaus.\n\n### 3. Prüfe, dass niemand Geld verlangt (3 Min.)\n\nDas ist der wichtigste Punkt. **Die Teilnahme kostet nichts.** Keine Mitgliedsbeiträge, keine Anzahlungen, keine kostenpflichtigen \"Reservierungen\". Häuser werden **nur an den Eigentümer bezahlt, beim Notar** — wie bei jedem Immobilienkauf in Spanien. Wir fassen dieses Geld nie an und nehmen keine Provision. Sollte je jemand eine Überweisung an das Projekt verlangen: Das ist die rote Linie. Sofort stoppen.\n\n### 4. Lies die Datenschutzerklärung (3 Min.)\n\nLies nach, wer die Daten deiner Mutter oder deines Vaters verarbeitet und wie. Die Erklärung steht auf der Website. Vage oder fehlende Datenschutzinfos sind überall ein Warnsignal — hier kannst du sie direkt prüfen.\n\n### 5. Prüfe das S1-Formular selbst (5 Min.)\n\nDas Projekt sagt: EU-Rentner bekommen über das **Formular S1** Zugang zur spanischen öffentlichen Gesundheitsversorgung, bezahlt vom Herkunftsland. Glaub uns nicht einfach — das ist EU-Recht, keine Erfindung von uns. Such \"Formular S1\" auf der Website der Krankenkasse deiner Eltern oder bei der Deutschen Verbindungsstelle Krankenversicherung – Ausland (DVKA). Du wirst es genau so beschrieben finden, wie wir es beschreiben. Die deutsche Rente zahlt die Deutsche Rentenversicherung übrigens auch nach Spanien — auch das kannst du dort nachlesen.\n\n### 6. Lies den Leitfaden \"Wenn es nicht klappt\" (3 Min.)\n\nDer Weg ist bewusst umkehrbar: erst die Gemeinschaft online kennenlernen, dann eine Erkundungsreise, dann ein Probewohnen zur Miete, erst danach ein festes Zuhause. Der Ausstieg ist in jeder Etappe vorgesehen, schriftlich. Lies diesen Leitfaden. Ein Projekt, das den Weggang einplant, ist ehrlicher als eines, das nur Ankünfte kennt.\n\n### 7. Stell dem Gründer die unbequemen Fragen (Zeit variabel)\n\nEs gibt eine wöchentliche Telefonsprechstunde. Nutze sie. Frag alles, was dir unangenehm erscheint: Wer verdient woran? Was passiert, wenn das Projekt scheitert? Was, wenn deine Mutter ernsthaft krank wird? Du bist willkommen — genau für skeptische Angehörige gibt es diese Sprechstunde.\n\n### 8. Bitte darum, mit jemand anderem zu sprechen (Zeit variabel)\n\nLass dich mit einer anderen Kandidatenfamilie oder mit der Bürgermeisterin von Larva verbinden. Eine einzelne Stimme kann einstudiert sein. Mehrere unabhängige Stimmen sind viel schwerer zu fälschen.\n\n### 9. Komm mit auf die Erkundungsreise (—)\n\nAngehörige sind auf der Erkundungsreise willkommen. Sieh dir das Dorf an, die Arztpraxis (an 7 Tagen die Woche geöffnet, mit Krankenwagen), die Apotheke, die Häuser. 30 Minuten Checks sind gut — zwei Tage vor Ort sind besser.\n\n### 10. Prüfe die Hauspreise mit eigenen Augen (5 Min.)\n\nDas Projekt nennt Häuser ab etwa 10.000–25.000 € in den Kandidatendörfern. Öffne **idealista**, das größte spanische Immobilienportal, und such in der ländlichen Provinz Jaén. Du wirst sehen: ~15.000 € für ein Dorfhaus dort sind real, kein Köder.\n\n## Und was haben wir davon?\n\nDie ehrliche Antwort: **im Moment nichts.** Wir sind in der Pilotphase. Niemand zahlt für die Teilnahme, und an den Häusern verdienen wir nichts — das Geld geht direkt vom Käufer an den Eigentümer. Ein künftiges Finanzierungsmodell wird es geben, und es wird transparent veröffentlicht, bevor es für irgendjemanden gilt. Was es nie geben wird: versteckte Provisionen auf Häuser.\n\nWenn nach diesen 10 Checks etwas immer noch nicht stimmig wirkt: Ruf uns an und sag es uns. Harte Fragen machen dieses Projekt besser.\n\n> ⚠️ Hauspreise (~10.000–25.000 €) und Taxikosten (~2 €) sind Schätzungen, im Einzelfall zu bestätigen. Krankenhaus: Úbeda, ~40 km, ~50 Min. Notruf: 112 (Spanien), 061 (medizinische Notfälle, Andalusien). Für Steuern, Rente und Hauskauf sollten deine Eltern Fachleute hinzuziehen (Steuerberater, Notar; bei der Rente: Deutsche Rentenversicherung, bei der Krankenversicherung: ihre Krankenkasse) — kein Leitfaden ersetzt das."}}};

var lang='en';
var id=(new URLSearchParams(location.search).get('id')||'').toLowerCase();
function esc(x){return String(x==null?'':x).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
function tr(o){return (o&&(o[lang]||o.en))||''}
function inline(s){
  s=esc(s);
  s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\*([^*]+)\*/g,'<em>$1</em>');
  return s;
}
function mdRender(md){
  var out='',para=[],ul=false,tbl=[];
  var lines=String(md||'').split('\n');
  function fP(){if(para.length){out+='<p>'+inline(para.join(' '))+'</p>';para=[];}}
  function fU(){if(ul){out+='</ul>';ul=false;}}
  function fT(){
    if(tbl.length){
      var rows=tbl.filter(function(r){return !/^[\s|:\-]+$/.test(r)});
      out+='<table>';
      rows.forEach(function(r,i){
        var cells=r.replace(/^\s*\|/,'').replace(/\|\s*$/,'').split('|');
        out+='<tr>'+cells.map(function(c){var t=i===0?'th':'td';return '<'+t+'>'+inline(c.trim())+'</'+t+'>'}).join('')+'</tr>';
      });
      out+='</table>';tbl=[];
    }
  }
  lines.forEach(function(raw){
    var l=raw.replace(/\s+$/,'');
    if(/^\s*\|/.test(l)){fP();fU();tbl.push(l);return;}
    fT();
    if(/^###\s+/.test(l)){fP();fU();out+='<h3>'+inline(l.replace(/^###\s+/,''))+'</h3>';return;}
    if(/^##\s+/.test(l)){fP();fU();out+='<h2>'+inline(l.replace(/^##\s+/,''))+'</h2>';return;}
    if(/^#\s+/.test(l)){fP();fU();out+='<h2>'+inline(l.replace(/^#\s+/,''))+'</h2>';return;}
    if(/^>\s?/.test(l)){fP();fU();out+='<blockquote>'+inline(l.replace(/^>\s?/,''))+'</blockquote>';return;}
    if(/^[-•]\s+/.test(l)){fP();if(!ul){out+='<ul>';ul=true;}out+='<li>'+inline(l.replace(/^[-•]\s+/,''))+'</li>';return;}
    if(l.trim()===''){fP();fU();return;}
    para.push(l.trim());
  });
  fT();fP();fU();
  return out;
}

  }
  document.getElementById('ghead').style.display='block';

    ch.insertAdjacentHTML('beforeend','<a class="gc" href="guide.html?id='+k+'">'+esc(G[k].emoji)+' '+esc(tr(G[k].title))+'</a>');
  });
}
