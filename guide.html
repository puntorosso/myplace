<script>
var G={"bilancio": {"slug": "bilancio", "emoji": "💶", "title": {"en": "The Honest Monthly Budget: Larva on €900–1,000 a Month", "it": "Il bilancio mensile onesto: vivere a Larva con 900-1.000 €", "es": "Presupuesto honesto: vivir en Larva con 900-1.000 € al mes", "de": "Das ehrliche Monatsbudget: Leben in Larva mit 900–1.000 €"}, "subtitle": {"en": "Every cost, line by line, for one person and for a couple — including the winter nobody mentions.", "it": "Tutte le spese, voce per voce, per una persona e per una coppia. Compreso l'inverno che nessuno racconta.", "es": "Todos los gastos, partida a partida, para una persona y para una pareja. Incluido el invierno del que nadie habla.", "de": "Alle Kosten, Posten für Posten, für eine Person und für ein Paar – samt dem Winter, den keiner erwähnt."}, "md": {"en": "How far does a pension of €900–1,000 a month really go in Larva? Here is the honest answer, line by line. Every number marked with ~ is an estimate to be confirmed on the ground. The scenario is the trial-rental stage (step 3 of the path): you buy nothing, you commit to nothing, and you pay the rent directly to the owner. We never touch your money.\n\n## The monthly table\n\n| Item | One person | A couple |\n|---|---|---|\n| Trial rent | ~€250–350 (to be confirmed) | ~€250–400 (to be confirmed) |\n| Electricity | ~€40–60 | ~€50–70 |\n| Water and rubbish | ~€15–25 | ~€20–30 |\n| Gas bottles (summer) | ~€10–15 | ~€15–20 |\n| Heating (winter) | ~€50–80 | ~€60–90 |\n| Internet and phone | ~€30 | ~€35–40 |\n| Food shopping | ~€200–250 | ~€350–450 |\n| Pharmacy | ~€10–20 | ~€20–40 |\n| Taxi and transport | ~€20–30 | ~€30–40 |\n| Bar and small pleasures | ~€40–60 | ~€60–90 |\n| Unexpected costs | ~€50 | ~€70 |\n| **Total, summer** | **~€665–890** | **~€900–1,250** |\n| **Total, winter** | **~€705–955** | **~€945–1,320** |\n\nThe summer total uses the \"gas bottles\" line; the winter total uses the \"heating\" line. Never both at once.\n\n### Where the numbers come from\n\n- The orange butane bottle has a state-regulated price in Spain: currently ~€16.35, updated every two months. In summer, one bottle a month covers cooking and hot water. In winter you will need three or four, plus electric heaters.\n- A typical Spanish electricity bill runs ~€50–65 a month on the regulated PVPC tariff, at average consumption. A small village house can stay below that.\n- Pharmacy: under current Spanish rules, pensioners in the public system with incomes below €18,000 pay 10% of the price, capped at ~€8.23 a month (to be confirmed). How this applies to S1 holders must be confirmed when you register at the health centre.\n- Food: ~€250–300 a month per person is the Spanish average. Shopping at the local market and cooking at home, you can spend less.\n\n## Healthcare is not a budget line\n\nIf you receive a state pension from an EU country, it follows you to Spain. The S1 form — ask the health institution of your home country before leaving — gives you access to Andalusian public healthcare, with the cost still carried by your home country. Larva has a medical clinic open seven days a week, with an ambulance, and a pharmacy in the village. The reference hospital is in Úbeda, ~40 km away (~50 minutes). Emergencies: 112; health emergencies in Andalucía: 061.\n\n## The comparison with a big city\n\nIn Milan, a small flat in the outskirts costs ~€750–1,000 a month in rent alone; living alone costs ~€1,400–2,000 a month in total. In Munich, a one-room flat runs ~€770–900 cold rent plus ~€150–200 in service charges. In Larva, the rent of one big-city flat covers almost your entire month. That is not magic — it is a village of ~435 people. You give up some things. Your bank account breathes.\n\n## What is NOT cheaper\n\n- **A car.** Insurance, fuel, inspections, repairs: budget ~€100–150 a month if you drive regularly. In Larva the doctor, the pharmacy and the bar are in the village, and the taxi to the next town costs ~€2 — some people manage without a car. But for trips to Úbeda and for your own freedom, a car — your own or shared with neighbours — is the realistic plan.\n- **Going home.** Flights from Granada or Málaga are not always cheap, and the airport itself is a 2–3 hour trip. Budget ~€200–400 per person per visit, to be confirmed by season.\n- **Winter.** Larva sits on a high plateau in the Sierra Mágina. Nights below zero are normal from December to February, and old village houses are often poorly insulated. Heating will cost more than you imagine, not less.\n\n## So — can you live on €900–1,000?\n\nOne person: yes, with care. In summer you will put money aside; in the hardest winter months, the high end of the table leaves little margin. A couple with two pensions has real breathing room. And if one day you buy a house (~€10,000–25,000 in the candidate villages), the rent line disappears — replaced by small but real costs: property tax (IBI), insurance, maintenance.\n\n> ⚠️ All figures marked ~ are 2026 estimates to be confirmed in person; the trial rent is agreed directly with the owner. Before moving, check your pension and tax position with a professional adviser, and confirm the S1 procedure with your home institution. We never promise grants or subsidies, and taking part costs nothing.", "it": "Fin dove arriva davvero una pensione di 900-1.000 € al mese a Larva? Ecco la risposta onesta, voce per voce. Ogni numero con la tilde (~) è una stima da confermare sul posto. Lo scenario è l'affitto di prova (tappa 3 del percorso): non compri nulla, non ti vincoli a nulla, e l'affitto lo paghi direttamente al proprietario. Noi non tocchiamo mai i tuoi soldi.\n\n## La tabella del mese\n\n| Voce | Una persona | Una coppia |\n|---|---|---|\n| Affitto di prova | ~250-350 € (da confermare) | ~250-400 € (da confermare) |\n| Luce | ~40-60 € | ~50-70 € |\n| Acqua e rifiuti | ~15-25 € | ~20-30 € |\n| Bombole gas (estate) | ~10-15 € | ~15-20 € |\n| Riscaldamento (inverno) | ~50-80 € | ~60-90 € |\n| Internet e telefono | ~30 € | ~35-40 € |\n| Spesa alimentare | ~200-250 € | ~350-450 € |\n| Farmacia | ~10-20 € | ~20-40 € |\n| Taxi e trasporti | ~20-30 € | ~30-40 € |\n| Bar e piccoli piaceri | ~40-60 € | ~60-90 € |\n| Imprevisti | ~50 € | ~70 € |\n| **Totale estate** | **~665-890 €** | **~900-1.250 €** |\n| **Totale inverno** | **~705-955 €** | **~945-1.320 €** |\n\nIl totale estivo usa la riga \"bombole gas\"; quello invernale la riga \"riscaldamento\". Mai tutte e due insieme.\n\n### Da dove vengono i numeri\n\n- La bombola arancione di butano ha un prezzo regolato dallo Stato spagnolo: oggi ~16,35 €, aggiornato ogni due mesi. D'estate una bombola al mese basta per cucina e acqua calda. D'inverno ne servono tre o quattro, più qualche stufetta elettrica.\n- La bolletta della luce media in Spagna è ~50-65 € al mese sulla tariffa regolata PVPC, con consumi medi. In una piccola casa di paese si può stare sotto.\n- Farmacia: con le regole spagnole attuali, i pensionati nel sistema pubblico con redditi sotto i 18.000 € pagano il 10% del prezzo, con un tetto di ~8,23 € al mese (da confermare). Come si applica a chi arriva col modulo S1 va confermato all'ambulatorio al momento della registrazione.\n- La spesa: ~250-300 € al mese a persona è la media spagnola. Col mercato locale e cucinando in casa si può spendere meno.\n\n## La sanità non è una voce di spesa\n\nLa pensione INPS ti viene pagata anche in Spagna. Col modulo S1 — chiedilo alla tua ASL prima di partire — entri nella sanità pubblica andalusa: il costo resta a carico dell'Italia. Se il trasferimento diventa stabile, ricordati l'iscrizione all'AIRE. A Larva c'è l'ambulatorio aperto 7 giorni su 7 con ambulanza, e la farmacia è in paese. L'ospedale di riferimento è a Úbeda, a ~40 km (~50 minuti). Emergenze: 112; emergenze sanitarie in Andalusia: 061.\n\n## Il confronto con Milano\n\nA Milano un monolocale in periferia costa ~750-1.000 € al mese di solo affitto; vivere da soli costa ~1.400-2.000 € al mese in tutto. A Larva, con l'affitto di un monolocale milanese copri quasi l'intero mese. Non è magia: è un paese di ~435 abitanti, non una metropoli. Rinunci a qualcosa. Il conto in banca respira.\n\n## Cosa NON è più economico\n\n- **L'auto.** Assicurazione, carburante, revisioni, riparazioni: metti in conto ~100-150 € al mese se la usi con regolarità. A Larva medico, farmacia e bar sono in paese, e il taxi per il paese vicino costa ~2 €: c'è chi fa senza auto. Ma per Úbeda e per la tua libertà, un'auto — tua o condivisa coi vicini — è lo scenario realistico.\n- **Tornare in Italia.** I voli da Granada o Málaga non sono sempre economici, e l'aeroporto stesso dista 2-3 ore. Metti in conto ~200-400 € a persona per ogni viaggio, da confermare secondo la stagione.\n- **L'inverno.** Larva sorge su un altopiano della Sierra Mágina, in quota. Le notti sotto zero sono normali da dicembre a febbraio, e le vecchie case di paese sono spesso poco isolate. Il riscaldamento costerà più di quanto immagini, non meno.\n\n## Allora: ce la si fa con 900-1.000 €?\n\nDa soli: sì, con attenzione. D'estate metti via qualcosa; nei mesi più duri dell'inverno, la fascia alta della tabella lascia poco margine. Una coppia con due pensioni respira davvero. E se un giorno compri casa (~10.000-25.000 € nei borghi candidati), la voce affitto sparisce — sostituita da costi piccoli ma reali: imposta sulla casa (IBI), assicurazione, manutenzione.\n\n> ⚠️ Tutte le cifre con ~ sono stime 2026 da confermare di persona; l'affitto di prova si concorda direttamente col proprietario. Prima di partire verifica pensione, fisco e residenza con un commercialista (e in Spagna con un gestor); il modulo S1 va richiesto alla tua ASL. Non promettiamo mai aiuti o incentivi economici, e partecipare non costa nulla.", "es": "¿Cuánto da de sí de verdad una pensión de 900-1.000 € al mes en Larva? Aquí tienes la respuesta honesta, partida a partida. Cada cifra marcada con ~ es una estimación que conviene confirmar sobre el terreno. El escenario es el alquiler de prueba (etapa 3 del camino): no compras nada, no te atas a nada, y el alquiler se lo pagas directamente al propietario. Nosotros nunca tocamos tu dinero.\n\n## La tabla del mes\n\n| Partida | Una persona | Una pareja |\n|---|---|---|\n| Alquiler de prueba | ~250-350 € (por confirmar) | ~250-400 € (por confirmar) |\n| Luz | ~40-60 € | ~50-70 € |\n| Agua y basura | ~15-25 € | ~20-30 € |\n| Bombonas (verano) | ~10-15 € | ~15-20 € |\n| Calefacción (invierno) | ~50-80 € | ~60-90 € |\n| Internet y teléfono | ~30 € | ~35-40 € |\n| Alimentación | ~200-250 € | ~350-450 € |\n| Farmacia | ~10-20 € | ~20-40 € |\n| Taxi y transporte | ~20-30 € | ~30-40 € |\n| Bar y pequeños placeres | ~40-60 € | ~60-90 € |\n| Imprevistos | ~50 € | ~70 € |\n| **Total verano** | **~665-890 €** | **~900-1.250 €** |\n| **Total invierno** | **~705-955 €** | **~945-1.320 €** |\n\nEl total de verano usa la fila \"bombonas\"; el de invierno, la fila \"calefacción\". Nunca las dos a la vez.\n\n### De dónde salen las cifras\n\n- La bombona naranja de butano tiene precio regulado por el Estado: hoy ~16,35 €, y se revisa cada dos meses. En verano, una bombona al mes cubre cocina y agua caliente. En invierno harán falta tres o cuatro, más alguna estufa eléctrica.\n- La factura media de la luz ronda los ~50-65 € al mes con la tarifa regulada PVPC, con un consumo medio. En una casa pequeña de pueblo se puede bajar de ahí.\n- Farmacia: con las normas actuales, los pensionistas con rentas inferiores a 18.000 € pagan el 10% del precio, con tope de ~8,23 € al mes (por confirmar). Si llegas con el formulario S1 de otro país de la UE, confirma cómo se te aplica al registrarte en el consultorio.\n- Alimentación: ~250-300 € al mes por persona es la media española. Comprando en el mercado local y cocinando en casa, se puede gastar menos.\n\n## La sanidad no es una partida de gasto\n\nSi ya cobras una pensión española, no cambia nada: tu tarjeta sanitaria te acompaña. Si tu pensión viene de otro país de la UE, el formulario S1 — lo pides a la institución sanitaria de tu país antes de mudarte — te da acceso a la sanidad pública andaluza, con el coste a cargo de tu país de origen. En Larva hay consultorio médico abierto los 7 días de la semana con ambulancia, y farmacia en el pueblo. El hospital de referencia está en Úbeda, a ~40 km (~50 minutos). Emergencias: 112; urgencias sanitarias en Andalucía: 061.\n\n## La comparación con la gran ciudad\n\nEn Madrid o Barcelona, un piso pequeño difícilmente baja de ~900-1.100 € solo de alquiler, y vivir solo supera con facilidad los ~1.500 € al mes. En Larva, con lo que cuesta solo el alquiler en la capital cubres casi el mes entero. No es magia: es un pueblo de ~435 habitantes, no una metrópoli. Renuncias a algunas cosas. Tu cuenta respira.\n\n## Lo que NO es más barato\n\n- **El coche.** Seguro, gasolina, ITV, averías: cuenta ~100-150 € al mes si lo usas con regularidad. En Larva el médico, la farmacia y el bar están en el pueblo, y el taxi al pueblo de al lado cuesta ~2 €: hay quien vive sin coche. Pero para Úbeda y para tu libertad, un coche — propio o compartido con vecinos — es el escenario realista.\n- **Volver a casa.** Si tu familia está lejos, los vuelos desde Granada o Málaga no siempre son baratos, y el propio aeropuerto está a 2-3 horas. Cuenta ~200-400 € por persona y viaje, por confirmar según temporada.\n- **El invierno.** Larva está en el altiplano de Sierra Mágina, a bastante altitud. Las noches bajo cero son normales de diciembre a febrero, y las casas viejas de pueblo suelen estar mal aisladas. La calefacción costará más de lo que imaginas, no menos.\n\n## Entonces, ¿se puede vivir con 900-1.000 €?\n\nUna persona sola: sí, con cabeza. En verano ahorras algo; en los meses más duros del invierno, la parte alta de la tabla deja poco margen. Una pareja con dos pensiones respira de verdad. Y si un día compras casa (~10.000-25.000 € en los pueblos candidatos), la partida del alquiler desaparece — sustituida por gastos pequeños pero reales: IBI, seguro, mantenimiento.\n\n> ⚠️ Todas las cifras con ~ son estimaciones de 2026 a confirmar en persona; el alquiler de prueba se acuerda directamente con el propietario. Antes de mudarte, revisa tu situación fiscal y de pensión con un gestor o asesor profesional, y confirma el trámite del S1 con la institución de tu país. Nunca prometemos ayudas ni incentivos económicos, y participar no cuesta nada.", "de": "Wie weit reicht eine Rente von 900–1.000 € im Monat wirklich in Larva? Hier ist die ehrliche Antwort, Posten für Posten. Jede Zahl mit Tilde (~) ist eine Schätzung, die du vor Ort prüfen solltest. Das Szenario ist die Probemiete (Etappe 3 des Wegs): Du kaufst nichts, du bindest dich an nichts, und die Miete zahlst du direkt an den Eigentümer. Wir fassen dein Geld nie an.\n\n## Die Monatstabelle\n\n| Posten | Eine Person | Ein Paar |\n|---|---|---|\n| Probemiete | ~250–350 € (zu bestätigen) | ~250–400 € (zu bestätigen) |\n| Strom | ~40–60 € | ~50–70 € |\n| Wasser und Müllgebühr | ~15–25 € | ~20–30 € |\n| Gasflaschen (Sommer) | ~10–15 € | ~15–20 € |\n| Heizung (Winter) | ~50–80 € | ~60–90 € |\n| Internet und Telefon | ~30 € | ~35–40 € |\n| Lebensmittel | ~200–250 € | ~350–450 € |\n| Apotheke | ~10–20 € | ~20–40 € |\n| Taxi und Fahrten | ~20–30 € | ~30–40 € |\n| Bar und kleine Freuden | ~40–60 € | ~60–90 € |\n| Unvorhergesehenes | ~50 € | ~70 € |\n| **Gesamt Sommer** | **~665–890 €** | **~900–1.250 €** |\n| **Gesamt Winter** | **~705–955 €** | **~945–1.320 €** |\n\nDie Sommersumme rechnet mit der Zeile \"Gasflaschen\", die Wintersumme mit der Zeile \"Heizung\". Nie beide zugleich.\n\n### Woher die Zahlen kommen\n\n- Die orangefarbene Butangasflasche hat in Spanien einen staatlich regulierten Preis: aktuell ~16,35 €, alle zwei Monate neu festgelegt. Im Sommer reicht eine Flasche im Monat für Kochen und Warmwasser. Im Winter brauchst du drei bis vier, dazu elektrische Heizgeräte.\n- Eine durchschnittliche spanische Stromrechnung liegt bei ~50–65 € im Monat im regulierten PVPC-Tarif, bei mittlerem Verbrauch. Ein kleines Dorfhaus kann darunter bleiben.\n- Apotheke: Nach den aktuellen spanischen Regeln zahlen Rentner im öffentlichen System mit Einkommen unter 18.000 € zehn Prozent des Preises, gedeckelt auf ~8,23 € im Monat (zu bestätigen). Wie das für S1-Versicherte gilt, klärst du bei der Anmeldung im Gesundheitszentrum.\n- Lebensmittel: ~250–300 € im Monat pro Person ist der spanische Durchschnitt. Mit dem örtlichen Markt und eigener Küche geht es günstiger.\n\n## Die Gesundheitsversorgung ist kein Kostenposten\n\nDie Deutsche Rentenversicherung zahlt dir deine Rente auch nach Spanien. Mit dem Formular S1 — das bekommst du vor dem Umzug von deiner gesetzlichen Krankenkasse — bist du im andalusischen öffentlichen Gesundheitssystem versorgt; die Kosten trägt weiterhin Deutschland. Kläre mit deiner Krankenkasse auch, was ein dauerhafter Wegzug für Pflegeversicherung und Zusatzleistungen bedeutet. In Larva gibt es eine Arztpraxis, die an 7 Tagen die Woche geöffnet ist, mit Krankenwagen, und eine Apotheke im Ort. Das zuständige Krankenhaus liegt in Úbeda, ~40 km entfernt (~50 Minuten). Notruf: 112; medizinischer Notruf in Andalusien: 061.\n\n## Der Vergleich mit München\n\nIn München kostet eine 1-Zimmer-Wohnung ~770–900 € Kaltmiete plus ~150–200 € Nebenkosten. Wer allein lebt, braucht insgesamt ~1.800–2.400 € im Monat. In Larva deckt allein die Münchner Miete fast deinen ganzen Monat. Das ist keine Zauberei: Es ist ein Dorf mit ~435 Einwohnern, keine Großstadt. Du verzichtest auf manches. Dein Konto atmet auf.\n\n## Was NICHT billiger ist\n\n- **Das Auto.** Versicherung, Sprit, die spanische ITV (wie der TÜV), Reparaturen: Rechne mit ~100–150 € im Monat bei regelmäßiger Nutzung. In Larva sind Arzt, Apotheke und Bar im Ort, und das Taxi ins Nachbardorf kostet ~2 € — manche kommen ohne Auto aus. Aber für Úbeda und für deine Unabhängigkeit ist ein Auto — eigenes oder mit Nachbarn geteilt — das realistische Szenario.\n- **Heimflüge.** Flüge ab Granada oder Málaga nach Deutschland sind nicht immer günstig, und schon der Weg zum Flughafen dauert 2–3 Stunden. Rechne mit ~200–400 € pro Person und Besuch, je nach Saison zu bestätigen.\n- **Der Winter.** Larva liegt auf einer Hochebene der Sierra Mágina. Nächte unter null Grad sind von Dezember bis Februar normal, und alte Dorfhäuser sind oft schlecht isoliert. Das Heizen kostet mehr, als du denkst — nicht weniger.\n\n## Also: Reichen 900–1.000 €?\n\nAllein: ja, mit Umsicht. Im Sommer legst du etwas zurück; in den härtesten Wintermonaten lässt das obere Ende der Tabelle wenig Spielraum. Ein Paar mit zwei Renten hat echten Puffer. Und wenn du eines Tages ein Haus kaufst (~10.000–25.000 € in den Kandidatendörfern), fällt die Mietzeile weg — ersetzt durch kleine, aber reale Posten: Grundsteuer (IBI), Versicherung, Instandhaltung.\n\n> ⚠️ Alle Zahlen mit ~ sind Schätzungen von 2026, vor Ort zu bestätigen; die Probemiete vereinbarst du direkt mit dem Eigentümer. Kläre vor dem Umzug Rente, Steuern und Krankenversicherung mit einem Steuerberater und deiner Krankenkasse; das S1 beantragst du dort. Wir versprechen nie Zuschüsse oder finanzielle Anreize, und die Teilnahme kostet nichts."}}, "ritorno": {"slug": "ritorno", "emoji": "🔙", "title": {"en": "If it doesn't work out, you go home", "it": "Se non funziona, torni a casa", "es": "Si no funciona, vuelves a casa", "de": "Wenn es nicht passt, gehst du zurück"}, "subtitle": {"en": "Our written exit policy: what going back costs at each of the 4 steps — in euros and in practice.", "it": "La nostra regola di uscita, scritta: cosa costa tornare indietro in ogni tappa, in euro e in pratica.", "es": "Nuestra política de salida por escrito: qué cuesta volver en cada etapa, en euros y en la práctica.", "de": "Unsere schriftliche Ausstiegsregel: was der Rückzug in jeder Etappe kostet — in Euro und in der Praxis."}, "md": {"en": "## If it doesn't work out, you go home\n\nBefore you read anything else on this site, read this page. It answers the question most people are too polite to ask out loud: \"And if I hate it — what then?\"\n\nThe honest answer: **you go home.** And here we explain exactly what that costs, step by step. We walk the 4-step path backwards, from the easiest exit to the hardest.\n\n### Walking away after Step 1: meeting the community online\n\n**Cost: zero. Loss: zero.**\n\nStep 1 happens from your sofa. Video calls, messages, getting to know the people who might become your neighbours in Larva. You sign nothing. You pay nothing. There are no fees, no membership, no penalty clauses — participating costs nothing, by design.\n\nIf after three weeks or three months you think \"this isn't for me\", you say so and that's that. Nobody chases you. There is nothing to cancel.\n\n### Walking away after Step 2: the exploratory trip\n\n**Cost: the trip itself, which you pay for. ~€300–500 (to be confirmed), depending on where you travel from.**\n\nYou come and see Larva with your own eyes. Flights or trains, a few nights' accommodation, meals. That money is spent whether you stay or not — and that's the whole point. A few hundred euros to find out, before any commitment, whether this life fits you: that is cheap insurance.\n\nIf you go home and decide it's a no, you've lost the price of a holiday — and gained an answer. You stop wondering.\n\n### Walking away during Step 3: the trial rental\n\n**Cost: what your rental contract with the owner says. Usually one month's rent, sometimes a deposit.**\n\nHere a real contract enters the picture — between **you and the property owner**, not with us. We never touch your money. No commission, no markup, ever.\n\nWhat you risk depends on that contract: typically the current month and possibly a deposit, as agreed with the owner. Read the notice terms before signing. If you leave mid-month, you generally lose that month — not more. Your home in your own country is still there, because we tell everyone: **don't sell anything to do the trial.** And as long as you keep your official residence at home, nothing changes with your pension — it arrives as it always has.\n\n### Walking away after Step 4: buying a house\n\n**This is the least reversible step — and that's exactly why it comes last.**\n\nIn Spain, buying property costs **~10–12% on top of the price** in taxes, notary and registration fees (to be confirmed for your specific case — always use a notary and an independent adviser). On a €15,000 village house that's ~€1,500–1,800 you don't get back. Selling again takes time in a small village, and you may sell for less than you paid.\n\nThis is why our rule is firm: **buy only after living the trial rental.** Never on the first visit, never on enthusiasm alone.\n\n### The table, at a glance\n\n| Step | If you walk away, you lose |\n|---|---|\n| 1. Meet the community online | Nothing. €0, no contract, no penalty |\n| 2. Exploratory trip | The trip cost: ~€300–500 (to be confirmed), paid by you |\n| 3. Trial rental | Rent/deposit per your contract with the owner |\n| 4. Buying a house | ~10–12% purchase costs + resale time and risk |\n\n### Going back is not failing\n\nWe expect some people to return home. That is the system **working**, not breaking. The trial exists so the wrong fit shows up early and cheaply.\n\n> \"I came back after two months. Nobody made me feel bad about it. Now I know, instead of wondering forever.\" — that is the sentence we want anyone who leaves to be able to say.\n\nIf you decide to return: you tell the owner per your contract, you tell us (a phone call is enough), and you go home. No exit interview, no penalty, no shame.\n\n> ⚠️ Honest note: trip costs (~€300–500) and Spanish purchase costs (~10–12%) are estimates to be confirmed for your case. Rental terms depend entirely on your contract with the owner — read it before signing. Before any purchase, consult a notary and an independent tax adviser.", "it": "## Se non funziona, torni a casa\n\nPrima di leggere qualsiasi altra pagina di questo sito, leggi questa. Risponde alla domanda che quasi nessuno fa ad alta voce: \"E se poi mi pento?\"\n\nLa risposta onesta è: **torni a casa.** E qui ti spieghiamo esattamente quanto costa, tappa per tappa. Percorriamo le 4 tappe al contrario: dall'uscita più facile a quella più difficile.\n\n### Ritirarsi dopo la Tappa 1: conoscere la comunità online\n\n**Costo: zero. Perdita: zero.**\n\nLa Tappa 1 si fa dal divano di casa tua. Videochiamate, messaggi, conoscere le persone che potrebbero diventare i tuoi vicini a Larva. Non firmi nulla. Non paghi nulla. Niente quote, niente iscrizioni, niente penali: partecipare non costa nulla, per scelta.\n\nSe dopo tre settimane o tre mesi pensi \"non fa per me\", lo dici e finisce lì. Nessuno insiste. Non c'è nulla da disdire.\n\n### Ritirarsi dopo la Tappa 2: il viaggio esplorativo\n\n**Costo: il viaggio, che paghi tu. ~300–500€ (da confermare), a seconda di dove parti.**\n\nVieni a vedere Larva con i tuoi occhi. Volo o treno, qualche notte, i pasti. Quei soldi li spendi comunque, che tu resti o no — ed è proprio questo il senso. Qualche centinaio di euro per scoprire prima di ogni impegno se questa vita fa per te: è un'assicurazione che costa poco.\n\nSe torni e decidi di no, hai perso il prezzo di una vacanza — e hai guadagnato una risposta. Smetti di chiedertelo.\n\n### Ritirarsi durante la Tappa 3: l'affitto di prova\n\n**Costo: quello che dice il tuo contratto d'affitto col proprietario. Di solito una mensilità, a volte una caparra.**\n\nQui entra in gioco un contratto vero — tra **te e il proprietario di casa**, non con noi. Noi non tocchiamo mai i tuoi soldi: zero commissioni, zero ricarichi, sempre.\n\nCosa rischi dipende da quel contratto: in genere la mensilità in corso ed eventualmente la caparra, come pattuito col proprietario. Leggi i termini di disdetta prima di firmare. Se te ne vai a metà mese, di norma perdi quel mese — non di più. La tua casa in Italia è ancora lì, perché lo diciamo a tutti: **per la prova non si vende nulla.** E finché mantieni la residenza in Italia, con INPS non cambia niente: la pensione arriva come sempre.\n\n### Ritirarsi dopo la Tappa 4: l'acquisto della casa\n\n**È la tappa meno reversibile — ed è esattamente per questo che viene per ultima.**\n\nIn Spagna comprare casa costa il **~10–12% in più del prezzo** tra imposte, notaio e registri (da confermare per il tuo caso: serve sempre un notaio e un consulente indipendente). Su una casa da 15.000€ sono ~1.500–1.800€ che non rivedi. Rivendere in un borgo piccolo richiede tempo, e potresti rivendere a meno di quanto hai pagato.\n\nPer questo la nostra regola è ferma: **si compra solo dopo aver vissuto l'affitto di prova.** Mai alla prima visita, mai sull'onda dell'entusiasmo. Anche per AIRE e residenza: nessun passo anagrafico definitivo prima di essere sicuri — e per quello, parla con un commercialista.\n\n### La tabella, in un colpo d'occhio\n\n| Tappa | Se ti ritiri, perdi |\n|---|---|\n| 1. Conosci la comunità online | Nulla. 0€, nessun contratto, nessuna penale |\n| 2. Viaggio esplorativo | Il costo del viaggio: ~300–500€ (da confermare), a carico tuo |\n| 3. Affitto di prova | Mensilità/caparra secondo il contratto col proprietario |\n| 4. Acquisto casa | ~10–12% di costi di compravendita + tempi e rischio di rivendita |\n\n### Tornare non è fallire\n\nCi aspettiamo che qualcuno torni a casa. Vuol dire che il sistema **funziona**, non che si è rotto. La prova esiste apposta: perché un'idea sbagliata si scopra presto e costi poco.\n\n> \"Sono tornato dopo due mesi. Nessuno mi ha fatto pesare niente. Adesso lo so, invece di chiedermelo per sempre.\" — è la frase che vogliamo possa dire chi va via.\n\nSe decidi di tornare: avvisi il proprietario come da contratto, avvisi noi (basta una telefonata) e torni a casa. Nessun colloquio d'uscita, nessuna penale, nessuna vergogna.\n\n> ⚠️ Nota di onestà: i costi del viaggio (~300–500€) e i costi di compravendita in Spagna (~10–12%) sono stime da confermare per il tuo caso. Le condizioni dell'affitto dipendono solo dal tuo contratto col proprietario: leggilo prima di firmare. Prima di comprare, e per residenza/AIRE/fisco, consulta un notaio e un commercialista.", "es": "## Si no funciona, vuelves a casa\n\nAntes de leer cualquier otra página de esta web, lee esta. Responde a la pregunta que casi nadie hace en voz alta: \"¿Y si me arrepiento?\"\n\nLa respuesta honesta es: **vuelves a casa.** Y aquí te explicamos exactamente cuánto cuesta, etapa por etapa. Recorremos las 4 etapas al revés: de la salida más fácil a la más difícil.\n\n### Retirarte tras la Etapa 1: conocer la comunidad online\n\n**Coste: cero. Pérdida: cero.**\n\nLa Etapa 1 se hace desde el sofá de tu casa. Videollamadas, mensajes, conocer a las personas que podrían ser tus vecinos en Larva. No firmas nada. No pagas nada. Sin cuotas, sin inscripciones, sin penalizaciones: participar no cuesta nada, por principio.\n\nSi después de tres semanas o tres meses piensas \"esto no es para mí\", lo dices y se acabó. Nadie te persigue. No hay nada que cancelar.\n\n### Retirarte tras la Etapa 2: el viaje exploratorio\n\n**Coste: el viaje, que pagas tú. ~300–500 € (por confirmar), según desde dónde vengas.**\n\nVienes a ver Larva con tus propios ojos. Avión o tren, unas noches de alojamiento, las comidas. Ese dinero lo gastas igual, te quedes o no — y ese es precisamente el sentido. Unos cientos de euros para descubrir, antes de cualquier compromiso, si esta vida va contigo: es un seguro barato.\n\nSi vuelves y decides que no, has perdido el precio de unas vacaciones — y has ganado una respuesta. Dejas de preguntártelo.\n\n### Retirarte durante la Etapa 3: el alquiler de prueba\n\n**Coste: lo que diga tu contrato de alquiler con el propietario. Normalmente una mensualidad, a veces una fianza.**\n\nAquí entra en juego un contrato de verdad — entre **tú y el propietario de la vivienda**, no con nosotros. Nosotros nunca tocamos tu dinero: cero comisiones, cero recargos, siempre.\n\nLo que arriesgas depende de ese contrato: normalmente la mensualidad en curso y, en su caso, la fianza, según lo pactado con el propietario. Lee las condiciones de aviso antes de firmar. Si te vas a mitad de mes, por lo general pierdes ese mes — no más. Tu casa en tu país sigue ahí, porque se lo decimos a todos: **para la prueba no se vende nada.** Y mientras mantengas tu residencia en tu país, tu pensión no cambia: te llega igual que siempre.\n\n### Retirarte tras la Etapa 4: la compra de la casa\n\n**Es la etapa menos reversible — y exactamente por eso va la última.**\n\nEn España comprar una vivienda cuesta un **~10–12 % más del precio** entre impuestos, notaría y registro (por confirmar en tu caso: hace falta siempre notario y un asesor independiente). En una casa de 15.000 € son ~1.500–1.800 € que no recuperas. Revender en un pueblo pequeño lleva tiempo, y puede que vendas por menos de lo que pagaste.\n\nPor eso nuestra regla es firme: **se compra solo después de vivir el alquiler de prueba.** Nunca en la primera visita, nunca llevado por el entusiasmo.\n\n### La tabla, de un vistazo\n\n| Etapa | Si te retiras, pierdes |\n|---|---|\n| 1. Conocer la comunidad online | Nada. 0 €, sin contrato, sin penalización |\n| 2. Viaje exploratorio | El coste del viaje: ~300–500 € (por confirmar), a tu cargo |\n| 3. Alquiler de prueba | Mensualidad/fianza según tu contrato con el propietario |\n| 4. Compra de la casa | ~10–12 % de gastos de compraventa + tiempo y riesgo de reventa |\n\n### Volver no es fracasar\n\nContamos con que alguna persona vuelva a casa. Eso significa que el sistema **funciona**, no que se ha roto. La prueba existe para eso: para que un error se descubra pronto y cueste poco.\n\n> \"Volví a los dos meses. Nadie me lo reprochó. Ahora lo sé, en vez de preguntármelo toda la vida.\" — eso es lo que queremos que pueda decir quien se va.\n\nSi decides volver: avisas al propietario según tu contrato, nos avisas a nosotros (basta una llamada) y vuelves a casa. Sin entrevista de salida, sin penalización, sin vergüenza.\n\n> ⚠️ Nota de honestidad: los costes del viaje (~300–500 €) y los gastos de compraventa en España (~10–12 %) son estimaciones por confirmar en tu caso. Las condiciones del alquiler dependen solo de tu contrato con el propietario: léelo antes de firmar. Antes de comprar, consulta a un notario y a un asesor fiscal independiente.", "de": "## Wenn es nicht passt, gehst du zurück\n\nBevor du irgendeine andere Seite hier liest, lies diese. Sie beantwortet die Frage, die sich kaum jemand laut zu stellen traut: \"Und wenn ich es bereue — was dann?\"\n\nDie ehrliche Antwort: **Du gehst zurück nach Hause.** Und hier steht genau, was das kostet — Etappe für Etappe. Wir gehen die 4 Etappen rückwärts durch: vom leichtesten Ausstieg zum schwersten.\n\n### Ausstieg nach Etappe 1: die Gemeinschaft online kennenlernen\n\n**Kosten: null. Verlust: null.**\n\nEtappe 1 findet auf deinem Sofa statt. Videoanrufe, Nachrichten, die Menschen kennenlernen, die deine Nachbarn in Larva werden könnten. Du unterschreibst nichts. Du zahlst nichts. Keine Beiträge, keine Mitgliedschaft, keine Vertragsstrafen — die Teilnahme kostet nichts, ganz bewusst.\n\nWenn du nach drei Wochen oder drei Monaten denkst \"das ist nichts für mich\", sagst du es — und das war's. Niemand hakt nach. Es gibt nichts zu kündigen.\n\n### Ausstieg nach Etappe 2: die Erkundungsreise\n\n**Kosten: die Reise selbst, die du bezahlst. ~300–500 € (noch zu bestätigen), je nach Abreiseort.**\n\nDu siehst dir Larva mit eigenen Augen an. Flug oder Bahn, ein paar Übernachtungen, Essen. Dieses Geld ist ausgegeben, ob du bleibst oder nicht — und genau darum geht es. Ein paar hundert Euro, um vor jeder Verpflichtung herauszufinden, ob dieses Leben zu dir passt: Das ist eine günstige Versicherung.\n\nWenn du heimfährst und Nein sagst, hast du den Preis eines Urlaubs verloren — und eine Antwort gewonnen. Du musst dich nicht mehr fragen.\n\n### Ausstieg während Etappe 3: das Probewohnen zur Miete\n\n**Kosten: das, was dein Mietvertrag mit dem Eigentümer vorsieht. Meist eine Monatsmiete, manchmal eine Kaution.**\n\nHier kommt ein echter Vertrag ins Spiel — zwischen **dir und dem Hauseigentümer**, nicht mit uns. Wir fassen dein Geld nie an: keine Provision, kein Aufschlag, niemals.\n\nWas du riskierst, steht in diesem Vertrag: in der Regel die laufende Monatsmiete und gegebenenfalls die Kaution, wie mit dem Eigentümer vereinbart. Lies die Kündigungsbedingungen, bevor du unterschreibst. Gehst du mitten im Monat, verlierst du normalerweise diesen Monat — nicht mehr. Deine Wohnung in Deutschland ist noch da, denn das sagen wir allen: **Fürs Probewohnen wird nichts verkauft.** Solange du deinen Wohnsitz in Deutschland behältst, ändert sich bei der Deutschen Rentenversicherung und deiner Krankenkasse nichts — die Rente kommt wie immer.\n\n### Ausstieg nach Etappe 4: der Hauskauf\n\n**Das ist die am wenigsten umkehrbare Etappe — und genau deshalb kommt sie zuletzt.**\n\nIn Spanien kostet ein Hauskauf **~10–12 % zusätzlich zum Kaufpreis** an Steuern, Notar und Grundbuch (für deinen Fall zu bestätigen — immer mit Notar und unabhängiger Beratung). Bei einem Dorfhaus für 15.000 € sind das ~1.500–1.800 €, die du nicht wiedersiehst. Der Wiederverkauf in einem kleinen Dorf braucht Zeit, und womöglich verkaufst du unter dem Kaufpreis.\n\nDeshalb ist unsere Regel eindeutig: **Gekauft wird erst nach dem Probewohnen.** Nie beim ersten Besuch, nie aus reiner Begeisterung. Und bevor du deinen Wohnsitz endgültig verlegst: Sprich mit einem Steuerberater, der sich mit Rente und Krankenversicherung im EU-Ausland auskennt.\n\n### Die Tabelle auf einen Blick\n\n| Etappe | Wenn du aussteigst, verlierst du |\n|---|---|\n| 1. Gemeinschaft online kennenlernen | Nichts. 0 €, kein Vertrag, keine Strafe |\n| 2. Erkundungsreise | Die Reisekosten: ~300–500 € (zu bestätigen), von dir bezahlt |\n| 3. Probewohnen zur Miete | Miete/Kaution laut deinem Vertrag mit dem Eigentümer |\n| 4. Hauskauf | ~10–12 % Kaufnebenkosten + Zeit und Risiko beim Wiederverkauf |\n\n### Zurückgehen ist kein Scheitern\n\nWir rechnen damit, dass manche zurückgehen. Das heißt: Das System **funktioniert** — es ist nicht kaputt. Genau dafür gibt es die Probephase: damit ein Irrtum früh auffällt und wenig kostet.\n\n> \"Ich bin nach zwei Monaten zurück. Niemand hat mir ein schlechtes Gewissen gemacht. Jetzt weiß ich es — statt mich ewig zu fragen.\" — wer geht, soll genau das sagen können.\n\nWenn du zurückwillst: Du informierst den Eigentümer laut Vertrag, sagst uns Bescheid (ein Anruf genügt) und fährst heim. Kein Abschlussgespräch, keine Strafe, keine Scham.\n\n> ⚠️ Ehrlichkeitshinweis: Reisekosten (~300–500 €) und spanische Kaufnebenkosten (~10–12 %) sind Schätzungen, die für deinen Fall zu bestätigen sind. Die Mietbedingungen regelt allein dein Vertrag mit dem Eigentümer — lies ihn vor der Unterschrift. Vor einem Kauf und bei Fragen zu Wohnsitz, Rente und Krankenkasse: Notar und unabhängigen Steuerberater hinzuziehen."}}, "pensione": {"emoji": "🏦", "slug": "pensione", "title": {"en": "Your pension, paid in Spain: step by step", "it": "La pensione sul conto spagnolo, passo-passo", "es": "Tu pensión cobrada en España, paso a paso", "de": "Deine Rente in Spanien: Schritt für Schritt"}, "subtitle": {"en": "Your state pension follows you anywhere in the EU, with no cuts. Here is what to do and who to call.", "it": "La pensione INPS ti segue in Spagna senza tagli. Cosa fare, chi chiamare e con quali tempi.", "es": "Tu pensión pública te sigue a España sin recortes. Qué hacer, a quién llamar y con qué plazos.", "de": "Deine gesetzliche Rente kommt ohne Kürzung nach Spanien. Was zu tun ist — und wen du anrufst."}, "md": {"it": "## La buona notizia, subito\n\nLa tua pensione non si blocca se ti trasferisci in Spagna. È un diritto scritto nel regolamento europeo 883/2004: le pensioni si \"esportano\" in tutta l'Unione Europea, senza tagli e senza permessi speciali. L'INPS continua a pagarti, ogni mese, l'importo che ti spetta.\n\nQuello che cambia è una cosa sola: dove arrivano i soldi. E qui hai due strade, entrambe legittime.\n\n## Le tue due opzioni\n\n| | Tieni il conto italiano | Apri un conto spagnolo |\n|---|---|---|\n| Cosa fare con l'INPS | Nulla: la pensione arriva come oggi | Comunicare il nuovo IBAN |\n| Come prelevi | Bancomat in Spagna (occhio alle commissioni) | In paese o nel paese vicino |\n| Verifica \"esistenza in vita\" | Di norma no | Sì, una volta l'anno (vedi sotto) |\n\nMolte persone, nei primi mesi, tengono semplicemente il conto italiano e prelevano in Spagna con la carta. Funziona, ed è la scelta prudente: decidi con calma, in linea con il nostro percorso reversibile. Chiedi prima alla tua banca quanto costa un prelievo all'estero: in zona euro spesso poco o nulla, ma le condizioni variano da banca a banca.\n\n## Passo-passo: la pensione sul conto spagnolo\n\n**Passo 1 — Apri il conto in Spagna.** Servono passaporto o carta d'identità e il NIE (il numero di identificazione per stranieri). Fatti scrivere IBAN e BIC.\n\n**Passo 2 — Vai al patronato.** I patronati (ACLI, INCA, INAS e altri) assistono i pensionati gratuitamente, e hanno sedi anche in Spagna. Ti aiutano a presentare la domanda di variazione dell'ufficio pagatore. È la strada più semplice se non usi internet.\n\n**Passo 3 — Oppure fai da te online.** Sul sito inps.it, entrando con SPID o CIE, c'è il servizio \"Cambiare le coordinate di accredito della pensione\". Il sistema prepara un modulo (AP03 o AP04) che la nuova banca deve timbrare e firmare; poi lo ricarichi online e confermi l'invio.\n\n**Passo 4 — Aspetta la prima rata.** La variazione decorre di norma dalla prima rata utile, spesso il mese successivo (~1-2 mesi di prudenza, da confermare col patronato). Non chiudere il conto italiano finché non vedi il primo accredito in Spagna.\n\nI pagamenti INPS all'estero sono gestiti da Citibank per conto dell'INPS: non è una stranezza, è il fornitore ufficiale.\n\n## La verifica di \"esistenza in vita\": cos'è e come funziona\n\nUna volta l'anno, chi riscuote la pensione all'estero riceve da Citibank un modulo. Serve a confermare che la pensione arriva alla persona giusta. È routine e riguarda tutti: non sei sotto controllo speciale.\n\nIn pratica:\n\n- il modulo arriva per posta (per chi vive in Spagna di solito nella seconda metà dell'anno; le date cambiano ogni anno);\n- lo fai firmare e timbrare da un \"testimone accettabile\": il patronato o il consolato sono le strade più comuni, e il patronato lo fa gratis;\n- lo rispedisci entro la scadenza indicata sulla lettera.\n\nSe il modulo non torna indietro, prima ti pagano una rata in contanti tramite Western Union, poi la pensione viene sospesa finché non rispondi. Sospesa, non persa: si sblocca. Ma è una seccatura evitabile: segna la scadenza sul calendario. Se invece tieni l'accredito in Italia, questa verifica via Citibank di norma non ti riguarda (conferma col patronato).\n\n## Sanità: il modulo S1\n\nDa pensionato INPS hai diritto al modulo S1, che ti apre la sanità pubblica spagnola con i costi a carico dell'Italia. In Italia lo rilascia di norma la ASL (chiedi conferma al patronato): richiedilo prima di partire e registralo in Spagna all'INSS, la previdenza sociale spagnola. Ne parliamo nella guida sulla sanità.\n\n## Non dimenticare l'AIRE\n\nSe sposti la residenza in Spagna, per legge hai 90 giorni per iscriverti all'AIRE (l'anagrafe degli italiani all'estero), dal portale Fast It o tramite il consolato. È gratuita. Dal 2024 chi non si iscrive rischia una sanzione da 200 a 1.000 € per anno. E l'iscrizione serve anche all'INPS per i suoi controlli.\n\n## A chi telefonare\n\n- **INPS**: 803 164 (gratuito da fisso in Italia) oppure 06 164 164 da cellulare; dall'estero +39 06 164 164. Lun-ven 8-20, sabato 8-14, ora italiana. Risponde anche in spagnolo.\n- **Citibank, servizio pensionati INPS**: +39 02 6943 0693, operatori anche in italiano e spagnolo, lun-ven 8-20 ora italiana. Email: inps.pensionati@citi.com.\n- **Il tuo patronato**: assistenza gratuita, anche in Spagna.\n\n## Checklist da stampare\n\n- Ho chiesto alla mia banca i costi dei prelievi in Spagna\n- Ho deciso: conto italiano o conto spagnolo\n- (Se conto spagnolo) Ho IBAN e BIC scritti su carta\n- Ho il contatto di un patronato (in Italia o in Spagna)\n- Ho presentato la variazione e NON ho chiuso il vecchio conto\n- Ho segnato sul calendario la verifica di esistenza in vita\n- Ho chiesto il modulo S1 prima della partenza\n- Mi sono iscritto all'AIRE entro 90 giorni dal trasferimento\n- Ho i numeri: INPS +39 06 164 164, Citibank +39 02 6943 0693\n\n> ⚠️ Onestà fino in fondo: le date delle campagne di esistenza in vita cambiano ogni anno (verificale su inps.it o col patronato). Le commissioni bancarie variano da banca a banca. E per le tasse — dove si paga dopo il trasferimento — serve un commercialista che conosca la convenzione Italia-Spagna: questa pagina non le copre.", "de": "## Die gute Nachricht zuerst\n\nDeine gesetzliche Rente zieht mit dir um. In der EU gilt die Verordnung 883/2004: Renten werden ohne Kürzung in jedes EU-Land gezahlt — Spanien eingeschlossen. Die Deutsche Rentenversicherung sagt es selbst: Beim Umzug ins EU-Ausland ändert sich an der Rentenhöhe in den allermeisten Fällen nichts.\n\nDu musst also niemanden um Erlaubnis bitten. Du musst nur Bescheid geben — und entscheiden, auf welches Konto das Geld gehen soll.\n\n## Deine zwei Möglichkeiten\n\n| | Deutsches Konto behalten | Spanisches Konto |\n|---|---|---|\n| Aufwand | Fast keiner — nur den Umzug melden | Konto eröffnen, IBAN melden |\n| Geld abheben | Mit der Karte in Spanien (Gebühren prüfen) | Vor Ort, wie gewohnt |\n| Währung | Euro | Euro — kein Umrechnen |\n\nBeides ist erlaubt. Viele behalten am Anfang das deutsche Konto und heben in Spanien mit der Karte ab. Innerhalb der Euro-Zone kostet das oft wenig oder nichts — frag deine Bank, die Konditionen sind überall anders. Das passt auch zu unserem Weg: Jeder Schritt bleibt umkehrbar.\n\n## Schritt für Schritt\n\n**Schritt 1 — Melde den Umzug, am besten zwei Monate vorher.** Zuständig ist der Renten Service der Deutschen Post AG, der die Renten im Auftrag der Rentenversicherung auszahlt:\n\nDeutsche Post AG, Niederlassung Renten Service, 13496 Berlin. Telefon: +49 221 569 2777.\n\nAlternativ kannst du auch deinen Rentenversicherungsträger informieren.\n\n**Schritt 2 — Gib dein Konto an.** Für Zahlungen ins Ausland gibt es eigene Formulare (\"Zahlungserklärung\"), auch zweisprachig Deutsch-Spanisch. Du brauchst IBAN und BIC. Ein spanisches Konto eröffnest du mit Pass oder Personalausweis und der NIE (der spanischen Identifikationsnummer für Ausländer).\n\n**Schritt 3 — Warte die erste Zahlung ab.** Schließ dein deutsches Konto nicht, bevor die erste Rente in Spanien angekommen ist. Plane zur Sicherheit ~1–2 Monate Übergang ein.\n\n## Die Lebensbescheinigung — in Spanien meist automatisch\n\nEinmal im Jahr will der Renten Service wissen, dass es dich noch gibt. Das klingt kalt, ist aber reine Routine: Es schützt die Rentenkasse vor Missbrauch und betrifft alle im Ausland — nicht nur dich.\n\nFür Spanien gibt es eine Erleichterung: Zwischen Deutschland und Spanien läuft ein automatischer Datenabgleich. Für die meisten Rentner in Spanien erledigt sich der Lebensnachweis dadurch von selbst — ohne Formular, ohne Behördengang. Das bestätigt die Deutsche Rentenversicherung ausdrücklich.\n\nFalls doch ein Formular kommt: ausfüllen, bestätigen lassen (zum Beispiel beim Konsulat oder einer zugelassenen Stelle) und an den Renten Service zurückschicken — nicht an die Rentenversicherung. Es gibt auch den digitalen Lebensnachweis per Smartphone (über die PostIdent-App). Wer die Frist verpasst, riskiert, dass die Zahlung vorübergehend gestoppt wird — gestoppt, nicht gestrichen: Sie läuft nach der Klärung weiter.\n\n## Krankenversicherung: das Formular S1\n\nAls gesetzlich versicherter Rentner hast du Anspruch auf das Formular S1 deiner Krankenkasse. Damit wirst du in die spanische öffentliche Gesundheitsversorgung aufgenommen — die Kosten trägt weiterhin Deutschland. Beantrage das S1 bei deiner Krankenkasse, bevor du umziehst, und gib es in Spanien bei der Sozialversicherung (INSS) ab. Mehr dazu steht in unserem Gesundheits-Kapitel.\n\n## Wen du anrufst\n\n- **Deutsche Rentenversicherung, Servicetelefon**: 0800 1000 4800 (kostenlos aus Deutschland). Aus Spanien: 00800 1000 4800 aus dem Festnetz — falls die Nummer aus deinem Netz nicht funktioniert, ruf den Renten Service unter +49 221 569 2777 an. Mo–Do 8–19 Uhr, Fr 8–15:30 Uhr.\n- **Renten Service der Deutschen Post**: +49 221 569 2777.\n- **Deine Krankenkasse**: für das Formular S1.\n\nGut zu wissen: Die Rentenversicherung bietet zusammen mit dem spanischen Träger kostenlose internationale Beratungstage in spanischen Städten an.\n\n## Checkliste zum Ausdrucken\n\n- Renten Service informiert (möglichst 2 Monate vor dem Umzug)\n- Konto entschieden: deutsches behalten oder spanisches melden\n- IBAN und BIC auf Papier notiert\n- Deutsches Konto bleibt offen, bis die erste Zahlung in Spanien da ist\n- S1 bei der Krankenkasse beantragt\n- Bank nach Gebühren fürs Abheben in Spanien gefragt\n- Nummern notiert: 00800 1000 4800 und +49 221 569 2777\n\n> ⚠️ Ehrlich gesagt: Ob bei dir der automatische Lebensnachweis greift, klärst du am besten direkt mit dem Renten Service — verlass dich nicht blind darauf. Bankgebühren sind von Bank zu Bank verschieden. Und die Steuerfrage (Deutschland oder Spanien? Stichwort Doppelbesteuerungsabkommen) gehört zu einem Steuerberater, der beide Länder kennt — diese Seite ersetzt ihn nicht.", "en": "## The good news first\n\nYour state pension does not stop when you move to Spain. Under EU regulation 883/2004, state pensions are paid wherever you live in the EU — in full, with no cuts and no special permission needed. This applies to every EU country's pension: Italian, German, French, Dutch, all of them.\n\nWhat changes is only the practical part: where the money lands, and one piece of paper a year. This page walks you through both.\n\n## Your two options\n\n| | Keep your account back home | Open a Spanish account |\n|---|---|---|\n| Effort | Almost none | New account, then notify your pension office |\n| Withdrawing cash | Card at Spanish cash machines (check the fees) | Locally, like everyone else |\n| Currency | Euro to euro, if you are in the euro zone | Euro |\n\nBoth are perfectly legal. Many people simply keep their home account for the first months and withdraw in Spain with their bank card. It buys you time to decide calmly — which fits how we do things: every step stays reversible.\n\n## Step by step\n\n**Step 1 — Tell your pension institution you are moving.** Every country has one body that pays state pensions (INPS in Italy, Deutsche Rentenversicherung in Germany, and so on). Call or write before you move, give your new address, and ask two questions: \"What do you need from me?\" and \"How do I change the account you pay into?\"\n\n**Step 2 — If you want a Spanish account, open it first.** You will need your passport or ID card and an NIE (the Spanish identification number for foreigners). Ask the bank to write down your IBAN and BIC. Spain is in the SEPA area, so for euro pensions the transfer works like a domestic one. Send the details to your pension institution on their own form.\n\n**Step 3 — Do not close the old account yet.** Wait until the first payment arrives in Spain. Allow ~1–2 months of overlap, to be safe.\n\n## The \"proof of life\" letter\n\nOnce a year, most pension institutions check that pensioners living abroad are still alive. It sounds blunt, but it is routine: it protects the system from fraud, and it applies to everyone — not just you.\n\nIt usually works like this: a form arrives by post, you have it signed by an accepted witness (a consulate, a town hall, sometimes another authorised office), and you send it back by the deadline. Some countries have automated this with Spain through data exchange, so no form ever arrives. If you miss the deadline, payments are paused — paused, not lost — until you respond. Put the date on your calendar and it never becomes a problem.\n\n## Healthcare: the S1 form\n\nAs an EU state pensioner you are entitled to form S1 from your home country's health institution. Register it with the Spanish social security office (INSS) and you are covered by the Spanish public health system, with your home country paying the bill. Ask for the S1 before you move. There is more on this in our healthcare guide.\n\n**A note for UK readers:** the UK State Pension is also paid in Spain, with the yearly increases, under the UK–EU agreement — confirm the details with the International Pension Centre before you move.\n\n## Who to call\n\n- **Your national pension institution** — use the official number on its own website, and avoid lookalike sites that charge for \"help\".\n- **Europe Direct**, the EU's free information service, in any official EU language: 00 800 6 7 8 9 10 11.\n- In Spain, a **gestoría** (a licensed paperwork office, common in Spain and usually inexpensive) can handle forms with you — agree the fee before you start.\n\n## Printable checklist\n\n- Called my pension institution and told them I am moving\n- Asked my bank what withdrawals in Spain cost\n- Decided: home account or Spanish IBAN\n- (If Spanish account) IBAN and BIC written down on paper\n- Old account stays open until the first payment lands in Spain\n- Asked how the proof-of-life check works and noted the date\n- Requested form S1 before departure\n\n> ⚠️ Being straight with you: procedures and deadlines differ by country and change from year to year — always confirm them by phone with your own pension institution. Bank fees vary. And tax (where you pay it after moving) is a separate question for a cross-border tax adviser — this page does not cover it.", "es": "## La buena noticia, primero\n\nTu pensión pública no se bloquea por mudarte a España. El reglamento europeo 883/2004 lo dice claro: las pensiones públicas se pagan en cualquier país de la Unión, íntegras, sin recortes y sin pedir permiso. Da igual que tu pensión sea italiana, alemana, francesa o de otro país de la UE: te sigue hasta el pueblo.\n\nLo único que cambia es lo práctico: a qué cuenta llega el dinero, y un papel al año. Eso es todo, y aquí lo vemos paso a paso.\n\n## Tus dos opciones\n\n| | Mantener la cuenta de tu país | Abrir una cuenta española |\n|---|---|---|\n| Trámite | Casi ninguno | Cuenta nueva y comunicar el IBAN |\n| Sacar dinero | Con tarjeta en cajeros españoles (pregunta las comisiones) | En el pueblo o en el de al lado |\n| Moneda | Euro con euro, sin cambio (en zona euro) | Euro |\n\nLas dos son legales. Mucha gente mantiene su cuenta de siempre los primeros meses y saca dinero en España con la tarjeta. Así decides con calma — y encaja con nuestro método: cada paso es reversible. Pregunta antes a tu banco qué cuesta sacar dinero fuera: en la zona euro suele ser poco o nada, pero las condiciones varían de banco a banco.\n\n## Paso a paso\n\n**Paso 1 — Avisa a tu organismo de pensiones.** Cada país tiene el suyo (INPS en Italia, Deutsche Rentenversicherung en Alemania, etcétera). Llama o escribe antes de mudarte, da tu nueva dirección y haz dos preguntas: \"¿qué necesitan de mí?\" y \"¿cómo cambio la cuenta de cobro?\".\n\n**Paso 2 — Si quieres cuenta española, ábrela primero.** Necesitarás el pasaporte o el documento de identidad y el NIE (número de identidad de extranjero). Pide al banco tu IBAN y el BIC por escrito. España está en la zona SEPA: para pensiones en euros, la transferencia funciona como una nacional. Envía los datos a tu organismo en su propio formulario.\n\n**Paso 3 — No cierres todavía la cuenta antigua.** Espera a que llegue el primer pago a España. Cuenta con ~1-2 meses de margen, por prudencia.\n\n## La \"fe de vida\"\n\nUna vez al año, casi todos los organismos comprueban que el pensionista que vive fuera sigue vivo. Suena brusco, pero es pura rutina: protege el sistema contra el fraude y se la piden a todo el mundo, no solo a ti.\n\nNormalmente funciona así: llega un formulario por correo, lo firmas ante un testigo aceptado (consulado, ayuntamiento o, a veces, otra oficina autorizada) y lo devuelves antes de la fecha límite. Algunos países ya lo han automatizado con España mediante intercambio de datos, y entonces no llega papel alguno. Si se pasa la fecha, el pago se suspende — se suspende, no se pierde — hasta que respondas. Apunta la fecha en el calendario y nunca será un problema.\n\n## Sanidad: el formulario S1\n\nComo pensionista de la UE tienes derecho al formulario S1 de tu país de origen. Lo registras en el INSS (la Seguridad Social española) y quedas dentro de la sanidad pública española, con los gastos a cargo de tu país. Pídelo antes de mudarte. Lo contamos con detalle en nuestra guía de sanidad.\n\n## A quién llamar\n\n- **Tu organismo de pensiones**: usa el número oficial de su propia web y evita webs parecidas que cobran por \"ayudarte\".\n- **Europe Direct**, el servicio de información de la UE, gratuito y en tu idioma: 00 800 6 7 8 9 10 11.\n- En España, una **gestoría** del pueblo o de la comarca puede llevarte los papeles por un precio razonable: pide presupuesto antes de empezar.\n\n## Lista para imprimir\n\n- He llamado a mi organismo de pensiones y he avisado de la mudanza\n- He preguntado a mi banco qué cuesta sacar dinero en España\n- He decidido: cuenta de mi país o IBAN español\n- (Si cuenta española) Tengo IBAN y BIC apuntados en papel\n- La cuenta antigua sigue abierta hasta ver el primer pago en España\n- Sé cómo es la fe de vida en mi caso y tengo la fecha apuntada\n- He pedido el S1 antes de salir\n\n> ⚠️ Con franqueza: los plazos y formularios cambian según el país y el año — confírmalos siempre por teléfono con tu organismo. Las comisiones bancarias varían de banco a banco. Y los impuestos (dónde tributas al mudarte) son otro tema: para eso necesitas un asesor fiscal que conozca los dos países."}}, "tasse": {"slug": "tasse", "emoji": "🧾", "title": {"en": "Taxes and double taxation, explained with examples", "it": "Tasse e doppia imposizione, spiegate con esempi", "es": "Impuestos y doble imposición, explicados con ejemplos", "de": "Steuern und Doppelbesteuerung, erklärt mit Beispielen"}, "subtitle": {"en": "Where you pay tax once you live in Spain, what the treaties say, and what is left of a small pension.", "it": "Dove paghi le tasse se vivi in Spagna, cosa dice la convenzione e quanto resta di una pensione piccola.", "es": "Dónde pagas impuestos si vives en España, qué dice el convenio y cuánto queda de una pensión pequeña.", "de": "Wo du Steuern zahlst, wenn du in Spanien lebst, was das DBA sagt und was von einer kleinen Rente bleibt."}, "md": {"it": "## Partiamo dalla domanda vera: \"dove pago le tasse?\"\n\nLa regola di base è semplice. Se in un anno passi **più di 183 giorni in Spagna**, per il fisco diventi **residente fiscale in Spagna**. Non conta dove ricevi la pensione, né dove sei nato: contano i giorni e, nei casi dubbi, dove hai casa, famiglia e interessi economici.\n\nDa quel momento, in linea di principio, dichiari in Spagna tutti i tuoi redditi. Compresa la pensione italiana.\n\n\"E quindi pago due volte?\" No. È proprio per evitarlo che Italia e Spagna hanno firmato una **convenzione contro le doppie imposizioni** (firmata nel 1977, ratificata con la legge 663/1980). La convenzione decide quale dei due Paesi può tassare la tua pensione.\n\n## Pensione privata o pubblica: la differenza che conta davvero\n\n- **Pensione INPS da lavoro privato** (operai, impiegati, commercianti, artigiani: la grande maggioranza): se sei residente fiscale in Spagna, si tassa **solo in Spagna** (articolo 18 della convenzione). L'Italia non deve trattenerti nulla.\n- **Pensione \"pubblica\"** (ex dipendenti dello Stato, enti locali e simili): resta tassata **in Italia** (articolo 19), anche se vivi in Spagna. Passa alla Spagna solo se hai anche la nazionalità spagnola. In Spagna è esente, ma può contare per calcolare l'aliquota su eventuali altri redditi.\n\nSe hai una situazione mista (anni nel pubblico e anni nel privato), fai guardare il caso a un professionista: non tirare a indovinare.\n\n**Passaggio pratico importante:** l'INPS non smette di trattenere da sola. Devi chiederle tu la pensione lorda, con l'apposito modulo per i residenti all'estero e un **certificato di residenza fiscale** rilasciato dal fisco spagnolo (Agencia Tributaria). Finché non lo fai, l'Italia continua a trattenere, e recuperare quei soldi dopo è lento.\n\n## Quanto pagheresti in Spagna: due esempi onesti\n\nIn Spagna la pensione si tassa con l'IRPF, l'equivalente della nostra IRPEF. Ma per le pensioni piccole ci sono tre sconti automatici che pesano molto (valori 2025, da confermare ogni anno):\n\n- **2.000 €** di spese forfettarie;\n- una riduzione fino a **7.302 €** per i redditi da lavoro e pensione più bassi;\n- un **minimo personale** esente: 5.550 €, che sale a **6.700 € sopra i 65 anni** e a 8.100 € sopra i 75.\n\n| | Pensione ~900 €/mese | Pensione ~1.200 €/mese |\n|---|---|---|\n| Lordo annuo (13 mensilità) | ~11.700 € | ~15.600 € |\n| Base imponibile dopo gli sconti | ~2.400 € | ~6.300 € |\n| Minimo esente (65+) | 6.700 € | 6.700 € |\n| **IRPF da pagare (65+)** | **~0 €** | **~0 €** |\n\nSì, hai letto bene: con le regole 2025, una pensione privata di ~900 o ~1.200 € al mese, per chi ha più di 65 anni, in Spagna spesso paga **poca o nessuna imposta**. Sotto i 65 anni, nel secondo esempio, parliamo di ~140 € l'anno (da confermare). Sono conti indicativi: il risultato vero dipende dalla tua situazione (altri redditi, casa, coniuge).\n\nUn dettaglio utile: se il tuo unico reddito è una pensione estera sotto ~15.876 € l'anno (soglia 2025, da confermare), potresti non essere nemmeno obbligato a presentare la dichiarazione. Spesso conviene presentarla lo stesso: mette le cose in chiaro con il fisco di entrambi i Paesi.\n\n## Tre cose pratiche da non dimenticare\n\n- **Iscrizione all'AIRE** (l'anagrafe degli italiani all'estero): è un obbligo quando ti trasferisci e aiuta a evitare contestazioni sulla residenza.\n- **Il primo anno è il più delicato**: nell'anno del trasloco rischi di essere \"conteso\" tra il fisco italiano e quello spagnolo. È il momento giusto per farti seguire.\n- **Modelo 720**: se mantieni in Italia conti o immobili sopra certe soglie (~50.000 €), in Spagna esiste una dichiarazione solo informativa. Non si paga nulla, ma dimenticarla costa caro. Da verificare col professionista.\n\n## Una consulenza vera, prima di partire\n\nQuesta pagina **non è una consulenza fiscale**. Serve a farti capire la logica e a toglierti la paura più grande: no, una pensione piccola non viene \"mangiata\" dalle tasse spagnole.\n\nPrima di trasferirti, metti in conto **1–2 ore con un commercialista** che conosca sia l'Italia sia la Spagna: poche centinaia di euro spese bene. Noi possiamo indicarti professionisti abituati a casi come il tuo; non possiamo sostituirli.\n\n> ⚠️ Tutte le cifre sono valori 2025 o stime indicate con ~, da confermare prima di ogni decisione. Pensioni pubbliche, situazioni miste e anno del trasferimento vanno verificati caso per caso con un commercialista. Fonti: convenzione Italia–Spagna, Agenzia delle Entrate, INPS, Agencia Tributaria.", "de": "## Fangen wir mit der eigentlichen Frage an: \"Wo zahle ich Steuern?\"\n\nDie Grundregel ist einfach. Verbringst du **mehr als 183 Tage im Jahr in Spanien**, bist du dort **steuerlich ansässig**. Es zählt nicht, wohin deine Rente überwiesen wird – es zählen die Tage und, im Zweifel, wo dein Lebensmittelpunkt liegt.\n\nAb dann gehören grundsätzlich alle deine Einkünfte in die spanische Steuererklärung. Auch die deutsche Rente.\n\n\"Zahle ich dann doppelt?\" Nein. Genau dafür gibt es das **Doppelbesteuerungsabkommen (DBA) zwischen Deutschland und Spanien** von 2011, das seit 2013 gilt. Es legt fest, welches Land was besteuern darf.\n\n## Was mit der gesetzlichen Rente passiert\n\nFür die Rente der **Deutschen Rentenversicherung** gilt: Spanien besteuert als Wohnsitzstaat – und Deutschland behält ein begrenztes Recht an der Quelle (Artikel 17 des DBA):\n\n- **Rentenbeginn vor 2015:** Deutschland besteuert nichts. Nur Spanien.\n- **Rentenbeginn ab 2015:** Deutschland darf **höchstens 5 % der Bruttorente** besteuern.\n- **Rentenbeginn ab 2030:** höchstens 10 %.\n\nZuständig ist das **Finanzamt Neubrandenburg** (\"Rente im Ausland\"). Es erfährt automatisch von deiner Rente und meldet sich meist schriftlich. Ignoriere diese Post nicht: Antworten kostet nichts, Schweigen kann teuer werden.\n\n**Beamtenpension?** Die bleibt in Deutschland steuerpflichtig, auch wenn du in Spanien lebst – außer du hast die spanische Staatsangehörigkeit. Betriebsrente, Riester, Rürup: eigene Regeln, unbedingt prüfen lassen.\n\n## Zwei ehrliche Beispiele\n\nSpanien behandelt die Rente wie Arbeitseinkommen (IRPF, die spanische Einkommensteuer). Für kleine Renten gibt es drei automatische Abzüge (Werte 2025, jedes Jahr neu prüfen):\n\n- **2.000 €** Pauschale;\n- eine Minderung von bis zu **7.302 €** für niedrige Einkommen;\n- ein steuerfreies \"mínimo personal\": 5.550 €, **ab 65 Jahren 6.700 €**, ab 75 Jahren 8.100 €.\n\n| | Rente ~900 €/Monat | Rente ~1.200 €/Monat |\n|---|---|---|\n| Brutto im Jahr | ~10.800 € | ~14.400 € |\n| Spanische IRPF (ab 65) | ~0 € | ~0 € |\n| Deutsche Steuer (Rentenbeginn 2015–2029) | max. ~540 €/Jahr | max. ~720 €/Jahr |\n\nAuch unter 65 bleibt es in diesen Beispielen bei null spanischer Steuer. Es sind Richtwerte: das echte Ergebnis hängt von deiner Lage ab (weitere Einkünfte, Wohnung, Ehepartner).\n\nUnd ehrlich gesagt: Wenn in Spanien null Steuer anfällt, läuft die Anrechnung der deutschen Steuer ins Leere – die bis zu 5 % bleiben dann tatsächlich hängen. Beim Beispiel mit 1.200 € sind das höchstens ~60 € im Monat. Ob es wirklich so viel wird, rechnet das Finanzamt Neubrandenburg konkret aus. Wer schon vor 2015 in Rente gegangen ist, zahlt in Deutschland gar nichts.\n\n## Praktische Punkte, die oft vergessen werden\n\n- Besorge dir die **steuerliche Ansässigkeitsbescheinigung** aus Spanien (Agencia Tributaria) – das Finanzamt fragt danach.\n- **Pflicht zur spanischen Erklärung:** Bei einer ausländischen Rente als einzigem Einkommen beginnt sie bei ~15.876 € im Jahr (Wert 2025, prüfen). Oft lohnt sich die Abgabe trotzdem – sie schafft klare Verhältnisse mit beiden Finanzämtern.\n- **Modelo 720:** Behältst du Konten oder Immobilien in Deutschland über ~50.000 €, gibt es in Spanien eine reine Informationsmeldung. Sie kostet nichts – sie zu vergessen kostet viel.\n- Das **Umzugsjahr** ist steuerlich das heikelste Jahr. Genau dann lohnt sich Begleitung.\n\n## Vor dem Umzug: 1–2 Stunden beim Profi\n\nDiese Seite ist **keine Steuerberatung**. Sie soll dir die Logik zeigen und die größte Angst nehmen: Nein, eine kleine Rente wird in Spanien nicht von Steuern \"aufgefressen\".\n\nPlane vor dem Umzug **1–2 Stunden mit einem Steuerberater** ein, der Deutschland und Spanien kennt – ein paar hundert Euro, gut angelegt. Wir können dir Fachleute nennen, die solche Fälle kennen; ersetzen können wir sie nicht.\n\n> ⚠️ Alle Zahlen sind Werte für 2025 oder Schätzungen mit ~ und müssen vor jeder Entscheidung geprüft werden. Beamtenpensionen, Betriebsrenten und das Umzugsjahr gehören in die Hände eines Steuerberaters. Quellen: DBA Deutschland–Spanien 2011, Deutsche Rentenversicherung, Finanzamt Neubrandenburg, Agencia Tributaria.", "en": "## Let's start with the real question: \"where do I pay tax?\"\n\nThe basic rule is simple. If you spend **more than 183 days a year in Spain**, you become a **tax resident of Spain**. It doesn't matter where your pension is paid from – what counts is the number of days and, in doubtful cases, where your home, family and finances are.\n\nFrom then on, in principle, you declare all your income in Spain. Including your pension from home.\n\n\"So do I pay twice?\" No. That is exactly what **double taxation treaties** are for. Spain has one with almost every EU country, and the treaty decides which country may tax your pension.\n\n## The pattern most treaties follow\n\nEvery treaty is different, but across the EU two patterns come up again and again:\n\n- **Private-sector and social-security pensions:** usually taxed **only in Spain** once you are resident there. That is how the Italian treaty works, for example. Some treaties let the origin country keep a small slice at source – Germany, for instance, keeps **up to 5%** of the gross pension for pensions that started in 2015 or later.\n- **Government-service pensions** (former civil servants): usually stay **taxed in the origin country**, even if you live in Spain – unless you hold Spanish nationality.\n\nIf your working life was a mix of both, have a professional look at your case. Don't guess.\n\nOne practical point: your home pension institution usually keeps withholding tax until you ask it to stop, with a **certificate of tax residence** issued by the Spanish tax agency (Agencia Tributaria). Do this early – refunds are slow everywhere.\n\n## What Spain actually charges on a small pension\n\nSpain taxes pensions as employment income (IRPF, the Spanish income tax). For small pensions, three automatic allowances do most of the work (2025 figures, to be confirmed each year):\n\n- a flat **€2,000** expense allowance;\n- a reduction of up to **€7,302** for low incomes;\n- a tax-free **personal minimum**: €5,550, rising to **€6,700 at 65+** and €8,100 at 75+.\n\n| | Pension ~€900/month | Pension ~€1,200/month |\n|---|---|---|\n| Gross per year | ~€10,800 | ~€14,400 |\n| Taxable base after allowances | ~€1,500 | ~€5,100 |\n| Personal minimum (65+) | €6,700 | €6,700 |\n| **Spanish tax due** | **~€0** | **~€0** |\n\nYes, you read that right: under the 2025 rules, a small private pension often pays **little or no Spanish income tax** – in these examples, zero even under 65. These are indicative numbers: the real result depends on your situation (other income, property, spouse).\n\nOne more useful detail: if your only income is a foreign pension below ~€15,876 a year (2025 threshold, to be confirmed), you may not even be required to file a Spanish return. Filing anyway is often wise – it keeps things clear with both tax offices.\n\n## Practical notes people forget\n\n- Tell the authorities at home that you have moved – most countries have a register for citizens living abroad.\n- **The year you move is the trickiest one**: both countries may see you as resident for part of it. That is the moment to get help.\n- **Modelo 720**: if you keep accounts or property at home worth over ~€50,000, Spain requires a purely informational declaration. It costs nothing – forgetting it can cost a lot.\n\n## Before you move: 1–2 hours with a professional\n\nThis page is **not tax advice**. It is here to show you the logic and take away the biggest fear: no, Spanish taxes will not \"eat\" a small pension.\n\nBefore moving, budget **1–2 hours with a tax adviser** who knows both Spain and your home country – a few hundred euros, well spent. We can point you to professionals used to cases like yours; we cannot replace them.\n\n> ⚠️ All figures are 2025 values or estimates marked with ~, to be confirmed before any decision. Government pensions, mixed careers and the year of the move need case-by-case advice from a qualified tax adviser. Sources: Spain's double taxation treaties, Agencia Tributaria.", "es": "## Empecemos por la pregunta que importa: \"¿dónde pago impuestos?\"\n\nLa regla básica es sencilla. Si pasas **más de 183 días al año en España**, te conviertes en **residente fiscal en España**. No importa desde dónde te paguen la pensión: cuentan los días y, en caso de duda, dónde están tu casa, tu familia y tus intereses económicos.\n\nA partir de ahí, en principio, declaras en España todas tus rentas. Incluida la pensión que cobras de otro país.\n\n\"¿Entonces pago dos veces?\" No. Para eso existen los **convenios de doble imposición**. España tiene uno con casi todos los países de la UE, y el convenio decide qué país puede gravar tu pensión.\n\n## El patrón que siguen casi todos los convenios\n\nCada convenio es distinto, pero se repiten dos reglas:\n\n- **Pensiones privadas y de la seguridad social:** lo habitual es que tributen **solo en España** cuando ya resides aquí. Así funciona, por ejemplo, el convenio con Italia. Algunos convenios dejan al país de origen una retención pequeña: Alemania, por ejemplo, conserva **hasta un 5%** de la pensión bruta para pensiones iniciadas desde 2015.\n- **Pensiones de funcionario:** normalmente siguen tributando **en el país que las paga**, aunque vivas en España, salvo que tengas la nacionalidad española.\n\nSi tu vida laboral mezcla las dos cosas, que lo mire un profesional. No adivines.\n\nUn detalle práctico: el organismo que paga tu pensión suele seguir reteniendo hasta que le pidas que pare, con un **certificado de residencia fiscal** que emite la Agencia Tributaria. Hazlo pronto: las devoluciones son lentas en todas partes.\n\n## ¿Cuánto se paga en España por una pensión pequeña?\n\nEn España la pensión tributa como rendimiento del trabajo (IRPF). Para las pensiones pequeñas, tres descuentos automáticos hacen casi todo el trabajo (cifras de 2025, confírmalas cada año):\n\n- **2.000 €** de gastos a tanto alzado;\n- una reducción de hasta **7.302 €** para rentas bajas;\n- un **mínimo personal** exento: 5.550 €, que sube a **6.700 € a partir de los 65 años** y a 8.100 € a partir de los 75.\n\n| | Pensión ~900 €/mes | Pensión ~1.200 €/mes |\n|---|---|---|\n| Bruto al año | ~10.800 € | ~14.400 € |\n| Base tras los descuentos | ~1.500 € | ~5.100 € |\n| Mínimo personal (65+) | 6.700 € | 6.700 € |\n| **IRPF a pagar** | **~0 €** | **~0 €** |\n\nSí, has leído bien: con las reglas de 2025, una pensión privada pequeña a menudo paga **poco o ningún IRPF** — en estos ejemplos, cero incluso por debajo de los 65 años. Son cuentas orientativas: el resultado real depende de tu situación (otras rentas, vivienda, cónyuge).\n\nOtro dato útil: si tu única renta es una pensión extranjera por debajo de ~15.876 € al año (umbral de 2025, confírmalo), puede que ni siquiera estés obligado a presentar la declaración. Aun así, muchas veces conviene presentarla: deja las cosas claras con las dos haciendas.\n\n## Lo práctico que se suele olvidar\n\n- **El año de la mudanza es el más delicado**: los dos países pueden considerarte residente durante una parte. Es el momento de pedir ayuda.\n- **Modelo 720**: si conservas en tu país de origen cuentas o inmuebles por más de ~50.000 €, en España existe una declaración solo informativa. No se paga nada, pero olvidarla sale caro.\n- Guarda todos los certificados y resoluciones: con dos haciendas de por medio, el papel es tu mejor defensa.\n\n## Antes de mudarte: 1–2 horas con un profesional\n\nEsta página **no es asesoramiento fiscal**. Sirve para que entiendas la lógica y pierdas el miedo más grande: no, los impuestos españoles no se \"comen\" una pensión pequeña.\n\nAntes de mudarte, reserva **1–2 horas con un asesor fiscal** que conozca España y tu país de origen: unos cientos de euros bien gastados. Nosotros podemos indicarte profesionales acostumbrados a casos como el tuyo; no podemos sustituirlos.\n\n> ⚠️ Todas las cifras son valores de 2025 o estimaciones marcadas con ~, pendientes de confirmar antes de cualquier decisión. Pensiones públicas, carreras mixtas y el año de la mudanza requieren un asesor fiscal cualificado. Fuentes: convenios de doble imposición de España, Agencia Tributaria."}}, "salute": {"slug": "salute", "emoji": "🩺", "title": {"en": "If I get sick in Larva: how it really works", "it": "Se mi ammalo a Larva: il percorso reale", "es": "Si me pongo enfermo en Larva: el camino concreto", "de": "Wenn ich in Larva krank werde: der konkrete Weg"}, "subtitle": {"en": "From a 3 a.m. emergency to your everyday medicines: what really happens, step by step.", "it": "Dall'emergenza alle 3 di notte ai farmaci di ogni giorno: cosa succede davvero, passo per passo.", "es": "De la urgencia a las 3 de la madrugada a las medicinas de cada día: qué pasa de verdad, paso a paso.", "de": "Vom Notfall um 3 Uhr nachts bis zum täglichen Medikament: was wirklich passiert, Schritt für Schritt."}, "md": {"it": "Trasferirsi a 60 o 70 anni in un paese di ~435 abitanti fa nascere una domanda prima di tutte le altre: «E se mi ammalo?». È una domanda giusta. Non merita rassicurazioni vaghe, ma un percorso concreto. Eccolo, scenario per scenario.\n\n## 1. Un'emergenza alle 3 di notte\n\nTi svegli con un dolore forte al petto. Cosa succede, davvero?\n\n- Chiami il **061**, il numero delle emergenze sanitarie in Andalusia, oppure il **112**, il numero unico europeo. Risponde personale che valuta i sintomi e decide cosa inviare.\n- A Larva c'è un **ambulatorio medico con ambulanza**, in paese. Nei casi seri si parte subito verso l'ospedale.\n- L'ospedale di riferimento è il **San Juan de la Cruz di Úbeda**, a ~40 km: circa 50 minuti di strada.\n- Per i casi più critici l'Andalusia ha l'**elisoccorso del 061**, gestito da EPES, l'agenzia pubblica delle emergenze. Gli elicotteri sanitari sono distribuiti nella regione, con una base a Baza (Granada), non lontano dalla Sierra Mágina. È la centrale del 061 a decidere quando farlo decollare, in base a gravità e luogo. Tempi di volo esatti su Larva: da confermare.\n\nDiciamolo chiaro: 50 minuti non sono i 15 di una grande città. In alcune emergenze i minuti contano. Questo è il compromesso vero della vita in un borgo, ed è giusto saperlo prima, non dopo.\n\n## 2. Il medico di tutti i giorni\n\nA Larva l'ambulatorio è aperto **7 giorni su 7**. Per la pressione, un'influenza, un controllo, non devi andare da nessuna parte: il medico è in paese. Una volta registrato nel sistema sanitario andaluso (vedi i 4 passi dell'S1 qui sotto), il medico di famiglia ti viene assegnato proprio lì.\n\n## 3. Malattie croniche e farmaci\n\nSe prendi farmaci tutti i giorni, questa è la parte che ti interessa di più.\n\n- L'Andalusia usa la **ricetta elettronica** (si chiama Receta XXI): il medico può prescriverti in una sola visita la terapia fino a 12 mesi. Niente file per il \"rinnovo ricette\".\n- Ritiri i farmaci nella **farmacia di Larva**, in paese, con la tessera sanitaria. Il sistema vale in tutta la Spagna.\n- Arrivi con terapie in corso? Porta la documentazione: lettere di dimissione, elenco dei farmaci con i **principi attivi**, ultimi esami. Meglio se tradotta in spagnolo. Il medico di Larva la rivede con te e carica le terapie nel sistema. I principi attivi sono gli stessi in tutta la UE; a volte cambia solo il nome commerciale.\n\n## 4. Specialisti e visite: i tempi veri\n\nIl cardiologo, l'oculista, l'ortopedico sono a Úbeda o a Jaén. E qui serve onestà: **le liste d'attesa esistono**. I dati del Servizio sanitario andaluso (SAS, giugno 2025) indicano ~127 giorni di attesa media per una prima visita specialistica in Andalusia; in provincia di Jaén di più, ~183 giorni, in calo ma ancora alta (da confermare: i dati cambiano a ogni rilevazione). Per gli interventi chirurgici non urgenti la media andalusa è ~160 giorni.\n\nDue cose vanno dette insieme:\n\n- Le **urgenze vere non aspettano**: per i casi gravi e oncologici esistono percorsi rapidi e garanzie di legge sui tempi di risposta.\n- Molti residenti integrano con una **visita privata occasionale** a Úbeda o Jaén quando non vogliono aspettare. Prezzi: da confermare caso per caso.\n\n## 5. Cosa fa la comunità\n\nIl sistema sanitario cura. La comunità fa il resto, che spesso pesa di più:\n\n- Devi andare a Úbeda per una visita? C'è chi ti **accom
