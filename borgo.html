<script>
var V = {"cabra": {"name": "Cabra del Santo Cristo", "region": "Sierra Mágina · Jaén", "cluster": "Sierra Mágina", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/Cabra%20del%20Santo%20Cristo%20%28Ja%C3%A9n%2C%20Espa%C3%B1a%29.jpg?width=1200", "pop": "~1.651", "hosp": "Úbeda ~50 km / 49 min", "net": "fibra (parziale)", "house": "€24.000+", "inc": false, "tags": ["🎨", "📷", "🌿"], "sources": ["https://www.foro-ciudad.com/jaen/cabra-del-santo-cristo/habitantes.html", "https://www.idealista.com/venta-viviendas/cabra-de-santo-cristo-jaen/", "https://www.dipujaen.es/microsites/reto-demografico/municipios.html"], "highlight": {"en": "In the Sierra Mágina (Jaén), Cabra del Santo Cristo is the twin of Larva: right next door, sharing the same institutional network, with a strong photographic and artistic identity rooted in the legacy of Arturo Cerdá y Rico and an interpretive route. A warm village of around 1,651 people, made for art and photography, culture and nature.", "it": "Nella Sierra Mágina (Jaén), Cabra del Santo Cristo è il gemello di Larva: vicinissimo, con la stessa rete istituzionale e una forte identità fotografica e artistica che nasce dal lascito di Arturo Cerdá y Rico e da una ruta interpretativa. Un borgo caldo di circa 1.651 abitanti, fatto per arte e fotografia, cultura e natura.", "es": "En la Sierra Mágina (Jaén), Cabra del Santo Cristo es el gemelo de Larva: muy cerca, con la misma red institucional y una sólida identidad fotográfica y artística nacida del legado de Arturo Cerdá y Rico y de una ruta interpretativa. Un pueblo cálido de unos 1.651 habitantes, hecho para el arte y la fotografía, la cultura y la naturaleza.", "de": "In der Sierra Mágina (Jaén) ist Cabra del Santo Cristo der Zwilling von Larva: gleich nebenan gelegen, eingebunden in dasselbe institutionelle Netzwerk und mit einer ausgeprägten fotografischen und künstlerischen Identität, die im Erbe von Arturo Cerdá y Rico verwurzelt ist. Ein herzliches Dorf mit rund 1.651 Einwohnern, wie geschaffen für Kunst und Fotografie, Kultur und Natur."}, "services": {"en": "The village offers complete everyday services: an SAS health clinic, a pharmacy, schools (CEIP and infantil), a library, a post office and local shops, with the hospital in Úbeda about 50 km / 49 min away.", "it": "Il borgo offre servizi quotidiani completi: consultorio SAS, farmacia, scuole (CEIP e infantil), biblioteca, ufficio postale e negozi, con l'ospedale di Úbeda a circa 50 km / 49 min.", "es": "El pueblo ofrece servicios cotidianos completos: consultorio del SAS, farmacia, colegios (CEIP e infantil), biblioteca, oficina de correos y comercios, con el hospital de Úbeda a unos 50 km / 49 min.", "de": "Vollständige Versorgung für den Alltag: eine SAS-Gesundheitspraxis, eine Apotheke, Schulen, eine Bibliothek, ein Postamt und Geschäfte; das Krankenhaus in Úbeda liegt etwa 50 km bzw. 49 Minuten entfernt."}, "incentives": {"en": "Housing is very affordable (around 13 homes from 24,000€, about 503€/m2) and is supported by the Reto Demográfico programme of the Diputación de Jaén together with Junta de Andalucía housing aid (up to 10,800€ for under-35s).", "it": "Le case sono molto economiche (circa 13 abitazioni da 24.000€, intorno ai 503€/m2) e sono accompagnate dal programma Reto Demográfico della Diputación de Jaén e dagli aiuti vivienda della Junta de Andalucía (fino a 10.800€ per gli under 35).", "es": "La vivienda es muy económica (unas 13 casas desde 24.000€, en torno a 503€/m2) y cuenta con el apoyo del programa Reto Demográfico de la Diputación de Jaén y de las ayudas a la vivienda de la Junta de Andalucía (hasta 10.800€ para menores de 35 años).", "de": "Sehr erschwingliches Wohnen (rund 13 Häuser ab 24.000 €), unterstützt durch das Programm Reto Demográfico der Diputación de Jaén sowie durch Wohnbeihilfen der Junta de Andalucía (bis zu 10.800 € für unter 35-Jährige)."}}, "belmez": {"name": "Bélmez de la Moraleda", "region": "Sierra Mágina · Jaén", "cluster": "Sierra Mágina", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/B%C3%A9lmez%20de%20la%20Moraleda%2024J%2001.jpg?width=1200", "pop": "~1.509", "hosp": "Úbeda ~45–55 min", "net": "UNICO / 4G", "house": "€40.000+ (ruderi €12.000)", "inc": false, "tags": ["🎨", "📚", "🌿"], "sources": ["https://www.foro-ciudad.com/jaen/belmez-de-la-moraleda/habitantes.html", "https://www.belmezdelamoraleda.es/", "https://www.idealista.com/venta-viviendas/belmez-de-la-moraleda-jaen/"], "highlight": {"en": "Tucked inside the Sierra Mágina Natural Park in Jaén, Bélmez de la Moraleda is a small village (around 1,509 people) with a draw found nowhere else: las Caras de Bélmez, the famous teleplastias, now told through their own interpretation centre. Like Larva, it is a place where art, culture and the mystery of these legendary faces meet slow tourism and unspoiled nature, the perfect ground for a community to put down roots.", "it": "Immerso nel Parco Naturale Sierra Mágina, a Jaén, Bélmez de la Moraleda è un piccolo borgo (circa 1.509 abitanti) con un richiamo unico al mondo: las Caras de Bélmez, le celebri teleplastias, raccontate oggi in un centro d'interpretazione dedicato. Come Larva, è un luogo dove arte, cultura e mistero incontrano il turismo lento e una natura intatta, terreno ideale perché una comunità possa mettere radici.", "es": "En pleno Parque Natural Sierra Mágina, en Jaén, Bélmez de la Moraleda es un pueblo pequeño (en torno a 1.509 habitantes) con un atractivo único en el mundo: las Caras de Bélmez, las célebres teleplastias, hoy narradas en su propio centro de interpretación. Como Larva, es un lugar donde el arte, la cultura y el misterio se unen al turismo lento y a una naturaleza intacta, terreno ideal para que una comunidad eche raíces.", "de": "Inmitten des Naturparks Sierra Mágina hat Bélmez de la Moraleda (rund 1.509 Einwohner) eine Anziehungskraft, die es sonst nirgends gibt: las Caras de Bélmez, die berühmten Teleplastien, erzählt in einem eigenen Interpretationszentrum. Wie Larva ein Ort, an dem Kunst, Kultur und Geheimnis auf sanften Tourismus und unberührte Natur treffen."}, "services": {"en": "Everyday essentials are covered: a local health centre/consultorio, a pharmacy, infant and primary school, and the Centro de Interpretación de las Caras, with the hospital in Úbeda roughly 45-55 minutes away (exact distance to be confirmed).", "it": "I servizi essenziali ci sono: consultorio/centro di salute, farmacia, scuola dell'infanzia e primaria e il Centro de Interpretación de las Caras, con l'ospedale di Úbeda a circa 45-55 minuti (distanza esatta da confermare).", "es": "Los servicios esenciales están cubiertos: consultorio/centro de salud, farmacia, educación infantil y primaria y el Centro de Interpretación de las Caras, con el hospital de Úbeda a unos 45-55 minutos (distancia exacta por confirmar).", "de": "Alles fürs tägliche Leben: ein örtliches Gesundheitszentrum, eine Apotheke, eine Kindergarten- und Grundschule sowie das Centro de Interpretación de las Caras, wobei das Krankenhaus in Úbeda etwa 45-55 Minuten entfernt liegt (noch zu bestätigen)."}, "incentives": {"en": "Homes start from around 40,000€ (ruins from 12,000€), and the village is part of the Mágina cluster, which is set to benefit from incentives backed by the Diputación de Jaén and the Junta (details to be confirmed).", "it": "Le case partono da circa 40.000€ (ruderi da 12.000€) e il borgo rientra nel cluster Mágina, che potrà beneficiare di incentivi sostenuti dalla Diputación de Jaén e dalla Junta (dettagli da confermare).", "es": "Las casas parten de unos 40.000€ (ruinas desde 12.000€) y el pueblo forma parte del clúster Mágina, que podrá beneficiarse de incentivos respaldados por la Diputación de Jaén y la Junta (detalles por confirmar).", "de": "Häuser ab etwa 40.000 € (Ruinen ab 12.000 €); Teil des Mágina-Clusters, der von Förderungen der Diputación de Jaén und der Junta profitieren soll (Details noch zu bestätigen)."}}, "carcheles": {"name": "Cárcheles", "region": "Sierra Mágina · Jaén", "cluster": "Sierra Mágina", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/Carchelejo%2024J%2001.jpg?width=1200", "pop": "~1.293", "hosp": "Jaén ~30 km / 30–35 min", "net": "UNICO / 4G", "house": "€25.500+", "inc": false, "tags": ["🌿", "🔧"], "sources": ["https://www.foro-ciudad.com/jaen/carcheles/habitantes.html", "https://www.idealista.com/venta-viviendas/carcheles-jaen/"], "highlight": {"en": "In the heart of the Sierra Mágina, Cárcheles is a small, close-knit community living quietly among olive groves and Mediterranean mountains. Like Larva, its tiny hamlet of Cárchel offers the same intimate, human scale, while the village holds a special advantage: the best hospital access in the Mágina cluster, just 30 km from Jaén.", "it": "Nel cuore della Sierra Mágina, Cárcheles è una piccola comunità unita e raccolta, che vive in tranquillità tra oliveti e montagna mediterranea. Come Larva, il suo minuscolo nucleo di Cárchel offre la stessa scala intima e a misura d'uomo, ma il borgo ha un vantaggio speciale: la migliore accessibilità ospedaliera del cluster Mágina, a soli 30 km da Jaén.", "es": "En el corazón de la Sierra Mágina, Cárcheles es una pequeña comunidad unida y acogedora, que vive con tranquilidad entre olivares y monte mediterráneo. Como Larva, su minúsculo núcleo de Cárchel ofrece la misma escala íntima y humana, pero el pueblo tiene una ventaja especial: la mejor accesibilidad hospitalaria del clúster Mágina, a solo 30 km de Jaén.", "de": "Im Herzen der Sierra Mágina liegt Cárcheles, eine kleine, eng verbundene Gemeinschaft, die ruhig zwischen Olivenhainen und Bergen lebt. Wie Larva bietet sein winziger Weiler Cárchel einen intimen, menschlichen Maßstab und zugleich die beste Krankenhausanbindung im Mágina-Verbund, nur 30 km von Jaén entfernt."}, "services": {"en": "Essential services include a SAS health clinic with auxiliary staff and a primary school (CEIP), with the Jaén hospital just 30 km away (30-35 min via the A-44); pharmacy and shops to be confirmed.", "it": "I servizi essenziali comprendono un consultorio SAS con personale ausiliario e una scuola primaria (CEIP), con l'ospedale di Jaén a soli 30 km (30-35 min via A-44); farmacia e negozi da confermare.", "es": "Los servicios esenciales incluyen un consultorio del SAS con personal auxiliar y un colegio (CEIP), con el hospital de Jaén a solo 30 km (30-35 min por la A-44); farmacia y comercios por confirmar.", "de": "Zu den wesentlichen Dienstleistungen gehören eine SAS-Gesundheitsstation mit Hilfspersonal und eine Grundschule, während das Krankenhaus von Jaén nur 30 km entfernt ist (30-35 Min. über die A-44); Apotheke und Geschäfte sind noch zu bestätigen."}, "incentives": {"en": "Homes from 25,500 EUR and access to the Mágina cluster incentive programme make settling here especially affordable.", "it": "Case da 25.500 EUR e l'accesso al programma di incentivi del cluster Mágina rendono particolarmente accessibile trasferirsi qui.", "es": "Viviendas desde 25.500 EUR y el acceso al programa de incentivos del clúster Mágina hacen que establecerse aquí resulte especialmente asequible.", "de": "Häuser ab 25.500 € und der Zugang zum Förderprogramm des Mágina-Verbunds machen die Niederlassung hier besonders erschwinglich."}}, "jimena": {"name": "Jimena", "region": "Sierra Mágina · Jaén", "cluster": "Sierra Mágina", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/Jimena%2C%20en%20Ja%C3%A9n%20%28Espa%C3%B1a%29.jpg?width=1200", "pop": "~1.234", "hosp": "Úbeda ~26 km; Jaén ~38 min", "net": "UNICO / 4G", "house": "€44.000+", "inc": false, "tags": ["🌿", "🎨", "🔧"], "sources": ["https://www.foro-ciudad.com/jaen/jimena/habitantes.html", "https://www.idealista.com/en/venta-viviendas/jimena-jaen/", "https://www.jaenparaisointerior.es/en/w/cueva-de-la-graja"], "highlight": {"en": "Tucked into the high Sierra Mágina beneath the peak of Pico Mágina, Jimena is the rare village in the Mágina cluster whose population is gently growing (+11), a sign that life here is taking root again. With prehistoric rock art at the Cueva de la Graja, real mountain nature, and craft traditions of olive oil and figs, it offers newcomers the same warm, lived-in promise that drew us to Larva.", "it": "Incastonata nell'alta Sierra Mágina ai piedi del Pico Mágina, Jimena è il raro borgo del cluster Mágina con la popolazione in lieve crescita (+11), segno che qui la vita sta tornando a mettere radici. Con l'arte rupestre della Cueva de la Graja, una natura di montagna autentica e le tradizioni artigiane dell'olio e dei fichi, offre a chi arriva la stessa promessa calda e vissuta che ci ha portato a Larva.", "es": "Enclavada en la alta Sierra Mágina, a los pies del Pico Mágina, Jimena es el raro pueblo del clúster Mágina con población en ligero crecimiento (+11), señal de que aquí la vida vuelve a echar raíces. Con el arte rupestre de la Cueva de la Graja, una naturaleza de montaña auténtica y las tradiciones artesanas del aceite y los higos, ofrece a quien llega la misma promesa cálida y vivida que nos atrajo a Larva.", "de": "Unterhalb des Gipfels des Pico Mágina liegt Jimena, eines der seltenen Dörfer der Mágina, dessen Bevölkerung sanft wächst (+11) – ein Zeichen dafür, dass das Leben hier wieder Wurzeln schlägt. Mit prähistorischer Felskunst in der Cueva de la Graja, echter Bergnatur und Traditionen rund um Olivenöl und Feigen schenkt es dasselbe warme Versprechen, das uns nach Larva gezogen hat."}, "services": {"en": "Everyday essentials are within reach: a municipal swimming pool in the village, a local clinic and pharmacy (to be confirmed), and hospital care in Úbeda about 26 km away, with Jaén roughly 38 minutes by car and all key services under 40 minutes.", "it": "I servizi quotidiani sono a portata di mano: piscina municipale in paese, consultorio e farmacia (da confermare), e l'ospedale di Úbeda a circa 26 km, con Jaén a circa 38 minuti in auto e tutti i servizi essenziali entro 40 minuti.", "es": "Lo esencial del día a día está al alcance: piscina municipal en el pueblo, consultorio y farmacia (por confirmar), y el hospital de Úbeda a unos 26 km, con Jaén a unos 38 minutos en coche y todos los servicios clave a menos de 40 minutos.", "de": "Voraussichtlich eine Gesundheitsstation und eine Apotheke (noch zu bestätigen) sowie ein Gemeindeschwimmbad, mit dem Krankenhaus in Úbeda in etwa 26 km Entfernung und Jaén in rund 38 Minuten – alles in weniger als 40 Minuten erreichbar."}, "incentives": {"en": "Homes start from around 44,000€, and Jimena is part of the Mágina cluster incentive program supporting people who choose to settle and build a life here.", "it": "Le case partono da circa 44.000€ e Jimena rientra nel programma di incentivi del cluster Mágina, a sostegno di chi sceglie di trasferirsi e costruire qui la propria vita.", "es": "Las viviendas parten de unos 44.000€ y Jimena forma parte del programa de incentivos del clúster Mágina, en apoyo de quienes eligen instalarse y construir aquí su vida.", "de": "Häuser ab 44.000 € und Zugang zu den Förderungen des Mágina-Clusters (Diputación de Jaén und Junta)."}}, "bedmar": {"name": "Bedmar y Garcíez", "region": "Sierra Mágina · Jaén", "cluster": "Sierra Mágina", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/Bedmar%2001.jpg?width=1200", "pop": "~355 (Garcíez) · 2.571 (mun.)", "hosp": "Úbeda (da confermare)", "net": "UNICO / 4G", "house": "€10.300+", "inc": false, "openCouncil": true, "tags": ["🌿", "🔧"], "sources": ["https://www.foro-ciudad.com/jaen/bedmar-y-garciez/habitantes.html", "https://www.diariojaen.es/provincia/financiacion-y-lucha-contra-la-despoblacion-las-directrices-de-david-prieto-por-garciez-PJ11188106", "https://www.idealista.com/en/venta-viviendas/bedmar-y-garciez-jaen/"], "highlight": {"en": "Tucked inside the Sierra Mágina Natural Park in Jaén, Bedmar y Garcíez pairs a living municipality of 2,571 with the tiny hamlet of Garcíez (~355 people) — a Larva-sized scale where new neighbours can truly take root. With homes from just €10,300 and a town hall that has publicly made fighting depopulation a priority, it is fertile ground for a community drawn to nature and craft.", "it": "Incastonato nel Parco Naturale Sierra Mágina (Jaén), Bedmar y Garcíez unisce un municipio vivo di 2.571 abitanti al minuscolo nucleo di Garcíez (~355 persone) — una scala simile a quella di Larva, dove chi arriva può davvero mettere radici. Con case da appena 10.300€ e un Comune che ha dichiarato pubblicamente la lotta allo spopolamento come priorità, è terreno fertile per una comunità legata alla natura e all'artigianato.", "es": "Enclavado en el Parque Natural Sierra Mágina (Jaén), Bedmar y Garcíez une un municipio vivo de 2.571 habitantes con el minúsculo núcleo de Garcíez (~355 personas) — una escala parecida a la de Larva, donde quien llega puede echar raíces de verdad. Con casas desde apenas 10.300€ y un Ayuntamiento que ha declarado públicamente la lucha contra la despoblación como prioridad, es terreno fértil para una comunidad ligada a la naturaleza y la artesanía.", "de": "Im Naturpark Sierra Mágina hat der winzige Weiler Garcíez (rund 355 Einwohner) den minimalen, vertrauten Maßstab von Larva. Entscheidender Vorteil: Die Gemeinde hat den Kampf gegen die Abwanderung öffentlich zur Priorität erklärt, ganz wie die Bürgermeisterin von Larva."}, "services": {"en": "The municipality offers essential services — a refurbished health clinic, pharmacy, bank, shops and a CEIP school with infant education — with the nearest hospital in Úbeda, plus UNICO broadband/4G coverage (presence of these services in the Garcíez hamlet itself to be confirmed).", "it": "Il municipio dispone dei servizi essenziali — consultorio riformato, farmacia, banca, negozi e una scuola CEIP con infantil — con l'ospedale più vicino a Úbeda, oltre alla banda larga UNICO/4G (la presenza di questi servizi nel nucleo di Garcíez è da confermare).", "es": "El municipio cuenta con los servicios esenciales — consultorio reformado, farmacia, banco, comercios y un CEIP con infantil — con el hospital más cercano en Úbeda, además de banda ancha UNICO/4G (la presencia de estos servicios en el propio núcleo de Garcíez está por confirmar).", "de": "Eine renovierte Gesundheitsstation, eine Apotheke, eine Bank, Geschäfte und Schulen in der Gemeinde (die Dienste im Weiler Garcíez sind noch zu bestätigen), mit dem Krankenhaus von Úbeda als Anlaufstelle (Entfernung noch zu bestätigen)."}, "incentives": {"en": "Very affordable homes (around 31 houses from €10,300) sit alongside Sierra Mágina cluster incentives, backed by a town hall that has publicly committed to reversing depopulation, especially in Garcíez.", "it": "Case economicissime (circa 31 abitazioni da 10.300€) si affiancano agli incentivi del cluster Sierra Mágina, sostenuti da un Comune che si è impegnato pubblicamente a invertire lo spopolamento, in particolare a Garcíez.", "es": "Viviendas muy económicas (unas 31 casas desde 10.300€) se suman a los incentivos del clúster Sierra Mágina, respaldados por un Ayuntamiento que se ha comprometido públicamente a revertir la despoblación, especialmente en Garcíez.", "de": "Bemerkenswert günstige Häuser (rund 31 ab 10.300 €) und die Anreize des Mágina-Verbunds, mit einer dokumentierten Offenheit der Gemeinde für die Wiederbesiedlung."}}, "segura": {"name": "Segura de la Sierra", "region": "Sierra de Segura · Jaén", "cluster": "Sierra de Segura", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/DSC00226-Segura%20de%20la%20Sierra-Jaen.jpg?width=1200", "pop": "~1.688", "hosp": "Alta Resolución (Puente de Génave) ~25 km / 31 min", "net": "fibra ~64% · 4G ~99%", "house": "€16.000+", "inc": true, "tags": ["🎶", "🎨", "🌿", "🔧"], "sources": ["https://www.foro-ciudad.com/jaen/segura-de-la-sierra/habitantes.html", "https://vivemasandalucia.es/municipios/segura-de-la-sierra/", "https://fondoseuropeos.dipujaen.es/", "https://lospueblosmasbonitosdeespana.org/pueblos/segura-de-la-sierra/"], "highlight": {"en": "A medieval village ranked among Spain's \"Pueblos más bonitos\" and protected as a Conjunto Histórico, Segura de la Sierra holds a magnetic pull for artists. Like Larva, it is a small, character-rich place where a community can take root around art and music, culture and heritage, nature and craft.", "it": "Borgo medievale tra i \"Pueblos más bonitos de España\" e tutelato come Conjunto Histórico, Segura de la Sierra esercita un richiamo fortissimo sugli artisti. Come Larva, è un luogo piccolo e ricco di carattere, dove una comunità può mettere radici intorno ad arte e musica, cultura e patrimonio, natura e artigianato.", "es": "Pueblo medieval entre los \"Pueblos más bonitos de España\" y protegido como Conjunto Histórico, Segura de la Sierra ejerce un altísimo atractivo para los artistas. Como Larva, es un lugar pequeño y lleno de carácter, donde una comunidad puede echar raíces en torno al arte y la música, la cultura y el patrimonio, la naturaleza y la artesanía.", "de": "Ein mittelalterliches Dorf unter den \"Pueblos más bonitos de España\" (den schönsten Dörfern Spaniens), mit einem denkmalgeschützten historischen Ortskern – eine außergewöhnlich starke Anziehungskraft für Künstler. In der Sierra de Segura (Jaén) gelegen, mit rund 1.688 Einwohnern, teilt es sich das institutionelle Netzwerk von Larva."}, "services": {"en": "Essential services are covered with local consultorios and a pharmacy, full schooling (Infantil, Primaria, ESO and Bachillerato) in the Cortijos Nuevos district, and the Alta Resolución hospital in Puente de Génave about 25 km / 31 min away.", "it": "I servizi essenziali ci sono: consultori medici e farmacia in paese, scuola completa (Infantil, Primaria, ESO e Bachillerato) nella pedania di Cortijos Nuevos e l'ospedale di Alta Resolución a Puente de Génave a circa 25 km / 31 min.", "es": "Los servicios esenciales están cubiertos: consultorios y farmacia en el pueblo, escolarización completa (Infantil, Primaria, ESO y Bachillerato) en la pedanía de Cortijos Nuevos y el hospital de Alta Resolución en Puente de Génave a unos 25 km / 31 min.", "de": "Gesundheitszentren und eine Apotheke; im Weiler Cortijos Nuevos ein vollständiges Schulangebot (vom Kindergarten bis zur Oberstufe), wobei das Krankenhaus Alta Resolución (Puente de Génave) etwa 25 km / 31 Minuten entfernt ist."}, "incentives": {"en": "Housing support is confirmed and active: the Diputación de Jaén offers up to 10,000€ for first-time buyers under 35 (applications open until 30/11/2026), plus a reduced ITP transfer tax of 3.5%, with homes starting from 16,000€.", "it": "L'incentivo casa è confermato e attivo: la Diputación de Jaén offre fino a 10.000€ per gli under 35 alla prima casa (domande fino al 30/11/2026), oltre all'ITP ridotta al 3,5%, con case a partire da 16.000€.", "es": "La ayuda a la vivienda está confirmada y activa: la Diputación de Jaén ofrece hasta 10.000€ para menores de 35 años en primera vivienda (solicitudes hasta el 30/11/2026), además del ITP reducido al 3,5%, con casas desde 16.000€.", "de": "BESTÄTIGTE Wohnbeihilfe: Die Diputación de Jaén gewährt bis zu 10.000 € für unter 35-Jährige beim Kauf einer ersten Wohnung (Anträge bis zum 30.11.2026), zuzüglich einer ermäßigten Grunderwerbsteuer von 3,5 %. Wohnungen ab 16.000 €."}}, "benatae": {"name": "Benatae", "region": "Sierra de Segura · Jaén", "cluster": "Sierra de Segura", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/Benatae%2C%20en%20Ja%C3%A9n%20%28Espa%C3%B1a%29.jpg?width=1200", "pop": "~429", "hosp": "Alta Resolución ~13–14 km / 15–20 min", "net": "fibra ~84% · 4G ~98%", "house": "da confermare", "inc": true, "tags": ["🌿", "🔧"], "sources": ["https://www.foro-ciudad.com/jaen/benatae/habitantes.html", "https://vivemasandalucia.es/municipios/benatae/", "https://fondoseuropeos.dipujaen.es/"], "highlight": {"en": "Benatae is a tiny village of around 429 people in the Sierra de Segura (Jaén), the same minimal scale as Larva, set in an authentic natural-park landscape. That intimate size is exactly what makes it ideal for the project: the perfect ground for a small, close-knit community to take root, with room for nature and craftsmanship.", "it": "Benatae è un piccolo borgo di circa 429 abitanti nella Sierra de Segura (Jaén), la stessa scala minima di Larva, immerso nell'ambiente autentico del parco naturale. Proprio questa dimensione raccolta lo rende ideale per il progetto: il terreno perfetto perché una piccola comunità coesa metta radici, con spazio per natura e artigianato.", "es": "Benatae es un pequeño pueblo de unos 429 habitantes en la Sierra de Segura (Jaén), la misma escala mínima que Larva, en el entorno auténtico del parque natural. Es precisamente ese tamaño íntimo lo que lo hace ideal para el proyecto: el terreno perfecto para que arraigue una pequeña comunidad unida, con espacio para la naturaleza y la artesanía.", "de": "Vielleicht das Dorf, das Larva an Größe am nächsten kommt (~429 Einwohner): der minimale Maßstab, ideal für eine kleine, eng verbundene Gemeinschaft, in einer authentischen Umgebung inmitten des Naturparks der Sierra de Segura."}, "services": {"en": "Everyday essentials are covered with a local health clinic (consultorio) and a pharmacy, plus the Hospital de Alta Resolución in Puente de Génave just 13-14 km away (15-20 min); infant/primary school is not in the village (to be confirmed, likely commuting to nearby towns).", "it": "I servizi essenziali sono coperti da un consultorio medico e una farmacia in paese, con l'Ospedale di Alta Resolución di Puente de Génave a soli 13-14 km (15-20 min); la scuola dell'infanzia/primaria non è in loco (da confermare, probabile pendolarismo verso comuni vicini).", "es": "Los servicios esenciales están cubiertos con un consultorio médico y una farmacia en el pueblo, además del Hospital de Alta Resolución de Puente de Génave a solo 13-14 km (15-20 min); la escuela infantil/primaria no está en el municipio (por confirmar, probable desplazamiento a pueblos cercanos).", "de": "Eine Arztpraxis und eine Apotheke; Kindergarten/Grundschule nicht vor Ort (vermutlich mit Anfahrt, noch zu bestätigen), wobei das Krankenhaus Alta Resolución nur etwa 13-14 km / 15-20 Minuten entfernt liegt."}, "incentives": {"en": "A housing incentive is confirmed for Benatae, in line with the rest of the Segura cluster, to help newcomers settle in.", "it": "Per Benatae è confermato un incentivo casa, in linea con il resto del cluster Segura, a sostegno di chi sceglie di trasferirsi.", "es": "Para Benatae está confirmado un incentivo a la vivienda, en línea con el resto del clúster de Segura, para ayudar a quienes deciden instalarse.", "de": "BESTÄTIGTE Wohnbeihilfe (Cluster Sierra de Segura: bis zu 10.000 € für unter 35-Jährige, bis zum 30.11.2026). Lokale Immobilienpreise noch zu bestätigen."}}, "hornos": {"name": "Hornos", "region": "Sierra de Segura · Jaén", "cluster": "Sierra de Segura", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/Hornos%2C%20en%20Ja%C3%A9n%20%28Espa%C3%B1a%29.jpg?width=1200", "pop": "~573", "hosp": "Alta Resolución ~28 km / 32–34 min", "net": "fibra ~64% · 4G ~99%", "house": "€36.000+", "inc": true, "tags": ["🎨", "🌿"], "sources": ["https://www.foro-ciudad.com/jaen/hornos/habitantes.html", "https://vivemasandalucia.es/municipios/hornos/", "https://www.idealista.com/en/venta-viviendas/hornos-jaen/"], "highlight": {"en": "Perched on a hilltop within the Cazorla-Segura-Las Villas Natural Park, Hornos is a Conjunto Histórico-Artístico crowned by a castle, with breathtaking views over the Tranco reservoir. Like Larva, it offers a spectacular setting and quiet community life, ready to welcome people drawn to nature, art, music and craftsmanship.", "it": "Arroccato all'interno del Parco Naturale Cazorla-Segura-Las Villas, Hornos è un Conjunto Histórico-Artístico coronato da un castello, con una vista mozzafiato sull'embalse del Tranco. Come Larva, offre una scenografia spettacolare e una vita di comunità tranquilla, pronta ad accogliere chi cerca natura, arte, musica e artigianato.", "es": "Encaramado en lo alto, dentro del Parque Natural de Cazorla-Segura-Las Villas, Hornos es un Conjunto Histórico-Artístico coronado por un castillo, con vistas impresionantes al embalse del Tranco. Como Larva, ofrece un escenario espectacular y una vida en comunidad tranquila, lista para acoger a quienes buscan naturaleza, arte, música y artesanía.", "de": "Ein Dorf auf einem Hügel (historisch-künstlerisches Ensemble) mit einer Burg und Blick über den Tranco-Stausee, mitten im Naturpark Cazorla-Segura-Las Villas – eine spektakuläre Kulisse. Eine Larva-ähnliche Größe von rund 573 Menschen in der Sierra de Segura."}, "services": {"en": "Hornos has essential services covered: two health clinics (consultorios), a pharmacy, an infant and primary school, a bank, a taxi and ample tourist accommodation, with the Alta Resolución hospital in Puente de Génave about 28 km away (around 32-34 min).", "it": "Hornos copre i servizi essenziali: due consultori, una farmacia, scuola dell'infanzia e primaria, una banca, un taxi e un'ampia ricettività turistica, con l'ospedale di Alta Resolución di Puente de Génave a circa 28 km (32-34 min).", "es": "Hornos cubre los servicios esenciales: dos consultorios, una farmacia, escuela infantil y primaria, un banco, un taxi y amplia oferta de alojamiento turístico, con el hospital de Alta Resolución de Puente de Génave a unos 28 km (32-34 min).", "de": "Zwei Gesundheitsstationen, eine Apotheke, ein Kindergarten und eine Grundschule, eine Bank, ein Taxi und reichlich Unterkünfte für Touristen, mit dem Krankenhaus „Alta Resolución\" in rund 28 km / 32–34 Minuten Entfernung."}, "incentives": {"en": "Housing incentive confirmed: with homes from 36,000€ (and from 10,000€ in the surrounding area) and many empty or second houses to restore, the programme supports those who choose to make Hornos their home.", "it": "Incentivo casa confermato: con abitazioni a partire da 36.000€ (e da 10.000€ nell'area circostante) e molte case vuote o seconde case da recuperare, il programma sostiene chi sceglie di vivere a Hornos.", "es": "Incentivo a la vivienda confirmado: con casas desde 36.000€ (y desde 10.000€ en la zona) y muchas viviendas vacías o segundas residencias por recuperar, el programa apoya a quienes eligen hacer de Hornos su hogar.", "de": "BESTÄTIGTE Wohnungsbeihilfe (Cluster Sierra de Segura). Häuser ab 36.000 €, mit vielen leerstehenden Häusern zum Sanieren."}}, "torres": {"name": "Torres de Albánchez", "region": "Sierra de Segura · Jaén", "cluster": "Sierra de Segura", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/JDCANO%20Torres%20Albanchez.jpg?width=1200", "pop": "~741", "hosp": "Alta Resolución ~25–30 min", "net": "fibra ~87% · 4G 100%", "house": "da confermare (economico)", "inc": true, "tags": ["💻", "🔧", "🌿"], "sources": ["https://www.foro-ciudad.com/jaen/torres-de-albanchez/habitantes.html", "https://vivemasandalucia.es/municipios/torres-de-albanchez/", "https://www.torresdealbanchez.es/"], "highlight": {"en": "Tucked into the Sierra de Segura with around 741 residents, Torres de Albánchez offers the same warm, human scale that makes Larva special, set in a quiet natural park crowned by a medieval keep. With the best connectivity in the cluster (fibre reaching about 87% and full 4G coverage), it's a natural home for artists, makers and anyone who lives by remote and tech work.", "it": "Immersa nella Sierra de Segura con circa 741 abitanti, Torres de Albánchez offre la stessa scala raccolta e umana che rende speciale Larva, in un ambiente tranquillo nel parco e dominata da un torreón medievale. Con la migliore connettività del cluster (fibra intorno all'87% e copertura 4G completa), è la casa ideale per artisti, artigiani e per chi vive di lavoro da remoto e tech.", "es": "Enclavada en la Sierra de Segura con unos 741 habitantes, Torres de Albánchez ofrece la misma escala recogida y humana que hace especial a Larva, en un entorno tranquilo dentro del parque y coronada por un torreón medieval. Con la mejor conectividad del clúster (fibra en torno al 87% y cobertura 4G completa), es un hogar natural para artistas, artesanos y quienes viven del trabajo en remoto y tech.", "de": "Ein kompaktes Dorf wie Larva mit ausgezeichneter Anbindung (Glasfaser ~87 %, 4G 100 %) – ideal für Künstler und ortsunabhängiges Arbeiten – und einem mittelalterlichen Turm, in der Ruhe des Naturparks Sierra de Segura. Rund 741 Einwohner."}, "services": {"en": "Everyday essentials are covered with a local health clinic, a pharmacy and a school for infant and primary education (ESO is not available in the village).", "it": "I servizi essenziali sono presenti: un consultorio medico, una farmacia e una scuola dell'infanzia e primaria (la ESO non è disponibile in loco).", "es": "Los servicios esenciales están cubiertos: un consultorio médico, una farmacia y una escuela de infantil y primaria (la ESO no está disponible en el pueblo).", "de": "Eine Gesundheitsstation und eine Apotheke, eine Kinderkrippe und Grundschule (weiterführende Schule andernorts), mit dem Krankenhaus Alta Resolución in ~25–30 Minuten Entfernung (noch zu bestätigen)."}, "incentives": {"en": "Housing is affordable and a housing incentive is confirmed as part of the programme to help new residents settle in (single-municipality prices to be confirmed).", "it": "Le case sono accessibili e un incentivo casa è confermato nell'ambito del programma per aiutare i nuovi residenti a stabilirsi (i prezzi del singolo comune sono da confermare).", "es": "Las viviendas son asequibles y hay un incentivo de vivienda confirmado dentro del programa para ayudar a los nuevos residentes a instalarse (los precios del municipio están por confirmar).", "de": "BESTÄTIGTE Wohnbeihilfe (Cluster Sierra de Segura). Bezahlbare Wohnungen; örtliche Preise noch zu bestätigen."}}, "galera": {"name": "Galera", "region": "Altiplano · Granada", "cluster": "Altiplano de Granada", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/J23%20387%20Galera%2C%20H%C3%B6hlenwohnungen.jpg?width=1200", "pop": "~1.116", "hosp": "Baza ~44–45 km / 36–39 min", "net": "fibra (Excom/Habland)", "house": "case-grotta €22.000+", "inc": false, "tags": ["🎨", "🌌", "🐾"], "sources": ["https://www.foro-ciudad.com/granada/galera/habitantes.html", "https://www.idealista.com/en/venta-viviendas/galera-granada/", "https://www.excom.es/internet/galera/"], "highlight": {"en": "Tucked into Granada's Altiplano de Huéscar, Galera holds around 1,116 residents and a rare treasure: bioclimatic cave-houses, affordable and one of a kind, with the Tútugi archaeological site and a UNESCO Geopark all around. Like Larva, it is a small, stable community where natural and cultural richness make it a magnet for artists drawn to art, culture, nature and some of the clearest starry skies for astrotourism.", "it": "Incastonata nell'Altiplano de Granada (Huéscar), Galera conta circa 1.116 abitanti e custodisce un tesoro raro: le case-grotta bioclimatiche, economiche e uniche, con il sito archeologico di Tútugi e un Geoparco UNESCO tutt'intorno. Come Larva, è una piccola comunità stabile dove la ricchezza naturale e culturale la rende un magnete per gli artisti, ideale per arte, cultura, natura e per un cielo stellato perfetto per l'astroturismo.", "es": "Enclavada en el Altiplano de Granada (Huéscar), Galera tiene unos 1.116 habitantes y guarda un tesoro poco común: casas-cueva bioclimáticas, económicas y únicas, junto al yacimiento arqueológico de Tútugi y un Geoparque UNESCO. Como Larva, es una comunidad pequeña y estable cuya riqueza natural y cultural la convierte en un imán para artistas, perfecta para arte, cultura, naturaleza y un cielo estrellado ideal para el astroturismo.", "de": "Bioklimatische Höhlenhäuser, die archäologischen Stätten von Tútugi, ein UNESCO-Geopark und ein Sternenhimmel (Astrotourismus) machen Galera zu einem Anziehungspunkt für Künstler. Ein kleines Dorf (rund 1.116 Einwohner) im Altiplano von Granada."}, "services": {"en": "Everyday essentials are in place: a local health clinic (zona básica) and pharmacy, a school, and around 200 tourist beds in cave-houses, with confirmed fibre internet; the nearest hospital is in Baza, about 44-45 km away (roughly 36-39 min).", "it": "I servizi essenziali ci sono: consultorio medico (zona básica) e farmacia, una scuola e circa 200 posti letto turistici nelle case-grotta, con fibra confermata; l'ospedale più vicino è a Baza, a circa 44-45 km (circa 36-39 min).", "es": "Los servicios esenciales están cubiertos: consultorio médico (zona básica) y farmacia, una escuela y unas 200 plazas turísticas en casas-cueva, con fibra confirmada; el hospital más cercano está en Baza, a unos 44-45 km (unos 36-39 min).", "de": "Ein Gesundheitszentrum, eine Apotheke, eine Schule und rund 200 Gästebetten (Höhlenhäuser), wobei das Krankenhaus von Baza etwa 44-45 km / 36-39 Min. entfernt ist."}, "incentives": {"en": "Housing help comes through the \"Granada se puebla\" programme (Diputación de Granada) together with the GDR Altiplano (LEADER), with cave-houses starting from 22,000 euros (average around 99,950 euros, about 464 euros/m2).", "it": "Gli aiuti per la casa arrivano dal programma \"Granada se puebla\" (Diputación de Granada) insieme al GDR Altiplano (LEADER), con case-grotta a partire da 22.000 euro (media circa 99.950 euro, circa 464 euro/m2).", "es": "Las ayudas a la vivienda llegan a través del programa \"Granada se puebla\" (Diputación de Granada) junto con el GDR Altiplano (LEADER), con casas-cueva desde 22.000 euros (media en torno a 99.950 euros, unos 464 euros/m2).", "de": "Einzigartige, erschwingliche Höhlenhäuser ab 22.000 EUR, unterstützt von „Granada se puebla\" (Diputación de Granada) und der LEADER-Gruppe des Altiplano. Hinweis: andere Provinz (Granada), eigenständiger Rahmen, getrennt vom Netzwerk von Jaén."}}, "orce": {"name": "Orce", "region": "Altiplano · Granada", "cluster": "Altiplano de Granada", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/20250217%20103146%20Castillo%20Orce.jpg?width=1200", "pop": "~1.148", "hosp": "Baza ~45 km / 45 min", "net": "fibra (Excom/Habland)", "house": "€45.000+ (grotta 45–52k)", "inc": false, "tags": ["📚", "🌌"], "sources": ["https://www.foro-ciudad.com/granada/orce/habitantes.html", "https://www.idealista.com/en/venta-viviendas/orce-granada/", "https://www.orce.es/los-yacimientos/"], "highlight": {"en": "Orce sits on the Altiplano de Granada, hailed as the \"cradle of European prehistory\" thanks to the Venta Micena deposits dating back over 1.4 million years, set within a UNESCO Geopark under some of the clearest starry skies in the region. Like Larva, it is a small, welcoming village that draws artists, researchers and slow-travel lovers seeking culture, nature and astrotourism.", "it": "Orce si trova sull'Altiplano de Granada, celebrata come \"capitale della preistoria europea\" grazie ai giacimenti di Venta Micena, vecchi di oltre 1,4 milioni di anni, immersa in un Geoparco UNESCO sotto un cielo stellato limpidissimo. Come Larva, è un piccolo borgo accogliente che attira artisti, ricercatori e amanti del turismo lento in cerca di cultura, natura e astroturismo.", "es": "Orce se asienta en el Altiplano de Granada, reconocida como la \"capital de la prehistoria europea\" gracias a los yacimientos de Venta Micena, de más de 1,4 millones de años, dentro de un Geoparque UNESCO bajo un cielo estrellado nítido. Como Larva, es un pueblo pequeño y acogedor que atrae a artistas, investigadores y amantes del turismo lento en busca de cultura, naturaleza y astroturismo.", "de": "Die \"Hauptstadt der europäischen Vorgeschichte\" (die Fundstätten von Venta Micena, über 1,4 Millionen Jahre alt), ein UNESCO-Geopark mit Sternenhimmel – ein Anziehungspunkt für Künstler, Forscher und sanften Tourismus. Rund 1.148 Menschen im Hochland (Altiplano) von Granada."}, "services": {"en": "Everyday essentials are covered with a local medical clinic, a pharmacy, a school and archaeological interpretation centres, while the nearest hospital is in Baza, about 45 km / 45 minutes away.", "it": "I servizi essenziali sono garantiti da consultorio medico, farmacia, scuola e centri di interpretazione archeologica, mentre l'ospedale più vicino è a Baza, a circa 45 km / 45 minuti.", "es": "Los servicios esenciales están cubiertos con consultorio médico, farmacia, escuela y centros de interpretación arqueológica, mientras que el hospital más cercano está en Baza, a unos 45 km / 45 minutos.", "de": "Eine Gesundheitsstation, eine Apotheke, eine Schule und archäologische Besucherzentren, wobei das Krankenhaus von Baza etwa 45 km / 45 Minuten entfernt ist."}, "incentives": {"en": "Settling in is supported by housing aid programmes such as \"Granada se puebla\" and the GDR Altiplano, with homes starting from 45,000€ (typical cave-houses around 45,000-52,000€).", "it": "Il trasferimento è sostenuto da programmi di aiuto alla casa come \"Granada se puebla\" e il GDR Altiplano, con abitazioni a partire da 45.000€ (le tipiche case-grotta tra 45.000 e 52.000€).", "es": "La instalación cuenta con programas de ayuda a la vivienda como \"Granada se puebla\" y el GDR Altiplano, con casas desde 45.000€ (las típicas casas-cueva entre 45.000 y 52.000€).", "de": "Häuser ab 45.000 € (typische Höhlenhäuser 45.000–52.000 €), unterstützt durch \"Granada se puebla\" und die LEADER-Gruppe des Altiplano. Hinweis: Provinz Granada; Krankenhaus etwa 45 Minuten entfernt (das am weitesten entfernte im Teilverbund)."}}, "castillejar": {"name": "Castilléjar", "region": "Altiplano · Granada", "cluster": "Altiplano de Granada", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/Castill%C3%A9jar%2C%20en%20Granada%20%28Espa%C3%B1a%29.jpg?width=1200", "pop": "~1.289", "hosp": "Baza ~31 km / 34–48 min", "net": "fibra (fino 600 Mb)", "house": "€20.000+ (case-grotta)", "inc": false, "tags": ["💻", "🔧", "🌿"], "sources": ["https://www.foro-ciudad.com/granada/castillejar/habitantes.html", "https://www.sspa.juntadeandalucia.es/servicioandaluzdesalud/", "https://www.idealista.com/en/venta-viviendas/castillejar-granada/"], "highlight": {"en": "Set in Granada's Altiplano (Huéscar region) where two rivers meet, Castilléjar (~1,289 inhabitants) offers calm rural life and famously affordable cave houses that stay at a constant temperature year-round. Like Larva, it's a quiet village ready to welcome artists, makers and remote workers, with some of the best connectivity around (multiple operators, up to 600 Mb) and the countryside of Galera and Orce nearby.", "it": "Immerso nell'Altiplano di Granada (comarca di Huéscar), alla confluenza di due fiumi, Castilléjar (~1.289 abitanti) regala una vita rurale tranquilla e case-grotta molto economiche che restano a temperatura costante tutto l'anno. Come Larva, è un borgo sereno pronto ad accogliere artisti, artigiani e chi lavora da remoto, con una delle connettività migliori della zona (più operatori, fino a 600 Mb) e la natura di Galera e Orce a due passi.", "es": "En el Altiplano de Granada (comarca de Huéscar), en la confluencia de dos ríos, Castilléjar (~1.289 habitantes) ofrece una vida rural tranquila y casas-cueva muy económicas que se mantienen a temperatura constante todo el año. Como Larva, es un pueblo sereno listo para acoger a artistas, artesanos y teletrabajadores, con una de las mejores conectividades de la zona (varios operadores, hasta 600 Mb) y la naturaleza de Galera y Orce muy cerca.", "de": "Bezahlbare Höhlenhäuser, eine der besten Internetanbindungen (mehrere Anbieter mit bis zu 600 Mbit/s, ideal für Künstler und ortsunabhängiges Arbeiten) und eine ruhige, ländliche Atmosphäre am Zusammenfluss zweier Flüsse, in der Nähe von Galera und Orce. Rund 1.289 Menschen leben hier im Hochland (Altiplano) von Granada."}, "services": {"en": "Essential services on the spot: a health centre (family medicine, paediatrics and nursing), pharmacy, supermarket, town hall and school, with the hospital in Baza about 31 km away (34-48 min).", "it": "Servizi essenziali sul posto: consultorio (medicina di famiglia, pediatria e infermeria), farmacia, supermercato, municipio e scuola, con l'ospedale di Baza a circa 31 km (34-48 min).", "es": "Servicios esenciales en el propio pueblo: consultorio (medicina de familia, pediatría y enfermería), farmacia, supermercado, ayuntamiento y colegio, con el hospital de Baza a unos 31 km (34-48 min).", "de": "Ein Gesundheitszentrum (Allgemeinmedizin, Kinderheilkunde, Pflege), eine Apotheke, ein Supermarkt, das Rathaus und eine Schule; das Krankenhaus von Baza liegt etwa 31 km bzw. 34-48 Minuten entfernt."}, "incentives": {"en": "Homes are very affordable (around 24 from 20,000€, with a wide range up to 125,000-135,000€ for renovated ones), and buyers may benefit from housing support such as the reduced ITP transfer tax (from 8% to 3.5% in municipalities under 3,000 inhabitants), the \"Granada se puebla\" programme and the Altiplano GDR; details to be confirmed case by case.", "it": "Le case sono molto economiche (circa 24 a partire da 20.000€, con una fascia ampia fino a 125.000-135.000€ per quelle ristrutturate) e chi acquista può beneficiare di aiuti casa come l'ITP ridotta (dall'8% al 3,5% nei comuni sotto i 3.000 abitanti), il programma \"Granada se puebla\" e il GDR Altiplano; dettagli da confermare caso per caso.", "es": "Las viviendas son muy económicas (unas 24 desde 20.000€, con una franja amplia hasta 125.000-135.000€ las rehabilitadas) y quien compra puede beneficiarse de ayudas a la vivienda como el ITP reducido (del 8% al 3,5% en municipios de menos de 3.000 habitantes), el programa \"Granada se puebla\" y el GDR Altiplano; detalles por confirmar caso por caso.", "de": "Sehr günstige Häuser (rund 24 ab 20.000 €, viele davon Höhlenhäuser), unterstützt durch eine reduzierte Grunderwerbsteuer von 3,5 % (für Orte unter 3.000 Einwohnern), das Programm „Granada se puebla\" und die LEADER-Gruppe des Altiplano. Hinweis: Provinz Granada."}}, "comares": {"name": "Comares", "region": "Axarquía · Málaga", "cluster": "Axarquía", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/Comares%20Panorama.jpg?width=1200", "pop": "~1.345", "hosp": "Vélez-Málaga ~24 km", "net": "fibra/4G", "house": "€25.000+", "beach": "Torre del Mar ~35–40 min", "air": "Málaga AGP ~50 min", "inc": false, "tags": ["🎨", "📚", "🌿"], "sources": ["https://www.citypopulation.de/en/spain/andalucia/m%C3%A1laga/29044__comares/", "https://www.idealista.com/venta-viviendas/comares-malaga/", "https://www.rome2rio.com/s/Comares/Malaga-Airport-AGP"], "highlight": {"en": "Perched at around 700 metres on a hilltop, Comares is the whitewashed \"Moorish balcony of the Axarquía,\" with sweeping views, narrow stone-paved streets and a quiet, timeless feel that has long drawn painters, writers and nature lovers. Its steep lanes ask for sure footing, so it suits those still happy on their feet. And though it feels gloriously remote, the Mediterranean is close: the beaches of Torre del Mar and Vélez-Málaga are only about 35-40 minutes away by car, while Málaga-Costa del Sol airport (AGP) - a major international hub with frequent low-cost flights from Germany, Italy and the UK - sits roughly 50 minutes down the road.", "it": "Arroccata a circa 700 metri su una cima, Comares è il \"balcone moresco dell'Axarquía\", un borgo dalle case imbiancate, con panorami amplissimi, viuzze lastricate e un'atmosfera quieta e senza tempo che da sempre attira pittori, scrittori e amanti della natura. Le sue stradine ripide richiedono un buon passo, quindi è adatta a chi cammina ancora volentieri. E pur sembrando splendidamente isolata, il Mediterraneo è vicino: le spiagge di Torre del Mar e Vélez-Málaga sono a soli 35-40 minuti d'auto, mentre l'aeroporto di Málaga-Costa del Sol (AGP) - un grande hub internazionale con frequenti voli low cost da Germania, Italia e Regno Unito - si trova a circa 50 minuti.", "es": "Encaramada a unos 700 metros en lo alto de un cerro, Comares es el \"balcón moruno de la Axarquía\": un pueblo de casas encaladas, con vistas inmensas, callejuelas empedradas y un ambiente tranquilo y atemporal que desde siempre ha atraído a pintores, escritores y amantes de la naturaleza. Sus calles empinadas piden buen pie, así que va bien para quien todavía camina a gusto. Y aunque se sienta maravillosamente apartada, el Mediterráneo está cerca: las playas de Torre del Mar y Vélez-Málaga quedan a solo 35-40 minutos en coche, mientras que el aeropuerto de Málaga-Costa del Sol (AGP) - un gran nudo internacional con frecuentes vuelos de bajo coste desde Alemania, Italia y Reino Unido - está a unos 50 minutos.", "de": "Auf rund 700 Metern auf einer Bergkuppe thront Comares, der weiß getünchte \"maurische Balkon der Axarquía\", mit weiten Ausblicken, schmalen, kopfsteingepflasterten Gassen und einer stillen, zeitlosen Atmosphäre, die seit jeher Maler, Schriftsteller und Naturfreunde anzieht. Seine steilen Gässchen verlangen trittsicheres Gehen, sie passen also zu allen, die noch gerne zu Fuß unterwegs sind. Und obwohl sich der Ort herrlich abgelegen anfühlt, ist das Mittelmeer ganz nah: Die Strände von Torre del Mar und Vélez-Málaga liegen nur etwa 35-40 Autominuten entfernt, und der Flughafen Málaga-Costa del Sol (AGP) - ein großes internationales Drehkreuz mit vielen Billigflügen aus Deutschland, Italien und Großbritannien - ist rund 50 Minuten entfernt."}, "services": {"en": "The village has a local SAS health clinic (consultorio), a few basic shops, a bar and a bakery, and a small primary school, with a full health centre and hospital in Vélez-Málaga about 24 km away. Rural fibre and 4G are generally available, though exact coverage on your street is worth checking in advance.", "it": "Il paese dispone di un ambulatorio della sanità pubblica (consultorio SAS), di qualche negozio di base, un bar e un panificio, e di una piccola scuola primaria, mentre il centro sanitario completo e l'ospedale si trovano a Vélez-Málaga, a circa 24 km. La fibra rurale e il 4G sono in genere disponibili, anche se conviene verificare in anticipo la copertura esatta nella propria via.", "es": "El pueblo cuenta con un consultorio del SAS, algunas tiendas básicas, un bar y una panadería, y una pequeña escuela primaria, mientras que el centro de salud completo y el hospital están en Vélez-Málaga, a unos 24 km. La fibra rural y el 4G suelen estar disponibles, aunque conviene confirmar con antelación la cobertura exacta en tu calle.", "de": "Das Dorf hat eine öffentliche Arztpraxis (Consultorio des SAS), ein paar einfache Geschäfte, eine Bar und eine Bäckerei sowie eine kleine Grundschule; das vollständige Gesundheitszentrum und das Krankenhaus liegen im rund 24 km entfernten Vélez-Málaga. Ländliches Glasfasernetz und 4G sind in der Regel vorhanden, die genaue Abdeckung in deiner Straße solltest du aber vorab prüfen."}, "incentives": {"en": "To be honest, there is no confirmed municipal housing grant for Comares. Andalusia does run regional anti-depopulation programmes and a home-purchase aid of up to €10,800, but that is aimed at under-35s and most likely does not apply to retirees - so please treat any incentive as still to be verified.", "it": "Per onestà, non risulta confermato alcun contributo comunale per la casa a Comares. L'Andalusia ha sì programmi regionali contro lo spopolamento e un aiuto all'acquisto della prima casa fino a 10.800 €, ma è rivolto agli under 35 e con tutta probabilità non si applica ai pensionati: considera quindi ogni incentivo ancora da verificare.", "es": "Para ser sinceros, no hay ninguna ayuda municipal a la vivienda confirmada en Comares. Andalucía sí tiene programas regionales contra la despoblación y una ayuda a la compra de vivienda de hasta 10.800 €, pero está dirigida a menores de 35 años y lo más probable es que no aplique a personas jubiladas, así que considera cualquier incentivo como aún por verificar.", "de": "Ehrlich gesagt gibt es für Comares keinen bestätigten kommunalen Wohnzuschuss. Andalusien hat zwar regionale Programme gegen die Landflucht und eine Kaufförderung von bis zu 10.800 €, doch die richtet sich an unter 35-Jährige und gilt höchstwahrscheinlich nicht für Rentner - betrachte jeden Anreiz daher als noch zu prüfen."}}, "riogordo": {"name": "Riogordo", "region": "Axarquía · Málaga", "cluster": "Axarquía", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/Riogordo%20%28M%C3%A1laga%29.jpg?width=1200", "pop": "~2.778", "hosp": "Vélez-Málaga ~26 km", "net": "fibra/4G (da confermare)", "house": "€65.000+", "beach": "Torre del Mar ~37 min", "air": "Málaga AGP ~45 min", "inc": false, "tags": ["🎨", "📚", "🌿"], "sources": ["https://www.foro-ciudad.com/malaga/riogordo/habitantes.html", "https://www.idealista.com/venta-viviendas/riogordo-malaga/", "https://www.rome2rio.com/s/Riogordo/Malaga-Airport-AGP"], "highlight": {"en": "Riogordo is a tranquil whitewashed village in the Axarquía hills of Málaga, where everyday life still moves at a human pace and the famous \"El Paso\" living Easter passion play binds the community together year after year. With around 2,778 residents, it offers genuine Andalusian warmth, affordable homes (village houses from about €65,000), and the kind of slow, creative quiet that suits painters, writers, and lovers of nature. Best of all, you are never cut off: the Mediterranean coast at Torre del Mar is roughly 37 minutes away by car, and Málaga-Costa del Sol Airport, a major international hub, is only about 45 minutes by road.", "it": "Riogordo è un tranquillo borgo dalle case bianche tra le colline dell'Axarquía, in provincia di Málaga, dove la vita scorre ancora a misura d'uomo e la celebre rappresentazione vivente della Passione, \"El Paso\", unisce la comunità anno dopo anno. Con circa 2.778 abitanti, offre un'autentica accoglienza andalusa, case a prezzi accessibili (a partire da circa 65.000 €) e quella quiete lenta e creativa che si addice a pittori, scrittori e amanti della natura. E non sei mai isolato: la costa mediterranea di Torre del Mar dista circa 37 minuti in auto e l'aeroporto di Málaga-Costa del Sol, un grande hub internazionale, è a soli 45 minuti circa di strada.", "es": "Riogordo es un tranquilo pueblo de casas blancas en las colinas de la Axarquía, en la provincia de Málaga, donde la vida aún transcurre a escala humana y la célebre representación viviente de la Pasión, \"El Paso\", une a la comunidad año tras año. Con unos 2.778 habitantes, ofrece la auténtica calidez andaluza, viviendas asequibles (casas de pueblo desde unos 65.000 €) y esa calma lenta y creativa que tanto gusta a pintores, escritores y amantes de la naturaleza. Y nunca estás aislado: la costa mediterránea en Torre del Mar queda a unos 37 minutos en coche, y el aeropuerto de Málaga-Costa del Sol, un gran centro internacional, está a solo unos 45 minutos por carretera.", "de": "Riogordo ist ein ruhiges, weiß getünchtes Dorf in den Hügeln der Axarquía bei Málaga, wo das Leben noch in menschlichem Takt verläuft und das berühmte lebendige Passionsspiel \"El Paso\" die Gemeinschaft Jahr für Jahr zusammenhält. Mit rund 2.778 Einwohnern bietet es echte andalusische Herzlichkeit, bezahlbare Häuser (Dorfhäuser ab etwa 65.000 €) und jene langsame, kreative Ruhe, die Malern, Schriftstellern und Naturfreunden so guttut. Und du bist nie abgeschnitten: Die Mittelmeerküste bei Torre del Mar erreichst du in etwa 37 Minuten mit dem Auto, und der Flughafen Málaga-Costa del Sol, ein großes internationales Drehkreuz, liegt nur rund 45 Fahrminuten entfernt."}, "services": {"en": "Riogordo covers the everyday basics: a SAS public health consultorio, a primary school, and local shops for daily needs. Reliable internet coverage is still to be confirmed, and the larger hospitals and full services of the Málaga coast are about 45 minutes away.", "it": "Riogordo copre l'essenziale di tutti i giorni: un consultorio sanitario pubblico (SAS), una scuola primaria e negozi locali per le necessità quotidiane. La copertura internet affidabile è ancora da confermare, mentre gli ospedali più grandi e i servizi completi della costa di Málaga si trovano a circa 45 minuti.", "es": "Riogordo cubre lo esencial del día a día: un consultorio de salud público (SAS), un colegio de primaria y comercios locales para las necesidades cotidianas. La cobertura de internet fiable está aún por confirmar, y los hospitales más grandes y los servicios completos de la costa de Málaga quedan a unos 45 minutos.", "de": "Riogordo deckt die täglichen Grundbedürfnisse ab: ein öffentliches Gesundheits-Consultorio (SAS), eine Grundschule und örtliche Geschäfte für den Alltag. Eine zuverlässige Internetabdeckung ist noch zu bestätigen, und die größeren Krankenhäuser sowie das volle Angebot der Küste von Málaga sind etwa 45 Minuten entfernt."}, "incentives": {"en": "To be fully honest, no dedicated municipal grant for newcomers has been confirmed for Riogordo. Andalusia does run regional rural and anti-depopulation measures, but the home-purchase aid we are aware of is youth-targeted and age-restricted, so it likely would not apply to most pensioners; this is worth verifying case by case before you count on it.", "it": "Per essere del tutto onesti, per Riogordo non risulta confermato alcun contributo comunale dedicato ai nuovi residenti. L'Andalusia ha sì misure regionali per le aree rurali e contro lo spopolamento, ma l'aiuto all'acquisto della casa di cui siamo a conoscenza è rivolto ai giovani e soggetto a limiti d'età, quindi probabilmente non si applicherebbe alla maggior parte dei pensionati: conviene verificarlo caso per caso prima di farci affidamento.", "es": "Para ser del todo sinceros, no hay confirmada ninguna ayuda municipal específica para nuevos residentes en Riogordo. Andalucía sí cuenta con medidas regionales para el medio rural y contra la despoblación, pero la ayuda a la compra de vivienda que conocemos está dirigida a jóvenes y tiene límites de edad, por lo que probablemente no se aplicaría a la mayoría de los pensionistas; conviene verificarlo caso por caso antes de contar con ella.", "de": "Um ganz ehrlich zu sein: Für Riogordo ist kein eigener kommunaler Zuschuss für Neuankömmlinge bestätigt. Andalusien hat zwar regionale Programme für den ländlichen Raum und gegen die Abwanderung, doch die uns bekannte Kaufförderung für Wohnraum richtet sich an junge Menschen und ist altersbeschränkt, sodass sie für die meisten Rentner wohl nicht gelten würde; das solltest du im Einzelfall prüfen, bevor du dich darauf verlässt."}}, "elpinar": {"name": "El Pinar (Pinos del Valle)", "region": "Valle de Lecrín · Granada", "cluster": "Valle de Lecrín", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/Pinos%20del%20Valle%20%28Granada%29.jpg?width=1200", "pop": "~867", "hosp": "Granada ~50 km", "net": "4G (da confermare)", "house": "€22.000+", "beach": "Salobreña ~30–35 min", "air": "GRX ~50 min · AGP ~1h30", "inc": false, "tags": ["🌿", "🎨"], "sources": ["https://www.idealista.com/venta-viviendas/granada/valle-de-lecrin/", "https://www.citypopulation.de/en/spain/andalucia/granada/", "https://www.rome2rio.com/s/Pinos-del-Valle/Salobrena"], "highlight": {"en": "El Pinar sits on a balcony above the Béznar reservoir in the Valle de Lecrín, where olive and almond groves roll down toward the water and the days stay quiet. With around 867 residents across Pinos del Valle, Ízbor and Tablate, it's a small, unhurried place made for painters and for anyone who loves birdsong and open country. The Costa Tropical beaches at Salobreña and Motril are only about 30-35 minutes away by car (roughly 34 km), so the Mediterranean is an easy day out. Granada-Jaén airport (GRX) is about 45-55 minutes away, though for international connections Málaga airport (AGP) at roughly 1h15-1h30 is the more practical gateway.", "it": "El Pinar si affaccia come un balcone sul bacino di Béznar, nel Valle de Lecrín, dove gli uliveti e i mandorleti scendono verso l'acqua e le giornate restano tranquille. Con circa 867 abitanti distribuiti tra Pinos del Valle, Ízbor e Tablate, è un borgo piccolo e senza fretta, fatto per i pittori e per chi ama il canto degli uccelli e la campagna aperta. Le spiagge della Costa Tropical, a Salobreña e Motril, distano solo 30-35 minuti in auto (circa 34 km), quindi il Mediterraneo è una facile gita in giornata. L'aeroporto di Granada-Jaén (GRX) è a circa 45-55 minuti, ma per i collegamenti internazionali l'aeroporto di Málaga (AGP), a circa 1h15-1h30, è il punto di accesso più pratico.", "es": "El Pinar se asoma como un balcón sobre el embalse de Béznar, en el Valle de Lecrín, donde los olivares y almendrales descienden hacia el agua y los días transcurren con calma. Con unos 867 habitantes repartidos entre Pinos del Valle, Ízbor y Tablate, es un pueblo pequeño y sin prisas, hecho para pintores y para quien ama el canto de los pájaros y el campo abierto. Las playas de la Costa Tropical, en Salobreña y Motril, están a solo 30-35 minutos en coche (unos 34 km), así que el Mediterráneo es una escapada fácil de un día. El aeropuerto de Granada-Jaén (GRX) queda a unos 45-55 minutos, aunque para las conexiones internacionales el aeropuerto de Málaga (AGP), a alrededor de 1h15-1h30, es la puerta de entrada más práctica.", "de": "El Pinar liegt wie ein Balkon über dem Béznar-Stausee im Valle de Lecrín, wo sich Oliven- und Mandelhaine zum Wasser hinab ziehen und die Tage ruhig bleiben. Mit rund 867 Einwohnern, verteilt auf Pinos del Valle, Ízbor und Tablate, ist es ein kleiner, entschleunigter Ort, wie gemacht für Malerinnen und Maler und für alle, die Vogelgesang und weite Natur lieben. Die Strände der Costa Tropical bei Salobreña und Motril sind nur etwa 30-35 Autominuten entfernt (rund 34 km), das Mittelmeer ist also ein leichter Tagesausflug. Der Flughafen Granada-Jaén (GRX) liegt etwa 45-55 Minuten entfernt, doch für internationale Verbindungen ist der Flughafen Málaga (AGP) bei rund 1 Std. 15 bis 1 Std. 30 das praktischere Tor zur Welt."}, "services": {"en": "Everyday basics are covered: a health centre (consultorio) in Pinos del Valle and an auxiliary clinic in Ízbor, both run by the Andalusian Health Service, plus small local shops and a small school. The nearest hospital is in the city of Granada, and you'll want to check the broadband connection for your specific house before committing.", "it": "I servizi quotidiani essenziali ci sono: un ambulatorio (consultorio) a Pinos del Valle e una clinica ausiliaria a Ízbor, entrambi gestiti dal Servizio Sanitario Andaluso, oltre a piccoli negozi locali e a una piccola scuola. L'ospedale più vicino è nella città di Granada; conviene verificare la connessione internet della singola casa prima di decidere.", "es": "Los servicios básicos del día a día están cubiertos: un consultorio médico en Pinos del Valle y una clínica auxiliar en Ízbor, ambos del Servicio Andaluz de Salud, además de pequeños comercios locales y una pequeña escuela. El hospital más cercano está en la ciudad de Granada, y conviene comprobar la conexión a internet de cada vivienda en concreto antes de decidirse.", "de": "Die alltägliche Grundversorgung ist vorhanden: ein Gesundheitszentrum (Consultorio) in Pinos del Valle und eine Nebenpraxis in Ízbor, beide vom Andalusischen Gesundheitsdienst betrieben, dazu kleine örtliche Läden und eine kleine Schule. Das nächste Krankenhaus liegt in der Stadt Granada, und du solltest die Internetverbindung für dein konkretes Haus vorab prüfen."}, "incentives": {"en": "To be honest, no dedicated municipal grant for El Pinar has been confirmed. The village falls under the regional \"Granada se puebla\" repopulation strategy, but those programmes tend to be aimed at younger newcomers and the details still need verifying, so it's well worth approaching the town hall or the Mancomunidad del Valle de Lecrín directly to ask what currently applies.", "it": "Per essere onesti, non risulta confermato alcun contributo comunale dedicato a El Pinar. Il paese rientra nella strategia regionale di ripopolamento \"Granada se puebla\", ma quei programmi tendono a rivolgersi ai nuovi residenti più giovani e i dettagli vanno ancora verificati, quindi vale la pena contattare direttamente il municipio o la Mancomunidad del Valle de Lecrín per sapere cosa si applica oggi.", "es": "Siendo sinceros, no consta ninguna ayuda municipal específica para El Pinar. El pueblo se enmarca en la estrategia regional de repoblación \"Granada se puebla\", pero esos programas suelen dirigirse a nuevos residentes más jóvenes y los detalles aún están por confirmar, así que merece la pena contactar directamente con el ayuntamiento o con la Mancomunidad del Valle de Lecrín para saber qué se aplica en la actualidad.", "de": "Ehrlich gesagt ist keine eigene kommunale Förderung für El Pinar bestätigt. Der Ort fällt unter die regionale Wiederbesiedlungsstrategie \"Granada se puebla\", doch solche Programme richten sich meist an jüngere Zuziehende und die Einzelheiten müssen noch geprüft werden. Es lohnt sich daher, direkt beim Rathaus oder bei der Mancomunidad del Valle de Lecrín nachzufragen, was derzeit gilt."}}, "albunuelas": {"name": "Albuñuelas", "region": "Valle de Lecrín · Granada", "cluster": "Valle de Lecrín", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/Albu%C3%B1uelas%2C%20Granada.jpg?width=1200", "pop": "~794", "hosp": "Granada ~45 km", "net": "4G (da confermare)", "house": "€26.000+", "beach": "Salobreña ~38 min", "air": "GRX ~50 min · AGP ~1h30", "inc": false, "tags": ["🌿", "🎨"], "sources": ["https://www.idealista.com/venta-viviendas/albunuelas-granada/", "https://www.citypopulation.de/en/spain/andalucia/granada/18011__albu%C3%B1uelas/", "https://www.rome2rio.com/s/Albunuelas/Salobrena"], "highlight": {"en": "In the green Valle de Lecrín in Granada, Albuñuelas is a peaceful valley village of around 794 people, woven with natural springs, hiking trails and traditional Andalusian architecture, where life follows the rhythm of water and birdsong. It is a place made for painters and lovers of nature and birdwatching, the kind of slow, luminous setting where a small community can take root. And it sits unusually well-connected for a village this quiet: the beaches of the Costa Tropical (Salobreña and Motril) are about 38-40 minutes away by car, while Granada-Jaén airport (GRX) is roughly 45-50 minutes, with Málaga (about 1h30) serving as the real international gateway.", "it": "Nella verde Valle de Lecrín, in provincia di Granada, Albuñuelas è un tranquillo borgo di valle di circa 794 abitanti, intessuto di sorgenti naturali, sentieri escursionistici e architettura andalusa tradizionale, dove la vita segue il ritmo dell'acqua e del canto degli uccelli. È un luogo fatto per pittori e per chi ama la natura e il birdwatching, lo scenario lento e luminoso ideale perché una piccola comunità metta radici. E gode di un'eccezionale posizione per un borgo così quieto: le spiagge della Costa Tropical (Salobreña e Motril) distano circa 38-40 minuti in auto, mentre l'aeroporto di Granada-Jaén (GRX) è a circa 45-50 minuti, con Málaga (circa 1h30) come vera porta d'accesso internazionale.", "es": "En el verde Valle de Lecrín, en la provincia de Granada, Albuñuelas es un pueblo tranquilo de unos 794 habitantes, tejido de manantiales naturales, senderos y arquitectura andaluza tradicional, donde la vida sigue el ritmo del agua y del canto de los pájaros. Es un lugar hecho para pintores y para quienes aman la naturaleza y el birdwatching, el escenario lento y luminoso ideal para que una pequeña comunidad eche raíces. Y disfruta de una posición excepcional para un pueblo tan sereno: las playas de la Costa Tropical (Salobreña y Motril) están a unos 38-40 minutos en coche, mientras que el aeropuerto de Granada-Jaén (GRX) queda a unos 45-50 minutos, con Málaga (alrededor de 1h30) como verdadera puerta internacional.", "de": "Im grünen Valle de Lecrín bei Granada liegt Albuñuelas, ein ruhiges Talndorf mit rund 794 Einwohnern, durchzogen von natürlichen Quellen, Wanderwegen und traditioneller andalusischer Architektur, wo das Leben dem Rhythmus des Wassers und des Vogelgesangs folgt. Es ist wie geschaffen für Maler und für alle, die Natur und Vogelbeobachtung lieben – die langsame, lichtdurchflutete Kulisse, in der eine kleine Gemeinschaft Wurzeln schlagen kann. Und für ein so stilles Dorf ist es ungewöhnlich gut angebunden: Die Strände der Costa Tropical (Salobreña und Motril) erreichst du in etwa 38-40 Autominuten, der Flughafen Granada-Jaén (GRX) liegt rund 45-50 Minuten entfernt, während Málaga (etwa 1,5 Stunden) das eigentliche internationale Tor ist."}, "services": {"en": "Everyday needs are covered by a local public health consultorio (Mon-Fri 8:00-14:00, with family medicine, paediatrics and nursing), basic shops and a school in the village, with the main hospital in Granada about 45-50 minutes away.", "it": "Le esigenze quotidiane sono coperte da un consultorio pubblico (lun-ven 8:00-14:00, con medicina di famiglia, pediatria e infermieria), negozi di base e una scuola in paese, con l'ospedale principale a Granada a circa 45-50 minuti.", "es": "Las necesidades del día a día están cubiertas por un consultorio público local (lun-vie 8:00-14:00, con medicina de familia, pediatría y enfermería), comercios básicos y un colegio en el pueblo, con el hospital principal en Granada a unos 45-50 minutos.", "de": "Der Alltag ist abgedeckt: ein öffentliches Gesundheitszentrum (Mo-Fr 8:00-14:00 Uhr, mit Allgemeinmedizin, Kinderheilkunde und Pflege), grundlegende Geschäfte und eine Schule im Ort, wobei das Hauptkrankenhaus in Granada etwa 45-50 Minuten entfernt liegt."}, "incentives": {"en": "Housing is genuinely affordable, with homes from around 26,000€ (roughly 694€/m2 for rural property), but to be honest, no dedicated municipal grant has been confirmed for Albuñuelas; regional programmes such as \"Granada se puebla\" and those of the Mancomunidad del Valle de Lecrín do exist, though they tend to be youth-targeted and should be verified directly with the town hall.", "it": "Le case sono davvero accessibili, a partire da circa 26.000€ (intorno ai 694€/m2 per il rurale), ma, per essere onesti, per Albuñuelas non risulta confermato alcun incentivo comunale dedicato; esistono programmi regionali come \"Granada se puebla\" e quelli della Mancomunidad del Valle de Lecrín, che però tendono a essere rivolti ai giovani e vanno verificati direttamente con il Comune.", "es": "La vivienda es realmente asequible, con casas desde unos 26.000€ (en torno a 694€/m2 en el rural), pero, siendo honestos, no consta ningún incentivo municipal propio confirmado para Albuñuelas; sí existen programas regionales como \"Granada se puebla\" y los de la Mancomunidad del Valle de Lecrín, aunque suelen dirigirse a los jóvenes y conviene verificarlos directamente con el Ayuntamiento.", "de": "Das Wohnen ist wirklich günstig, mit Häusern ab etwa 26.000 € (rund 694 €/m2 im ländlichen Bereich) – aber um ehrlich zu sein, ist für Albuñuelas keine eigene kommunale Förderung bestätigt; regionale Programme wie \"Granada se puebla\" und die der Mancomunidad del Valle de Lecrín gibt es zwar, sie richten sich jedoch meist an junge Menschen und sollten direkt bei der Gemeinde überprüft werden."}}, "lecrin": {"name": "Lecrín", "region": "Valle de Lecrín · Granada", "cluster": "Valle de Lecrín", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/Talar%C3%A1%2C%20en%20Lecr%C3%ADn%20%28Granada%29.jpg?width=1200", "pop": "~2.268", "hosp": "Granada ~40 km", "net": "fibra/4G (da confermare)", "house": "€50.000+", "beach": "Salobreña ~25–30 min", "air": "GRX ~45 min · AGP ~1h30", "inc": false, "tags": ["🌿", "🎨", "📚"], "sources": ["https://www.idealista.com/venta-viviendas/lecrin-granada/", "https://www.citypopulation.de/en/spain/andalucia/granada/", "https://www.rome2rio.com/s/Lecrin/Salobrena"], "highlight": {"en": "Lecrín sits in Granada's lemon-scented valley, the gentle \"valley of happiness,\" where citrus groves and Sierra Nevada light fill everyday life. As the largest of our cluster's villages, it keeps a steady, slightly growing community of around 2,268 people, so you're never alone here. Best of all, you're close to the sea: the Costa Tropical beaches at Salobreña and Motril are just 25-30 minutes away by car. Granada-Jaén airport (GRX) is a 40-50 minute drive, and for international flights Málaga airport sits about an hour and a half away.", "it": "Lecrín si trova nella valle dei limoni di Granada, la dolce \"valle della felicità\", dove gli agrumeti e la luce della Sierra Nevada accompagnano la vita di ogni giorno. È il più grande tra i nostri borghi: una comunità stabile e in lieve crescita di circa 2.268 persone, così non ti senti mai solo. E soprattutto sei vicino al mare: le spiagge della Costa Tropical a Salobreña e Motril distano appena 25-30 minuti in auto. L'aeroporto di Granada-Jaén (GRX) è a 40-50 minuti, mentre per i voli internazionali quello di Málaga si raggiunge in circa un'ora e mezza.", "es": "Lecrín se encuentra en el valle de los limones de Granada, el dulce \"valle de la felicidad\", donde los naranjos y limoneros y la luz de Sierra Nevada llenan el día a día. Es el mayor de nuestros pueblos: una comunidad estable y en ligero crecimiento de unas 2.268 personas, así que aquí nunca estás solo. Y lo mejor: estás cerca del mar, pues las playas de la Costa Tropical en Salobreña y Motril quedan a solo 25-30 minutos en coche. El aeropuerto de Granada-Jaén (GRX) está a 40-50 minutos, y para vuelos internacionales el de Málaga se alcanza en aproximadamente una hora y media.", "de": "Lecrín liegt im zitronenduftenden Tal von Granada, dem sanften \"Tal des Glücks\", wo Zitrushaine und das Licht der Sierra Nevada den Alltag prägen. Es ist das größte unserer Dörfer: eine stabile, leicht wachsende Gemeinschaft von rund 2.268 Menschen, sodass du hier nie allein bist. Und das Beste: Du bist nah am Meer, denn die Strände der Costa Tropical bei Salobreña und Motril liegen nur 25-30 Autominuten entfernt. Der Flughafen Granada-Jaén (GRX) ist 40-50 Minuten entfernt, und für internationale Flüge erreichst du Málaga in etwa anderthalb Stunden."}, "services": {"en": "As a services anchor for the cluster, Lecrín offers more everyday conveniences than its tiny neighbours: a local health centre in Talará (the Valle de Lecrín basic health zone, part of Granada's metropolitan district), shops and a school, with the city of Granada and its hospitals around 30-40 minutes away.", "it": "Come punto di riferimento per i servizi del gruppo di borghi, Lecrín offre più comodità quotidiane dei piccoli paesi vicini: un consultorio locale a Talará (zona sanitaria di base del Valle de Lecrín, nel distretto metropolitano di Granada), negozi e una scuola, con la città di Granada e i suoi ospedali a circa 30-40 minuti.", "es": "Como referencia de servicios del conjunto de pueblos, Lecrín ofrece más comodidades cotidianas que sus pequeños vecinos: un consultorio local en Talará (zona básica de salud del Valle de Lecrín, dentro del distrito metropolitano de Granada), comercios y un colegio, con la ciudad de Granada y sus hospitales a unos 30-40 minutos.", "de": "Als Versorgungszentrum des Dorfverbunds bietet Lecrín mehr Annehmlichkeiten im Alltag als die winzigen Nachbardörfer: ein lokales Gesundheitszentrum in Talará (Basisgesundheitszone Valle de Lecrín, Teil des Großraums Granada), Geschäfte und eine Schule, wobei die Stadt Granada mit ihren Krankenhäusern etwa 30-40 Minuten entfernt liegt."}, "incentives": {"en": "To be honest, no dedicated municipal grant for newcomers has been confirmed here. Regional rural and anti-depopulation programmes for Andalusia do exist, but their conditions are still to be verified directly with the town hall.", "it": "Per essere onesti, qui non è stato confermato alcun contributo comunale dedicato a chi arriva. Esistono programmi regionali andalusi per le aree rurali e contro lo spopolamento, ma le loro condizioni restano da verificare direttamente con il municipio.", "es": "Para ser sinceros, aquí no se ha confirmado ninguna ayuda municipal específica para quienes llegan. Sí existen programas regionales andaluces para el medio rural y contra la despoblación, pero sus condiciones aún están por confirmar directamente con el ayuntamiento.", "de": "Ehrlich gesagt ist hier keine eigene kommunale Förderung für Zuziehende bestätigt. Es gibt zwar regionale andalusische Programme für den ländlichen Raum und gegen die Abwanderung, deren Bedingungen aber noch direkt mit dem Rathaus zu klären sind."}}};

 en:{back:'← Home',backv:'← The villages',soon:'Coming soon',inc:'Housing aid',open:'Council on board',

   (v.air?'<div class="d"><div class="k">✈️ '+t.air+'</div><div class="v">'+esc(v.air)+'</div></div>':'')+
 '</div>';

 document.getElementById('main').innerHTML=html;
