<style>
  :root{--paper:#f6efe3;--cream:#fbf7ee;--ink:#2a211b;--terracotta:#c2562f;--terra-deep:#9c3d1d;--olive:#6b7148;--ok:#3f7d4f;--line:#e2d6c2;--dust:#8a7c6a;--radius:18px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Hanken Grotesk",system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;font-size:18px;-webkit-font-smoothing:antialiased}
  h1,h2,h3{font-family:"Fraunces",Georgia,serif;font-weight:400;letter-spacing:-.01em}
  a{color:var(--terracotta)}
  .wrap{max-width:900px;margin:0 auto;padding:0 22px}
  header{background:rgba(246,239,227,.92);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;backdrop-filter:blur(8px)}
  .head-in{display:flex;align-items:center;justify-content:space-between;height:62px;gap:14px}
  .brand{display:flex;align-items:center;gap:10px;font-family:"Fraunces",serif;font-size:1.3rem;text-decoration:none;color:var(--ink)}
  .brand .dot{width:11px;height:11px;border-radius:50%;background:var(--terracotta)}
  .hr{display:flex;align-items:center;gap:14px}
  .home{font-size:.86rem;font-weight:600;color:var(--terracotta);text-decoration:none;white-space:nowrap}
  .lang{display:flex;border:1px solid var(--line);border-radius:100px;overflow:hidden;background:rgba(255,255,255,.5)}
  .lang button{border:none;background:transparent;font-family:inherit;font-size:.72rem;font-weight:700;padding:7px 9px;cursor:pointer;color:var(--dust)}
  .lang button.on{background:var(--terracotta);color:#fff}
  .hero{position:relative;height:340px;overflow:hidden}
  .hero img{width:100%;height:100%;object-fit:cover;display:block}
  .hero .shade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,12,8,.12),rgba(20,12,8,.55))}
  .hero .cap{position:absolute;left:0;right:0;bottom:0;padding:26px 0}
  .hero .cap .wrap{color:#fff}
  .hero h1{font-size:clamp(2rem,6vw,3rem);color:#fff;margin-bottom:4px}
  .hero .reg{color:#ffe9d4;font-weight:600;letter-spacing:.02em}
  .badges{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
  .badge{font-size:.66rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border-radius:99px;padding:5px 11px}
  .b-soon{background:rgba(255,255,255,.92);color:#8a6a3a}
  .b-inc{background:var(--ok);color:#fff}
  .b-open{background:var(--olive);color:#fff}
  main{padding:34px 0 70px}
  .data{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:4px 0 30px}
  @media(max-width:680px){.data{grid-template-columns:1fr 1fr}}
  .d{background:var(--cream);border:1px solid var(--line);border-radius:14px;padding:14px 16px}
  .d .k{font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--dust)}
  .d .v{font-size:1.02rem;margin-top:3px}
  .lead{font-size:1.2rem;color:#3f352c;margin-bottom:28px}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:26px;margin-bottom:28px}
  @media(max-width:680px){.cols{grid-template-columns:1fr}}
  .box h3{font-size:1.2rem;margin-bottom:6px;color:var(--terra-deep)}
  .suits{font-size:1.6rem;letter-spacing:6px;margin-top:6px}
  .kick{font-size:.74rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--terracotta);margin-bottom:14px}
  .cta{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin:10px 0 26px}
  .btn{display:inline-flex;align-items:center;gap:8px;font-weight:700;border-radius:99px;padding:15px 28px;text-decoration:none;transition:.2s}
  .btn-p{background:var(--terracotta);color:#fff}.btn-p:hover{background:var(--terra-deep)}
  .btn-g{border:2px solid var(--ink);color:var(--ink)}.btn-g:hover{background:var(--ink);color:var(--cream)}
  .sources{font-size:.86rem;color:var(--dust)}
  .sources a{color:var(--dust);margin-right:12px}
  .note{font-size:.85rem;color:#9a8a76;font-style:italic;border-top:1px solid var(--line);margin-top:26px;padding-top:16px}
  footer{border-top:1px solid var(--line);padding:24px 0;color:var(--dust);font-size:.85rem;text-align:center}
  footer a{color:var(--terracotta);text-decoration:none}
</style>
</head>

<script>
var V = {"cabra": {"name": "Cabra del Santo Cristo", "region": "Sierra Mágina · Jaén", "cluster": "Sierra Mágina", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/Cabra%20del%20Santo%20Cristo%20%28Ja%C3%A9n%2C%20Espa%C3%B1a%29.jpg?width=1200", "pop": "~1.651", "hosp": "Úbeda ~50 km / 49 min", "net": "fibra (parziale)", "house": "€24.000+", "inc": false, "tags": ["🎨", "📷", "🌿"], "sources": ["https://www.foro-ciudad.com/jaen/cabra-del-santo-cristo/habitantes.html", "https://www.idealista.com/venta-viviendas/cabra-de-santo-cristo-jaen/", "https://www.dipujaen.es/microsites/reto-demografico/municipios.html"], "highlight": {"en": "In the Sierra Mágina (Jaén), Cabra del Santo Cristo is the twin of Larva: right next door, sharing the same institutional network, with a strong photographic and artistic identity rooted in the legacy of Arturo Cerdá y Rico and an interpretive route. A warm village of around 1,651 people, made for art and photography, culture and nature.", "it": "Nella Sierra Mágina (Jaén), Cabra del Santo Cristo è il gemello di Larva: vicinissimo, con la stessa rete istituzionale e una forte identità fotografica e artistica che nasce dal lascito di Arturo Cerdá y Rico e da una ruta interpretativa. Un borgo caldo di circa 1.651 abitanti, fatto per arte e fotografia, cultura e natura.", "es": "En la Sierra Mágina (Jaén), Cabra del Santo Cristo es el gemelo de Larva: muy cerca, con la misma red institucional y una sólida identidad fotográfica y artística nacida del legado de Arturo Cerdá y Rico y de una ruta interpretativa. Un pueblo cálido de unos 1.651 habitantes, hecho para el arte y la fotografía, la cultura y la naturaleza."}, "services": {"en": "The village offers complete everyday services: an SAS health clinic, a pharmacy, schools (CEIP and infantil), a library, a post office and local shops, with the hospital in Úbeda about 50 km / 49 min away.", "it": "Il borgo offre servizi quotidiani completi: consultorio SAS, farmacia, scuole (CEIP e infantil), biblioteca, ufficio postale e negozi, con l'ospedale di Úbeda a circa 50 km / 49 min.", "es": "El pueblo ofrece servicios cotidianos completos: consultorio del SAS, farmacia, colegios (CEIP e infantil), biblioteca, oficina de correos y comercios, con el hospital de Úbeda a unos 50 km / 49 min."}, "incentives": {"en": "Housing is very affordable (around 13 homes from 24,000€, about 503€/m2) and is supported by the Reto Demográfico programme of the Diputación de Jaén together with Junta de Andalucía housing aid (up to 10,800€ for under-35s).", "it": "Le case sono molto economiche (circa 13 abitazioni da 24.000€, intorno ai 503€/m2) e sono accompagnate dal programma Reto Demográfico della Diputación de Jaén e dagli aiuti vivienda della Junta de Andalucía (fino a 10.800€ per gli under 35).", "es": "La vivienda es muy económica (unas 13 casas desde 24.000€, en torno a 503€/m2) y cuenta con el apoyo del programa Reto Demográfico de la Diputación de Jaén y de las ayudas a la vivienda de la Junta de Andalucía (hasta 10.800€ para menores de 35 años)."}}, "belmez": {"name": "Bélmez de la Moraleda", "region": "Sierra Mágina · Jaén", "cluster": "Sierra Mágina", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/B%C3%A9lmez%20de%20la%20Moraleda%2024J%2001.jpg?width=1200", "pop": "~1.509", "hosp": "Úbeda ~45–55 min", "net": "UNICO / 4G", "house": "€40.000+ (ruderi €12.000)", "inc": false, "tags": ["🎨", "📚", "🌿"], "sources": ["https://www.foro-ciudad.com/jaen/belmez-de-la-moraleda/habitantes.html", "https://www.belmezdelamoraleda.es/", "https://www.idealista.com/venta-viviendas/belmez-de-la-moraleda-jaen/"], "highlight": {"en": "Tucked inside the Sierra Mágina Natural Park in Jaén, Bélmez de la Moraleda is a small village (around 1,509 people) with a draw found nowhere else: las Caras de Bélmez, the famous teleplastias, now told through their own interpretation centre. Like Larva, it is a place where art, culture and the mystery of these legendary faces meet slow tourism and unspoiled nature, the perfect ground for a community to put down roots.", "it": "Immerso nel Parco Naturale Sierra Mágina, a Jaén, Bélmez de la Moraleda è un piccolo borgo (circa 1.509 abitanti) con un richiamo unico al mondo: las Caras de Bélmez, le celebri teleplastias, raccontate oggi in un centro d'interpretazione dedicato. Come Larva, è un luogo dove arte, cultura e mistero incontrano il turismo lento e una natura intatta, terreno ideale perché una comunità possa mettere radici.", "es": "En pleno Parque Natural Sierra Mágina, en Jaén, Bélmez de la Moraleda es un pueblo pequeño (en torno a 1.509 habitantes) con un atractivo único en el mundo: las Caras de Bélmez, las célebres teleplastias, hoy narradas en su propio centro de interpretación. Como Larva, es un lugar donde el arte, la cultura y el misterio se unen al turismo lento y a una naturaleza intacta, terreno ideal para que una comunidad eche raíces."}, "services": {"en": "Everyday essentials are covered: a local health centre/consultorio, a pharmacy, infant and primary school, and the Centro de Interpretación de las Caras, with the hospital in Úbeda roughly 45-55 minutes away (exact distance to be confirmed).", "it": "I servizi essenziali ci sono: consultorio/centro di salute, farmacia, scuola dell'infanzia e primaria e il Centro de Interpretación de las Caras, con l'ospedale di Úbeda a circa 45-55 minuti (distanza esatta da confermare).", "es": "Los servicios esenciales están cubiertos: consultorio/centro de salud, farmacia, educación infantil y primaria y el Centro de Interpretación de las Caras, con el hospital de Úbeda a unos 45-55 minutos (distancia exacta por confirmar)."}, "incentives": {"en": "Homes start from around 40,000€ (ruins from 12,000€), and the village is part of the Mágina cluster, which is set to benefit from incentives backed by the Diputación de Jaén and the Junta (details to be confirmed).", "it": "Le case partono da circa 40.000€ (ruderi da 12.000€) e il borgo rientra nel cluster Mágina, che potrà beneficiare di incentivi sostenuti dalla Diputación de Jaén e dalla Junta (dettagli da confermare).", "es": "Las casas parten de unos 40.000€ (ruinas desde 12.000€) y el pueblo forma parte del clúster Mágina, que podrá beneficiarse de incentivos respaldados por la Diputación de Jaén y la Junta (detalles por confirmar)."}}, "carcheles": {"name": "Cárcheles", "region": "Sierra Mágina · Jaén", "cluster": "Sierra Mágina", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/Carchelejo%2024J%2001.jpg?width=1200", "pop": "~1.293", "hosp": "Jaén ~30 km / 30–35 min", "net": "UNICO / 4G", "house": "€25.500+", "inc": false, "tags": ["🌿", "🔧"], "sources": ["https://www.foro-ciudad.com/jaen/carcheles/habitantes.html", "https://www.idealista.com/venta-viviendas/carcheles-jaen/"], "highlight": {"en": "In the heart of the Sierra Mágina, Cárcheles is a small, close-knit community living quietly among olive groves and Mediterranean mountains. Like Larva, its tiny hamlet of Cárchel offers the same intimate, human scale, while the village holds a special advantage: the best hospital access in the Mágina cluster, just 30 km from Jaén.", "it": "Nel cuore della Sierra Mágina, Cárcheles è una piccola comunità unita e raccolta, che vive in tranquillità tra oliveti e montagna mediterranea. Come Larva, il suo minuscolo nucleo di Cárchel offre la stessa scala intima e a misura d'uomo, ma il borgo ha un vantaggio speciale: la migliore accessibilità ospedaliera del cluster Mágina, a soli 30 km da Jaén.", "es": "En el corazón de la Sierra Mágina, Cárcheles es una pequeña comunidad unida y acogedora, que vive con tranquilidad entre olivares y monte mediterráneo. Como Larva, su minúsculo núcleo de Cárchel ofrece la misma escala íntima y humana, pero el pueblo tiene una ventaja especial: la mejor accesibilidad hospitalaria del clúster Mágina, a solo 30 km de Jaén."}, "services": {"en": "Essential services include a SAS health clinic with auxiliary staff and a primary school (CEIP), with the Jaén hospital just 30 km away (30-35 min via the A-44); pharmacy and shops to be confirmed.", "it": "I servizi essenziali comprendono un consultorio SAS con personale ausiliario e una scuola primaria (CEIP), con l'ospedale di Jaén a soli 30 km (30-35 min via A-44); farmacia e negozi da confermare.", "es": "Los servicios esenciales incluyen un consultorio del SAS con personal auxiliar y un colegio (CEIP), con el hospital de Jaén a solo 30 km (30-35 min por la A-44); farmacia y comercios por confirmar."}, "incentives": {"en": "Homes from 25,500 EUR and access to the Mágina cluster incentive programme make settling here especially affordable.", "it": "Case da 25.500 EUR e l'accesso al programma di incentivi del cluster Mágina rendono particolarmente accessibile trasferirsi qui.", "es": "Viviendas desde 25.500 EUR y el acceso al programa de incentivos del clúster Mágina hacen que establecerse aquí resulte especialmente asequible."}}, "jimena": {"name": "Jimena", "region": "Sierra Mágina · Jaén", "cluster": "Sierra Mágina", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/Jimena%2C%20en%20Ja%C3%A9n%20%28Espa%C3%B1a%29.jpg?width=1200", "pop": "~1.234", "hosp": "Úbeda ~26 km; Jaén ~38 min", "net": "UNICO / 4G", "house": "€44.000+", "inc": false, "tags": ["🌿", "🎨", "🔧"], "sources": ["https://www.foro-ciudad.com/jaen/jimena/habitantes.html", "https://www.idealista.com/en/venta-viviendas/jimena-jaen/", "https://www.jaenparaisointerior.es/en/w/cueva-de-la-graja"], "highlight": {"en": "Tucked into the high Sierra Mágina beneath the peak of Pico Mágina, Jimena is the rare village in the Mágina cluster whose population is gently growing (+11), a sign that life here is taking root again. With prehistoric rock art at the Cueva de la Graja, real mountain nature, and craft traditions of olive oil and figs, it offers newcomers the same warm, lived-in promise that drew us to Larva.", "it": "Incastonata nell'alta Sierra Mágina ai piedi del Pico Mágina, Jimena è il raro borgo del cluster Mágina con la popolazione in lieve crescita (+11), segno che qui la vita sta tornando a mettere radici. Con l'arte rupestre della Cueva de la Graja, una natura di montagna autentica e le tradizioni artigiane dell'olio e dei fichi, offre a chi arriva la stessa promessa calda e vissuta che ci ha portato a Larva.", "es": "Enclavada en la alta Sierra Mágina, a los pies del Pico Mágina, Jimena es el raro pueblo del clúster Mágina con población en ligero crecimiento (+11), señal de que aquí la vida vuelve a echar raíces. Con el arte rupestre de la Cueva de la Graja, una naturaleza de montaña auténtica y las tradiciones artesanas del aceite y los higos, ofrece a quien llega la misma promesa cálida y vivida que nos atrajo a Larva."}, "services": {"en": "Everyday essentials are within reach: a municipal swimming pool in the village, a local clinic and pharmacy (to be confirmed), and hospital care in Úbeda about 26 km away, with Jaén roughly 38 minutes by car and all key services under 40 minutes.", "it": "I servizi quotidiani sono a portata di mano: piscina municipale in paese, consultorio e farmacia (da confermare), e l'ospedale di Úbeda a circa 26 km, con Jaén a circa 38 minuti in auto e tutti i servizi essenziali entro 40 minuti.", "es": "Lo esencial del día a día está al alcance: piscina municipal en el pueblo, consultorio y farmacia (por confirmar), y el hospital de Úbeda a unos 26 km, con Jaén a unos 38 minutos en coche y todos los servicios clave a menos de 40 minutos."}, "incentives": {"en": "Homes start from around 44,000€, and Jimena is part of the Mágina cluster incentive program supporting people who choose to settle and build a life here.", "it": "Le case partono da circa 44.000€ e Jimena rientra nel programma di incentivi del cluster Mágina, a sostegno di chi sceglie di trasferirsi e costruire qui la propria vita.", "es": "Las viviendas parten de unos 44.000€ y Jimena forma parte del programa de incentivos del clúster Mágina, en apoyo de quienes eligen instalarse y construir aquí su vida."}}, "bedmar": {"name": "Bedmar y Garcíez", "region": "Sierra Mágina · Jaén", "cluster": "Sierra Mágina", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/Bedmar%2001.jpg?width=1200", "pop": "~355 (Garcíez) · 2.571 (mun.)", "hosp": "Úbeda (da confermare)", "net": "UNICO / 4G", "house": "€10.300+", "inc": false, "openCouncil": true, "tags": ["🌿", "🔧"], "sources": ["https://www.foro-ciudad.com/jaen/bedmar-y-garciez/habitantes.html", "https://www.diariojaen.es/provincia/financiacion-y-lucha-contra-la-despoblacion-las-directrices-de-david-prieto-por-garciez-PJ11188106", "https://www.idealista.com/en/venta-viviendas/bedmar-y-garciez-jaen/"], "highlight": {"en": "Tucked inside the Sierra Mágina Natural Park in Jaén, Bedmar y Garcíez pairs a living municipality of 2,571 with the tiny hamlet of Garcíez (~355 people) — a Larva-sized scale where new neighbours can truly take root. With homes from just €10,300 and a town hall that has publicly made fighting depopulation a priority, it is fertile ground for a community drawn to nature and craft.", "it": "Incastonato nel Parco Naturale Sierra Mágina (Jaén), Bedmar y Garcíez unisce un municipio vivo di 2.571 abitanti al minuscolo nucleo di Garcíez (~355 persone) — una scala simile a quella di Larva, dove chi arriva può davvero mettere radici. Con case da appena 10.300€ e un Comune che ha dichiarato pubblicamente la lotta allo spopolamento come priorità, è terreno fertile per una comunità legata alla natura e all'artigianato.", "es": "Enclavado en el Parque Natural Sierra Mágina (Jaén), Bedmar y Garcíez une un municipio vivo de 2.571 habitantes con el minúsculo núcleo de Garcíez (~355 personas) — una escala parecida a la de Larva, donde quien llega puede echar raíces de verdad. Con casas desde apenas 10.300€ y un Ayuntamiento que ha declarado públicamente la lucha contra la despoblación como prioridad, es terreno fértil para una comunidad ligada a la naturaleza y la artesanía."}, "services": {"en": "The municipality offers essential services — a refurbished health clinic, pharmacy, bank, shops and a CEIP school with infant education — with the nearest hospital in Úbeda, plus UNICO broadband/4G coverage (presence of these services in the Garcíez hamlet itself to be confirmed).", "it": "Il municipio dispone dei servizi essenziali — consultorio riformato, farmacia, banca, negozi e una scuola CEIP con infantil — con l'ospedale più vicino a Úbeda, oltre alla banda larga UNICO/4G (la presenza di questi servizi nel nucleo di Garcíez è da confermare).", "es": "El municipio cuenta con los servicios esenciales — consultorio reformado, farmacia, banco, comercios y un CEIP con infantil — con el hospital más cercano en Úbeda, además de banda ancha UNICO/4G (la presencia de estos servicios en el propio núcleo de Garcíez está por confirmar)."}, "incentives": {"en": "Very affordable homes (around 31 houses from €10,300) sit alongside Sierra Mágina cluster incentives, backed by a town hall that has publicly committed to reversing depopulation, especially in Garcíez.", "it": "Case economicissime (circa 31 abitazioni da 10.300€) si affiancano agli incentivi del cluster Sierra Mágina, sostenuti da un Comune che si è impegnato pubblicamente a invertire lo spopolamento, in particolare a Garcíez.", "es": "Viviendas muy económicas (unas 31 casas desde 10.300€) se suman a los incentivos del clúster Sierra Mágina, respaldados por un Ayuntamiento que se ha comprometido públicamente a revertir la despoblación, especialmente en Garcíez."}}, "segura": {"name": "Segura de la Sierra", "region": "Sierra de Segura · Jaén", "cluster": "Sierra de Segura", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/DSC00226-Segura%20de%20la%20Sierra-Jaen.jpg?width=1200", "pop": "~1.688", "hosp": "Alta Resolución (Puente de Génave) ~25 km / 31 min", "net": "fibra ~64% · 4G ~99%", "house": "€16.000+", "inc": true, "tags": ["🎶", "🎨", "🌿", "🔧"], "sources": ["https://www.foro-ciudad.com/jaen/segura-de-la-sierra/habitantes.html", "https://vivemasandalucia.es/municipios/segura-de-la-sierra/", "https://fondoseuropeos.dipujaen.es/", "https://lospueblosmasbonitosdeespana.org/pueblos/segura-de-la-sierra/"], "highlight": {"en": "A medieval village ranked among Spain's \"Pueblos más bonitos\" and protected as a Conjunto Histórico, Segura de la Sierra holds a magnetic pull for artists. Like Larva, it is a small, character-rich place where a community can take root around art and music, culture and heritage, nature and craft.", "it": "Borgo medievale tra i \"Pueblos más bonitos de España\" e tutelato come Conjunto Histórico, Segura de la Sierra esercita un richiamo fortissimo sugli artisti. Come Larva, è un luogo piccolo e ricco di carattere, dove una comunità può mettere radici intorno ad arte e musica, cultura e patrimonio, natura e artigianato.", "es": "Pueblo medieval entre los \"Pueblos más bonitos de España\" y protegido como Conjunto Histórico, Segura de la Sierra ejerce un altísimo atractivo para los artistas. Como Larva, es un lugar pequeño y lleno de carácter, donde una comunidad puede echar raíces en torno al arte y la música, la cultura y el patrimonio, la naturaleza y la artesanía."}, "services": {"en": "Essential services are covered with local consultorios and a pharmacy, full schooling (Infantil, Primaria, ESO and Bachillerato) in the Cortijos Nuevos district, and the Alta Resolución hospital in Puente de Génave about 25 km / 31 min away.", "it": "I servizi essenziali ci sono: consultori medici e farmacia in paese, scuola completa (Infantil, Primaria, ESO e Bachillerato) nella pedania di Cortijos Nuevos e l'ospedale di Alta Resolución a Puente de Génave a circa 25 km / 31 min.", "es": "Los servicios esenciales están cubiertos: consultorios y farmacia en el pueblo, escolarización completa (Infantil, Primaria, ESO y Bachillerato) en la pedanía de Cortijos Nuevos y el hospital de Alta Resolución en Puente de Génave a unos 25 km / 31 min."}, "incentives": {"en": "Housing support is confirmed and active: the Diputación de Jaén offers up to 10,000€ for first-time buyers under 35 (applications open until 30/11/2026), plus a reduced ITP transfer tax of 3.5%, with homes starting from 16,000€.", "it": "L'incentivo casa è confermato e attivo: la Diputación de Jaén offre fino a 10.000€ per gli under 35 alla prima casa (domande fino al 30/11/2026), oltre all'ITP ridotta al 3,5%, con case a partire da 16.000€.", "es": "La ayuda a la vivienda está confirmada y activa: la Diputación de Jaén ofrece hasta 10.000€ para menores de 35 años en primera vivienda (solicitudes hasta el 30/11/2026), además del ITP reducido al 3,5%, con casas desde 16.000€."}}, "benatae": {"name": "Benatae", "region": "Sierra de Segura · Jaén", "cluster": "Sierra de Segura", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/Benatae%2C%20en%20Ja%C3%A9n%20%28Espa%C3%B1a%29.jpg?width=1200", "pop": "~429", "hosp": "Alta Resolución ~13–14 km / 15–20 min", "net": "fibra ~84% · 4G ~98%", "house": "da confermare", "inc": true, "tags": ["🌿", "🔧"], "sources": ["https://www.foro-ciudad.com/jaen/benatae/habitantes.html", "https://vivemasandalucia.es/municipios/benatae/", "https://fondoseuropeos.dipujaen.es/"], "highlight": {"en": "Benatae is a tiny village of around 429 people in the Sierra de Segura (Jaén), the same minimal scale as Larva, set in an authentic natural-park landscape. That intimate size is exactly what makes it ideal for the project: the perfect ground for a small, close-knit community to take root, with room for nature and craftsmanship.", "it": "Benatae è un piccolo borgo di circa 429 abitanti nella Sierra de Segura (Jaén), la stessa scala minima di Larva, immerso nell'ambiente autentico del parco naturale. Proprio questa dimensione raccolta lo rende ideale per il progetto: il terreno perfetto perché una piccola comunità coesa metta radici, con spazio per natura e artigianato.", "es": "Benatae es un pequeño pueblo de unos 429 habitantes en la Sierra de Segura (Jaén), la misma escala mínima que Larva, en el entorno auténtico del parque natural. Es precisamente ese tamaño íntimo lo que lo hace ideal para el proyecto: el terreno perfecto para que arraigue una pequeña comunidad unida, con espacio para la naturaleza y la artesanía."}, "services": {"en": "Everyday essentials are covered with a local health clinic (consultorio) and a pharmacy, plus the Hospital de Alta Resolución in Puente de Génave just 13-14 km away (15-20 min); infant/primary school is not in the village (to be confirmed, likely commuting to nearby towns).", "it": "I servizi essenziali sono coperti da un consultorio medico e una farmacia in paese, con l'Ospedale di Alta Resolución di Puente de Génave a soli 13-14 km (15-20 min); la scuola dell'infanzia/primaria non è in loco (da confermare, probabile pendolarismo verso comuni vicini).", "es": "Los servicios esenciales están cubiertos con un consultorio médico y una farmacia en el pueblo, además del Hospital de Alta Resolución de Puente de Génave a solo 13-14 km (15-20 min); la escuela infantil/primaria no está en el municipio (por confirmar, probable desplazamiento a pueblos cercanos)."}, "incentives": {"en": "A housing incentive is confirmed for Benatae, in line with the rest of the Segura cluster, to help newcomers settle in.", "it": "Per Benatae è confermato un incentivo casa, in linea con il resto del cluster Segura, a sostegno di chi sceglie di trasferirsi.", "es": "Para Benatae está confirmado un incentivo a la vivienda, en línea con el resto del clúster de Segura, para ayudar a quienes deciden instalarse."}}, "hornos": {"name": "Hornos", "region": "Sierra de Segura · Jaén", "cluster": "Sierra de Segura", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/Hornos%2C%20en%20Ja%C3%A9n%20%28Espa%C3%B1a%29.jpg?width=1200", "pop": "~573", "hosp": "Alta Resolución ~28 km / 32–34 min", "net": "fibra ~64% · 4G ~99%", "house": "€36.000+", "inc": true, "tags": ["🎨", "🌿"], "sources": ["https://www.foro-ciudad.com/jaen/hornos/habitantes.html", "https://vivemasandalucia.es/municipios/hornos/", "https://www.idealista.com/en/venta-viviendas/hornos-jaen/"], "highlight": {"en": "Perched on a hilltop within the Cazorla-Segura-Las Villas Natural Park, Hornos is a Conjunto Histórico-Artístico crowned by a castle, with breathtaking views over the Tranco reservoir. Like Larva, it offers a spectacular setting and quiet community life, ready to welcome people drawn to nature, art, music and craftsmanship.", "it": "Arroccato all'interno del Parco Naturale Cazorla-Segura-Las Villas, Hornos è un Conjunto Histórico-Artístico coronato da un castello, con una vista mozzafiato sull'embalse del Tranco. Come Larva, offre una scenografia spettacolare e una vita di comunità tranquilla, pronta ad accogliere chi cerca natura, arte, musica e artigianato.", "es": "Encaramado en lo alto, dentro del Parque Natural de Cazorla-Segura-Las Villas, Hornos es un Conjunto Histórico-Artístico coronado por un castillo, con vistas impresionantes al embalse del Tranco. Como Larva, ofrece un escenario espectacular y una vida en comunidad tranquila, lista para acoger a quienes buscan naturaleza, arte, música y artesanía."}, "services": {"en": "Hornos has essential services covered: two health clinics (consultorios), a pharmacy, an infant and primary school, a bank, a taxi and ample tourist accommodation, with the Alta Resolución hospital in Puente de Génave about 28 km away (around 32-34 min).", "it": "Hornos copre i servizi essenziali: due consultori, una farmacia, scuola dell'infanzia e primaria, una banca, un taxi e un'ampia ricettività turistica, con l'ospedale di Alta Resolución di Puente de Génave a circa 28 km (32-34 min).", "es": "Hornos cubre los servicios esenciales: dos consultorios, una farmacia, escuela infantil y primaria, un banco, un taxi y amplia oferta de alojamiento turístico, con el hospital de Alta Resolución de Puente de Génave a unos 28 km (32-34 min)."}, "incentives": {"en": "Housing incentive confirmed: with homes from 36,000€ (and from 10,000€ in the surrounding area) and many empty or second houses to restore, the programme supports those who choose to make Hornos their home.", "it": "Incentivo casa confermato: con abitazioni a partire da 36.000€ (e da 10.000€ nell'area circostante) e molte case vuote o seconde case da recuperare, il programma sostiene chi sceglie di vivere a Hornos.", "es": "Incentivo a la vivienda confirmado: con casas desde 36.000€ (y desde 10.000€ en la zona) y muchas viviendas vacías o segundas residencias por recuperar, el programa apoya a quienes eligen hacer de Hornos su hogar."}}, "torres": {"name": "Torres de Albánchez", "region": "Sierra de Segura · Jaén", "cluster": "Sierra de Segura", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/JDCANO%20Torres%20Albanchez.jpg?width=1200", "pop": "~741", "hosp": "Alta Resolución ~25–30 min", "net": "fibra ~87% · 4G 100%", "house": "da confermare (economico)", "inc": true, "tags": ["💻", "🔧", "🌿"], "sources": ["https://www.foro-ciudad.com/jaen/torres-de-albanchez/habitantes.html", "https://vivemasandalucia.es/municipios/torres-de-albanchez/", "https://www.torresdealbanchez.es/"], "highlight": {"en": "Tucked into the Sierra de Segura with around 741 residents, Torres de Albánchez offers the same warm, human scale that makes Larva special, set in a quiet natural park crowned by a medieval keep. With the best connectivity in the cluster (fibre reaching about 87% and full 4G coverage), it's a natural home for artists, makers and anyone who lives by remote and tech work.", "it": "Immersa nella Sierra de Segura con circa 741 abitanti, Torres de Albánchez offre la stessa scala raccolta e umana che rende speciale Larva, in un ambiente tranquillo nel parco e dominata da un torreón medievale. Con la migliore connettività del cluster (fibra intorno all'87% e copertura 4G completa), è la casa ideale per artisti, artigiani e per chi vive di lavoro da remoto e tech.", "es": "Enclavada en la Sierra de Segura con unos 741 habitantes, Torres de Albánchez ofrece la misma escala recogida y humana que hace especial a Larva, en un entorno tranquilo dentro del parque y coronada por un torreón medieval. Con la mejor conectividad del clúster (fibra en torno al 87% y cobertura 4G completa), es un hogar natural para artistas, artesanos y quienes viven del trabajo en remoto y tech."}, "services": {"en": "Everyday essentials are covered with a local health clinic, a pharmacy and a school for infant and primary education (ESO is not available in the village).", "it": "I servizi essenziali sono presenti: un consultorio medico, una farmacia e una scuola dell'infanzia e primaria (la ESO non è disponibile in loco).", "es": "Los servicios esenciales están cubiertos: un consultorio médico, una farmacia y una escuela de infantil y primaria (la ESO no está disponible en el pueblo)."}, "incentives": {"en": "Housing is affordable and a housing incentive is confirmed as part of the programme to help new residents settle in (single-municipality prices to be confirmed).", "it": "Le case sono accessibili e un incentivo casa è confermato nell'ambito del programma per aiutare i nuovi residenti a stabilirsi (i prezzi del singolo comune sono da confermare).", "es": "Las viviendas son asequibles y hay un incentivo de vivienda confirmado dentro del programa para ayudar a los nuevos residentes a instalarse (los precios del municipio están por confirmar)."}}, "galera": {"name": "Galera", "region": "Altiplano · Granada", "cluster": "Altiplano de Granada", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/J23%20387%20Galera%2C%20H%C3%B6hlenwohnungen.jpg?width=1200", "pop": "~1.116", "hosp": "Baza ~44–45 km / 36–39 min", "net": "fibra (Excom/Habland)", "house": "case-grotta €22.000+", "inc": false, "tags": ["🎨", "🌌", "🐾"], "sources": ["https://www.foro-ciudad.com/granada/galera/habitantes.html", "https://www.idealista.com/en/venta-viviendas/galera-granada/", "https://www.excom.es/internet/galera/"], "highlight": {"en": "Tucked into Granada's Altiplano de Huéscar, Galera holds around 1,116 residents and a rare treasure: bioclimatic cave-houses, affordable and one of a kind, with the Tútugi archaeological site and a UNESCO Geopark all around. Like Larva, it is a small, stable community where natural and cultural richness make it a magnet for artists drawn to art, culture, nature and some of the clearest starry skies for astrotourism.", "it": "Incastonata nell'Altiplano de Granada (Huéscar), Galera conta circa 1.116 abitanti e custodisce un tesoro raro: le case-grotta bioclimatiche, economiche e uniche, con il sito archeologico di Tútugi e un Geoparco UNESCO tutt'intorno. Come Larva, è una piccola comunità stabile dove la ricchezza naturale e culturale la rende un magnete per gli artisti, ideale per arte, cultura, natura e per un cielo stellato perfetto per l'astroturismo.", "es": "Enclavada en el Altiplano de Granada (Huéscar), Galera tiene unos 1.116 habitantes y guarda un tesoro poco común: casas-cueva bioclimáticas, económicas y únicas, junto al yacimiento arqueológico de Tútugi y un Geoparque UNESCO. Como Larva, es una comunidad pequeña y estable cuya riqueza natural y cultural la convierte en un imán para artistas, perfecta para arte, cultura, naturaleza y un cielo estrellado ideal para el astroturismo."}, "services": {"en": "Everyday essentials are in place: a local health clinic (zona básica) and pharmacy, a school, and around 200 tourist beds in cave-houses, with confirmed fibre internet; the nearest hospital is in Baza, about 44-45 km away (roughly 36-39 min).", "it": "I servizi essenziali ci sono: consultorio medico (zona básica) e farmacia, una scuola e circa 200 posti letto turistici nelle case-grotta, con fibra confermata; l'ospedale più vicino è a Baza, a circa 44-45 km (circa 36-39 min).", "es": "Los servicios esenciales están cubiertos: consultorio médico (zona básica) y farmacia, una escuela y unas 200 plazas turísticas en casas-cueva, con fibra confirmada; el hospital más cercano está en Baza, a unos 44-45 km (unos 36-39 min)."}, "incentives": {"en": "Housing help comes through the \"Granada se puebla\" programme (Diputación de Granada) together with the GDR Altiplano (LEADER), with cave-houses starting from 22,000 euros (average around 99,950 euros, about 464 euros/m2).", "it": "Gli aiuti per la casa arrivano dal programma \"Granada se puebla\" (Diputación de Granada) insieme al GDR Altiplano (LEADER), con case-grotta a partire da 22.000 euro (media circa 99.950 euro, circa 464 euro/m2).", "es": "Las ayudas a la vivienda llegan a través del programa \"Granada se puebla\" (Diputación de Granada) junto con el GDR Altiplano (LEADER), con casas-cueva desde 22.000 euros (media en torno a 99.950 euros, unos 464 euros/m2)."}}, "orce": {"name": "Orce", "region": "Altiplano · Granada", "cluster": "Altiplano de Granada", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/20250217%20103146%20Castillo%20Orce.jpg?width=1200", "pop": "~1.148", "hosp": "Baza ~45 km / 45 min", "net": "fibra (Excom/Habland)", "house": "€45.000+ (grotta 45–52k)", "inc": false, "tags": ["📚", "🌌"], "sources": ["https://www.foro-ciudad.com/granada/orce/habitantes.html", "https://www.idealista.com/en/venta-viviendas/orce-granada/", "https://www.orce.es/los-yacimientos/"], "highlight": {"en": "Orce sits on the Altiplano de Granada, hailed as the \"cradle of European prehistory\" thanks to the Venta Micena deposits dating back over 1.4 million years, set within a UNESCO Geopark under some of the clearest starry skies in the region. Like Larva, it is a small, welcoming village that draws artists, researchers and slow-travel lovers seeking culture, nature and astrotourism.", "it": "Orce si trova sull'Altiplano de Granada, celebrata come \"capitale della preistoria europea\" grazie ai giacimenti di Venta Micena, vecchi di oltre 1,4 milioni di anni, immersa in un Geoparco UNESCO sotto un cielo stellato limpidissimo. Come Larva, è un piccolo borgo accogliente che attira artisti, ricercatori e amanti del turismo lento in cerca di cultura, natura e astroturismo.", "es": "Orce se asienta en el Altiplano de Granada, reconocida como la \"capital de la prehistoria europea\" gracias a los yacimientos de Venta Micena, de más de 1,4 millones de años, dentro de un Geoparque UNESCO bajo un cielo estrellado nítido. Como Larva, es un pueblo pequeño y acogedor que atrae a artistas, investigadores y amantes del turismo lento en busca de cultura, naturaleza y astroturismo."}, "services": {"en": "Everyday essentials are covered with a local medical clinic, a pharmacy, a school and archaeological interpretation centres, while the nearest hospital is in Baza, about 45 km / 45 minutes away.", "it": "I servizi essenziali sono garantiti da consultorio medico, farmacia, scuola e centri di interpretazione archeologica, mentre l'ospedale più vicino è a Baza, a circa 45 km / 45 minuti.", "es": "Los servicios esenciales están cubiertos con consultorio médico, farmacia, escuela y centros de interpretación arqueológica, mientras que el hospital más cercano está en Baza, a unos 45 km / 45 minutos."}, "incentives": {"en": "Settling in is supported by housing aid programmes such as \"Granada se puebla\" and the GDR Altiplano, with homes starting from 45,000€ (typical cave-houses around 45,000-52,000€).", "it": "Il trasferimento è sostenuto da programmi di aiuto alla casa come \"Granada se puebla\" e il GDR Altiplano, con abitazioni a partire da 45.000€ (le tipiche case-grotta tra 45.000 e 52.000€).", "es": "La instalación cuenta con programas de ayuda a la vivienda como \"Granada se puebla\" y el GDR Altiplano, con casas desde 45.000€ (las típicas casas-cueva entre 45.000 y 52.000€)."}}, "castillejar": {"name": "Castilléjar", "region": "Altiplano · Granada", "cluster": "Altiplano de Granada", "photo": "https://commons.wikimedia.org/wiki/Special:FilePath/Castill%C3%A9jar%2C%20en%20Granada%20%28Espa%C3%B1a%29.jpg?width=1200", "pop": "~1.289", "hosp": "Baza ~31 km / 34–48 min", "net": "fibra (fino 600 Mb)", "house": "€20.000+ (case-grotta)", "inc": false, "tags": ["💻", "🔧", "🌿"], "sources": ["https://www.foro-ciudad.com/granada/castillejar/habitantes.html", "https://www.sspa.juntadeandalucia.es/servicioandaluzdesalud/", "https://www.idealista.com/en/venta-viviendas/castillejar-granada/"], "highlight": {"en": "Set in Granada's Altiplano (Huéscar region) where two rivers meet, Castilléjar (~1,289 inhabitants) offers calm rural life and famously affordable cave houses that stay at a constant temperature year-round. Like Larva, it's a quiet village ready to welcome artists, makers and remote workers, with some of the best connectivity around (multiple operators, up to 600 Mb) and the countryside of Galera and Orce nearby.", "it": "Immerso nell'Altiplano di Granada (comarca di Huéscar), alla confluenza di due fiumi, Castilléjar (~1.289 abitanti) regala una vita rurale tranquilla e case-grotta molto economiche che restano a temperatura costante tutto l'anno. Come Larva, è un borgo sereno pronto ad accogliere artisti, artigiani e chi lavora da remoto, con una delle connettività migliori della zona (più operatori, fino a 600 Mb) e la natura di Galera e Orce a due passi.", "es": "En el Altiplano de Granada (comarca de Huéscar), en la confluencia de dos ríos, Castilléjar (~1.289 habitantes) ofrece una vida rural tranquila y casas-cueva muy económicas que se mantienen a temperatura constante todo el año. Como Larva, es un pueblo sereno listo para acoger a artistas, artesanos y teletrabajadores, con una de las mejores conectividades de la zona (varios operadores, hasta 600 Mb) y la naturaleza de Galera y Orce muy cerca."}, "services": {"en": "Essential services on the spot: a health centre (family medicine, paediatrics and nursing), pharmacy, supermarket, town hall and school, with the hospital in Baza about 31 km away (34-48 min).", "it": "Servizi essenziali sul posto: consultorio (medicina di famiglia, pediatria e infermeria), farmacia, supermercato, municipio e scuola, con l'ospedale di Baza a circa 31 km (34-48 min).", "es": "Servicios esenciales en el propio pueblo: consultorio (medicina de familia, pediatría y enfermería), farmacia, supermercado, ayuntamiento y colegio, con el hospital de Baza a unos 31 km (34-48 min)."}, "incentives": {"en": "Homes are very affordable (around 24 from 20,000€, with a wide range up to 125,000-135,000€ for renovated ones), and buyers may benefit from housing support such as the reduced ITP transfer tax (from 8% to 3.5% in municipalities under 3,000 inhabitants), the \"Granada se puebla\" programme and the Altiplano GDR; details to be confirmed case by case.", "it": "Le case sono molto economiche (circa 24 a partire da 20.000€, con una fascia ampia fino a 125.000-135.000€ per quelle ristrutturate) e chi acquista può beneficiare di aiuti casa come l'ITP ridotta (dall'8% al 3,5% nei comuni sotto i 3.000 abitanti), il programma \"Granada se puebla\" e il GDR Altiplano; dettagli da confermare caso per caso.", "es": "Las viviendas son muy económicas (unas 24 desde 20.000€, con una franja amplia hasta 125.000-135.000€ las rehabilitadas) y quien compra puede beneficiarse de ayudas a la vivienda como el ITP reducido (del 8% al 3,5% en municipios de menos de 3.000 habitantes), el programa \"Granada se puebla\" y el GDR Altiplano; detalles por confirmar caso por caso."}}};
