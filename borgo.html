<style>
  :root{--paper:#f6efe3;--cream:#fbf7ee;--ink:#2a211b;--terracotta:#c2562f;--terra-deep:#9c3d1d;--olive:#6b7148;--ok:#3f7d4f;--line:#e2d6c2;--dust:#8a7c6a;--radius:18px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Hanken Grotesk",system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;font-size:18px;-webkit-font-smoothing:antialiased}
  h1,h2,h3{font-family:"Fraunces",Georgia,serif;font-weight:400;letter-spacing:-.01em}
  a{color:var(--terracotta)}
  .wrap{max-width:900px;margin:0 auto;padding:0 22px}
  header{background:rgba(246,239,227,.92);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;backdrop-filter:blur(8px)}
  .head-in{display:flex;align-items:center;justify-content:space-between;height:62px;gap:14px}
  .brand{display:flex;align-items:center;gap:10px;font-family:"Fraunces",serif;font-size:1.3rem;text-decoration:none;color:var(--ink)}
  .brand .dot{width:11px;height:11px;border-radius:50%;background:var(--terracotta)}
  .hr{display:flex;align-items:center;gap:14px}
  .home{font-size:.86rem;font-weight:600;color:var(--terracotta);text-decoration:none;white-space:nowrap}
  .lang{display:flex;border:1px solid var(--line);border-radius:100px;overflow:hidden;background:rgba(255,255,255,.5)}
  .lang button{border:none;background:transparent;font-family:inherit;font-size:.72rem;font-weight:700;padding:7px 9px;cursor:pointer;color:var(--dust)}
  .lang button.on{background:var(--terracotta);color:#fff}
  .hero{position:relative;height:340px;overflow:hidden}
  .hero img{width:100%;height:100%;object-fit:cover;display:block}
  .hero .shade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,12,8,.12),rgba(20,12,8,.55))}
  .hero .cap{position:absolute;left:0;right:0;bottom:0;padding:26px 0}
  .hero .cap .wrap{color:#fff}
  .hero h1{font-size:clamp(2rem,6vw,3rem);color:#fff;margin-bottom:4px}
  .hero .reg{color:#ffe9d4;font-weight:600;letter-spacing:.02em}
  .badges{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
  .badge{font-size:.66rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border-radius:99px;padding:5px 11px}
  .b-soon{background:rgba(255,255,255,.92);color:#8a6a3a}
  .b-inc{background:var(--ok);color:#fff}
  .b-open{background:var(--olive);color:#fff}
  main{padding:34px 0 70px}
  .data{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:4px 0 30px}
  @media(max-width:680px){.data{grid-template-columns:1fr 1fr}}
  .d{background:var(--cream);border:1px solid var(--line);border-radius:14px;padding:14px 16px}
  .d .k{font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--dust)}
  .d .v{font-size:1.02rem;margin-top:3px}
  .lead{font-size:1.2rem;color:#3f352c;margin-bottom:28px}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:26px;margin-bottom:28px}
  @media(max-width:680px){.cols{grid-template-columns:1fr}}
  .box h3{font-size:1.2rem;margin-bottom:6px;color:var(--terra-deep)}
  .suits{font-size:1.6rem;letter-spacing:6px;margin-top:6px}
  .kick{font-size:.74rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--terracotta);margin-bottom:14px}
  .cta{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin:10px 0 26px}
  .btn{display:inline-flex;align-items:center;gap:8px;font-weight:700;border-radius:99px;padding:15px 28px;text-decoration:none;transition:.2s}
  .btn-p{background:var(--terracotta);color:#fff}.btn-p:hover{background:var(--terra-deep)}
  .btn-g{border:2px solid var(--ink);color:var(--ink)}.btn-g:hover{background:var(--ink);color:var(--cream)}
  .sources{font-size:.86rem;color:var(--dust)}
  .sources a{color:var(--dust);margin-right:12px}
  .note{font-size:.85rem;color:#9a8a76;font-style:italic;border-top:1px solid var(--line);margin-top:26px;padding-top:16px}
  footer{border-top:1px solid var(--line);padding:24px 0;color:var(--dust);font-size:.85rem;text-align:center}
  footer a{color:var(--terracotta);text-decoration:none}
</style>
</head>
